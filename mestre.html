<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Multi-Tela do Mestre (OBS) - Ordem Paranormal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        /* Fundo transparente para o OBS */
        body {
            background-color: transparent !important;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Verdana', sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        #setup-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(18, 18, 20, 0.95);
            padding: 30px;
            border: 2px solid #00b0ff;
            color: white;
            border-radius: 12px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            text-align: center;
            width: 400px;
        }

        #setup-box textarea {
            background: #111;
            border: 1px solid #555;
            color: white;
            padding: 12px;
            width: 90%;
            height: 120px;
            margin-bottom: 20px;
            font-size: 0.9em;
            border-radius: 6px;
            resize: none;
        }

        #setup-box button {
            background: #00b0ff;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-weight: 900;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
            width: 100%;
        }
        
        #setup-box button:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* --- LAYOUT DE MÚLTIPLOS JOGADORES --- */
        .master-layout {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 40px; 
            width: 100%;
            height: 100%;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
        }

        /* --- FOTO DO PERSONAGEM --- */
        .portrait-container {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }

        .portrait-container:hover {
            transform: scale(1.05);
        }

        .portrait-container img {
            height: 35vh; 
            max-height: 350px;
            object-fit: contain;
            border: none;
            outline: none;
            background: transparent;
            transition: all 0.4s ease-in-out;
        }

        /* Auras de Status */
        .aura-normal { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2)); }
        .aura-lesionado { filter: drop-shadow(0 0 30px rgba(229, 57, 53, 0.9)); }
        .aura-inconsciente { filter: drop-shadow(0 0 30px rgba(150, 0, 0, 1)); }
        .aura-morrendo { filter: drop-shadow(0 0 40px rgba(255, 0, 0, 1)); animation: pulseRed 1.2s infinite; }
        .aura-enlouquecendo { filter: drop-shadow(0 0 40px rgba(0, 176, 255, 1)); animation: pulseBlue 1.2s infinite; }
        .aura-les-enlouq { filter: drop-shadow(0 0 35px rgba(138, 43, 226, 1)); animation: pulsePurple 1.2s infinite; } 

        @keyframes pulseRed { 0% { filter: drop-shadow(0 0 15px rgba(255,0,0,0.8)); } 50% { filter: drop-shadow(0 0 40px rgba(255,0,0,1)); } 100% { filter: drop-shadow(0 0 15px rgba(255,0,0,0.8)); } }
        @keyframes pulseBlue { 0% { filter: drop-shadow(0 0 15px rgba(0,176,255,0.8)); } 50% { filter: drop-shadow(0 0 40px rgba(0,176,255,1)); } 100% { filter: drop-shadow(0 0 15px rgba(0,176,255,0.8)); } }
        @keyframes pulsePurple { 0% { filter: drop-shadow(0 0 15px rgba(138,43,226,0.8)); } 50% { filter: drop-shadow(0 0 40px rgba(138,43,226,1)); } 100% { filter: drop-shadow(0 0 15px rgba(138,43,226,0.8)); } }

        /* --- STATUS FLUTUANTES (NEON) --- */
        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            font-size: 4rem; 
            font-weight: 900;
            text-align: center;
            user-select: none;
            pointer-events: none; /* Deixa o clique passar reto caso o mestre esbarre nos números */
        }

        .vida-stat, .sani-stat, .ammo-stat { color: #f2f2f2; line-height: 1.1; }
        .vida-stat { text-shadow: 0 0 10px #ff4d4d, 0 0 20px #ff4d4d, 0 0 35px #cc0000; }
        .sani-stat { text-shadow: 0 0 10px #b366ff, 0 0 20px #b366ff, 0 0 35px #6600cc; }
        .ammo-stat { text-shadow: 0 0 10px #ffff33, 0 0 20px #ffff33, 0 0 35px #cca300; display: none;}
    </style>
</head>
<body ondblclick="showSetup()">

    <div id="setup-box">
        <h2 style="margin-top: 0; color: #00b0ff; text-transform: uppercase; font-size: 1.3em;">Conectar Jogadores</h2>
        <div style="font-size: 0.85em; margin-bottom: 15px; color: #aaa;">Cole os Links ou as IDs geradas nas fichas.<br><b>Pode colocar vários (um por linha ou separados por vírgula):</b></div>
        <textarea id="master_sync_input" placeholder="Ex:\nhttp://.../ficha.html?id=Arthur\nhttp://.../ficha.html?id=Joui"></textarea>
        <br>
        <button onclick="connect()">CONECTAR TELA</button>
        <div style="font-size: 0.7em; margin-top:15px; color:#666;">Dê um <b>DUPLO CLIQUE</b> na tela depois para reabrir este menu.</div>
    </div>

    <div class="master-layout" id="main-layout" style="display: none;">
        </div>

<script>
    // --- SUA CONFIGURAÇÃO DO FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyB3Ivin8vJWA7qB5WwRo23KfQpT38BP0e4",
        authDomain: "ficha-3f03e.firebaseapp.com",
        databaseURL: "https://ficha-3f03e-default-rtdb.firebaseio.com/",
        projectId: "ficha-3f03e",
        storageBucket: "ficha-3f03e.firebasestorage.app",
        messagingSenderId: "95581213733",
        appId: "1:95581213733:web:38c415b15cabacb3da1bcc",
        measurementId: "G-CD45HV17NP"
    };
    // Inicializando o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Puxa as IDs da URL se já estiver configurado
    const urlParams = new URLSearchParams(window.location.search);
    let idsParam = urlParams.get('ids');
    let players = [];

    if (idsParam) {
        players = idsParam.split(',').filter(id => id.trim() !== "");
        if (players.length > 0) {
            document.getElementById('setup-box').style.display = 'none';
            buildLayout();
            startSync();
        }
    }

    function connect() {
        let rawVal = document.getElementById('master_sync_input').value;
        if(!rawVal.trim()) return;

        let rawList = rawVal.split(/[\n,]/);
        let cleanIds = rawList.map(s => {
            let clean = s.trim();
            if (clean.includes('?id=')) {
                clean = clean.split('?id=')[1].split('&')[0];
            }
            return clean;
        }).filter(s => s !== ""); 

        cleanIds = [...new Set(cleanIds)];
        if(cleanIds.length === 0) return;
        
        window.location.href = '?ids=' + cleanIds.join(',');
    }

    function showSetup() {
        document.getElementById('setup-box').style.display = 'block';
    }

    // Função que abre a ficha clicada em uma nova guia
    function viewSheet(id) {
        let baseUrl = window.location.href.split('?')[0]; 
        if(baseUrl.endsWith('mestre.html')) {
            baseUrl = baseUrl.replace('mestre.html', 'ficha.html');
        } else {
            let lastSlash = baseUrl.lastIndexOf('/');
            baseUrl = baseUrl.substring(0, lastSlash) + '/ficha.html';
        }
        window.open(baseUrl + '?id=' + id, '_blank');
    }

    // Cria as estruturas de HTML para cada jogador na tela
    function buildLayout() {
        const container = document.getElementById('main-layout');
        container.style.display = 'flex';
        container.innerHTML = '';
        
        players.forEach(id => {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.id = 'card-' + id;
            
            card.innerHTML = `
                <div class="portrait-container" onclick="viewSheet('${id}')" title="Clique para abrir a ficha de ${id}">
                    <img id="obs_img_${id}" src="" class="aura-normal" style="display: none;">
                </div>
                <div class="stats-container">
                    <div id="obs_vida_${id}" class="vida-stat">0/0</div>
                    <div id="obs_sani_${id}" class="sani-stat">0/0</div>
                    <div id="obs_ammo_${id}" class="ammo-stat">0</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // MAGIA DO FIREBASE (Lê em tempo real)
    function startSync() {
        players.forEach(id => {
            db.ref('fichas/' + id).on('value', (snap) => {
                const d = snap.val();
                if(d) {
                    // Pega vida/sani da estrutura completa (Ficha V71)
                    let vA = (d.info && d.info.vida_atual) ? d.info.vida_atual : "0";
                    let vM = (d.info && d.info.vida_max) ? d.info.vida_max : "0";
                    let sA = (d.info && d.info.sani_atual) ? d.info.sani_atual : "0";
                    let sM = (d.info && d.info.sani_max) ? d.info.sani_max : "0";

                    document.getElementById('obs_vida_' + id).innerText = vA + "/" + vM;
                    document.getElementById('obs_sani_' + id).innerText = sA + "/" + sM;

                    // Pega status
                    let charImages = d.charImages || {};
                    let charStatus = d.charStatus || { lesionado: false, inconsciente: false, morrendo: false, enlouquecendo: false };
                    let baseImg = (d.info && d.info.char_img) ? d.info.char_img : "";

                    let imgUrl = charImages.normal || baseImg;
                    let auraClass = "aura-normal";

                    if (charStatus.morrendo && charImages.morrendo) { 
                        imgUrl = charImages.morrendo; auraClass = "aura-morrendo"; 
                    } else if (charStatus.inconsciente && charImages.inconsciente) { 
                        imgUrl = charImages.inconsciente; auraClass = "aura-inconsciente"; 
                    } else if (charStatus.lesionado && charStatus.enlouquecendo && charImages.les_enlouq) { 
                        imgUrl = charImages.les_enlouq; auraClass = "aura-les-enlouq"; 
                    } else if (charStatus.enlouquecendo && charImages.enlouquecendo) { 
                        imgUrl = charImages.enlouquecendo; auraClass = "aura-enlouquecendo"; 
                    } else if (charStatus.lesionado && charImages.lesionado) { 
                        imgUrl = charImages.lesionado; auraClass = "aura-lesionado"; 
                    } else {
                        if(charStatus.morrendo) auraClass = "aura-morrendo";
                        else if(charStatus.inconsciente) auraClass = "aura-inconsciente";
                        else if(charStatus.lesionado && charStatus.enlouquecendo) auraClass = "aura-les-enlouq";
                        else if(charStatus.lesionado) auraClass = "aura-lesionado";
                        else if(charStatus.enlouquecendo) auraClass = "aura-enlouquecendo";
                    }

                    const imgEl = document.getElementById('obs_img_' + id);
                    if(imgUrl && imgUrl !== "") {
                        imgEl.style.display = "block";
                        if(imgEl.src !== imgUrl) imgEl.src = imgUrl;
                        imgEl.className = auraClass;
                    } else {
                        imgEl.style.display = "none";
                    }

                    // Pega Munição da estrutura gigante
                    let activeFirearm = null;
                    if(d.inv) {
                        activeFirearm = d.inv.find(item => item.eq === true && item.type === 'arma' && item.ammo !== 'Nenhuma');
                    }

                    const ammoEl = document.getElementById('obs_ammo_' + id);
                    if(activeFirearm) {
                        ammoEl.style.display = 'block';
                        ammoEl.innerText = activeFirearm.currentShots || "0";
                        if(parseInt(activeFirearm.currentShots) <= 0) {
                            ammoEl.style.opacity = "0.5";
                            ammoEl.style.textShadow = "0 0 15px #ff4d4d"; 
                        } else {
                            ammoEl.style.opacity = "1";
                            ammoEl.style.textShadow = "0 0 10px #ffff33, 0 0 20px #ffff33, 0 0 35px #cca300";
                        }
                    } else {
                        ammoEl.style.display = 'none';
                    }
                }
            });
        });
    }

</script>
</body>
</html>
