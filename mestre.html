<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mestre Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: transparent !important; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Verdana', sans-serif; }
        #setup { position: absolute; top: 20px; background: #111; padding: 20px; border: 2px solid #00b0ff; border-radius: 10px; color: white; z-index: 100; text-align: center; }
        .layout { display: flex; flex-wrap: wrap; gap: 50px; justify-content: center; align-items: center; }
        .player-card { display: flex; align-items: center; gap: 30px; cursor: pointer; }
        .portrait img { height: 40vh; max-height: 400px; transition: 0.5s; }
        .stats { display: flex; flex-direction: column; gap: 10px; font-size: 5rem; font-weight: 900; color: white; text-align: center; }
        .v { text-shadow: 0 0 20px #ff4d4d, 0 0 40px #cc0000; }
        .s { text-shadow: 0 0 20px #b366ff, 0 0 40px #6600cc; }
        .a { text-shadow: 0 0 20px #ffff33, 0 0 40px #cca300; }
    </style>
</head>
<body>
    <div id="setup">
        <h3>IDs dos Jogadores (separe por vírgula)</h3>
        <input type="text" id="m_ids" value="Agente01" style="padding:10px; width:250px;"><br><br>
        <button onclick="connect()" style="padding:10px 20px; background:#00b0ff; border:none; font-weight:bold; cursor:pointer;">CONECTAR</button>
    </div>
    <div id="main" class="layout"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3Ivin8vJWA7qB5WwRo23KfQpT38BP0e4",
            authDomain: "ficha-3f03e.firebaseapp.com",
            databaseURL: "https://ficha-3f03e-default-rtdb.firebaseio.com/",
            projectId: "ficha-3f03e",
            storageBucket: "ficha-3f03e.firebasestorage.app",
            messagingSenderId: "95581213733",
            appId: "1:95581213733:web:38c415b15cabacb3da1bcc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function connect() {
            const ids = document.getElementById('m_ids').value.split(',');
            document.getElementById('setup').style.display = 'none';
            const main = document.getElementById('main');
            main.innerHTML = '';

            ids.forEach(id => {
                id = id.trim();
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => window.open('ficha.html?id=' + id, '_blank');
                card.innerHTML = `<div class="portrait"><img id="img_${id}" src=""></div><div class="stats"><div class="v" id="v_${id}">0/0</div><div class="s" id="s_${id}">0/0</div><div class="a" id="a_${id}">0</div></div>`;
                main.appendChild(card);

                db.ref('fichas/' + id).on('value', (snap) => {
                    const data = snap.val();
                    if(data) {
                        document.getElementById('v_'+id).innerText = data.v_at + "/" + data.v_mx;
                        document.getElementById('s_'+id).innerText = data.s_at + "/" + data.s_mx;
                        document.getElementById('a_'+id).innerText = data.ammo;
                        let img = data.photos.normal;
                        let aura = "rgba(255,255,255,0.3)";
                        if(data.status.lesionado && data.status.enlouquecendo) { img = data.photos.combo || data.photos.lesionado; aura = "purple"; }
                        else if(data.status.lesionado) { img = data.photos.lesionado; aura = "red"; }
                        else if(data.status.enlouquecendo) { img = data.photos.enlouquecendo; aura = "blue"; }
                        const imgEl = document.getElementById('img_'+id);
                        imgEl.src = img || 'https://via.placeholder.com/150';
                        imgEl.style.filter = `drop-shadow(0 0 30px ${aura})`;
                    }
                });
            });
        }
    </script>
</body>
</html>
