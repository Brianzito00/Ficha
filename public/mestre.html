<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escudo do Mestre</title>
    <style>
        /* Estilos mantidos conforme original para consistência visual */
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        :root {--bg-body:#121214; --bg-card:rgba(32, 32, 36, 0.85); --border-color:rgba(50, 50, 56, 0.8); --text-primary:#e1e1e6; --text-secondary:#a8a8b3; --accent-blue:#00b0ff; --accent-yellow:#ffcf33; --accent-green:#00e676; --accent-red:#e53935; --accent-purple:#b82bf2;}
        body {font-family:'Roboto',sans-serif; background-color:var(--bg-body); background-image:url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg'); background-size:cover; background-attachment:fixed; background-position:center; color:var(--text-primary); margin:0; padding:20px; display:flex; flex-direction:column; height:100vh; box-sizing:border-box;}
        
        .mestre-top-bar { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px 25px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(8px); }
        .content-wrapper { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        .left-panel { flex: 3; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .player-card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; position: relative; transition: 0.3s; }
        
        /* Barras de Status */
        .bar-container { background: rgba(0,0,0,0.8); height: 20px; border-radius: 4px; overflow: hidden; position: relative; margin: 5px 0; }
        .bar-fill { height: 100%; transition: width 0.5s ease; }
        .fill-vida { background: var(--accent-red); }
        .fill-sani { background: var(--accent-blue); }
        .fill-pe { background: var(--accent-yellow); }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 0.8em; font-weight: bold; line-height: 20px; text-shadow: 1px 1px 1px black; }

        .log-container { flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .log-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.9em; display: flex; flex-direction: column; gap: 8px; }
        
        .btn-add { background: var(--accent-green); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tabs-container { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 10px; background: var(--bg-card); color: white; border: 1px solid var(--border-color); cursor: pointer; flex: 1; }
        .tab-btn.active { background: var(--accent-red); }
    </style>
</head>
<body>

    <div class="mestre-top-bar">
        <span style="font-weight: 900; color: var(--accent-red);">🛡️ ESCUDO DO MESTRE</span>
        <div>
            <input type="text" id="add-code-input" placeholder="CÓDIGO DO JOGADOR" style="padding: 8px; border-radius: 4px; border: none;">
            <button class="btn-add" onclick="adicionarJogador()">ADICIONAR</button>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="mudarAba('jogadores')">Jogadores</button>
        <button class="tab-btn" onclick="mudarAba('monstros')">Monstros</button>
        <button class="tab-btn" onclick="mudarAba('catalogo')">Catálogo</button>
    </div>

    <div class="content-wrapper">
        <div class="left-panel" id="main-panel">
            <div id="players-board" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;">
                </div>
        </div>

        <div class="log-container">
            <div style="padding: 10px; background: rgba(0,0,0,0.3); text-align: center; font-weight: bold;">ROLAGENS</div>
            <div class="log-messages" id="log-box"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const campanhaAtiva = localStorage.getItem('campanha_atual') || "demo";
        let jogadoresPermitidos = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];
        let playersDataMemoria = {}; // Memória volátil para status em tempo real

        const socket = io();

        socket.on('connect', () => {
            socket.emit('join_campaign', campanhaAtiva);
            // Solicita que todos os jogadores online enviem suas fichas atuais
            jogadoresPermitidos.forEach(code => socket.emit('mestre_pede_ficha', code));
        });

        // ESCUTA: Atualização de Ficha do Jogador
        socket.on('status_change', (dados) => {
            const code = (dados.codigo || "").toUpperCase();
            if (jogadoresPermitidos.includes(code)) {
                playersDataMemoria[code] = dados;
                renderizarJogadores();
            }
        });

        // ESCUTA: Rolagens de Dados
        socket.on('rolagem_feita', (dados) => {
            const log = document.getElementById('log-box');
            const item = document.createElement('div');
            item.style.padding = "8px";
            item.style.borderBottom = "1px solid #333";
            item.innerHTML = `<b style="color:var(--accent-blue)">${dados.jogador}:</b> ${dados.acao} ➔ <span style="font-size:1.2em; color:var(--accent-yellow)">${dados.resultado}</span>`;
            log.prepend(item);
        });

        function adicionarJogador() {
            const input = document.getElementById('add-code-input');
            const code = input.value.trim().toUpperCase();
            if (code && !jogadoresPermitidos.includes(code)) {
                jogadoresPermitidos.push(code);
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos));
                socket.emit('mestre_pede_ficha', code); // Pede a ficha assim que adiciona
                renderizarJogadores();
            }
            input.value = "";
        }

        function removerJogador(code) {
            jogadoresPermitidos = jogadoresPermitidos.filter(c => c !== code);
            localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos));
            delete playersDataMemoria[code];
            renderizarJogadores();
        }

        function renderizarJogadores() {
            const board = document.getElementById('players-board');
            board.innerHTML = "";

            jogadoresPermitidos.forEach(code => {
                const data = playersDataMemoria[code];
                const card = document.createElement('div');
                card.className = "player-card";

                if (!data) {
                    card.innerHTML = `<div style="color:gray">Aguardando conexão de <b>${code}</b>...</div>
                                      <button onclick="removerJogador('${code}')" style="margin-top:10px; background:none; border:1px solid red; color:red; cursor:pointer;">Remover</button>`;
                } else {
                    const pV = (data.vida_atual / data.vida_max) * 100;
                    const pS = (data.sani_atual / data.sani_max) * 100;

                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <img src="${data.foto || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--accent-blue);">
                            <b style="color:var(--accent-yellow)">${data.nome || code}</b>
                        </div>
                        <div class="bar-container"><div class="bar-fill fill-vida" style="width:${pV}%"></div><div class="bar-text">PV: ${data.vida_atual}/${data.vida_max}</div></div>
                        <div class="bar-container"><div class="bar-fill fill-sani" style="width:${pS}%"></div><div class="bar-text">SAN: ${data.sani_atual}/${data.sani_max}</div></div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                             <button onclick="enviarComando('${code}', 'vida', -1)" style="flex:1">- Vida</button>
                             <button onclick="enviarComando('${code}', 'vida', 1)" style="flex:1">+ Vida</button>
                        </div>
                        <button onclick="removerJogador('${code}')" style="position:absolute; top:5px; right:5px; background:none; border:none; color:red; cursor:pointer;">X</button>
                    `;
                }
                board.appendChild(card);
            });
        }

        // Função para interagir diretamente com a ficha do jogador
        function enviarComando(playerCode, tipo, delta) {
            socket.emit('comando_mestre', {
                tipo: tipo,
                codigo: playerCode,
                delta: delta
            });
        }

        function mudarAba(aba) {
            // Lógica simples de troca de abas para manter o exemplo conciso
            console.log("Mudando para aba:", aba);
        }

        // Inicialização
        renderizarJogadores();
    </script>
</body>
</html>
