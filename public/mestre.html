<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escudo do Mestre - Painel de Jogadores</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        
        :root {
            --bg-body: #121214; 
            --bg-card: rgba(32, 32, 36, 0.85);
            --border-color: rgba(50, 50, 56, 0.8); 
            --text-primary: #e1e1e6; 
            --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; 
            --accent-yellow: #ffcf33; 
            --accent-green: #00e676; 
            --accent-red: #e53935;
            --accent-purple: #b82bf2;
        }

        body {
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-body);
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center; 
            color: var(--text-primary);
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box;
        }

        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .fade-in { animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .mestre-top-bar { 
            background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px 25px; 
            border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; 
            align-items: center; flex-wrap: wrap; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); 
        }
        .code-input { padding: 10px; background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); color: white; border-radius: 6px; text-transform: uppercase; font-size: 0.9em; width: 200px; margin-left: 20px; }
        .btn-add { background: var(--accent-green); border: none; color: black; font-weight: bold; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { filter: brightness(1.2); transform: scale(1.02); }
        .btn-remove-global { background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); font-weight: bold; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-remove-global:hover { background: var(--accent-red); color: white; }

        .players-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; align-content: flex-start; overflow-y: auto; padding-right: 10px; flex: 1; 
        }

        .player-card { 
            background: linear-gradient(145deg, rgba(30,30,35,0.95), rgba(15,15,18,0.95)); 
            border: 1px solid #333; border-top: 4px solid var(--accent-blue); border-radius: 12px; 
            padding: 18px; display: flex; flex-direction: column; gap: 12px; position: relative; 
            transition: 0.3s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.8); overflow: hidden; 
        }
        .player-card::before { 
            content: ''; position: absolute; top: 0; right: 0; width: 150px; height: 150px; 
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%); 
            pointer-events: none; z-index: 1;
        }
        .player-card:hover { transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0,0,0,0.9); border-color: #555; }
        
        .player-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; z-index: 2; }
        .player-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-blue); background: #000; flex-shrink: 0; transition: opacity 0.3s ease-in-out, border-color 0.3s, box-shadow 0.3s; }
        .player-name { font-size: 1.3em; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn-remove-card { position: absolute; top: 8px; right: 8px; background: var(--accent-red); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.8em; font-weight: bold; cursor: pointer; z-index: 10; transition: 0.2s; }
        .btn-remove-card:hover { filter: brightness(1.2); transform: scale(1.1); }
        .btn-ctrl { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; width: 24px; height: 24px; font-size: 0.9em; }
        .btn-ctrl:hover { filter: brightness(1.5); border-color: white; }
        
        .stat-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); z-index: 2; }
        .stat-label { font-size: 0.75em; font-weight: 900; letter-spacing: 1px; }
        .stat-input { width: 35px; background: transparent; border: none; color: white; text-align: right; font-weight: 900; font-size: 1em; outline: none; padding: 0; transition: color 0.3s ease; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); }
        .btn-roll { width: 100%; margin-top: 12px; padding: 10px; background: rgba(0,0,0,0.4); color: var(--text-secondary); border: 1px solid #444; border-radius: 6px; font-size: 0.75em; font-weight: bold; letter-spacing: 1px; cursor: pointer; transition: 0.2s; z-index: 2; }
        .btn-roll:hover { color: white; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="mestre-top-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-weight: 900; color: var(--accent-red); font-size: 1.4em; letter-spacing: 1px;">🛡️ PAINEL DE JOGADORES</span>
            <input type="text" id="add-code-input" class="code-input" placeholder="Login (Ex: JOAO123)" maxlength="30">
            <button class="btn-add" onclick="adicionarJogador()">+ ADICIONAR NA MESA</button>
        </div>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="btn-add" style="background: var(--accent-purple); color: white;" onclick="window.open('/overlay.html?mesa=' + campanhaAtiva, '_blank')">📺 ABRIR OVERLAY</button>
            <button class="btn-remove-global" onclick="fazerLogout()">SAIR DA MESA</button>
        </div>
    </div>

    <div id="players-board" class="players-container fade-in"></div>

    <div id="modal-ficha" class="modal-overlay">
        <div style="width: 95%; max-width: 1400px; display: flex; justify-content: flex-end; flex-direction: column; gap: 10px;">
            <button class="btn-remove-global" style="background: var(--accent-red); color: white; border: none; align-self: flex-end;" onclick="fecharFicha()">X FECHAR FICHA</button>
            <iframe id="iframe-ficha" src="" style="width: 100%; height: 85vh; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg-body);"></iframe>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        let campanhaAtiva = localStorage.getItem('campanha_atual') || "demo";
        const socket = typeof io !== 'undefined' ? io() : null;

        let jogadoresPermitidos = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];
        let playersDataMemoria = JSON.parse(localStorage.getItem('mestre_players_data_' + campanhaAtiva)) || {};
        let debounceTimer;

        function salvarMestreNoFirebase() { 
            clearTimeout(debounceTimer); 
            debounceTimer = setTimeout(() => { 
                const dataToSave = { allowedCodes: jogadoresPermitidos }; 
                fetch('/api/salvar_campanha', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ campanha: campanhaAtiva, dados: { mestre: dataToSave } }) 
                }); 
            }, 1000); 
        }

        function fazerLogout() { 
            localStorage.removeItem('campanha_atual'); 
            window.location.href = '/index.html'; 
        }

        if (socket) {
            socket.on('connect', () => {
                socket.emit('join_campaign', campanhaAtiva);
                if(jogadoresPermitidos.length > 0) {
                    jogadoresPermitidos.forEach(codigo => socket.emit('request_player', codigo));
                    socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos });
                }
            });

            socket.on('comando_mestre', (dados) => {
                if (dados.tipo === 'request_overlay_sync') { 
                    socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); 
                }
                
                if (dados.tipo === 'jogador_entrou' && dados.codigo) {
                    const codLimpo = dados.codigo.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/[^A-Z0-9 ]/g, '').trim();
                    if (!jogadoresPermitidos.includes(codLimpo)) { 
                        jogadoresPermitidos.push(codLimpo); 
                        localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos)); 
                        salvarMestreNoFirebase(); 
                        socket.emit('request_player', codLimpo); 
                        socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); 
                        renderizarJogadores(); 
                    } else { 
                        socket.emit('request_player', codLimpo); 
                    }
                }
            });

            const gerenciarAtualizacaoJogador = (dados) => {
                const codPuro = (dados.codigo || "").toUpperCase();
                if (!codPuro || !jogadoresPermitidos.includes(codPuro)) return;
                
                if (!playersDataMemoria[codPuro]) playersDataMemoria[codPuro] = {};
                if (dados.fullData) playersDataMemoria[codPuro].fullData = dados.fullData;
                
                playersDataMemoria[codPuro].nome = dados.nome || playersDataMemoria[codPuro].fullData?.info?.char_nome || playersDataMemoria[codPuro].nome;
                playersDataMemoria[codPuro].foto = dados.foto || playersDataMemoria[codPuro].fullData?.info?.char_img || playersDataMemoria[codPuro].foto;
                playersDataMemoria[codPuro].nex = dados.nex !== undefined ? dados.nex : (playersDataMemoria[codPuro].fullData?.info?.char_nex !== undefined ? playersDataMemoria[codPuro].fullData?.info?.char_nex : playersDataMemoria[codPuro].nex);
                playersDataMemoria[codPuro].defesa = dados.defesa !== undefined ? dados.defesa : (playersDataMemoria[codPuro].fullData?.defense !== undefined ? playersDataMemoria[codPuro].fullData?.defense : (playersDataMemoria[codPuro].fullData?.info?.defesa || playersDataMemoria[codPuro].defesa || 10));

                let newVida = dados.vida_atual !== undefined ? dados.vida_atual : (dados.status?.vida_atual !== undefined ? dados.status?.vida_atual : playersDataMemoria[codPuro].fullData?.info?.vida_atual);
                let newSani = dados.sani_atual !== undefined ? dados.sani_atual : (dados.status?.sani_atual !== undefined ? dados.status?.sani_atual : playersDataMemoria[codPuro].fullData?.info?.sani_atual);
                let newPe = dados.pe_atual !== undefined ? dados.pe_atual : (dados.status?.pe_atual !== undefined ? dados.status?.pe_atual : playersDataMemoria[codPuro].fullData?.info?.pe_atual);

                if (newVida !== undefined) { playersDataMemoria[codPuro].vida_atual = newVida; if(playersDataMemoria[codPuro].fullData && playersDataMemoria[codPuro].fullData.info) playersDataMemoria[codPuro].fullData.info.vida_atual = newVida; }
                if (newSani !== undefined) { playersDataMemoria[codPuro].sani_atual = newSani; if(playersDataMemoria[codPuro].fullData && playersDataMemoria[codPuro].fullData.info) playersDataMemoria[codPuro].fullData.info.sani_atual = newSani; }
                if (newPe !== undefined) { playersDataMemoria[codPuro].pe_atual = newPe; if(playersDataMemoria[codPuro].fullData && playersDataMemoria[codPuro].fullData.info) playersDataMemoria[codPuro].fullData.info.pe_atual = newPe; }
                
                if (dados.status) {
                    playersDataMemoria[codPuro].status = dados.status;
                } else if (dados.fullData && dados.fullData.charStatus) {
                    playersDataMemoria[codPuro].status = dados.fullData.charStatus;
                }

                localStorage.setItem('mestre_players_data_' + campanhaAtiva, JSON.stringify(playersDataMemoria));
                
                const cardExiste = document.getElementById(`player-${codPuro}`);
                const isOfflineCard = cardExiste && !cardExiste.querySelector('.input-vida');

                if (!cardExiste || isOfflineCard) {
                    renderizarJogadores();
                } else {
                    atualizarDOMJogador(codPuro);
                }
            };

            socket.on('status_change', gerenciarAtualizacaoJogador);
            socket.on('update_mestre', gerenciarAtualizacaoJogador);
        }

        function adicionarJogador() { 
            let input = document.getElementById('add-code-input'); 
            let codigo = input.value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/[^A-Z0-9 ]/g, '').trim(); 
            if (codigo.length > 0 && !jogadoresPermitidos.includes(codigo)) { 
                jogadoresPermitidos.push(codigo); 
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos)); 
                salvarMestreNoFirebase(); 
                if(socket) {
                    socket.emit('request_player', codigo); 
                    socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); 
                }
                renderizarJogadores();
            } 
            input.value = ''; 
        }
        
        function removerJogador(codigo) { 
            if(!confirm(`Desejas remover ${codigo} da mesa?`)) return;
            const codPuro = codigo.toUpperCase(); 
            jogadoresPermitidos = jogadoresPermitidos.filter(c => c !== codPuro); 
            localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos)); 
            salvarMestreNoFirebase();
            delete playersDataMemoria[codPuro]; 
            localStorage.setItem('mestre_players_data_' + campanhaAtiva, JSON.stringify(playersDataMemoria)); 
            renderizarJogadores();
            
            if(socket) {
                socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); 
                socket.emit('limpar_cache_jogador', { codigo: codPuro }); 
                socket.emit('comando_mestre', { tipo: 'expulsar_jogador', codigo: codPuro }); 
            }
            fetch('/api/sair_campanha', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: codPuro, campanha: campanhaAtiva }) }); 
        }

        function alterarStatusJogador(codPuro, tipo, valor) {
            if (!playersDataMemoria[codPuro] || !playersDataMemoria[codPuro].fullData) return;
            let fd = playersDataMemoria[codPuro].fullData;
            let fieldA = tipo + '_atual';
            fd.info[fieldA] = (parseInt(fd.info[fieldA]) || 0) + valor;
            playersDataMemoria[codPuro][fieldA] = fd.info[fieldA];
            atualizarDOMJogador(codPuro);
            if (socket) { socket.emit('comando_mestre', { tipo: 'update_status_force', codigo: codPuro, status: { vida_atual: fd.info.vida_atual, sani_atual: fd.info.sani_atual, pe_atual: fd.info.pe_atual } }); }
            fetch('/api/guardar_ficha', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: codPuro + '_' + campanhaAtiva, fichaData: fd }) }).catch(()=>{});
        }

        function setStatusJogador(codPuro, tipo, valor) {
            if (!playersDataMemoria[codPuro] || !playersDataMemoria[codPuro].fullData) return;
            let fd = playersDataMemoria[codPuro].fullData;
            fd.info[tipo + '_atual'] = parseInt(valor) || 0;
            playersDataMemoria[codPuro][tipo + '_atual'] = fd.info[tipo + '_atual'];
            atualizarDOMJogador(codPuro);
            if (socket) { socket.emit('comando_mestre', { tipo: 'update_status_force', codigo: codPuro, status: { vida_atual: fd.info.vida_atual, sani_atual: fd.info.sani_atual, pe_atual: fd.info.pe_atual } }); }
            fetch('/api/guardar_ficha', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: codPuro + '_' + campanhaAtiva, fichaData: fd }) }).catch(()=>{});
        }

        function atualizarDOMJogador(codPuro) {
            const dados = playersDataMemoria[codPuro];
            if(!dados) return;
            const card = document.getElementById(`player-${codPuro}`);
            if(!card) return renderizarJogadores();
            
            const imgEl = card.querySelector('.player-img');
            const nomeEl = card.querySelector('.player-name');

            // FOTO COM EFEITO DE FADE
            if (imgEl && dados.foto && imgEl.getAttribute('src') !== dados.foto) {
                imgEl.style.opacity = 0; 
                setTimeout(() => {
                    imgEl.src = dados.foto; 
                    imgEl.setAttribute('src', dados.foto);
                    imgEl.onload = () => imgEl.style.opacity = 1; 
                    setTimeout(() => imgEl.style.opacity = 1, 100);
                }, 300);
            }

            // BORDAS DE STATUS
            if (dados.status && imgEl) {
                let stBorderColor = 'var(--accent-blue)';
                let stBoxShadow = 'none';
                if (dados.status.morrendo) { stBorderColor = 'var(--accent-red)'; stBoxShadow = '0 0 15px var(--accent-red)'; }
                else if (dados.status.inconsciente) { stBorderColor = '#ff5252'; }
                else if (dados.status.lesionado && dados.status.enlouquecendo) { stBorderColor = 'var(--accent-purple)'; stBoxShadow = '0 0 15px var(--accent-purple)'; }
                else if (dados.status.lesionado) { stBorderColor = 'var(--accent-red)'; }
                else if (dados.status.enlouquecendo) { stBorderColor = 'var(--accent-blue)'; stBoxShadow = '0 0 15px var(--accent-blue)'; }
                
                imgEl.style.borderColor = stBorderColor;
                imgEl.style.boxShadow = stBoxShadow;
                card.style.borderTopColor = stBorderColor;
            }

            if (nomeEl) nomeEl.innerText = dados.nome || 'Desconhecido';
            const nexDefEls = card.querySelectorAll('.player-header b');
            if (nexDefEls && nexDefEls.length >= 2) {
                nexDefEls[0].innerText = `${dados.nex || 0}%`;
                nexDefEls[1].innerText = `${dados.defesa || 10}`;
            }

            // ATUALIZAR STATUS E FLASH AMARELO
            const vA = dados.vida_atual !== undefined ? dados.vida_atual : (dados.fullData?.info?.vida_atual || 0); 
            const sA = dados.sani_atual !== undefined ? dados.sani_atual : (dados.fullData?.info?.sani_atual || 0); 
            const pA = dados.pe_atual !== undefined ? dados.pe_atual : (dados.fullData?.info?.pe_atual || 0); 
            
            const iVida = document.getElementById(`vida-${codPuro}`);
            const iSani = document.getElementById(`sani-${codPuro}`);
            const iPe = document.getElementById(`pe-${codPuro}`);

            if(iVida && document.activeElement !== iVida) { 
                if(iVida.value != vA) { iVida.value = vA; iVida.style.color = '#ffcf33'; setTimeout(() => iVida.style.color = 'white', 300); }
            }
            if(iSani && document.activeElement !== iSani) { 
                if(iSani.value != sA) { iSani.value = sA; iSani.style.color = '#ffcf33'; setTimeout(() => iSani.style.color = 'white', 300); }
            }
            if(iPe && document.activeElement !== iPe) { 
                if(iPe.value != pA) { iPe.value = pA; iPe.style.color = '#ffcf33'; setTimeout(() => iPe.style.color = 'white', 300); }
            }
            
            const maxVida = document.getElementById(`max-vida-${codPuro}`);
            const maxSani = document.getElementById(`max-sani-${codPuro}`);
            const maxPe = document.getElementById(`max-pe-${codPuro}`);
            
            if(maxVida) maxVida.innerText = `/${dados.fullData?.info?.vida_max || 1}`;
            if(maxSani) maxSani.innerText = `/${dados.fullData?.info?.sani_max || 1}`;
            if(maxPe) maxPe.innerText = `/${dados.fullData?.info?.pe_max || 1}`;
        }

        function renderizarJogadores() {
            const playersBoard = document.getElementById('players-board');
            playersBoard.innerHTML = '';
            
            jogadoresPermitidos.forEach(codPuro => {
                const card = document.createElement('div'); 
                card.className = 'player-card'; 
                card.id = `player-${codPuro}`;
                const dados = playersDataMemoria[codPuro];
                
                if (!dados || !dados.fullData) {
                    card.innerHTML = `
                        <button class="btn-remove-card" onclick="removerJogador('${codPuro}')">X</button>
                        <div class="player-header">
                            <img id="foto-${codPuro}" src="https://via.placeholder.com/70" class="player-img" style="filter: grayscale(100%); opacity: 0.5;">
                            <div style="flex: 1; min-width: 0;">
                                <h3 class="player-name" style="color: gray;">${codPuro}</h3>
                                <div style="color:var(--accent-red); font-size: 0.8em; font-weight: bold; margin-top: 5px;">Offline / A carregar...</div>
                            </div>
                        </div>
                    `;
                    playersBoard.appendChild(card); return;
                }
                
                const vA = dados.vida_atual !== undefined ? dados.vida_atual : (dados.fullData?.info?.vida_atual || 0); 
                const vM = dados.fullData?.info?.vida_max !== undefined ? dados.fullData.info.vida_max : 1; 
                const sA = dados.sani_atual !== undefined ? dados.sani_atual : (dados.fullData?.info?.sani_atual || 0); 
                const sM = dados.fullData?.info?.sani_max !== undefined ? dados.fullData.info.sani_max : 1; 
                const pA = dados.pe_atual !== undefined ? dados.pe_atual : (dados.fullData?.info?.pe_atual || 0); 
                const pM = dados.fullData?.info?.pe_max !== undefined ? dados.fullData.info.pe_max : 1;
                
                let stBorderColor = 'var(--accent-blue)';
                let stBoxShadow = 'none';
                if (dados.status) {
                    if (dados.status.morrendo) { stBorderColor = 'var(--accent-red)'; stBoxShadow = '0 0 15px var(--accent-red)'; }
                    else if (dados.status.inconsciente) { stBorderColor = '#ff5252'; }
                    else if (dados.status.lesionado && dados.status.enlouquecendo) { stBorderColor = 'var(--accent-purple)'; stBoxShadow = '0 0 15px var(--accent-purple)'; }
                    else if (dados.status.lesionado) { stBorderColor = 'var(--accent-red)'; }
                    else if (dados.status.enlouquecendo) { stBorderColor = 'var(--accent-blue)'; stBoxShadow = '0 0 15px var(--accent-blue)'; }
                }
                
                card.style.borderTopColor = stBorderColor;
                
                card.innerHTML = `
                    <button class="btn-remove-card" onclick="removerJogador('${codPuro}')">X</button>
                    <div class="player-header">
                        <div style="position: relative;">
                            <img id="foto-${codPuro}" src="${dados.foto || 'https://via.placeholder.com/70'}" class="player-img" style="border-color: ${stBorderColor}; box-shadow: ${stBoxShadow};">
                        </div>
                        <div style="flex: 1; min-width: 0;">
                            <h3 class="player-name">${dados.nome || 'Desconhecido'}</h3>
                            <div style="font-size: 0.75em; color: var(--text-secondary); margin-bottom: 6px; font-family: monospace;">@${codPuro}</div>
                            <div style="display: flex; gap: 6px;">
                                <span style="background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 4px; font-size: 0.75em; color: var(--text-primary); border: 1px solid #444;">NEX <b style="color:var(--accent-yellow)">${dados.nex || 0}%</b></span>
                                <span style="background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 4px; font-size: 0.75em; color: var(--text-primary); border: 1px solid #444;">DEF <b style="color:white">${dados.defesa || 10}</b></span>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 8px; z-index: 2; margin-top: 5px;">
                        <div class="stat-row" style="border-left: 4px solid var(--accent-red);">
                            <span class="stat-label" style="color: var(--accent-red);">VIDA</span>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <button class="btn-ctrl" style="background: rgba(229,57,53,0.15); color: var(--accent-red); border-color: rgba(229,57,53,0.3);" onclick="alterarStatusJogador('${codPuro}', 'vida', -1)">-</button>
                                <div style="font-weight: 900; color: white; width: 65px; text-align: center;">
                                    <input type="number" id="vida-${codPuro}" class="stat-input" value="${vA}" onchange="setStatusJogador('${codPuro}', 'vida', this.value)">
                                    <span id="max-vida-${codPuro}" style="color: var(--text-secondary); font-size: 0.75em;">/${vM}</span>
                                </div>
                                <button class="btn-ctrl" style="background: rgba(229,57,53,0.15); color: var(--accent-red); border-color: rgba(229,57,53,0.3);" onclick="alterarStatusJogador('${codPuro}', 'vida', 1)">+</button>
                            </div>
                        </div>
                        
                        <div class="stat-row" style="border-left: 4px solid var(--accent-blue);">
                            <span class="stat-label" style="color: var(--accent-blue);">SANI</span>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <button class="btn-ctrl" style="background: rgba(0,176,255,0.15); color: var(--accent-blue); border-color: rgba(0,176,255,0.3);" onclick="alterarStatusJogador('${codPuro}', 'sani', -1)">-</button>
                                <div style="font-weight: 900; color: white; width: 65px; text-align: center;">
                                    <input type="number" id="sani-${codPuro}" class="stat-input" value="${sA}" onchange="setStatusJogador('${codPuro}', 'sani', this.value)">
                                    <span id="max-sani-${codPuro}" style="color: var(--text-secondary); font-size: 0.75em;">/${sM}</span>
                                </div>
                                <button class="btn-ctrl" style="background: rgba(0,176,255,0.15); color: var(--accent-blue); border-color: rgba(0,176,255,0.3);" onclick="alterarStatusJogador('${codPuro}', 'sani', 1)">+</button>
                            </div>
                        </div>

                        <div class="stat-row" style="border-left: 4px solid var(--accent-yellow);">
                            <span class="stat-label" style="color: var(--accent-yellow);">P.E.</span>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <button class="btn-ctrl" style="background: rgba(255,207,51,0.15); color: var(--accent-yellow); border-color: rgba(255,207,51,0.3);" onclick="alterarStatusJogador('${codPuro}', 'pe', -1)">-</button>
                                <div style="font-weight: 900; color: white; width: 65px; text-align: center;">
                                    <input type="number" id="pe-${codPuro}" class="stat-input" value="${pA}" onchange="setStatusJogador('${codPuro}', 'pe', this.value)">
                                    <span id="max-pe-${codPuro}" style="color: var(--text-secondary); font-size: 0.75em;">/${pM}</span>
                                </div>
                                <button class="btn-ctrl" style="background: rgba(255,207,51,0.15); color: var(--accent-yellow); border-color: rgba(255,207,51,0.3);" onclick="alterarStatusJogador('${codPuro}', 'pe', 1)">+</button>
                            </div>
                        </div>
                    </div>

                    <button class="btn-roll" onclick="abrirFicha('${codPuro}')">🔍 INSPECIONAR FICHA</button>
                `;
                playersBoard.appendChild(card);
            });
        }

        function abrirFicha(codigo) { 
            const iframe = document.getElementById('iframe-ficha'); 
            document.getElementById('modal-ficha').style.display = 'flex'; 
            
            iframe.onload = async () => { 
                let pData = playersDataMemoria[codigo.toUpperCase()]; 
                if (pData && pData.fullData) { 
                    iframe.contentWindow.postMessage({tipo: 'load_offline_data', data: pData.fullData}, '*'); 
                }
            }; 
            iframe.src = `/ficha.html?view=${codigo.toUpperCase()}&t=${Date.now()}`; 
        }

        function fecharFicha() { 
            document.getElementById('modal-ficha').style.display = 'none'; 
            document.getElementById('iframe-ficha').src = ''; 
        }

        window.onload = async () => {
            try {
                const response = await fetch('/api/carregar_campanha', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ campanha: campanhaAtiva }) });
                const result = await response.json();
                if (result.sucesso && result.dados && result.dados.mestre) {
                    if(result.dados.mestre.allowedCodes) {
                        jogadoresPermitidos = result.dados.mestre.allowedCodes;
                        localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos));
                    }
                }
            } catch (e) {}
            renderizarJogadores();
        };

    </script>
</body>
</html>
