<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escudo do Mestre - Modo Limpo</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        
        :root {
            --bg-body: #121214; 
            --bg-card: rgba(32, 32, 36, 0.95);
            --border-color: rgba(50, 50, 56, 0.8); 
            --text-primary: #e1e1e6; 
            --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; 
            --accent-yellow: #ffcf33; 
            --accent-red: #e53935;
        }

        body {
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-body);
            color: var(--text-primary);
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box;
        }

        /* BARRA SUPERIOR */
        .top-bar {
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 15px 25px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .input-box {
            padding: 10px; 
            background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color); 
            color: white; 
            border-radius: 6px; 
            text-transform: uppercase; 
            font-weight: bold;
        }

        .btn-action {
            background: var(--accent-blue); 
            border: none; 
            color: black; 
            font-weight: bold; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .btn-action:hover { filter: brightness(1.2); }

        /* GRID JOGADORES */
        .players-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
            overflow-y: auto;
        }

        /* CARD DO JOGADOR */
        .player-card { 
            background: var(--bg-card); 
            border: 2px solid var(--border-color); 
            border-radius: 12px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            position: relative;
        }
        
        .player-header { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 10px; 
        }
        .player-img { 
            width: 60px; height: 60px; 
            border-radius: 50%; object-fit: cover; 
            border: 2px solid var(--accent-yellow); 
            background: #000; 
        }
        .player-name { font-size: 1.2em; font-weight: bold; color: var(--accent-yellow); text-transform: uppercase; margin: 0; }
        .player-info { font-size: 0.8em; color: var(--text-secondary); line-height: 1.4; }

        .btn-remove { position: absolute; top: 10px; right: 10px; background: var(--accent-red); color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-weight: bold; }
        
        .status-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 6px; }
        .btn-ctrl { background: #333; color: white; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; width: 28px; height: 28px; font-weight: bold; }
        .input-number { width: 40px; background: transparent; border: none; border-bottom: 1px solid white; color: white; text-align: center; font-weight: bold; outline: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="color: var(--accent-red); font-weight: 900; font-size: 1.2em;">🛡️ ESCUDO LIMPO</span>
            <input type="text" id="input-add-jogador" class="input-box" placeholder="CÓDIGO DO JOGADOR">
            <button class="btn-action" onclick="adicionarJogador()">+ ADICIONAR</button>
        </div>
        <div style="color: var(--text-secondary); font-size: 0.9em;" id="status-conexao">Conectando...</div>
    </div>

    <div class="players-grid" id="players-board">
        </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        // 1. VARIÁVEIS GLOBAIS
        const campanhaAtiva = localStorage.getItem('campanha_atual') || "demo";
        let jogadoresPermitidos = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];
        let playersDataMemoria = JSON.parse(localStorage.getItem('mestre_players_data_' + campanhaAtiva)) || {};
        
        const socket = typeof io !== 'undefined' ? io() : null;
        const board = document.getElementById('players-board');

        // 2. INICIALIZAÇÃO E SOCKETS
        if (socket) {
            socket.on('connect', () => {
                document.getElementById('status-conexao').innerText = "✔️ Conectado (" + campanhaAtiva + ")";
                document.getElementById('status-conexao').style.color = "var(--accent-green)";
                
                socket.emit('join_campaign', campanhaAtiva);
                jogadoresPermitidos.forEach(codigo => socket.emit('request_player', codigo));
            });

            // Escuta atualizações vindas da ficha do jogador
            socket.on('status_change', gerenciarSincronizacao);
            socket.on('update_mestre', gerenciarSincronizacao);
        }

        // 3. A FUNÇÃO CORE: LIDA COM OS DADOS RECEBIDOS
        function gerenciarSincronizacao(dados) {
            const codPuro = (dados.codigo || "").toUpperCase();
            if (!codPuro || !jogadoresPermitidos.includes(codPuro)) return;

            if (!playersDataMemoria[codPuro]) playersDataMemoria[codPuro] = {};

            let precisaReconstruirCard = false;

            // Processa FullData (Nome, Foto, NEX, Defesa e limites de vida/sani)
            if (dados.fullData) {
                const info = dados.fullData.info || {};
                const nomeRecebido = info.char_nome || codPuro;
                const fotoRecebida = info.char_img || '';
                const nexRecebido = info.char_nex || 0;
                const defRecebida = dados.fullData.defense || info.defesa || 10;

                // Se o nome ou foto mudou, marcamos para reconstruir o card HTML
                if (playersDataMemoria[codPuro].nome !== nomeRecebido || playersDataMemoria[codPuro].foto !== fotoRecebida) {
                    precisaReconstruirCard = true;
                }

                playersDataMemoria[codPuro].fullData = dados.fullData;
                playersDataMemoria[codPuro].nome = nomeRecebido;
                playersDataMemoria[codPuro].foto = fotoRecebida;
                playersDataMemoria[codPuro].nex = nexRecebido;
                playersDataMemoria[codPuro].defesa = defRecebida;
                
                // Atualiza os valores atuais usando o que veio no fullData (caso não tenha vindo solto no payload)
                if (dados.vida_atual === undefined) playersDataMemoria[codPuro].vida_atual = info.vida_atual;
                if (dados.sani_atual === undefined) playersDataMemoria[codPuro].sani_atual = info.sani_atual;
                if (dados.pe_atual === undefined) playersDataMemoria[codPuro].pe_atual = info.pe_atual;
            }

            // Processa atualizações rápidas (quando o jogador clica num botão de vida, o socket manda apenas vida_atual)
            if (dados.vida_atual !== undefined) playersDataMemoria[codPuro].vida_atual = dados.vida_atual;
            if (dados.sani_atual !== undefined) playersDataMemoria[codPuro].sani_atual = dados.sani_atual;
            if (dados.pe_atual !== undefined) playersDataMemoria[codPuro].pe_atual = dados.pe_atual;

            // Salva na memória local
            localStorage.setItem('mestre_players_data_' + campanhaAtiva, JSON.stringify(playersDataMemoria));

            // Decide como atualizar a interface do mestre
            const cardExiste = document.getElementById(`player-${codPuro}`);
            
            if (!cardExiste || precisaReconstruirCard) {
                renderizarJogadores(); // Recria do zero para pôr a foto/nome certos
            } else {
                atualizarApenasNumeros(codPuro); // Altera só os inputs para não tirar o seu foco
            }
        }

        // 4. RENDERIZAR INTERFACE
        function renderizarJogadores() {
            board.innerHTML = '';
            jogadoresPermitidos.forEach(cod => {
                const dados = playersDataMemoria[cod];
                const card = document.createElement('div');
                card.className = 'player-card';
                card.id = `player-${cod}`;

                if (!dados || !dados.fullData) {
                    // Card quando o mestre adicionou o jogador, mas ele ainda não enviou a ficha
                    card.innerHTML = `
                        <button class="btn-remove" onclick="removerJogador('${cod}')">X</button>
                        <div class="player-header">
                            <div class="player-img" style="background:#333;"></div>
                            <div>
                                <h3 class="player-name">${cod}</h3>
                                <div class="player-info" style="color:var(--accent-red);">A aguardar conexão...</div>
                            </div>
                        </div>
                    `;
                    board.appendChild(card);
                    return;
                }

                // Dados processados
                const vA = dados.vida_atual || 0; const vM = dados.fullData.info?.vida_max || 1;
                const sA = dados.sani_atual || 0; const sM = dados.fullData.info?.sani_max || 1;
                const pA = dados.pe_atual || 0;   const pM = dados.fullData.info?.pe_max || 1;

                card.innerHTML = `
                    <button class="btn-remove" onclick="removerJogador('${cod}')">X</button>
                    <div class="player-header">
                        <img src="${dados.foto || 'https://via.placeholder.com/60'}" class="player-img">
                        <div>
                            <h3 class="player-name" id="nome-${cod}">${dados.nome}</h3>
                            <div class="player-info" id="info-${cod}">NEX: ${dados.nex}% | Defesa: ${dados.defesa}</div>
                        </div>
                    </div>

                    <div class="status-row" style="border-left: 4px solid var(--accent-red);">
                        <span style="color: var(--accent-red); font-weight: bold;">VIDA</span>
                        <div style="display:flex; align-items:center; gap:5px;">
                            <button class="btn-ctrl" onclick="alterarStatusMestre('${cod}', 'vida', -1)">-</button>
                            <input type="number" id="vida-input-${cod}" class="input-number" value="${vA}" onchange="setStatusMestre('${cod}', 'vida', this.value)">
                            <span id="vida-max-${cod}" style="color: gray;">/ ${vM}</span>
                            <button class="btn-ctrl" onclick="alterarStatusMestre('${cod}', 'vida', 1)">+</button>
                        </div>
                    </div>

                    <div class="status-row" style="border-left: 4px solid var(--accent-blue);">
                        <span style="color: var(--accent-blue); font-weight: bold;">SANI</span>
                        <div style="display:flex; align-items:center; gap:5px;">
                            <button class="btn-ctrl" onclick="alterarStatusMestre('${cod}', 'sani', -1)">-</button>
                            <input type="number" id="sani-input-${cod}" class="input-number" value="${sA}" onchange="setStatusMestre('${cod}', 'sani', this.value)">
                            <span id="sani-max-${cod}" style="color: gray;">/ ${sM}</span>
                            <button class="btn-ctrl" onclick="alterarStatusMestre('${cod}', 'sani', 1)">+</button>
                        </div>
                    </div>

                    <div class="status-row" style="border-left: 4px solid var(--accent-yellow);">
                        <span style="color: var(--accent-yellow); font-weight: bold;">P.E.</span>
                        <div style="display:flex; align-items:center; gap:5px;">
                            <button class="btn-ctrl" onclick="alterarStatusMestre('${cod}', 'pe', -1)">-</button>
                            <input type="number" id="pe-input-${cod}" class="input-number" value="${pA}" onchange="setStatusMestre('${cod}', 'pe', this.value)">
                            <span id="pe-max-${cod}" style="color: gray;">/ ${pM}</span>
                            <button class="btn-ctrl" onclick="alterarStatusMestre('${cod}', 'pe', 1)">+</button>
                        </div>
                    </div>
                `;
                board.appendChild(card);
            });
        }

        // Atualiza o DOM sem redesenhar o elemento inteiro (para não perder o foco ao digitar)
        function atualizarApenasNumeros(cod) {
            const dados = playersDataMemoria[cod];
            if (!dados) return;

            // Textos info
            const infoEl = document.getElementById(`info-${cod}`);
            if (infoEl) infoEl.innerText = `NEX: ${dados.nex}% | Defesa: ${dados.defesa}`;

            // Inputs (Verifica se não é o input que está selecionado no momento para não apagar o que o mestre digita)
            const inputVida = document.getElementById(`vida-input-${cod}`);
            if (inputVida && document.activeElement !== inputVida) inputVida.value = dados.vida_atual;
            
            const inputSani = document.getElementById(`sani-input-${cod}`);
            if (inputSani && document.activeElement !== inputSani) inputSani.value = dados.sani_atual;

            const inputPe = document.getElementById(`pe-input-${cod}`);
            if (inputPe && document.activeElement !== inputPe) inputPe.value = dados.pe_atual;

            // Valores Máximos
            if (dados.fullData && dados.fullData.info) {
                const maxVida = document.getElementById(`vida-max-${cod}`);
                if (maxVida) maxVida.innerText = `/ ${dados.fullData.info.vida_max || 1}`;
                
                const maxSani = document.getElementById(`sani-max-${cod}`);
                if (maxSani) maxSani.innerText = `/ ${dados.fullData.info.sani_max || 1}`;
                
                const maxPe = document.getElementById(`pe-max-${cod}`);
                if (maxPe) maxPe.innerText = `/ ${dados.fullData.info.pe_max || 1}`;
            }
        }

        // 5. INTERAÇÕES DO MESTRE ENVIANDO PARA O JOGADOR
        function setStatusMestre(cod, tipo, valorNum) {
            if (!playersDataMemoria[cod]) return;
            const val = parseInt(valorNum) || 0;
            
            // Atualiza localmente
            playersDataMemoria[cod][tipo + '_atual'] = val;
            if(playersDataMemoria[cod].fullData && playersDataMemoria[cod].fullData.info) {
                playersDataMemoria[cod].fullData.info[tipo + '_atual'] = val;
            }

            // Emite para o servidor forçar a atualização na tela do jogador
            if (socket) {
                const payloadStatus = {};
                payloadStatus[tipo + '_atual'] = val;
                socket.emit('comando_mestre', { 
                    tipo: 'update_status_force', 
                    codigo: cod, 
                    status: payloadStatus 
                });
            }
            
            localStorage.setItem('mestre_players_data_' + campanhaAtiva, JSON.stringify(playersDataMemoria));
            atualizarApenasNumeros(cod);
        }

        function alterarStatusMestre(cod, tipo, delta) {
            const atual = parseInt(playersDataMemoria[cod]?.[tipo + '_atual']) || 0;
            setStatusMestre(cod, tipo, atual + delta);
        }

        // 6. ADICIONAR E REMOVER
        function adicionarJogador() {
            const input = document.getElementById('input-add-jogador');
            const cod = input.value.trim().toUpperCase();
            if (cod && !jogadoresPermitidos.includes(cod)) {
                jogadoresPermitidos.push(cod);
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos));
                if(socket) socket.emit('request_player', cod);
                renderizarJogadores();
            }
            input.value = '';
        }

        function removerJogador(cod) {
            if(confirm(`Remover o jogador ${cod}?`)) {
                jogadoresPermitidos = jogadoresPermitidos.filter(c => c !== cod);
                delete playersDataMemoria[cod];
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos));
                localStorage.setItem('mestre_players_data_' + campanhaAtiva, JSON.stringify(playersDataMemoria));
                renderizarJogadores();
            }
        }

        // Inicializa a renderização ao carregar
        window.onload = () => {
            renderizarJogadores();
        };
    </script>
</body>
</html>
