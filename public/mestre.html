<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escudo do Mestre</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        
        :root {
            --bg-body: #121214; 
            --bg-card: rgba(32, 32, 36, 0.85);
            --border-color: rgba(50, 50, 56, 0.8); 
            --text-primary: #e1e1e6; 
            --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; 
            --accent-yellow: #ffcf33; 
            --accent-green: #00e676; 
            --accent-red: #e53935;
            --accent-purple: #b82bf2;
        }

        body {
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-body);
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; 
            background-attachment: fixed; 
            background-position: center; 
            color: var(--text-primary);
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box;
        }

        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .fade-in { animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .player-card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; flex-direction: column; gap: 10px; position: relative; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; }
        .player-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.9); border-color: var(--accent-blue); }

        .monster-card { background: linear-gradient(180deg, rgba(32,32,36,0.95) 0%, rgba(18,18,20,0.95) 100%); border: 2px solid #333; border-top: 4px solid var(--accent-red); box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 12px; position: relative; transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; }
        .monster-card:hover { transform: translateY(-2px); border-color: var(--accent-red); box-shadow: 0 15px 40px rgba(229,57,53,0.3); }
        .monster-header-info { display: flex; flex-direction: column; flex: 1; justify-content: center; min-width: 0; }
        .monster-section-title { font-size: 0.8em; font-weight: 900; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin: 15px 0 5px 0; }
        
        .monster-attack-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(229,57,53,0.3); border-radius: 8px; padding: 12px; margin-bottom: 10px; transition: 0.2s; }
        .monster-attack-card:hover { border-color: rgba(229,57,53,0.6); background: rgba(229,57,53,0.08); }
        .btn-atk, .btn-dmg { padding: 10px; border: none; border-radius: 6px; font-weight: 900; font-size: 0.8em; cursor: pointer; transition: 0.2s; text-transform: uppercase; text-align: center; }
        .btn-atk { background: rgba(255,207,51,0.1); color: var(--accent-yellow); border: 1px solid rgba(255,207,51,0.3); }
        .btn-atk:hover { background: var(--accent-yellow); color: black; }
        .btn-dmg { background: rgba(229,57,53,0.1); color: var(--accent-red); border: 1px solid rgba(229,57,53,0.3); }
        .btn-dmg:hover { background: var(--accent-red); color: white; }
        .monster-power-card { background: rgba(184,43,242,0.05); border-left: 4px solid var(--accent-purple); padding: 12px; border-radius: 0 8px 8px 0; margin-bottom: 10px; border-top: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .mestre-top-bar { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px 25px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .code-input { padding: 8px; background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); color: white; border-radius: 6px; text-transform: uppercase; font-size: 0.8em; width: 150px; margin-left: 20px; }
        .btn-add { background: var(--accent-green); border: none; color: black; font-weight: bold; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .btn-add:hover { filter: brightness(1.2); transform: scale(1.02); }
        
        .tabs-container { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); border-bottom: none; flex: 1; text-align: center; }
        .tab-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); transform: translateY(-2px); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

        .content-wrapper { display: flex; gap: 20px; flex: 1; overflow: hidden; min-height: 0; }
        .left-panel { flex: 3; display: flex; flex-direction: column; overflow: hidden; }

        .players-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; align-content: flex-start; overflow-y: auto; padding-right: 10px; flex: 1; }
        .monsters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; align-content: flex-start; overflow-y: auto; padding-right: 10px; flex: 1; }
        .catalogo-grid-view, #pistas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; align-content: flex-start; padding-right: 5px; }

        .player-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; flex-wrap: wrap; }
        .player-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); background: #000; flex-shrink: 0; }
        .monster-img { border-color: var(--accent-red); }
        .player-name { font-size: 1.2em; font-weight: bold; color: var(--accent-yellow); text-transform: uppercase; margin: 0; }
        .monster-name { color: var(--accent-red); }
        .player-info { font-size: 0.8em; color: var(--text-secondary); line-height: 1.4; }
        
        .btn-remove { position: absolute; top: 10px; right: 10px; background: var(--accent-red); color: white; border: none; border-radius: 4px; padding: 2px 8px; font-size: 0.8em; font-weight: bold; cursor: pointer; z-index: 10; transition: 0.2s; }
        .btn-remove:hover { filter: brightness(1.2); }
        .btn-ctrl { background: #333; color: white; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; }
        .btn-ctrl:hover { filter: brightness(1.5); border-color: white; }
        .btn-roll { background: var(--accent-yellow); color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.8em; margin-top: 5px; width: 100%; box-sizing: border-box; }
        .btn-roll:hover { filter: brightness(1.2); transform: scale(1.02);}

        .log-container { flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(8px); min-width: 300px; }
        .log-title { background: rgba(0,0,0,0.5); padding: 15px; text-align: center; font-weight: bold; color: var(--accent-green); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .log-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .log-item { background: rgba(18, 18, 20, 0.9); border: 1px solid #333; padding: 10px; border-radius: 8px; font-size: 0.9em; animation: slideInUp 0.3s ease-out; }
        .log-item .player-name { font-size: 0.9em; color: var(--accent-blue); margin-bottom: 5px; }
        .log-item .roll-result { font-size: 1.2em; font-weight: 900; text-align: center; margin: 5px 0; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px; padding: 25px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.9); box-sizing: border-box; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .form-group label { font-size: 0.9em; font-weight: bold; color: var(--accent-yellow); }
        .monster-input { padding: 10px; background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); color: white; border-radius: 6px; box-sizing: border-box; width: 100%; transition: 0.2s; }
        .monster-input:focus { border-color: var(--accent-blue); outline: none;}
        .dynamic-row { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        
        .pista-card { background: rgba(18,18,20,0.8); border: 1px solid rgba(255,207,51,0.3); border-radius: 8px; padding: 15px; cursor: pointer; transition: 0.3s; text-align: center; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
        .pista-card:hover { transform: scale(1.02); background: rgba(255,207,51,0.1); box-shadow: 0 0 15px rgba(255,207,51,0.3); border-color: var(--accent-blue); }

        .popup-box-dice { position: relative; width: 90%; max-width: 600px; height: 400px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000; border: 4px solid var(--accent-yellow); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; text-align: center; }
        .popup-box-dice::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 1; }
        .popup-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; display: none; flex-direction: column; justify-content: center; align-items: center; animation: fadeInResult 0.5s forwards; text-align: center; }
        .popup-number { font-family: 'Permanent Marker', cursive; font-size: 8em; font-weight: 900; color: white; text-shadow: 4px 4px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; width: 100%; line-height: 1; margin: 0; padding: 0; }
        .popup-res { font-family: 'Permanent Marker', cursive; font-size: 2.2em; line-height: 1.1; margin: 0; margin-top: 5px; text-transform: uppercase; text-shadow: 2px 2px 4px #000; max-height: 180px; overflow-y: auto; padding: 0 10px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center; }
        
        .attr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; } 
        .skill-group { display: flex; flex-direction: column; gap: 4px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px; border: 1px solid #333;}
        .skill-group label { display: flex; align-items: center; gap: 5px; font-size: 0.8em; color: var(--text-primary); }

        #iniciativa-board, #catalogo-board, #rmestre-board, #pistas-mestre-board { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .ini-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .ini-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 10px; }

        #roteiro-board { display: none; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .roteiro-layout { display: flex; gap: 20px; height: calc(100% - 45px); overflow: hidden; }
        .roteiro-sidebar { width: 250px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid var(--border-color); padding-right: 15px; overflow-y: auto; flex-shrink: 0; }
        .roteiro-sidebar-right { width: 250px; display: flex; flex-direction: column; gap: 10px; border-left: 1px solid var(--border-color); padding-left: 15px; overflow-y: auto; flex-shrink: 0; }
        .roteiro-editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .session-btn { background: rgba(18,18,20,0.8); color: var(--text-primary); border: 1px solid var(--border-color); padding: 12px; cursor: pointer; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; transition: 0.2s; }
        .session-btn:hover { border-color: var(--accent-blue); background: rgba(255,255,255,0.05); }
        .session-btn.active { background: rgba(0, 176, 255, 0.15); border-color: var(--accent-blue); color: var(--accent-blue); }
        .session-btn.active-desc { background: rgba(184, 43, 242, 0.15); border-color: var(--accent-purple); color: var(--accent-purple); }
        .roteiro-titulo-input { background: transparent; border: none; border-bottom: 2px solid var(--border-color); color: white; font-size: 1.5em; font-weight: bold; margin-top: 0; margin-bottom: 15px; padding-bottom: 5px; outline: none; width: 100%; font-family: inherit; transition: 0.2s; }
        .roteiro-titulo-input:focus { border-color: var(--accent-yellow); }
        .roteiro-textarea { flex: 1; background: rgba(12, 12, 14, 0.9); border: 1px solid var(--border-color); color: var(--text-primary); padding: 20px; font-family: 'Roboto', sans-serif; font-size: 1.1em; border-radius: 8px; resize: none; outline: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); line-height: 1.6; }
        .roteiro-textarea:focus { border-color: var(--accent-blue); }

        #mapas-board { display: none; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .map-list { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; flex-shrink: 0; }
        .map-btn { background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.2s; display: flex; gap: 10px; align-items: center; }
        .map-btn.active { border-color: var(--accent-blue); background: rgba(0, 176, 255, 0.15); color: var(--accent-blue); }
        .map-view-container { flex: 1; position: relative; overflow: hidden; border: 2px solid var(--border-color); border-radius: 8px; background: #0b0b0e; cursor: grab; display: block; }
        .map-view-container:active { cursor: grabbing; }
        #map-transform-wrapper { transform-origin: 0 0; width: 100%; height: 100%; position: absolute; top:0; left:0; will-change: transform; }
        .map-image { display: block; max-width: none; user-select: none; pointer-events: none; }
        .map-pin-marker { position: absolute; width: 26px; height: 26px; border-radius: 50% 50% 50% 0; transform: translate(-50%, -100%) rotate(-45deg); cursor: pointer; z-index: 10; box-shadow: 2px 2px 8px rgba(0,0,0,0.6); border: 2px solid white; transition: transform 0.1s, filter 0.1s; }
        .map-pin-marker:hover { filter: brightness(1.3); transform: translate(-50%, -100%) rotate(-45deg) scale(1.15); }
        .map-pin-marker::after { content: ''; width: 8px; height: 8px; background: white; position: absolute; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .map-tooltip { position: absolute; background: rgba(10, 10, 12, 0.95); border: 1px solid var(--accent-yellow); color: white; padding: 15px; border-radius: 8px; z-index: 20; max-width: 250px; display: none; transform: translate(-50%, -120%); margin-top: -15px; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .map-tooltip h4 { margin: 0 0 8px 0; color: var(--accent-yellow); font-size: 1.1em; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;}
        .map-tooltip p { margin: 0; font-size: 0.9em; color: #ddd; line-height: 1.4; white-space: pre-wrap; }

        @media (max-width: 900px) { .players-container, .monsters-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; padding: 10px; }
            .content-wrapper { flex-direction: column; height: auto; overflow: visible; }
            .left-panel { overflow: visible; }
            .players-container, .monsters-grid, .catalogo-grid-view, #pistas-grid { grid-template-columns: 1fr; overflow-y: visible; padding-right: 0; }
            .log-container { height: 400px; margin-top: 10px; min-width: 100%; }
            .tab-btn { border-radius: 8px; margin-bottom: 5px; }
            .popup-box-dice { height: 300px; }
            .popup-number { font-size: 6em; }
            .popup-res { font-size: 1.5em; }
            .attr-grid { grid-template-columns: 1fr; } 
            #roteiro-board { height: auto; padding: 15px; }
            .roteiro-layout { flex-direction: column; height: auto; }
            .roteiro-sidebar, .roteiro-sidebar-right { width: 100%; flex-direction: row; overflow-x: auto; flex-wrap: nowrap; border:none; padding:0; margin-bottom:10px;}
            #roteiro-list, #descricao-list { flex-direction: row !important; display: flex; overflow-x: auto; flex-wrap: nowrap; gap: 8px; width: 100%;}
            .session-btn { flex: 0 0 auto; white-space: nowrap; padding: 8px 12px; }
            .roteiro-editor { overflow-y: visible; height: 350px; margin: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="mestre-top-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-weight: 900; color: var(--accent-red); font-size: 1.4em; letter-spacing: 1px;">🛡️ ESCUDO DO MESTRE</span>
            <input type="text" id="add-code-input" class="code-input" placeholder="Login do Jogador..." maxlength="30">
            <button class="btn-add" onclick="adicionarJogador()">+ MANUAL</button>
        </div>
        
        <div style="flex: 1;"></div>

        <div style="background: rgba(18, 18, 20, 0.8); border: 2px solid var(--accent-yellow); padding: 8px 15px; border-radius: 6px; font-weight: bold; color: var(--accent-yellow); margin-right: 10px; display: flex; align-items: center;">
            <span id="save-status" style="font-size: 0.8em; color: var(--text-secondary); font-style: italic;">Sincronizado ✔️</span>
        </div>

        <button class="btn-add" style="background: var(--accent-purple); color: white; margin-right:10px;" onclick="window.open('/overlay.html?mesa=' + campanhaAtiva, '_blank')">📺 OVERLAY</button>
        <button class="btn-remove" style="position: static; padding: 10px 20px; font-size: 1em; background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red);" onclick="fazerLogout()">SAIR (LOBBY)</button>
    </div>

    <div class="tabs-container" id="mestre-tabs-container">
        <button class="tab-btn active" id="tab-jogadores" onclick="mudarAba('jogadores')">🕵️ Jogadores</button>
        <button class="tab-btn" id="tab-monstros" onclick="mudarAba('monstros')">👹 Monstros</button>
        <button class="tab-btn" id="tab-iniciativa" onclick="mudarAba('iniciativa')">⚔️ Iniciativa</button>
        <button class="tab-btn" id="tab-roteiro" onclick="mudarAba('roteiro')">📜 Roteiro</button>
        <button class="tab-btn" id="tab-mapas" onclick="mudarAba('mapas')">🗺️ Mapas</button>
        <button class="tab-btn" id="tab-catalogo" onclick="mudarAba('catalogo')">🎒 Catálogo</button>
        <button class="tab-btn" id="tab-rmestre" onclick="mudarAba('rmestre')">🔮 Rituais</button>
        <button class="tab-btn" id="tab-pistas-mestre" onclick="mudarAba('pistas-mestre')">🔍 Pistas</button>
    </div>

    <div class="content-wrapper active" id="mestre-content-wrapper">
        <div class="left-panel">
            
            <div id="players-board" class="players-container fade-in"></div>

            <div id="monsters-board" style="display:none; flex-direction:column; height: 100%;">
                <div style="margin-bottom: 20px;">
                    <button class="btn-add" style="background: var(--accent-red); color: white; width: 100%; font-size: 1.2em; padding: 15px;" onclick="abrirModalCriatura()">+ CRIAR NOVA CRIATURA</button>
                </div>
                <div class="monsters-grid" id="monsters-grid"></div>
            </div>

            <div id="catalogo-board" style="display:none; flex-direction:column; height: 100%;">
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="btn-add" style="background: var(--accent-green); color: black; flex: 1; min-width: 150px; font-size: 1em;" onclick="abrirModalItemMestre('comum')">+ NOVO ITEM</button>
                    <button class="btn-add" style="background: var(--accent-purple); color: white; flex: 1; min-width: 150px; font-size: 1em;" onclick="abrirModalItemMestre('municao')">+ NOVA MUNIÇÃO</button>
                    <button class="btn-add" style="background: var(--accent-yellow); color: black; flex: 1; min-width: 150px; font-size: 1em;" onclick="abrirModalItemMestre('armacc')">+ NOVA ARMA (CORPO)</button>
                    <button class="btn-add" style="background: var(--accent-blue); color: black; flex: 1; min-width: 150px; font-size: 1em;" onclick="abrirModalItemMestre('armadisp')">+ NOVA ARMA (DISPARO)</button>
                </div>
                <div style="flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 20px;">
                    <div><h3 style="color: var(--accent-green); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-top: 0; text-transform: uppercase;">🎒 Itens & Munições</h3><div class="catalogo-grid-view" id="catalogo-grid-comum"></div></div>
                    <div><h3 style="color: var(--accent-yellow); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-top: 0; text-transform: uppercase;">🗡️ Armas Corpo a Corpo</h3><div class="catalogo-grid-view" id="catalogo-grid-armacc"></div></div>
                    <div><h3 style="color: var(--accent-blue); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; margin-top: 0; text-transform: uppercase;">🔫 Armas de Disparo</h3><div class="catalogo-grid-view" id="catalogo-grid-armadisp"></div></div>
                </div>
            </div>

            <div id="rmestre-board" style="display:none; flex-direction:column; height: 100%;">
                <div style="margin-bottom: 20px;"><button class="btn-add" style="background: var(--accent-purple); color: white; width: 100%; font-size: 1.2em; padding: 15px;" onclick="abrirModalRitualMestre()">+ CRIAR NOVO RITUAL NO CATÁLOGO</button></div>
                <div style="flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 10px;">
                    <div id="rituais-mestre-1-container" style="display: none;"><h3 style="color: var(--text-secondary); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; font-size: 1em; text-transform: uppercase;">1º Círculo</h3><div class="catalogo-grid-view" id="rituais-mestre-1-body"></div></div>
                    <div id="rituais-mestre-2-container" style="display: none;"><h3 style="color: var(--text-secondary); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; font-size: 1em; text-transform: uppercase;">2º Círculo</h3><div class="catalogo-grid-view" id="rituais-mestre-2-body"></div></div>
                    <div id="rituais-mestre-3-container" style="display: none;"><h3 style="color: var(--text-secondary); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; font-size: 1em; text-transform: uppercase;">3º Círculo</h3><div class="catalogo-grid-view" id="rituais-mestre-3-body"></div></div>
                    <div id="rituais-mestre-4-container" style="display: none;"><h3 style="color: var(--text-secondary); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; font-size: 1em; text-transform: uppercase;">4º Círculo</h3><div class="catalogo-grid-view" id="rituais-mestre-4-body"></div></div>
                </div>
            </div>

            <div id="pistas-mestre-board" style="display:none; flex-direction:column; height: 100%;">
                <div style="margin-bottom: 20px;"><button class="btn-add" style="background: var(--accent-yellow); color: black; width: 100%; font-size: 1.2em; padding: 15px;" onclick="abrirModalPista()">+ CRIAR NOVA PISTA (MESTRE)</button></div>
                <div id="pistas-grid" style="overflow-y:auto; padding-right:10px;"></div>
            </div>

            <div id="iniciativa-board" style="display:none;">
                <div class="ini-controls">
                    <button class="btn-add" style="flex: 1; background: var(--accent-red); color: white; padding: 10px 5px; font-size: 0.9em;" onclick="limparIniciativa()">🗑️ LIMPAR</button>
                    <button class="btn-add" style="flex: 2; font-size: 1.1em; padding: 10px 5px;" onclick="rolarMonstrosIniciativa()">🎲 ROLAR MONSTROS</button>
                    <button class="btn-add" style="flex: 1; background: var(--accent-blue); color: black; padding: 10px 5px; font-size: 0.9em;" onclick="passarTurno()">⏭️ PRÓXIMO</button>
                </div>
                <div class="ini-list-container" id="iniciativa-list-container"></div>
            </div>

            <div id="roteiro-board" style="display:none;">
                <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <h2 style="color: var(--accent-blue); margin: 0;">📜 Gestão da Campanha</h2>
                    <span id="roteiro-status" style="font-size: 0.8em; color: var(--text-secondary); font-style: italic;">A aguardar...</span>
                </div>
                <div class="roteiro-layout">
                    <div class="roteiro-sidebar"><button class="btn-add" style="width: 100%; margin-bottom: 5px; flex-shrink: 0; background: var(--accent-blue); color: black;" onclick="adicionarRoteiro()">+ NOVA SESSÃO</button><div id="roteiro-list" style="display: flex; flex-direction: column; gap: 8px;"></div></div>
                    <div class="roteiro-editor"><input type="text" id="roteiro-titulo-atual" class="roteiro-titulo-input" placeholder="Nomeie a sua anotação aqui..."><textarea id="roteiro-text" class="roteiro-textarea" placeholder="O editor selecionado aparecerá aqui..."></textarea></div>
                    <div class="roteiro-sidebar-right"><button class="btn-add" style="width: 100%; margin-bottom: 5px; flex-shrink: 0; background: var(--accent-purple); color: white;" onclick="adicionarDescricao()">+ NOVO OBJETO / CENÁRIO</button><div id="descricao-list" style="display: flex; flex-direction: column; gap: 8px;"></div></div>
                </div>
            </div>

            <div id="mapas-board" style="display:none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                    <h2 style="color: var(--accent-blue); margin: 0;">🗺️ Mapas Interativos</h2>
                    <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                        <input type="text" id="novo-mapa-nome" class="monster-input" placeholder="Nome do Mapa" style="width: 150px; padding: 8px;">
                        <input type="text" id="novo-mapa-url" class="monster-input" placeholder="URL da Imagem" style="width: 150px; padding: 8px;">
                        <label class="btn-add" style="padding: 8px 15px; margin: 0; cursor: pointer; background: var(--text-secondary); color: black;">📂 DO PC<input type="file" id="novo-mapa-file" accept="image/*" style="display: none;" onchange="carregarMapaPC(event)"></label>
                        <button class="btn-add" style="padding: 8px 15px; margin: 0;" onclick="adicionarMapa()">+ ADICIONAR MAPA</button>
                        <button class="btn-remove" style="position: static; padding: 8px 15px; margin: 0;" onclick="apagarMapaAtual()">🗑️ APAGAR ATUAL</button>
                    </div>
                </div>
                <div class="map-list" id="map-list-container"></div>
                <div class="map-view-container" id="map-view">
                    <div id="map-transform-wrapper"><div id="map-content" style="position: relative; display: inline-block;"><img id="map-image-display" class="map-image" src="" style="display: none;"><div id="pins-container"></div><div class="map-tooltip" id="map-tooltip"><h4 id="tooltip-title"></h4><p id="tooltip-desc"></p></div></div></div>
                </div>
            </div>

        </div>

        <div class="log-container fade-in" id="mestre-log-container">
            <div class="log-title">🎲 Resultados</div>
            <div class="log-messages" id="log-box"><div style="text-align: center; color: var(--text-secondary); font-size: 0.8em; margin-top: 20px;" id="aguardar-msg">A aguardar rolagens...</div></div>
        </div>
    </div>

    <div id="modal-ficha" class="modal-overlay"><div style="width: 95%; max-width: 1400px; display: flex; justify-content: flex-end; flex-direction: column; gap: 10px;"><button class="btn-remove" style="position: static; padding: 10px 20px; font-size: 1.2em;" onclick="fecharFicha()">X FECHAR FICHA</button><iframe id="iframe-ficha" src="" style="width: 100%; height: 85vh; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg-body);"></iframe></div></div>
    
    <div id="popup-dice" class="modal-overlay" onclick="closeDice()" style="z-index: 10000;"><div class="popup-box-dice" onclick="event.stopPropagation()"><div id="popup-content" class="popup-content"><div id="popup-num" class="popup-number">00</div><div id="popup-res" class="popup-res">RESULTADO</div></div></div></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        let campanhaAtiva = localStorage.getItem('campanha_atual') || "demo";
        const socket = typeof io !== 'undefined' ? io() : null;

        let jogadoresPermitidos = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];
        let iniciativaList = JSON.parse(localStorage.getItem('mestre_iniciativa_' + campanhaAtiva)) || [];
        let monstros = JSON.parse(localStorage.getItem('mestre_monstros_' + campanhaAtiva)) || [];
        let roteiros = JSON.parse(localStorage.getItem('mestre_roteiros_' + campanhaAtiva)) || [];
        let descricoes = JSON.parse(localStorage.getItem('mestre_descricoes_' + campanhaAtiva)) || [];
        let mapas = JSON.parse(localStorage.getItem('mestre_mapas_' + campanhaAtiva)) || [];
        let catalogoMestre = JSON.parse(localStorage.getItem('mestre_catalogo_itens_' + campanhaAtiva)) || [];
        let pistasMestre = JSON.parse(localStorage.getItem('mestre_pistas_' + campanhaAtiva)) || [];
        let playersDataMemoria = JSON.parse(localStorage.getItem('mestre_players_data_' + campanhaAtiva)) || {};
        
        let currentMapaIdMap = null;
        let editMonstroId = null;
        let turnoAtualIndex = 0;

        const playersBoard = document.getElementById('players-board'); 
        const logBox = document.getElementById('log-box'); 

        // ================= SINCRONIZAÇÃO CORRIGIDA =================
        if (socket) {
            socket.on('connect', () => {
                socket.emit('join_campaign', campanhaAtiva);
                jogadoresPermitidos.forEach(codigo => socket.emit('request_player', codigo));
            });

            const gerenciarAtualizacaoJogador = (dados) => {
                const codPuro = (dados.codigo || "").toUpperCase();
                if (!codPuro || !jogadoresPermitidos.includes(codPuro)) return;
                
                if (!playersDataMemoria[codPuro]) playersDataMemoria[codPuro] = {};
                
                let mudouEstrutura = false;

                // Se houver fullData, atualizamos os dados "estáticos" (nome, foto, etc)
                if (dados.fullData) {
                    playersDataMemoria[codPuro].fullData = dados.fullData;
                    if (dados.fullData.info) {
                        const novoNome = dados.fullData.info.char_nome;
                        const novaFoto = dados.fullData.info.char_img;
                        const novoNex = dados.fullData.info.char_nex;
                        const novaDef = dados.fullData.defense;

                        // Verifica se houve mudança real para evitar re-renderização desnecessária
                        if (playersDataMemoria[codPuro].nome !== novoNome || 
                            playersDataMemoria[codPuro].foto !== novaFoto || 
                            playersDataMemoria[codPuro].nex !== novoNex ||
                            playersDataMemoria[codPuro].defesa !== novaDef) {
                            mudouEstrutura = true;
                        }

                        playersDataMemoria[codPuro].nome = novoNome;
                        playersDataMemoria[codPuro].foto = novaFoto;
                        playersDataMemoria[codPuro].nex = novoNex;
                        playersDataMemoria[codPuro].defesa = novaDef;
                    }
                } 
                
                // Atualização dos status numéricos (Vida, Sanidade, PE)
                if (playersDataMemoria[codPuro].fullData && playersDataMemoria[codPuro].fullData.info) {
                    if(dados.vida_atual !== undefined) { 
                        playersDataMemoria[codPuro].vida_atual = dados.vida_atual; 
                        playersDataMemoria[codPuro].fullData.info.vida_atual = dados.vida_atual; 
                    }
                    if(dados.sani_atual !== undefined) { 
                        playersDataMemoria[codPuro].sani_atual = dados.sani_atual; 
                        playersDataMemoria[codPuro].fullData.info.sani_atual = dados.sani_atual; 
                    }
                    if(dados.pe_atual !== undefined) { 
                        playersDataMemoria[codPuro].pe_atual = dados.pe_atual; 
                        playersDataMemoria[codPuro].fullData.info.pe_atual = dados.pe_atual; 
                    }
                }
                
                localStorage.setItem('mestre_players_data_' + campanhaAtiva, JSON.stringify(playersDataMemoria));

                // Lógica de Renderização: Se o nome/foto mudou, redesenha o card. 
                // Se só os números mudaram, atualiza apenas os inputs.
                if (mudouEstrutura || dados.fullData) {
                    renderizarJogadores(); 
                } else {
                    atualizarDOMJogador(codPuro);
                }
            };

            socket.on('status_change', gerenciarAtualizacaoJogador);
            socket.on('update_mestre', gerenciarAtualizacaoJogador);
            socket.on('novo_log', (dados) => {
                adicionarAoLog(dados.jogador, dados.acao, dados.resultado, dados.cor);
            });
        }

        function renderizarJogadores() {
            playersBoard.innerHTML = '';
            jogadoresPermitidos.forEach(codPuro => {
                const card = document.createElement('div'); card.className = 'player-card'; card.id = `player-${codPuro}`;
                const dados = playersDataMemoria[codPuro];
                if (!dados || !dados.fullData) {
                    card.innerHTML = `<button class="btn-remove" onclick="removerJogador('${codPuro}')">X</button><div class="player-header"><img src="https://via.placeholder.com/60" class="player-img"><div><h3 class="player-name">${codPuro}</h3><div class="player-info">Aguardando...</div></div></div>`;
                    playersBoard.appendChild(card); return;
                }
                const vA = dados.fullData.info.vida_atual || 0; const vM = dados.fullData.info.vida_max || 1;
                const sA = dados.fullData.info.sani_atual || 0; const sM = dados.fullData.info.sani_max || 1;
                const pA = dados.fullData.info.pe_atual || 0; const pM = dados.fullData.info.pe_max || 1;
                
                card.innerHTML = `
                    <button class="btn-remove" onclick="removerJogador('${codPuro}')">X</button>
                    <div class="player-header">
                        <img src="${dados.foto || 'https://via.placeholder.com/60'}" class="player-img">
                        <div>
                            <h3 class="player-name">${dados.nome || codPuro}</h3>
                            <div class="player-info">NEX: ${dados.nex || 0}% | DEFESA: ${dados.defesa || 10}</div>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px;">
                            <span style="color: var(--accent-red); font-weight: bold; font-size: 0.8em;">PV</span>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="number" class="input-vida" style="width: 40px; background: transparent; border: none; color: white; text-align: center; font-weight: bold;" value="${vA}" onchange="setStatusJogador('${codPuro}', 'vida', this.value)">
                                <span class="max-vida" style="color: gray; font-size: 0.8em;">/ ${vM}</span>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px;">
                            <span style="color: var(--accent-blue); font-weight: bold; font-size: 0.8em;">SAN</span>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="number" class="input-sani" style="width: 40px; background: transparent; border: none; color: white; text-align: center; font-weight: bold;" value="${sA}" onchange="setStatusJogador('${codPuro}', 'sani', this.value)">
                                <span class="max-sani" style="color: gray; font-size: 0.8em;">/ ${sM}</span>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px;">
                            <span style="color: var(--accent-yellow); font-weight: bold; font-size: 0.8em;">PE</span>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="number" class="input-pe" style="width: 40px; background: transparent; border: none; color: white; text-align: center; font-weight: bold;" value="${pA}" onchange="setStatusJogador('${codPuro}', 'pe', this.value)">
                                <span class="max-pe" style="color: gray; font-size: 0.8em;">/ ${pM}</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-roll" onclick="abrirFicha('${codPuro}')">🔍 FICHA</button>
                `;
                playersBoard.appendChild(card);
            });
        }

        function atualizarDOMJogador(codPuro) {
            const dados = playersDataMemoria[codPuro];
            if(!dados) return;
            const card = document.getElementById(`player-${codPuro}`);
            if(!card) return;
            const iVida = card.querySelector('.input-vida');
            const iSani = card.querySelector('.input-sani');
            const iPe = card.querySelector('.input-pe');
            if(iVida && document.activeElement !== iVida) iVida.value = dados.vida_atual;
            if(iSani && document.activeElement !== iSani) iSani.value = dados.sani_atual;
            if(iPe && document.activeElement !== iPe) iPe.value = dados.pe_atual;
        }

        function mudarAba(aba) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+aba).classList.add('active');
            ['players-board', 'monsters-board', 'iniciativa-board', 'roteiro-board', 'mapas-board', 'catalogo-board', 'rmestre-board', 'pistas-mestre-board'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
            if(aba === 'jogadores') { document.getElementById('players-board').style.display = 'grid'; renderizarJogadores(); }
            else if(aba === 'monstros') { document.getElementById('monsters-board').style.display = 'flex'; renderizarMonstros(); }
            else if(aba === 'roteiro') { document.getElementById('roteiro-board').style.display = 'flex'; renderRoteiros(); }
        }

        function adicionarAoLog(jogador, acao, resultado, cor) {
            const item = document.createElement('div');
            item.className = 'log-item fade-in';
            item.innerHTML = `<div class="player-name">${jogador}</div><div style="font-size: 0.8em; color: gray;">${acao}</div><div class="roll-result" style="${cor}">${resultado}</div>`;
            logBox.prepend(item); 
        }

        function adicionarJogador() { 
            let input = document.getElementById('add-code-input'); 
            let codigo = input.value.trim().toUpperCase(); 
            if (codigo && !jogadoresPermitidos.includes(codigo)) { 
                jogadoresPermitidos.push(codigo); 
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(jogadoresPermitidos)); 
                socket.emit('request_player', codigo); 
                renderizarJogadores();
            } 
            input.value = ''; 
        }

        function abrirFicha(codigo) { 
            const iframe = document.getElementById('iframe-ficha'); 
            document.getElementById('modal-ficha').style.display = 'flex'; 
            iframe.src = `/ficha.html?view=${codigo}&t=${Date.now()}`; 
        }

        function fecharFicha() { document.getElementById('modal-ficha').style.display = 'none'; document.getElementById('iframe-ficha').src = ''; }
        function fazerLogout() { localStorage.removeItem('campanha_atual'); window.location.href = '/index.html'; }

        window.onload = () => { mudarAba('jogadores'); };
    </script>
</body>
</html>
