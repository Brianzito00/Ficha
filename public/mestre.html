<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escudo do Mestre - Ordem</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        :root {
            --bg-body: #121214; --bg-card: rgba(32,32,36,0.85); --border-color: rgba(50,50,56,0.8);
            --text-primary: #e1e1e6; --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; --accent-green: #00e676; --accent-red: #e53935; --accent-purple: #b82bf2;
            --shadow-card: 0 8px 32px 0 rgba(0,0,0,0.8);
        }

        body { 
            font-family: 'Roboto', sans-serif; background-color: var(--bg-body); 
            background-size: cover; background-position: center; background-attachment: fixed; 
            color: var(--text-primary); margin: 0; padding: 0; 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(18, 18, 20, 0.9); border-bottom: 2px solid var(--accent-red);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            box-sizing: border-box; z-index: 100; backdrop-filter: blur(10px);
        }

        .top-bar h1 { margin: 0; font-size: 1.5em; color: var(--accent-red); text-transform: uppercase; }
        .btn-leave { background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-leave:hover { background: var(--accent-red); color: white; }

        /* Layout Principal */
        .main-content { display: flex; width: 100%; height: calc(100vh - 60px); margin-top: 60px; }

        /* Grelha de Jogadores */
        .players-area { flex: 1; padding: 20px; overflow-y: auto; }
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        /* Card do Jogador */
        .player-card { 
            background: var(--bg-card); border: 1px solid var(--border-color); border-top: 3px solid var(--accent-red);
            border-radius: 12px; padding: 15px; box-shadow: var(--shadow-card); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 15px; transition: transform 0.2s;
            will-change: transform, box-shadow; /* Otimização para as animações */
        }
        .player-card:hover { transform: translateY(-3px); border-color: var(--accent-red); }

        .player-header { display: flex; align-items: center; gap: 15px; }
        .player-img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); background: #000; }
        .player-info h3 { margin: 0 0 5px 0; color: white; text-transform: uppercase; font-size: 1.2em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .player-info p { margin: 0; color: var(--text-secondary); font-size: 0.85em; font-weight: bold; }
        .player-info .destaque { color: var(--accent-green); font-size: 1.1em; }

        /* Barras de Status */
        .status-row { margin-bottom: 8px; }
        .status-labels { display: flex; justify-content: space-between; font-size: 0.8em; font-weight: 900; margin-bottom: 3px; }
        .bar-container { width: 100%; height: 18px; background: rgba(0,0,0,0.8); border-radius: 4px; border: 1px solid #222; overflow: hidden; position: relative;}
        .bar-fill { height: 100%; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .fill-pe { background: linear-gradient(90deg, #b38f00, var(--accent-yellow)); }

        .btn-view-sheet { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
            color: white; padding: 10px; border-radius: 6px; cursor: pointer; 
            font-weight: bold; text-transform: uppercase; transition: 0.2s; width: 100%;
        }
        .btn-view-sheet:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-blue); color: var(--accent-blue); }

        /* Painel Lateral (Log de Dados) */
        .log-area { 
            width: 350px; background: rgba(18,18,20,0.95); border-left: 1px solid var(--border-color); 
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }
        .log-area h3 { color: var(--accent-yellow); text-align: center; margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .log-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        
        .log-item { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 10px; border-radius: 8px; }
        .log-item.crit { border-color: var(--accent-yellow); box-shadow: inset 0 0 10px rgba(255,207,51,0.1); }
        .log-item.fail { border-color: var(--accent-red); box-shadow: inset 0 0 10px rgba(229,57,53,0.1); }
        .log-player { font-size: 0.8em; color: var(--text-secondary); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .log-action { font-size: 0.9em; color: white; margin-bottom: 5px; font-style: italic; }
        .log-result { font-family: 'Permanent Marker', cursive; font-size: 2.2em; text-align: right; line-height: 1; }

        /* =========================================
           ANIMAÇÕES DE STATUS ÚNICAS
        ========================================= */

        /* VIDA: Tremor violento (Dano) / Pulsação suave (Cura) */
        @keyframes hitVidaDano {
            0% { transform: translateX(0); border-color: var(--border-color); }
            20% { transform: translateX(-6px) scale(0.97); box-shadow: 0 0 25px rgba(229,57,53,0.9); border-color: var(--accent-red); }
            40% { transform: translateX(6px) scale(0.97); }
            60% { transform: translateX(-6px) scale(0.97); }
            80% { transform: translateX(6px) scale(0.97); }
            100% { transform: translateX(0) scale(1); border-color: var(--border-color); }
        }
        @keyframes hitVidaCura {
            0% { transform: scale(1); border-color: var(--border-color); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,230,118,1); border-color: var(--accent-green); }
            100% { transform: scale(1); border-color: var(--border-color); }
        }

        /* SANIDADE: Glitch/Distorção Mental (Dano) / Pulsação (Cura) */
        @keyframes hitSaniDano {
            0% { transform: translate(0) skew(0); border-color: var(--border-color); }
            20% { transform: translate(-4px, 2px) skew(-5deg) scale(0.98); box-shadow: 0 0 25px rgba(0,176,255,0.9); border-color: var(--accent-blue); filter: hue-rotate(20deg); }
            40% { transform: translate(4px, -2px) skew(5deg) scale(0.98); }
            60% { transform: translate(-2px, 2px) skew(-3deg) scale(0.98); }
            80% { transform: translate(2px, -2px) skew(3deg) scale(0.98); }
            100% { transform: translate(0) skew(0) scale(1); border-color: var(--border-color); filter: none; }
        }
        @keyframes hitSaniCura {
            0% { transform: scale(1); border-color: var(--border-color); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,176,255,0.8); border-color: var(--accent-blue); }
            100% { transform: scale(1); border-color: var(--border-color); }
        }

        /* PONTOS DE ESFORÇO: Pesado para baixo (Gasto) / Subir leve (Ganho) */
        @keyframes hitPeDano {
            0% { transform: translateY(0); border-color: var(--border-color); }
            30% { transform: translateY(6px) scale(0.98); box-shadow: inset 0 0 25px rgba(255,207,51,0.5); border-color: var(--accent-yellow); }
            100% { transform: translateY(0) scale(1); border-color: var(--border-color); }
        }
        @keyframes hitPeCura {
            0% { transform: translateY(0); border-color: var(--border-color); }
            50% { transform: translateY(-6px); box-shadow: 0 15px 25px rgba(255,207,51,0.8); border-color: var(--accent-yellow); }
            100% { transform: translateY(0); border-color: var(--border-color); }
        }

        /* Classes de Animação */
        .anim-vida-dano { animation: hitVidaDano 0.5s ease-out !important; z-index: 10; position: relative; }
        .anim-vida-cura { animation: hitVidaCura 0.6s ease-out !important; z-index: 10; position: relative; }
        .anim-sani-dano { animation: hitSaniDano 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) !important; z-index: 10; position: relative; }
        .anim-sani-cura { animation: hitSaniCura 0.6s ease-out !important; z-index: 10; position: relative; }
        .anim-pe-dano   { animation: hitPeDano 0.4s ease-out !important; z-index: 10; position: relative; }
        .anim-pe-cura   { animation: hitPeCura 0.5s ease-out !important; z-index: 10; position: relative; }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .log-area { width: 100%; height: 300px; border-left: none; border-top: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Mesa: <span id="display-campanha" style="color: white;">---</span></h1>
        <button class="btn-leave" onclick="voltarLobby()">Sair da Mesa</button>
    </div>

    <div class="main-content">
        <div class="players-area">
            <div id="players-grid" class="players-grid">
                <div id="empty-state" style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-style: italic; margin-top: 50px;">
                    A aguardar ligação dos jogadores...<br>
                    <span style="font-size: 0.8em;">Os jogadores aparecerão aqui assim que abrirem ou alterarem a ficha.</span>
                </div>
            </div>
        </div>

        <div class="log-area">
            <h3>Registos de Rolagens</h3>
            <div id="log-list" class="log-list">
                <div style="text-align: center; color: #555; font-size: 0.8em; font-style: italic; margin-top: 20px;">
                    Nenhum dado rolado ainda.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const campanhaAtiva = localStorage.getItem('campanha_atual');
        if(!campanhaAtiva) { window.location.href = '/index.html'; }
        document.getElementById('display-campanha').innerText = campanhaAtiva;

        // Recuperar wallpaper da mesa definido na criação (Lobby)
        const customWP = localStorage.getItem('campanha_wp_' + campanhaAtiva);
        if(customWP && customWP.trim() !== '') {
            document.body.style.backgroundImage = `url('${customWP}')`;
        } else {
            document.body.style.backgroundImage = `url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg')`;
        }

        const socket = typeof io !== 'undefined' ? io() : null;
        let jogadoresConectados = {};
        let logsIniciaisRemovidos = false;

        // CARREGAR JOGADORES DA MEMÓRIA IMEDIATAMENTE (CACHE LOCAL)
        const cacheKey = 'mestre_cache_' + campanhaAtiva;
        const cacheSalvo = localStorage.getItem(cacheKey);
        if (cacheSalvo) {
            try {
                jogadoresConectados = JSON.parse(cacheSalvo);
                setTimeout(() => renderPlayers(), 100); 
            } catch(e) {}
        }

        if (socket) {
            socket.on('connect', () => {
                socket.emit('join_campaign', campanhaAtiva);
                
                Object.keys(jogadoresConectados).forEach(codigo => {
                    socket.emit('request_player', codigo);
                });
            });

            // ESCUTAR ATUALIZAÇÕES DE FICHA
            socket.on('update_mestre', (dados) => {
                if (dados && dados.codigo) {
                    let animClass = null;
                    
                    // Lógica para detetar as alterações (Vida, Sani, PE) e aplicar a animação correta
                    if (jogadoresConectados[dados.codigo]) {
                        let p = jogadoresConectados[dados.codigo];
                        
                        let oldVida = parseInt(p.vida_atual) || 0;
                        let newVida = parseInt(dados.vida_atual) || 0;
                        let oldSani = parseInt(p.sani_atual) || 0;
                        let newSani = parseInt(dados.sani_atual) || 0;
                        let oldPe   = parseInt(p.pe_atual) || 0;
                        let newPe   = parseInt(dados.pe_atual) || 0;
                        
                        // Hierarquia de animação: Vida > Sanidade > PE
                        if (newVida < oldVida) animClass = 'anim-vida-dano';
                        else if (newVida > oldVida) animClass = 'anim-vida-cura';
                        else if (newSani < oldSani) animClass = 'anim-sani-dano';
                        else if (newSani > oldSani) animClass = 'anim-sani-cura';
                        else if (newPe < oldPe) animClass = 'anim-pe-dano';
                        else if (newPe > oldPe) animClass = 'anim-pe-cura';
                    }

                    jogadoresConectados[dados.codigo] = dados;
                    localStorage.setItem(cacheKey, JSON.stringify(jogadoresConectados));
                    
                    renderPlayers();

                    // Aplicar a animação ao card recém-renderizado
                    if (animClass) {
                        const cardElement = document.getElementById(`card-${dados.codigo}`);
                        if (cardElement) {
                            cardElement.classList.add(animClass);
                            // Remove a classe após a animação terminar para poder ser repetida futuramente
                            setTimeout(() => { cardElement.classList.remove(animClass); }, 600);
                        }
                    }
                }
            });

            socket.on('mestre_pede_ficha', (codigo) => {
                console.log(`Servidor pediu a ficha de ${codigo}, a aguardar que o jogador sincronize...`);
            });

            socket.on('novo_log', (dados) => {
                adicionarLog(dados);
            });
            
            socket.on('comando_mestre', (dados) => {
                if (dados.tipo === 'jogador_saiu' && dados.codigo) {
                    delete jogadoresConectados[dados.codigo];
                    localStorage.setItem(cacheKey, JSON.stringify(jogadoresConectados)); 
                    renderPlayers();
                }
            });
        }

        function renderPlayers() {
            const grid = document.getElementById('players-grid');
            
            if (Object.keys(jogadoresConectados).length === 0) {
                grid.innerHTML = `<div id="empty-state" style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-style: italic; margin-top: 50px;">A aguardar ligação dos jogadores...<br><span style="font-size: 0.8em;">Os jogadores aparecerão aqui assim que abrirem ou alterarem a ficha.</span></div>`;
                return;
            }
            
            grid.innerHTML = '';
            
            Object.values(jogadoresConectados).forEach(player => {
                const vMax = Math.max(1, parseInt(player.vida_max) || 1);
                const sMax = Math.max(1, parseInt(player.sani_max) || 1);
                const pMax = Math.max(1, parseInt(player.pe_max) || 1);
                
                const vAtual = parseInt(player.vida_atual) || 0;
                const sAtual = parseInt(player.sani_atual) || 0;
                const pAtual = parseInt(player.pe_atual) || 0;

                const pctVida = Math.max(0, Math.min(100, (vAtual / vMax) * 100));
                const pctSani = Math.max(0, Math.min(100, (sAtual / sMax) * 100));
                const pctPe   = Math.max(0, Math.min(100, (pAtual / pMax) * 100));

                let extraStyles = "";
                if (player.status) {
                    if (player.status.morrendo) extraStyles = "animation: pulseRed 1.5s infinite; border-color: var(--accent-red); box-shadow: 0 0 15px rgba(229,57,53,0.3);";
                    else if (player.status.enlouquecendo) extraStyles = "animation: pulseBlue 1.5s infinite; border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0,176,255,0.3);";
                }

                const fotoExibicao = (player.foto && player.foto.trim() !== '') 
                    ? player.foto 
                    : 'https://static.vecteezy.com/ti/vetor-gratis/p1/35129568-silhueta-do-desconhecido-pessoa-com-face-escondido-coberto-e-mascarado-misterioso-estranho-homem-anonimo-personagem-ilustracao-isolado-em-branco-fundo-gratis-vetor.jpg';

                const card = document.createElement('div');
                card.id = `card-${player.codigo}`; 
                card.className = 'player-card';
                card.style.cssText = extraStyles;
                
                card.innerHTML = `
                    <div class="player-header">
                        <img src="${fotoExibicao}" class="player-img">
                        <div class="player-info">
                            <h3>${player.nome || 'Desconhecido'}</h3>
                            <p>NEX: <span class="destaque">${player.nex || 0}%</span> | DEF: <span class="destaque" style="color:var(--accent-blue);">${player.defesa || 10}</span></p>
                        </div>
                    </div>
                    
                    <div class="status-bars">
                        <div class="status-row">
                            <div class="status-labels"><span style="color:var(--accent-red)">VIDA</span><span>${vAtual} / ${vMax}</span></div>
                            <div class="bar-container"><div class="bar-fill fill-vida" style="width: ${pctVida}%;"></div></div>
                        </div>
                        <div class="status-row">
                            <div class="status-labels"><span style="color:var(--accent-blue)">SANIDADE</span><span>${sAtual} / ${sMax}</span></div>
                            <div class="bar-container"><div class="bar-fill fill-sani" style="width: ${pctSani}%;"></div></div>
                        </div>
                        <div class="status-row">
                            <div class="status-labels"><span style="color:var(--accent-yellow)">PE</span><span>${pAtual} / ${pMax}</span></div>
                            <div class="bar-container"><div class="bar-fill fill-pe" style="width: ${pctPe}%;"></div></div>
                        </div>
                    </div>

                    <button class="btn-view-sheet" onclick="abrirFichaLeitura('${player.codigo}')">🔍 Inspecionar Ficha</button>
                `;
                
                grid.appendChild(card);
            });
        }

        function adicionarLog(dados) {
            const list = document.getElementById('log-list');
            
            if (!logsIniciaisRemovidos) {
                list.innerHTML = '';
                logsIniciaisRemovidos = true;
            }

            const item = document.createElement('div');
            let classeLog = 'log-item';
            if (dados.cor && dados.cor.includes('#ffcf33')) classeLog += ' crit';
            if (dados.cor && dados.cor.includes('#ff5252')) classeLog += ' fail';

            item.className = classeLog;
            item.innerHTML = `
                <div class="log-player">🎲 ${dados.jogador || 'Jogador'}</div>
                <div class="log-action">${dados.acao || 'Rolagem'}</div>
                <div class="log-result" style="${dados.cor || 'color: white;'}">${dados.resultado}</div>
            `;
            
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 25) list.removeChild(list.lastChild);
        }

        function abrirFichaLeitura(codigoJogador) {
            window.open('/ficha.html?view=' + codigoJogador, '_blank');
        }

        function voltarLobby() {
            localStorage.removeItem('campanha_atual');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
