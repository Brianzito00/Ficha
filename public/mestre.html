<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escudo do Mestre</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
    :root {--bg-body:#121214; --bg-card:rgba(32, 32, 36, 0.85); --border-color:rgba(50, 50, 56, 0.8); --text-primary:#e1e1e6; --text-secondary:#a8a8b3; --accent-blue:#00b0ff; --accent-yellow:#ffcf33; --accent-green:#00e676; --accent-red:#e53935; --accent-purple:#b82bf2;}
    
    body {font-family:'Roboto',sans-serif; background-color:var(--bg-body); background-image:url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg'); background-size:cover; background-attachment:fixed; background-position:center; color:var(--text-primary); margin:0; padding:20px; display:flex; flex-direction:column; height:100vh; box-sizing:border-box; overflow:hidden;}

    /* Animações de Interface */
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .fade-in { animation: slideInUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    
    .mestre-top-bar { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px 25px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    .tabs-container { display: flex; gap: 8px; margin-bottom: 15px; }
    .tab-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex: 1; }
    .tab-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(229, 57, 53, 0.3); }

    .content-wrapper { display: flex; gap: 20px; flex: 1; min-height: 0; }
    .left-panel { flex: 3; display: flex; flex-direction: column; overflow: hidden; }

    .players-container, .monsters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; align-content: flex-start; overflow-y: auto; padding: 10px; flex: 1; scroll-behavior: smooth; }
    
    .player-card, .monster-card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 14px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; flex-direction: column; gap: 12px; transition: 0.3s ease; }
    .player-card:hover, .monster-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.3); }

    /* Barra de Status Animada */
    .bar-container { background: rgba(0,0,0,0.6); height: 22px; border-radius: 6px; border: 1px solid #333; position: relative; overflow: hidden; margin-top: 4px; }
    .bar-fill { height: 100%; width: 100%; transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); } /* Efeito Elástico Suave */
    .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.85em; font-weight: 900; line-height: 22px; text-shadow: 1px 1px 2px #000; z-index: 2; }

    .log-container { flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; min-width: 320px; backdrop-filter: blur(10px); }
    .log-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .log-item { background: rgba(18, 18, 20, 0.9); border: 1px solid #333; padding: 12px; border-radius: 10px; animation: slideInUp 0.3s ease-out; }

    .monster-details { font-size: 0.85em; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .monster-skill-btn { background: rgba(0,176,255,0.1); border: 1px solid var(--accent-blue); color: var(--accent-blue); border-radius: 4px; padding: 4px 8px; font-size: 0.75em; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .monster-skill-btn:hover { background: var(--accent-blue); color: black; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; backdrop-filter: blur(10px); justify-content: center; align-items: center; }
    .modal-content { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 15px; padding: 30px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
</style>
</head>
<body>

<div class="mestre-top-bar">
    <div style="display:flex; align-items:center; gap:15px;">
        <span style="font-weight:900; color:var(--accent-red); font-size:1.4em; letter-spacing:1px;">🛡️ ESCUDO DO MESTRE</span>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn-add" style="background:var(--accent-purple); color:white;" onclick="window.open('/overlay.html?mesa=' + campanhaAtiva, '_blank')">📺 OVERLAY</button>
        <button class="btn-add" style="background:transparent; border:1px solid var(--accent-red); color:var(--accent-red);" onclick="fazerLogout()">SAIR</button>
    </div>
</div>

<div class="tabs-container">
    <button class="tab-btn active" id="tab-jogadores" onclick="mudarAba('jogadores')">🕵️ Jogadores</button>
    <button class="tab-btn" id="tab-monstros" onclick="mudarAba('monstros')">👹 Monstros</button>
    <button class="tab-btn" id="tab-iniciativa" onclick="mudarAba('iniciativa')">⚔️ Iniciativa</button>
    <button class="tab-btn" id="tab-mapas" onclick="mudarAba('mapas')">🗺️ Mapas</button>
    <button class="tab-btn" id="tab-catalogo" onclick="mudarAba('catalogo')">🎒 Catálogo</button>
    <button class="tab-btn" id="tab-rmestre" onclick="mudarAba('rmestre')">🔮 Rituais</button>
</div>

<div class="content-wrapper">
    <div class="left-panel">
        <div class="players-container" id="players-board"></div>
        
        <div id="monsters-board" style="display:none; flex-direction:column; height: 100%;">
            <button class="btn-add" style="background:var(--accent-red); color:white; width:100%; margin-bottom:15px; padding:15px;" onclick="abrirModalCriatura()">+ CRIAR NOVA CRIATURA</button>
            <div class="monsters-grid" id="monsters-grid"></div>
        </div>

        <div id="iniciativa-board" style="display:none; flex-direction:column; height:100%;">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn-add" style="flex:1; background:var(--accent-red); color:white;" onclick="limparIniciativa()">🗑️ LIMPAR</button>
                <button class="btn-add" style="flex:2;" onclick="rolarMonstrosIniciativa()">🎲 ROLAR MONSTROS</button>
            </div>
            <div class="ini-list-container" id="iniciativa-list-container"></div>
        </div>

        <div id="catalogo-board" style="display:none; flex-direction:column; height:100%;">
             <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                <button class="btn-add" style="background:var(--accent-green); flex:1;" onclick="abrirModalItemMestre('comum')">+ ITEM</button>
                <button class="btn-add" style="background:var(--accent-purple); color:white; flex:1;" onclick="abrirModalItemMestre('municao')">+ MUNIÇÃO</button>
                <button class="btn-add" style="background:var(--accent-yellow); flex:1;" onclick="abrirModalItemMestre('armacc')">+ ARMA CORPO</button>
                <button class="btn-add" style="background:var(--accent-blue); flex:1;" onclick="abrirModalItemMestre('armadisp')">+ ARMA FOGO</button>
            </div>
            <div style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:20px;" id="catalogo-container">
                <div class="catalogo-grid-view" id="catalogo-grid-comum"></div>
                <div class="catalogo-grid-view" id="catalogo-grid-armacc"></div>
                <div class="catalogo-grid-view" id="catalogo-grid-armadisp"></div>
            </div>
        </div>

        </div>

    <div class="log-container fade-in">
        <div class="log-title">🎲 ROLAGENS RECENTES</div>
        <div class="log-messages" id="log-box"></div>
    </div>
</div>

<div id="modal-criatura" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color:var(--accent-red); margin-top:0;">Nova Criatura</h2>
        <div class="form-group"><label>Nome</label><input type="text" id="c-nome" class="monster-input"></div>
        <div class="form-group"><label>Foto URL</label><input type="text" id="c-foto" class="monster-input"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div class="form-group"><label>Vida Máxima</label><input type="number" id="c-vida" class="monster-input" value="100"></div>
            <div class="form-group"><label>Defesa</label><input type="number" id="c-defesa" class="monster-input" value="10"></div>
        </div>
        <div class="attr-grid">
            <div><label>AGI</label><input type="number" id="c-agi" class="monster-input" value="1"></div>
            <div><label>FOR</label><input type="number" id="c-for" class="monster-input" value="1"></div>
            <div><label>PRE</label><input type="number" id="c-pre" class="monster-input" value="1"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-add" style="flex:2;" onclick="salvarCriatura()">GUARDAR</button>
            <button class="btn-add" style="flex:1; background:#444; color:white;" onclick="fecharModalCriatura()">FECHAR</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
    const socket = io();
    const campanhaAtiva = localStorage.getItem('campanha_atual');
    let jogadoresPermitidos = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];
    let monstros = JSON.parse(localStorage.getItem('mestre_monstros_' + campanhaAtiva)) || [];
    let playersDataMemoria = JSON.parse(localStorage.getItem('mestre_players_data_' + campanhaAtiva)) || {};

    const tbSucesso = { 1:{n:20,b:99,e:99},2:{n:19,b:20,e:99},3:{n:18,b:20,e:99},4:{n:17,b:19,e:99},5:{n:16,b:19,e:20},6:{n:15,b:18,e:20},7:{n:14,b:18,e:20},8:{n:13,b:17,e:20},9:{n:12,b:17,e:20},10:{n:11,b:16,e:19},11:{n:10,b:16,e:19},12:{n:9,b:15,e:19},13:{n:8,b:15,e:19},14:{n:7,b:14,e:19},15:{n:6,b:14,e:18},16:{n:5,b:13,e:18},17:{n:4,b:13,e:18},18:{n:3,b:12,e:18},19:{n:2,b:12,e:18},20:{n:1,b:11,e:18} };
    function getAlvosD20(vh) { if (vh < 1) vh = 1; if (vh > 20) return { n: 1, b: 2, e: 11 }; return tbSucesso[vh]; }

    function mudarAba(aba) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+aba).classList.add('active');
        const containers = ['players-board', 'monsters-board', 'iniciativa-board', 'catalogo-board'];
        containers.forEach(c => {
            const el = document.getElementById(c);
            if(el) el.style.display = (c.includes(aba)) ? 'grid' : 'none';
            if(el && c.includes(aba)) el.classList.add('fade-in');
        });
        if(aba === 'jogadores') renderizarJogadores();
        if(aba === 'monstros') renderizarMonstros();
    }

    function renderizarJogadores() {
        const board = document.getElementById('players-board');
        board.innerHTML = '';
        jogadoresPermitidos.forEach(cod => {
            const d = playersDataMemoria[cod] || {nome: cod, foto:'', fullData:{info:{vida_atual:0, vida_max:1}}};
            const vA = d.vida_atual || 0; const vM = d.vida_max || 1;
            const perc = Math.min((vA/vM)*100, 100);
            
            const card = document.createElement('div');
            card.className = 'player-card fade-in';
            card.innerHTML = `
                <div class="player-header">
                    <img src="${d.foto || 'https://via.placeholder.com/60'}" class="player-img">
                    <div>
                        <p class="player-name">${d.nome}</p>
                        <span style="font-size:10px; color:gray;">USER: ${cod}</span>
                    </div>
                </div>
                <div class="bar-container">
                    <div class="bar-fill fill-vida" style="width:${perc}%"></div>
                    <div class="bar-text">${vA} / ${vM}</div>
                </div>
                <button class="btn-roll" onclick="abrirFicha('${cod}')">ABRIR FICHA COMPLETA</button>
            `;
            board.appendChild(card);
        });
    }

    function rolarD20Monstro(nome, acao, totalVH) {
        const d20 = Math.floor(Math.random()*20)+1;
        const tg = getAlvosD20(totalVH);
        let res = "FALHA"; let cor = "var(--accent-red)";
        if(d20 === 1) res = "DESASTRE";
        else if(d20 >= tg.e) { res = "EXTREMO"; cor = "var(--accent-yellow)"; }
        else if(d20 >= tg.b) { res = "BOM"; cor = "var(--accent-blue)"; }
        else if(d20 >= tg.n) { res = "NORMAL"; cor = "var(--accent-green)"; }
        
        adicionarAoLog(nome, acao + ` (VH ${totalVH})`, `${d20} - ${res}`, `color:${cor}`);
    }

    function adicionarAoLog(nome, acao, res, cor) {
        const box = document.getElementById('log-box');
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `<strong>${nome}</strong>: ${acao} <br> <span style="${cor}; font-weight:900; font-size:1.2em;">${res}</span>`;
        box.prepend(item);
    }

    // Sockets e Inicialização
    socket.on('connect', () => { socket.emit('join_campaign', campanhaAtiva); });
    socket.on('update_mestre', (dados) => {
        playersDataMemoria[dados.codigo] = dados;
        localStorage.setItem('mestre_players_data_' + campanhaAtiva, JSON.stringify(playersDataMemoria));
        renderizarJogadores();
    });

    window.onload = () => { mudarAba('jogadores'); };
</script>
</body>
</html>
