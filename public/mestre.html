<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escudo do Mestre - Ordem Paranormal</title>
    <style>
        :root {
            --bg-body: #121214; --bg-card: rgba(32, 32, 36, 0.85);
            --border-color: rgba(50, 50, 56, 0.8); --text-primary: #e1e1e6; --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; --accent-green: #00e676; --accent-red: #e53935;
            --accent-purple: #b82bf2;
        }
        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-body); background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg'); background-size: cover; background-attachment: fixed; color: var(--text-primary); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .mestre-top-bar { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .code-input { padding: 10px; background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); color: white; border-radius: 6px; text-transform: uppercase; font-weight: bold; flex: 1; min-width: 200px; }
        .btn-add { background: var(--accent-green); border: none; color: black; font-weight: bold; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .btn-add:hover { filter: brightness(1.2); }
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px 25px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); border-bottom: none; flex: 1; text-align: center; }
        .tab-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
        .content-wrapper { display: flex; gap: 20px; flex: 1; overflow: hidden; min-height: 0; }
        .left-panel { flex: 3; display: flex; flex-direction: column; overflow: hidden; }
        .players-container, .monsters-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-content: flex-start; overflow-y: auto; padding-right: 10px; flex: 1; }
        .player-card, .monster-card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; flex-direction: column; gap: 10px; transition: 0.3s; position: relative; }
        .monster-card { border-color: var(--accent-red); }
        .player-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; flex-wrap: wrap; }
        .player-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); background: #000; flex-shrink: 0; }
        .monster-img { border-color: var(--accent-red); }
        .player-name { font-size: 1.2em; font-weight: bold; color: var(--accent-yellow); text-transform: uppercase; margin: 0; }
        .monster-name { color: var(--accent-red); }
        .player-info { font-size: 0.8em; color: var(--text-secondary); line-height: 1.4; }
        .btn-remove { position: absolute; top: 10px; right: 10px; background: var(--accent-red); color: white; border: none; border-radius: 4px; padding: 2px 8px; font-size: 0.8em; font-weight: bold; cursor: pointer; z-index: 10; }
        .btn-ctrl { background: #333; color: white; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; width: 28px; height: 28px; font-weight: bold; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; }
        .btn-ctrl:hover { filter: brightness(1.5); border-color: white; }
        .bar-container { background: rgba(0,0,0,0.8); height: 25px; border-radius: 4px; border: 1px solid #333; position: relative; overflow: hidden; margin-top: 5px; flex: 1; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.9em; font-weight: bold; line-height: 25px; text-shadow: 1px 1px 2px #000; }
        .status-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .tag { font-size: 0.7em; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .tag:hover { filter: brightness(1.5); }
        .tag-lesionado { background: rgba(229, 57, 53, 0.4); border: 1px solid var(--accent-red); }
        .tag-morrendo { background: var(--accent-red); animation: pulseRed 1.5s infinite; border: 1px solid white; }
        .tag-enlouquecendo { background: rgba(0, 176, 255, 0.4); border: 1px solid var(--accent-blue); }
        .log-container { flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(8px); min-width: 300px; }
        .log-title { background: rgba(0,0,0,0.5); padding: 15px; text-align: center; font-weight: bold; color: var(--accent-green); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .log-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .log-item { background: rgba(18, 18, 20, 0.9); border: 1px solid #333; padding: 10px; border-radius: 8px; font-size: 0.9em; }
        .log-item .player-name { font-size: 0.9em; color: var(--accent-blue); margin-bottom: 5px; }
        .log-item .roll-result { font-size: 1.2em; font-weight: 900; text-align: center; margin: 5px 0; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 2px var(--accent-red); } 50% { box-shadow: 0 0 10px var(--accent-red); } 100% { box-shadow: 0 0 2px var(--accent-red); } }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px; padding: 20px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.9); box-sizing: border-box; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .form-group label { font-size: 0.9em; font-weight: bold; color: var(--accent-yellow); }
        .monster-input { padding: 10px; background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); color: white; border-radius: 6px; box-sizing: border-box; width: 100%;}
        .dynamic-row { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        .btn-roll { background: var(--accent-yellow); color: #000; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.8em; margin-top: 5px; width: 100%; box-sizing: border-box;}
        .btn-roll:hover { filter: brightness(1.2); }
        .monster-details { font-size: 0.8em; color: var(--text-secondary); background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; max-height: 250px; overflow-y: auto;}
        .popup-box-dice { position: relative; width: 90%; max-width: 600px; height: 400px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000; border: 4px solid var(--accent-yellow); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .popup-box-dice::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 1; }
        .popup-content { position: relative; z-index: 10; display: none; animation: fadeInResult 0.5s forwards; text-align: center; width: 100%; padding: 10px; box-sizing: border-box; }
        .popup-number { font-size: 8em; font-weight: 900; color: white; text-shadow: 4px 4px 0 #000; }
        .popup-res { font-size: 2em; font-weight: 900; margin-top: 10px; text-transform: uppercase; text-shadow: 2px 2px 4px #000; }
        @keyframes fadeInResult { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .attr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; } 
        .skill-group { display: flex; flex-direction: column; gap: 4px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px; border: 1px solid #333;}
        .skill-group label { display: flex; align-items: center; gap: 5px; font-size: 0.8em; color: var(--text-primary); }
        #iniciativa-board { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .ini-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .ini-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 10px; }
        .ini-card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px; padding: 10px 20px; display: flex; align-items: center; gap: 20px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; backdrop-filter: blur(8px); flex-wrap: wrap; }
        .ini-card.is-player { border-left: 6px solid var(--accent-blue); }
        .ini-card.is-monster { border-left: 6px solid var(--accent-red); }
        .ini-rank { font-size: 2em; font-weight: 900; color: var(--accent-yellow); width: 40px; text-align: center; }
        .ini-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--text-secondary); background: black; }
        .ini-info { flex: 1; min-width: 150px; }
        .ini-name { font-size: 1.3em; font-weight: bold; text-transform: uppercase; margin: 0 0 5px 0; color: white; }
        .ini-details { font-size: 0.85em; color: var(--text-secondary); }
        .ini-total-box { text-align: center; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px; border: 1px solid #333; }
        .ini-total { font-size: 2em; font-weight: 900; color: var(--accent-green); line-height: 1; }
        .ini-total-lbl { font-size: 0.7em; color: var(--text-secondary); font-weight: bold; text-transform: uppercase; }
        #roteiro-board { display: none; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .roteiro-layout { display: flex; gap: 20px; height: calc(100% - 45px); overflow: hidden; }
        .roteiro-sidebar { width: 250px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid var(--border-color); padding-right: 15px; overflow-y: auto; flex-shrink: 0; }
        .roteiro-sidebar-right { width: 250px; display: flex; flex-direction: column; gap: 10px; border-left: 1px solid var(--border-color); padding-left: 15px; overflow-y: auto; flex-shrink: 0; }
        .roteiro-editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .session-btn { background: rgba(18,18,20,0.8); color: var(--text-primary); border: 1px solid var(--border-color); padding: 12px; cursor: pointer; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; transition: 0.2s; }
        .session-btn:hover { border-color: var(--accent-blue); background: rgba(255,255,255,0.05); }
        .session-btn.active { background: rgba(0, 176, 255, 0.15); border-color: var(--accent-blue); color: var(--accent-blue); }
        .session-btn.active-desc { background: rgba(184, 43, 242, 0.15); border-color: var(--accent-purple); color: var(--accent-purple); }
        .roteiro-titulo-input { background: transparent; border: none; border-bottom: 2px solid var(--border-color); color: white; font-size: 1.5em; font-weight: bold; margin-top: 0; margin-bottom: 15px; padding-bottom: 5px; outline: none; width: 100%; font-family: inherit; transition: 0.2s; }
        .roteiro-titulo-input:focus { border-color: var(--accent-yellow); }
        .roteiro-textarea { flex: 1; background: rgba(12, 12, 14, 0.9); border: 1px solid var(--border-color); color: var(--text-primary); padding: 20px; font-family: 'Roboto', sans-serif; font-size: 1.1em; border-radius: 8px; resize: none; outline: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); line-height: 1.6; }
        .roteiro-textarea:focus { border-color: var(--accent-blue); }
        .roteiro-textarea::-webkit-scrollbar, .roteiro-sidebar::-webkit-scrollbar, .roteiro-sidebar-right::-webkit-scrollbar { width: 6px; }
        .roteiro-textarea::-webkit-scrollbar-thumb, .roteiro-sidebar::-webkit-scrollbar-thumb, .roteiro-sidebar-right::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        @media (max-width: 900px) { .players-container, .monsters-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { body { height: auto; overflow-y: auto; padding: 10px; } .content-wrapper { flex-direction: column; height: auto; overflow: visible; } .left-panel { overflow: visible; } .players-container, .monsters-grid { grid-template-columns: 1fr; overflow-y: visible; padding-right: 0; } .log-container { height: 400px; margin-top: 10px; min-width: 100%; } .tab-btn { border-radius: 8px; margin-bottom: 5px; } .ini-card { gap: 10px; } .popup-box-dice { height: 300px; } .popup-number { font-size: 6em; } .popup-res { font-size: 1.5em; } .attr-grid { grid-template-columns: 1fr; } #roteiro-board { height: auto; padding: 15px; } .roteiro-layout { flex-direction: column; height: auto; } .roteiro-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding-right: 0; padding-bottom: 15px; flex-direction: row; overflow-x: auto; flex-wrap: nowrap; } .roteiro-sidebar-right { width: 100%; border-left: none; border-top: 1px solid var(--border-color); padding-left: 0; padding-top: 15px; flex-direction: row; overflow-x: auto; flex-wrap: nowrap; } #roteiro-list, #descricao-list { flex-direction: row !important; display: flex; overflow-x: auto; flex-wrap: nowrap; gap: 8px; width: 100%;} .session-btn { flex: 0 0 auto; white-space: nowrap; padding: 8px 12px; } .roteiro-editor { overflow-y: visible; height: 350px; margin: 15px 0; } }
    </style>
</head>
<body>

    <div class="mestre-top-bar">
        <span style="font-weight: bold; color: var(--accent-blue);">Conectar Jogador:</span>
        <input type="text" id="add-code-input" class="code-input" placeholder="Digite o Usuário (Login)" maxlength="30">
        <button class="btn-add" onclick="adicionarJogador()">+ ADICIONAR</button>
        
        <div style="flex: 1;"></div>

        <button class="btn-add" style="background: var(--accent-purple); color: white;" onclick="window.open('/overlay.html', '_blank')">📺 ABRIR OVERLAY</button>
        <button class="btn-remove" style="position: static; padding: 10px 20px; font-size: 1em; background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red);" onclick="fazerLogout()">SAIR (LOBBY)</button>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" id="tab-jogadores" onclick="mudarAba('jogadores')">🕵️ Jogadores</button>
        <button class="tab-btn" id="tab-monstros" onclick="mudarAba('monstros')">👹 Monstros</button>
        <button class="tab-btn" id="tab-iniciativa" onclick="mudarAba('iniciativa')">⚔️ Iniciativa</button>
        <button class="tab-btn" id="tab-roteiro" onclick="mudarAba('roteiro')">📜 Roteiro / Mundo</button>
    </div>

    <div class="content-wrapper">
        <div class="left-panel">
            <div class="players-container" id="players-board"></div>

            <div id="monsters-board" style="display:none; flex-direction:column; height: 100%;">
                <div style="margin-bottom: 20px;">
                    <button class="btn-add" style="background: var(--accent-red); color: white; width: 100%; font-size: 1.2em; padding: 15px;" onclick="abrirModalCriatura()">+ CRIAR NOVA CRIATURA</button>
                </div>
                <div class="monsters-grid" id="monsters-grid"></div>
            </div>

            <div id="iniciativa-board">
                <div class="ini-controls">
                    <button class="btn-add" style="flex: 1; background: var(--accent-red); color: white;" onclick="limparIniciativa()">🗑️ LIMPAR</button>
                    <button class="btn-add" style="flex: 2; font-size: 1.1em;" onclick="rolarMonstrosIniciativa()">🎲 ROLAR MONSTROS</button>
                </div>
                <div class="ini-list-container" id="iniciativa-list-container"></div>
            </div>

            <div id="roteiro-board">
                <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <h2 style="color: var(--accent-blue); margin: 0;">📜 Gestão da Campanha</h2>
                    <span id="roteiro-status" style="font-size: 0.8em; color: var(--text-secondary); font-style: italic;">A aguardar...</span>
                </div>
                
                <div class="roteiro-layout">
                    <div class="roteiro-sidebar">
                        <button class="btn-add" style="width: 100%; margin-bottom: 5px; flex-shrink: 0; background: var(--accent-blue); color: black;" onclick="adicionarRoteiro()">+ NOVA SESSÃO</button>
                        <div id="roteiro-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>
                    
                    <div class="roteiro-editor">
                        <input type="text" id="roteiro-titulo-atual" class="roteiro-titulo-input" placeholder="Nomeie a sua anotação aqui...">
                        <textarea id="roteiro-text" class="roteiro-textarea" placeholder="O editor selecionado aparecerá aqui. Podes escrever o roteiro da sessão ou a descrição de um objeto/cenário da tua campanha... Tudo salva automaticamente!"></textarea>
                    </div>

                    <div class="roteiro-sidebar-right">
                        <button class="btn-add" style="width: 100%; margin-bottom: 5px; flex-shrink: 0; background: var(--accent-purple); color: white;" onclick="adicionarDescricao()">+ NOVO OBJETO / CENÁRIO</button>
                        <div id="descricao-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="log-container">
            <div class="log-title">🎲 LOG DE DADOS E AÇÕES</div>
            <div class="log-messages" id="log-box">
                <div style="text-align: center; color: var(--text-secondary); font-size: 0.8em; margin-top: 20px;" id="aguardar-msg">A aguardar rolagens...</div>
            </div>
        </div>
    </div>

    <div id="modal-ficha" class="modal-overlay">
        <div style="width: 95%; max-width: 1400px; display: flex; justify-content: flex-end;">
            <button class="btn-remove" style="position: static; padding: 10px 20px; font-size: 1.2em; margin-bottom: 10px;" onclick="fecharFicha()">X FECHAR FICHA</button>
        </div>
        <iframe id="iframe-ficha" src="" style="width: 95%; max-width: 1400px; height: 85vh; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg-body);"></iframe>
    </div>

    <div id="popup-dice" class="modal-overlay" onclick="closeDice()" style="z-index: 10000;">
        <div class="popup-box-dice" onclick="event.stopPropagation()">
            <div id="popup-content" class="popup-content">
                <div id="popup-num" class="popup-number">00</div>
                <div id="popup-res" class="popup-res">RESULTADO</div>
            </div>
        </div>
    </div>

    <div id="modal-criatura" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--accent-red); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Criar Criatura</h2>
            
            <div class="form-group"><label>Nome</label><input type="text" id="c-nome" class="monster-input" placeholder="Ex: Zumbi de Sangue"></div>
            <div class="form-group"><label>Foto URL</label><input type="text" id="c-foto" class="monster-input" placeholder="https://link-da-imagem.com/foto.png"></div>
            
            <div style="display:flex; gap: 10px; flex-wrap: wrap;">
                <div class="form-group" style="flex:1; min-width: 150px;"><label>Presença Perturbadora</label><input type="text" id="c-presenca" class="monster-input" placeholder="Ex: NEX 20% - DT 15"></div>
                <div class="form-group" style="flex:1; min-width: 100px;"><label>Defesa</label><input type="number" id="c-defesa" class="monster-input" placeholder="15"></div>
            </div>
            
            <div class="form-group"><label>Pontos de Vida</label><input type="number" id="c-vida" class="monster-input" placeholder="Ex: 50"></div>

            <div class="form-group">
                <label>Atributos</label>
                <div class="attr-grid">
                    <div><span style="font-size:0.7em; color:var(--text-secondary);">AGI</span><input type="number" id="c-agi" class="monster-input" value="1" style="text-align:center;"></div>
                    <div><span style="font-size:0.7em; color:var(--text-secondary);">FOR</span><input type="number" id="c-for" class="monster-input" value="1" style="text-align:center;"></div>
                    <div><span style="font-size:0.7em; color:var(--text-secondary);">PRE</span><input type="number" id="c-pre" class="monster-input" value="1" style="text-align:center;"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Perícias Principais</label>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;">
                    <div class="skill-group"><label><input type="checkbox" id="c-treino-luta"> Luta (FOR)</label><input type="number" id="c-bonus-luta" class="monster-input" placeholder="Bônus Extra" value="0"></div>
                    <div class="skill-group"><label><input type="checkbox" id="c-treino-pontaria"> Pontaria (AGI)</label><input type="number" id="c-bonus-pontaria" class="monster-input" placeholder="Bônus Extra" value="0"></div>
                    <div class="skill-group"><label><input type="checkbox" id="c-treino-iniciativa"> Iniciativa (AGI)</label><input type="number" id="c-bonus-iniciativa" class="monster-input" placeholder="Bônus Extra" value="0"></div>
                    <div class="skill-group"><label><input type="checkbox" id="c-treino-reflexos"> Reflexos (AGI)</label><input type="number" id="c-bonus-reflexos" class="monster-input" placeholder="Bônus Extra" value="0"></div>
                    <div class="skill-group"><label><input type="checkbox" id="c-treino-percepcao"> Percepção (PRE)</label><input type="number" id="c-bonus-percepcao" class="monster-input" placeholder="Bônus Extra" value="0"></div>
                    <div class="skill-group"><label><input type="checkbox" id="c-treino-vontade"> Vontade (PRE)</label><input type="number" id="c-bonus-vontade" class="monster-input" placeholder="Bônus Extra" value="0"></div>
                </div>
            </div>

            <div class="form-group">
                <label style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    Ataques <button onclick="addCampoAtaque('c-ataques-list')" class="btn-ctrl" style="width: auto; padding: 0 10px; margin-top: 5px;">+ Adicionar Ataque</button>
                </label>
                <div id="c-ataques-list"></div>
            </div>

            <div class="form-group">
                <label style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    Poderes Gerais <button onclick="addCampoPoder('c-poderes-list')" class="btn-ctrl" style="width: auto; padding: 0 10px; margin-top: 5px;">+ Adicionar Poder</button>
                </label>
                <div id="c-poderes-list"></div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; flex-wrap: wrap;">
                <button class="btn-remove" style="position: static; flex: 1;" onclick="fecharModalCriatura()">Cancelar</button>
                <button class="btn-add" style="background: var(--accent-green); flex: 2;" onclick="salvarCriatura()">Guardar Criatura</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        let playerCode = localStorage.getItem('usuario_logado');
        let campanhaAtiva = localStorage.getItem('campanha_atual');

        if (!playerCode || !campanhaAtiva) { window.location.href = '/index.html'; }

        function fazerLogout() {
            localStorage.removeItem('campanha_atual');
            window.location.href = '/index.html';
        }

        let cloudSaveStr = localStorage.getItem('mestre_save_nuvem_' + campanhaAtiva);
        if (cloudSaveStr) {
            try {
                let cloudSave = JSON.parse(cloudSaveStr);
                if (cloudSave.roteiros) localStorage.setItem('mestre_roteiros', JSON.stringify(cloudSave.roteiros));
                if (cloudSave.descricoes) localStorage.setItem('mestre_descricoes', JSON.stringify(cloudSave.descricoes));
                if (cloudSave.monstros) localStorage.setItem('mestre_monstros', JSON.stringify(cloudSave.monstros));
                if (cloudSave.iniciativa) localStorage.setItem('mestre_iniciativa', JSON.stringify(cloudSave.iniciativa));
                if (cloudSave.allowedCodes) localStorage.setItem('mestre_allowed_codes', JSON.stringify(cloudSave.allowedCodes));
            } catch(e) {}
            localStorage.removeItem('mestre_save_nuvem_' + campanhaAtiva); 
        }

        let debounceTimer;
        function salvarMestreNoFirebase() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const dataToSave = {
                    roteiros: JSON.parse(localStorage.getItem('mestre_roteiros') || '[]'),
                    descricoes: JSON.parse(localStorage.getItem('mestre_descricoes') || '[]'),
                    monstros: JSON.parse(localStorage.getItem('mestre_monstros') || '[]'),
                    iniciativa: JSON.parse(localStorage.getItem('mestre_iniciativa') || '[]'),
                    allowedCodes: JSON.parse(localStorage.getItem('mestre_allowed_codes') || '[]')
                };
                fetch('/api/salvar_campanha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ campanha: campanhaAtiva, dados: { mestre: dataToSave } })
                }).catch(e => console.error("Erro ao salvar o Mestre no Firebase:", e));
            }, 1500); 
        }

        const originalSetItem = localStorage.setItem;
        localStorage.setItem = function(key, value) {
            originalSetItem.apply(this, arguments);
            if (['mestre_roteiros', 'mestre_descricoes', 'mestre_monstros', 'mestre_iniciativa', 'mestre_allowed_codes'].includes(key)) {
                salvarMestreNoFirebase();
            }
        };

        let jogadoresPermitidos = JSON.parse(localStorage.getItem('mestre_allowed_codes')) || [];
        const URL_FICHA = "/ficha.html"; 
        const socket = io();
        const playersBoard = document.getElementById('players-board');
        const logBox = document.getElementById('log-box');

        let playersDataMemoria = {}; 
        let iniciativaList = JSON.parse(localStorage.getItem('mestre_iniciativa')) || [];

        let roteiros = JSON.parse(localStorage.getItem('mestre_roteiros'));
        let descricoes = JSON.parse(localStorage.getItem('mestre_descricoes')) || [];
        
        let modoEdicaoAtual = 'roteiro'; 
        let currentRoteiroId = null;
        let currentDescricaoId = null;

        if (!roteiros || roteiros.length === 0) {
            let textoAntigo = localStorage.getItem('mestre_roteiro') || '';
            roteiros = [{ id: 's' + Date.now(), title: 'Sessão 01', text: textoAntigo }];
            localStorage.setItem('mestre_roteiros', JSON.stringify(roteiros));
        }
        currentRoteiroId = roteiros[0].id;
        if(descricoes.length > 0) currentDescricaoId = descricoes[0].id;

        function renderRoteiros() {
            const list = document.getElementById('roteiro-list');
            list.innerHTML = '';
            roteiros.forEach((r) => {
                const btn = document.createElement('div');
                btn.className = `session-btn ${modoEdicaoAtual === 'roteiro' && r.id === currentRoteiroId ? 'active' : ''}`;
                btn.onclick = () => selecionarRoteiro(r.id);
                btn.innerHTML = `<span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${r.title}</span><button class="btn-del" style="padding: 2px 6px; font-size:0.7em;" onclick="event.stopPropagation(); apagarRoteiro('${r.id}')">X</button>`;
                list.appendChild(btn);
            });
        }

        function renderDescricoes() {
            const list = document.getElementById('descricao-list');
            list.innerHTML = '';
            descricoes.forEach((d) => {
                const btn = document.createElement('div');
                btn.className = `session-btn ${modoEdicaoAtual === 'descricao' && d.id === currentDescricaoId ? 'active-desc' : ''}`;
                btn.onclick = () => selecionarDescricao(d.id);
                btn.innerHTML = `<span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${d.title}</span><button class="btn-del" style="padding: 2px 6px; font-size:0.7em; background: #333;" onclick="event.stopPropagation(); apagarDescricao('${d.id}')">X</button>`;
                list.appendChild(btn);
            });
        }

        function adicionarRoteiro() { const novoId = 's' + Date.now(); roteiros.push({ id: novoId, title: 'Nova Sessão', text: '' }); salvarRoteiros(); selecionarRoteiro(novoId); }
        function adicionarDescricao() { const novoId = 'd' + Date.now(); descricoes.push({ id: novoId, title: 'Novo Objeto/Cenário', text: '' }); salvarDescricoes(); selecionarDescricao(novoId); }
        function selecionarRoteiro(id) { modoEdicaoAtual = 'roteiro'; currentRoteiroId = id; renderRoteiros(); renderDescricoes(); atualizarEditor(); }
        function selecionarDescricao(id) { modoEdicaoAtual = 'descricao'; currentDescricaoId = id; renderRoteiros(); renderDescricoes(); atualizarEditor(); }

        function atualizarEditor() {
            const tituloInput = document.getElementById('roteiro-titulo-atual'); const textArea = document.getElementById('roteiro-text');
            if (modoEdicaoAtual === 'roteiro') { const rot = roteiros.find(r => r.id === currentRoteiroId); if(rot) { tituloInput.value = rot.title; tituloInput.style.borderColor = "var(--accent-blue)"; textArea.value = rot.text; } } 
            else { const desc = descricoes.find(d => d.id === currentDescricaoId); if(desc) { tituloInput.value = desc.title; tituloInput.style.borderColor = "var(--accent-purple)"; textArea.value = desc.text; } }
        }

        function apagarRoteiro(id) { if(roteiros.length === 1) return alert("Precisas de ter pelo menos uma sessão criada!"); if(confirm("Tem a certeza que deseja apagar esta sessão e todo o seu texto secreto?")) { roteiros = roteiros.filter(r => r.id !== id); if(currentRoteiroId === id) currentRoteiroId = roteiros[0].id; salvarRoteiros(); selecionarRoteiro(currentRoteiroId); } }
        function apagarDescricao(id) { if(confirm("Tem a certeza que deseja apagar esta anotação de mundo?")) { descricoes = descricoes.filter(d => d.id !== id); salvarDescricoes(); if(currentDescricaoId === id) { if (descricoes.length > 0) selecionarDescricao(descricoes[0].id); else selecionarRoteiro(currentRoteiroId); } else { renderDescricoes(); } } }

        function salvarRoteiros() { localStorage.setItem('mestre_roteiros', JSON.stringify(roteiros)); }
        function salvarDescricoes() { localStorage.setItem('mestre_descricoes', JSON.stringify(descricoes)); }

        const roteiroInput = document.getElementById('roteiro-text'); const roteiroTituloInput = document.getElementById('roteiro-titulo-atual');
        roteiroTituloInput.addEventListener('input', function() { if (modoEdicaoAtual === 'roteiro') { const rot = roteiros.find(r => r.id === currentRoteiroId); if(rot) { rot.title = this.value || 'Sessão Sem Nome'; salvarRoteiros(); renderRoteiros(); } } else { const desc = descricoes.find(d => d.id === currentDescricaoId); if(desc) { desc.title = this.value || 'Objeto/Cenário Sem Nome'; salvarDescricoes(); renderDescricoes(); } } dispararFeedbackEditor(); });
        roteiroInput.addEventListener('input', function() { if (modoEdicaoAtual === 'roteiro') { const rot = roteiros.find(r => r.id === currentRoteiroId); if(rot) { rot.text = this.value; salvarRoteiros(); } } else { const desc = descricoes.find(d => d.id === currentDescricaoId); if(desc) { desc.text = this.value; salvarDescricoes(); } } dispararFeedbackEditor(); });

        let saveTimeoutEditor;
        function dispararFeedbackEditor() { const status = document.getElementById('roteiro-status'); status.innerText = "A guardar..."; status.style.color = "var(--accent-yellow)"; clearTimeout(saveTimeoutEditor); saveTimeoutEditor = setTimeout(() => { status.innerText = "Guardado ✔️"; status.style.color = "var(--accent-green)"; setTimeout(() => { status.innerText = "Sincronizado na Nuvem"; status.style.color = "var(--text-secondary)"; }, 2000); }, 1000); }

        socket.on('connect', () => { 
            socket.emit('join_campaign', campanhaAtiva);
            jogadoresPermitidos.forEach(codigo => socket.emit('request_player', codigo)); 
            socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos });
        });

        function adicionarJogador() {
            let input = document.getElementById('add-code-input'); let codigo = input.value.toUpperCase().trim();
            if (codigo.length > 0 && !jogadoresPermitidos.includes(codigo)) { jogadoresPermitidos.push(codigo); localStorage.setItem('mestre_allowed_codes', JSON.stringify(jogadoresPermitidos)); socket.emit('request_player', codigo); socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); }
            input.value = '';
        }

        function removerJogador(codigo) { jogadoresPermitidos = jogadoresPermitidos.filter(c => c !== codigo); localStorage.setItem('mestre_allowed_codes', JSON.stringify(jogadoresPermitidos)); const card = document.getElementById(`player-${codigo}`); if (card) card.remove(); socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); }

        function abrirFicha(codigo) { document.getElementById('iframe-ficha').src = `${URL_FICHA}?view=${codigo}`; document.getElementById('modal-ficha').style.display = 'flex'; }
        function fecharFicha() { document.getElementById('modal-ficha').style.display = 'none'; document.getElementById('iframe-ficha').src = ''; }

        function alterarStatusMestre(codigo, tipo, valor) {
            if (tipo === 'vida' || tipo === 'sani') socket.emit('comando_mestre', { codigo: codigo, tipo: tipo, delta: valor });
            else if (tipo === 'status') socket.emit('comando_mestre', { codigo: codigo, status: valor });
        }

        socket.on('update_mestre', (dados) => {
            if (!dados.codigo || !jogadoresPermitidos.includes(dados.codigo)) return;
            playersDataMemoria[dados.codigo] = dados;
            let card = document.getElementById(`player-${dados.codigo}`);
            if (!card) { card = document.createElement('div'); card.className = 'player-card'; card.id = `player-${dados.codigo}`; playersBoard.appendChild(card); }
            const percVida = Math.min(Math.max((dados.vida_atual / dados.vida_max) * 100, 0), 100) || 0; const percSani = Math.min(Math.max((dados.sani_atual / dados.sani_max) * 100, 0), 100) || 0;
            let tagsHtml = `<span class="tag" style="cursor:pointer; opacity: ${dados.status?.lesionado ? '1' : '0.3'}; background: rgba(229, 57, 53, 0.4); border: 1px solid var(--accent-red);" onclick="alterarStatusMestre('${dados.codigo}', 'status', 'lesionado')">Lesionado</span><span class="tag" style="cursor:pointer; opacity: ${dados.status?.inconsciente ? '1' : '0.3'}; background: ${dados.status?.inconsciente ? '#ff5252' : 'transparent'}; border: 1px solid #ff5252;" onclick="alterarStatusMestre('${dados.codigo}', 'status', 'inconsciente')">Inconsciente</span><span class="tag ${dados.status?.morrendo ? 'tag-morrendo' : ''}" style="cursor:pointer; opacity: ${dados.status?.morrendo ? '1' : '0.3'}; background: rgba(229, 57, 53, 0.8); border: 1px solid white;" onclick="alterarStatusMestre('${dados.codigo}', 'status', 'morrendo')">Morrendo</span><span class="tag" style="cursor:pointer; opacity: ${dados.status?.enlouquecendo ? '1' : '0.3'}; background: rgba(0, 176, 255, 0.4); border: 1px solid var(--accent-blue);" onclick="alterarStatusMestre('${dados.codigo}', 'status', 'enlouquecendo')">Enlouquecendo</span>`;
            card.innerHTML = `<button class="btn-remove" onclick="removerJogador('${dados.codigo}')">X</button><div class="player-header"><img src="${dados.foto || 'https://via.placeholder.com/60'}" class="player-img"><div><h3 class="player-name">${dados.nome || 'Desconhecido'}</h3><div class="player-info">NEX: ${dados.nex || 0}% | Defesa: ${dados.defesa || 10}</div><div style="font-size: 0.7em; color: gray; margin-top: 2px;">Usuário: ${dados.codigo}</div></div></div><div><div style="font-size: 0.75em; color: var(--accent-red); font-weight: bold; margin-bottom: 2px;">VIDA</div><div style="display: flex; align-items: center; gap: 5px;"><button class="btn-ctrl" onclick="alterarStatusMestre('${dados.codigo}', 'vida', -1)">-</button><div class="bar-container"><div class="bar-fill fill-vida" style="width: ${percVida}%"></div><div class="bar-text">${dados.vida_atual} / ${dados.vida_max}</div></div><button class="btn-ctrl" onclick="alterarStatusMestre('${dados.codigo}', 'vida', 1)">+</button></div></div><div><div style="font-size: 0.75em; color: var(--accent-blue); font-weight: bold; margin-bottom: 2px;">SANIDADE</div><div style="display: flex; align-items: center; gap: 5px;"><button class="btn-ctrl" onclick="alterarStatusMestre('${dados.codigo}', 'sani', -1)">-</button><div class="bar-container"><div class="bar-fill fill-sani" style="width: ${percSani}%"></div><div class="bar-text">${dados.sani_atual} / ${dados.sani_max}</div></div><button class="btn-ctrl" onclick="alterarStatusMestre('${dados.codigo}', 'sani', 1)">+</button></div></div><div class="status-tags">${tagsHtml}</div><button class="btn-roll" style="width: 100%; margin-top: 5px;" onclick="abrirFicha('${dados.codigo}')">🔍 VER FICHA COMPLETA</button>`;
        });

        socket.on('comando_mestre', (dados) => {
            if (dados.tipo === 'request_overlay_sync') { socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); }
            if (dados.tipo === 'remover_jogador_mestre' && dados.codigo) { removerJogador(dados.codigo); }
            if (dados.tipo === 'jogador_entrou' && dados.codigo) {
                const c = dados.codigo.toUpperCase().trim();
                if (!jogadoresPermitidos.includes(c)) { jogadoresPermitidos.push(c); localStorage.setItem('mestre_allowed_codes', JSON.stringify(jogadoresPermitidos)); socket.emit('request_player', c); socket.emit('comando_mestre', { tipo: 'sync_overlay', players: jogadoresPermitidos }); salvarMestreNoFirebase(); }
            }
        });

        socket.on('novo_log', (dados) => { if (dados.codigo && !jogadoresPermitidos.includes(dados.codigo)) return; adicionarAoLog(dados.jogador, dados.acao, dados.resultado, dados.cor); if (dados.acao.toLowerCase().includes('iniciativa')) { processarIniciativa(dados); } });

        function processarIniciativa(dados) {
            let dadoPuro = parseInt(dados.resultado) || 0; let isPlayer = dados.codigo !== null; let idUnico = isPlayer ? dados.codigo : 'monstro_' + dados.jogador + '_' + Date.now(); let bonusCalc = 0; let agiBase = 0; let foto = 'https://via.placeholder.com/60'; let nomeStr = dados.jogador;
            if (isPlayer) { let pData = playersDataMemoria[dados.codigo]; if (pData && pData.fullData) { let fd = pData.fullData; agiBase = parseInt(fd.attrs['attr_agi']) || 1; let skillInic = parseInt(fd.skills['skill_iniciativa']) || 0; let isTreinado = fd.skills['chk_iniciativa'] === true; let penalty = 0; if (fd.inv) { let hasHeavy = fd.inv.some(i => i.eq && (i.n.toLowerCase().includes('proteção pesada') || i.n.toLowerCase().includes('protecao pesada'))); if (hasHeavy) penalty = -5; } bonusCalc = Math.floor(skillInic + (agiBase * 0.50) + (isTreinado ? 10 : 0) + penalty); foto = pData.foto || foto; } } 
            else { let monstro = monstros.find(m => m.nome === dados.jogador); if (monstro) { idUnico = monstro.id; agiBase = monstro.attrs ? (parseInt(monstro.attrs.agi) || 1) : 1; let sData = monstro.skills ? monstro.skills['iniciativa'] : null; if (sData) { bonusCalc = Math.floor(sData.bonus + (agiBase * 0.50) + (sData.treinado ? 10 : 0)); } foto = monstro.foto || foto; } }
            let totalIniciativa = dadoPuro + bonusCalc; let objIndex = iniciativaList.findIndex(i => i.id === idUnico);
            if (objIndex > -1) { iniciativaList[objIndex] = { id: idUnico, isPlayer, nome: nomeStr, foto, dado: dadoPuro, bonus: bonusCalc, agi: agiBase, total: totalIniciativa }; } else { iniciativaList.push({ id: idUnico, isPlayer, nome: nomeStr, foto, dado: dadoPuro, bonus: bonusCalc, agi: agiBase, total: totalIniciativa }); }
            if (document.getElementById('tab-iniciativa').classList.contains('active')) { renderizarIniciativa(); }
        }

        function adicionarAoLog(nome, acao, resultado, corStr = '') {
            const waitMsg = document.getElementById('aguardar-msg'); if (waitMsg)
