<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escudo do Mestre - Ordem Paranormal</title>
    <style>
        :root {
            --bg-body: #121214; --bg-card: rgba(32, 32, 36, 0.85);
            --border-color: rgba(50, 50, 56, 0.8); --text-primary: #e1e1e6; --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; --accent-green: #00e676; --accent-red: #e53935;
        }

        body {
            font-family: 'Roboto', sans-serif; background-color: var(--bg-body);
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; background-attachment: fixed; color: var(--text-primary);
            margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }

        .mestre-top-bar {
            background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; 
            border-radius: 12px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        }
        .code-input {
            padding: 10px; background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); 
            color: white; border-radius: 6px; text-transform: uppercase; font-weight: bold; width: 250px;
        }
        .btn-add {
            background: var(--accent-green); border: none; color: black; font-weight: bold; 
            padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .btn-add:hover { filter: brightness(1.2); }

        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 10px 25px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: bold;
            font-size: 1.1em; transition: 0.3s; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); border-bottom: none;
        }
        .tab-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

        .content-wrapper { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        .left-panel { flex: 3; display: flex; flex-direction: column; overflow: hidden; }

        .players-container, .monsters-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; align-content: flex-start; overflow-y: auto; padding-right: 10px; flex: 1;
        }

        .player-card, .monster-card {
            background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px;
            padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 10px; transition: 0.3s; position: relative;
        }
        .monster-card { border-color: var(--accent-red); }

        .player-header { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .player-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); background: #000; }
        .monster-img { border-color: var(--accent-red); }
        .player-name { font-size: 1.2em; font-weight: bold; color: var(--accent-yellow); text-transform: uppercase; margin: 0; }
        .monster-name { color: var(--accent-red); }
        .player-info { font-size: 0.8em; color: var(--text-secondary); line-height: 1.4; }
        
        .btn-remove { position: absolute; top: 10px; right: 10px; background: var(--accent-red); color: white; border: none; border-radius: 4px; padding: 2px 8px; font-size: 0.8em; font-weight: bold; cursor: pointer; z-index: 10; }
        .btn-ctrl { background: #333; color: white; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; width: 28px; height: 28px; font-weight: bold; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .btn-ctrl:hover { filter: brightness(1.5); border-color: white; }

        .bar-container { background: rgba(0,0,0,0.8); height: 25px; border-radius: 4px; border: 1px solid #333; position: relative; overflow: hidden; margin-top: 5px; flex: 1; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.9em; font-weight: bold; line-height: 25px; text-shadow: 1px 1px 2px #000; }

        .status-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .tag { font-size: 0.7em; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .tag:hover { filter: brightness(1.5); }
        .tag-lesionado { background: rgba(229, 57, 53, 0.4); border: 1px solid var(--accent-red); }
        .tag-morrendo { background: var(--accent-red); animation: pulseRed 1.5s infinite; border: 1px solid white; }
        .tag-enlouquecendo { background: rgba(0, 176, 255, 0.4); border: 1px solid var(--accent-blue); }

        .log-container {
            flex: 1; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px;
            display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(8px); min-width: 300px;
        }
        .log-title { background: rgba(0,0,0,0.5); padding: 15px; text-align: center; font-weight: bold; color: var(--accent-green); border-bottom: 1px solid var(--border-color); }
        .log-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .log-item { background: rgba(18, 18, 20, 0.9); border: 1px solid #333; padding: 10px; border-radius: 8px; font-size: 0.9em; }
        .log-item .player-name { font-size: 0.9em; color: var(--accent-blue); margin-bottom: 5px; }
        .log-item .roll-result { font-size: 1.2em; font-weight: 900; text-align: center; margin: 5px 0; }

        @keyframes pulseRed { 0% { box-shadow: 0 0 2px var(--accent-red); } 50% { box-shadow: 0 0 10px var(--accent-red); } 100% { box-shadow: 0 0 2px var(--accent-red); } }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px;
            padding: 20px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9);
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .form-group label { font-size: 0.9em; font-weight: bold; color: var(--accent-yellow); }
        .monster-input { padding: 10px; background: rgba(18,18,20,0.8); border: 1px solid var(--border-color); color: white; border-radius: 6px; }
        .dynamic-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-roll { background: var(--accent-yellow); color: #000; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.8em; margin-top: 5px;}
        .btn-roll:hover { filter: brightness(1.2); }
        .monster-details { font-size: 0.8em; color: var(--text-secondary); background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; max-height: 250px; overflow-y: auto;}

        /* ESTILOS DO POPUP DE DADOS IDÊNTICO AO DO JOGADOR */
        .popup-box-dice { position: relative; width: 90%; max-width: 600px; height: 400px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000; border: 4px solid var(--accent-yellow); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .popup-box-dice::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 1; }
        .popup-content { position: relative; z-index: 10; display: none; animation: fadeInResult 0.5s forwards; text-align: center; }
        .popup-number { font-size: 10em; font-weight: 900; color: white; text-shadow: 4px 4px 0 #000; }
        .popup-res { font-size: 2.5em; font-weight: 900; margin-top: 10px; text-transform: uppercase; text-shadow: 2px 2px 4px #000; }
        @keyframes fadeInResult { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .attr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; } 
        .skill-group { display: flex; flex-direction: column; gap: 4px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px; border: 1px solid #333;}
        .skill-group label { display: flex; align-items: center; gap: 5px; font-size: 0.8em; color: var(--text-primary); }

        /* --- ESTILOS DA ABA DE INICIATIVA --- */
        #iniciativa-board {
            display: none; flex-direction: column; height: 100%; overflow: hidden;
        }
        .ini-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .ini-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 10px; }
        
        .ini-card {
            background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px;
            padding: 10px 20px; display: flex; align-items: center; gap: 20px; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.3s; backdrop-filter: blur(8px);
        }
        .ini-card.is-player { border-left: 6px solid var(--accent-blue); }
        .ini-card.is-monster { border-left: 6px solid var(--accent-red); }
        
        .ini-rank { font-size: 2em; font-weight: 900; color: var(--accent-yellow); width: 40px; text-align: center; }
        .ini-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--text-secondary); background: black; }
        .ini-info { flex: 1; }
        .ini-name { font-size: 1.3em; font-weight: bold; text-transform: uppercase; margin: 0 0 5px 0; color: white; }
        .ini-details { font-size: 0.85em; color: var(--text-secondary); }
        .ini-total-box { text-align: center; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px; border: 1px solid #333; }
        .ini-total { font-size: 2em; font-weight: 900; color: var(--accent-green); line-height: 1; }
        .ini-total-lbl { font-size: 0.7em; color: var(--text-secondary); font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="mestre-top-bar">
        <span style="font-weight: bold; color: var(--accent-blue);">Conectar Ficha:</span>
        <input type="text" id="add-code-input" class="code-input" placeholder="Digite o Código do Jogador" maxlength="4">
        <button class="btn-add" onclick="adicionarJogador()">+ ADICIONAR JOGADOR</button>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" id="tab-jogadores" onclick="mudarAba('jogadores')">🕵️ Jogadores</button>
        <button class="tab-btn" id="tab-monstros" onclick="mudarAba('monstros')">👹 Monstros / Criaturas</button>
        <button class="tab-btn" id="tab-iniciativa" onclick="mudarAba('iniciativa')">⚔️ Iniciativa</button>
    </div>

    <div class="content-wrapper">
        <div class="left-panel">
            <div class="players-container" id="players-board"></div>

            <div id="monsters-board">
                <div style="margin-bottom: 20px;">
                    <button class="btn-add" style="background: var(--accent-red); color: white; width: 100%; font-size: 1.2em; padding: 15px;" onclick="abrirModalCriatura()">+ CRIAR NOVA CRIATURA</button>
                </div>
                <div class="monsters-grid" id="monsters-grid"></div>
            </div>

            <div id="iniciativa-board">
                <div class="ini-controls">
                    <button class="btn-add" style="flex: 1; background: var(--accent-red); color: white;" onclick="limparIniciativa()">🗑️ LIMPAR INICIATIVA</button>
                    <button class="btn-add" style="flex: 2; font-size: 1.1em;" onclick="rolarMonstrosIniciativa()">🎲 ROLAR INICIATIVA DOS MONSTROS</button>
                </div>
                <div class="ini-list-container" id="iniciativa-list-container">
                    </div>
            </div>
        </div>

        <div class="log-container">
            <div class="log-title">🎲 LOG DE DADOS E AÇÕES</div>
            <div class="log-messages" id="log-box">
                <div style="text-align: center; color: var(--text-secondary); font-size: 0.8em; margin-top: 20px;" id="aguardar-msg">A aguardar rolagens...</div>
            </div>
        </div>
    </div>

    <div id="modal-ficha" class="modal-overlay">
        <div style="width: 95%; max-width: 1400px; display: flex; justify-content: flex-end;">
            <button class="btn-remove" style="position: static; padding: 10px 20px; font-size: 1.2em; margin-bottom: 10px;" onclick="fecharFicha()">X FECHAR FICHA</button>
        </div>
        <iframe id="iframe-ficha" src="" style="width: 95%; max-width: 1400px; height: 85vh; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg-body);"></iframe>
    </div>

    <div id="popup-dice" class="modal-overlay" onclick="closeDice()" style="z-index: 10000;">
        <div class="popup-box-dice" onclick="event.stopPropagation()">
            <div id="popup-content" class="popup-content">
                <div id="popup-num" class="popup-number">00</div>
                <div id="popup-res" class="popup-res">RESULTADO</div>
            </div>
        </div>
    </div>

    <div id="modal-criatura" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--accent-red); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Criar Criatura</h2>
            
            <div class="form-group"><label>Nome</label><input type="text" id="c-nome" class="monster-input" placeholder="Ex: Zumbi de Sangue"></div>
            <div class="form-group"><label>Foto URL</label><input type="text" id="c-foto" class="monster-input" placeholder="https://link-da-imagem.com/foto.png"></div>
            
            <div style="display:flex; gap: 10px;">
                <div class="form-group" style="flex:1;"><label>Presença Perturbadora</label><input type="text" id="c-presenca" class="monster-input" placeholder="Ex: NEX 20% - DT 15"></div>
                <div class="form-group" style="flex:1;"><label>Defesa</label><input type="number" id="c-defesa" class="monster-input" placeholder="15"></div>
            </div>
            
            <div class="form-group"><label>Pontos de Vida</label><input type="number" id="c-vida" class="monster-input" placeholder="Ex: 50"></div>

            <div class="form-group">
                <label>Atributos</label>
                <div class="attr-grid">
                    <div><span style="font-size:0.7em; color:var(--text-secondary);">AGI</span><input type="number" id="c-agi" class="monster-input" value="1" style="text-align:center; width:100%; box-sizing:border-box;"></div>
                    <div><span style="font-size:0.7em; color:var(--text-secondary);">FOR</span><input type="number" id="c-for" class="monster-input" value="1" style="text-align:center; width:100%; box-sizing:border-box;"></div>
                    <div><span style="font-size:0.7em; color:var(--text-secondary);">PRE</span><input type="number" id="c-pre" class="monster-input" value="1" style="text-align:center; width:100%; box-sizing:border-box;"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Perícias Principais</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="skill-group">
                        <label><input type="checkbox" id="c-treino-luta"> Luta (FOR)</label>
                        <input type="number" id="c-bonus-luta" class="monster-input" placeholder="Bônus Extra" value="0">
                    </div>
                    <div class="skill-group">
                        <label><input type="checkbox" id="c-treino-pontaria"> Pontaria (AGI)</label>
                        <input type="number" id="c-bonus-pontaria" class="monster-input" placeholder="Bônus Extra" value="0">
                    </div>
                    <div class="skill-group">
                        <label><input type="checkbox" id="c-treino-iniciativa"> Iniciativa (AGI)</label>
                        <input type="number" id="c-bonus-iniciativa" class="monster-input" placeholder="Bônus Extra" value="0">
                    </div>
                    <div class="skill-group">
                        <label><input type="checkbox" id="c-treino-reflexos"> Reflexos (AGI)</label>
                        <input type="number" id="c-bonus-reflexos" class="monster-input" placeholder="Bônus Extra" value="0">
                    </div>
                    <div class="skill-group">
                        <label><input type="checkbox" id="c-treino-percepcao"> Percepção (PRE)</label>
                        <input type="number" id="c-bonus-percepcao" class="monster-input" placeholder="Bônus Extra" value="0">
                    </div>
                    <div class="skill-group">
                        <label><input type="checkbox" id="c-treino-vontade"> Vontade (PRE)</label>
                        <input type="number" id="c-bonus-vontade" class="monster-input" placeholder="Bônus Extra" value="0">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label style="display: flex; justify-content: space-between; align-items: center;">
                    Ataques <button onclick="addCampoAtaque('c-ataques-list')" class="btn-ctrl" style="width: auto; padding: 0 10px;">+ Adicionar Ataque</button>
                </label>
                <div id="c-ataques-list"></div>
            </div>

            <div class="form-group">
                <label style="display: flex; justify-content: space-between; align-items: center;">
                    Poderes Gerais <button onclick="addCampoPoder('c-poderes-list')" class="btn-ctrl" style="width: auto; padding: 0 10px;">+ Adicionar Poder</button>
                </label>
                <div id="c-poderes-list"></div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px;">
                <button class="btn-remove" style="position: static;" onclick="fecharModalCriatura()">Cancelar</button>
                <button class="btn-add" style="background: var(--accent-green);" onclick="salvarCriatura()">Guardar Criatura</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        let jogadoresPermitidos = JSON.parse(localStorage.getItem('mestre_allowed_codes')) || [];
        const URL_FICHA = "/ficha.html"; 
        const socket = io();
        const playersBoard = document.getElementById('players-board');
        const logBox = document.getElementById('log-box');

        let playersDataMemoria = {}; // Guarda os atributos/stats completos dos jogadores em tempo real
        let iniciativaList = JSON.parse(localStorage.getItem('mestre_iniciativa')) || [];

        // Tabela D20 e Perícias Base
        const tabelaD20 = {1:{n:20,b:99,e:99},2:{n:19,b:20,e:99},3:{n:18,b:20,e:99},4:{n:17,b:19,e:99},5:{n:16,b:19,e:20},6:{n:15,b:18,e:20},7:{n:14,b:18,e:20},8:{n:13,b:17,e:20},9:{n:12,b:17,e:20},10:{n:11,b:16,e:19},11:{n:10,b:16,e:19},12:{n:9,b:15,e:19},13:{n:8,b:15,e:19},14:{n:7,b:14,e:19},15:{n:6,b:14,e:18},16:{n:5,b:13,e:18},17:{n:4,b:13,e:18},18:{n:3,b:12,e:18},19:{n:2,b:12,e:18},20:{n:1,b:11,e:18}};
        const periciasMonstroInfo = {
            'luta': { attr: 'for', mod: 0.25, nome: 'Luta' },
            'pontaria': { attr: 'agi', mod: 0.45, nome: 'Pontaria' },
            'iniciativa': { attr: 'agi', mod: 0.50, nome: 'Iniciativa' },
            'reflexos': { attr: 'agi', mod: 0.35, nome: 'Reflexos' },
            'percepcao': { attr: 'pre', mod: 0.50, nome: 'Percepção' },
            'vontade': { attr: 'pre', mod: 0.50, nome: 'Vontade' }
        };

        socket.on('connect', () => { jogadoresPermitidos.forEach(codigo => socket.emit('request_player', codigo)); });

        function adicionarJogador() {
            const input = document.getElementById('add-code-input');
            const codigo = input.value.toUpperCase().trim();
            if (codigo.length > 0 && !jogadoresPermitidos.includes(codigo)) {
                jogadoresPermitidos.push(codigo);
                localStorage.setItem('mestre_allowed_codes', JSON.stringify(jogadoresPermitidos));
                socket.emit('request_player', codigo);
            }
            input.value = '';
        }

        function removerJogador(codigo) {
            jogadoresPermitidos = jogadoresPermitidos.filter(c => c !== codigo);
            localStorage.setItem('mestre_allowed_codes', JSON.stringify(jogadoresPermitidos));
            const card = document.getElementById(`player-${codigo}`);
            if (card) card.remove();
        }

        function abrirFicha(codigo) {
            document.getElementById('iframe-ficha').src = `${URL_FICHA}?view=${codigo}`;
            document.getElementById('modal-ficha').style.display = 'flex';
        }

        function fecharFicha() {
            document.getElementById('modal-ficha').style.display = 'none';
            document.getElementById('iframe-ficha').src = '';
        }

        function alterarStatusMestre(codigo, tipo, valor) {
            if (tipo === 'vida' || tipo === 'sani') socket.emit('comando_mestre', { codigo: codigo, tipo: tipo, delta: valor });
            else if (tipo === 'status') socket.emit('comando_mestre', { codigo: codigo, status: valor });
        }

        socket.on('update_mestre', (dados) => {
            if (!dados.codigo || !jogadoresPermitidos.includes(dados.codigo)) return;
            
            // Guarda as informações na memória local para sabermos os Bônus de Iniciativa deles!
            playersDataMemoria[dados.codigo] = dados;

            let card = document.getElementById(`player-${dados.codigo}`);
            if (!card) {
                card = document.createElement('div');
                card.className = 'player-card';
                card.id = `player-${dados.codigo}`;
                playersBoard.appendChild(card);
            }

        function processarIniciativa(dados) {
            let dadoPuro = parseInt(dados.resultado) || 0;
            let isPlayer = dados.codigo !== null;
            let idUnico = isPlayer ? dados.codigo : 'monstro_' + dados.jogador + '_' + Date.now(); 
            
            let bonusCalc = 0;
            let agiBase = 0;
            let foto = 'https://via.placeholder.com/60';
            let nomeStr = dados.jogador;

            if (isPlayer) {
                let pData = playersDataMemoria[dados.codigo];
                if (pData && pData.fullData) {
                    let fd = pData.fullData;
                    agiBase = parseInt(fd.attrs['attr_agi']) || 1;
                    let skillInic = parseInt(fd.skills['skill_iniciativa']) || 0;
                    let isTreinado = fd.skills['chk_iniciativa'] === true;
                    
                    let penalty = 0;
                    if (fd.inv) {
                        let hasHeavy = fd.inv.some(i => i.eq && (i.n.toLowerCase().includes('proteção pesada') || i.n.toLowerCase().includes('protecao pesada')));
                        if (hasHeavy) penalty = -5;
                    }
                    
                    // Cálculo igual à ficha principal
                    bonusCalc = Math.floor(skillInic + (agiBase * 0.50) + (isTreinado ? 10 : 0) + penalty);
                    foto = pData.foto || foto;
                }
            } else {
                let monstro = monstros.find(m => m.nome === dados.jogador);
                if (monstro) {
                    idUnico = monstro.id;
                    agiBase = monstro.attrs ? (parseInt(monstro.attrs.agi) || 1) : 1;
                    let sData = monstro.skills ? monstro.skills['iniciativa'] : null;
                    if (sData) {
                        bonusCalc = Math.floor(sData.bonus + (agiBase * 0.50) + (sData.treinado ? 10 : 0));
                    }
                    foto = monstro.foto || foto;
                }
            }

            let totalIniciativa = dadoPuro + bonusCalc;

            let objIndex = iniciativaList.findIndex(i => i.id === idUnico);
            if (objIndex > -1) {
                iniciativaList[objIndex] = { id: idUnico, isPlayer, nome: nomeStr, foto, dado: dadoPuro, bonus: bonusCalc, agi: agiBase, total: totalIniciativa };
            } else {
                iniciativaList.push({ id: idUnico, isPlayer, nome: nomeStr, foto, dado: dadoPuro, bonus: bonusCalc, agi: agiBase, total: totalIniciativa });
            }

            if (document.getElementById('tab-iniciativa').classList.contains('active')) {
                renderizarIniciativa();
            }
        }

        }

        function rolarDanoMonstro(monstroNome, ataqueNome, formulaDano) {
            let formula = formulaDano.toLowerCase().replace(/\s+/g, ''); 
            let total = 0;
            
            let pieces = formula.match(/[+\-]?[^+\-]+/g); 
            if(!pieces) return alert("Fórmula de dano inválida!");

            pieces.forEach(p => {
                let sinal = 1;
                if(p.startsWith('+')) { p = p.substring(1); }
                else if(p.startsWith('-')) { sinal = -1; p = p.substring(1); }
                
                if(p.includes('d')) { 
                    let parts = p.split('d');
                    let qtd = parseInt(parts[0]) || 1;
                    let faces = parseInt(parts[1]) || 1;
                    let sum = 0;
                    for(let i=0; i<qtd; i++) sum += Math.floor(Math.random() * faces) + 1;
                    total += (sum * sinal);
                } else { 
                    let val = parseInt(p);
                    if(!isNaN(val)) total += (val * sinal);
                }
            });

            if(total < 0) total = 0;
            showPopup(total, `DANO: ${ataqueNome}`, "color:var(--accent-red)", monstroNome);
        }

        function rolarPericiaMonstro(id, keyPericia) {
            const monstro = monstros.find(m => m.id === id);
            if (!monstro) return;

            if (!monstro.attrs || !monstro.skills) {
                alert("Esta criatura foi criada num formato antigo. Por favor recrie-a.");
                return;
            }

            const info = periciasMonstroInfo[keyPericia];
            const attrVal = monstro.attrs[info.attr] || 1;
            const skillData = monstro.skills[keyPericia] || { bonus: 0, treinado: false };

            let f = Math.floor(skillData.bonus + (attrVal * info.mod) + (skillData.treinado ? 10 : 0));
            let d = Math.floor(Math.random() * 20) + 1;
            
            let fLimit = f > 20 ? 20 : (f < 1 ? 1 : f);
            let m = tabelaD20[fLimit];

            let resultadoStr = "FALHA";
            let cor = "color:var(--accent-red)";

            if (d === 20) {
                resultadoStr = "CRÍTICO";
                cor = "color:var(--accent-red); text-shadow: 0 0 5px var(--accent-red);";
            } else if (d >= m.e && m.e != 99) {
                resultadoStr = "EXTREMO";
                cor = "color:var(--accent-yellow)";
            } else if (d >= m.b && m.b != 99) {
                resultadoStr = "BOM";
                cor = "color:var(--accent-blue)";
            } else if (d >= m.n) {
                resultadoStr = "NORMAL";
                cor = "color:var(--accent-green)";
            }

            if (d === 1) {
                resultadoStr = "DESASTRE";
                cor = "color:#ff5252; font-weight:bold;";
            }

            showPopup(d, `${info.nome} (${resultadoStr})`, cor, monstro.nome);
        }

                }

                let listasHTML = '';
                if (monstro.ataques && monstro.ataques.length > 0) {
                    let linhasAtaque = monstro.ataques.map(a => {
                        if (typeof a === 'string') return `<li>${a}</li>`;
                        
                        let nomeExibicao = a.qtd && a.qtd > 1 ? `${a.qtd}x ${a.nome}` : a.nome;
                        let tipoText = a.tipo ? ` (${a.tipo})` : '';
                        let critText = a.critico && a.critico !== '20/x2' ? ` | Crit: ${a.critico}` : '';

                        return `
                        <li style="display: flex; flex-direction: column; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                                <span><strong style="color:white;">${nomeExibicao}</strong><span style="color:var(--text-secondary); font-size:0.85em;">${tipoText}</span></span>
                                <button class="btn-ctrl" style="width: auto; padding: 4px 10px; font-size: 0.85em; background: var(--accent-red); border: none; border-radius: 4px;" onclick="rolarDanoMonstro('${monstro.nome}', '${a.nome}', '${a.dano}')">🩸 Dano</button>
                            </div>
                            <div style="font-size: 0.85em; color: var(--text-secondary);">
                                Dano: <span style="color:var(--accent-yellow); font-weight:bold;">${a.dano}</span>${critText}
                            </div>
                        </li>`;
                    }).join('');

                    listasHTML += `<div style="margin-bottom: 5px;"><strong style="color:var(--accent-red);">Ataques:</strong><ul style="margin: 5px 0 5px 0; padding:0; list-style:none;">${linhasAtaque}</ul></div>`;
                }
                
                if (monstro.poderes && monstro.poderes.length > 0) {
                    listasHTML += `<div><strong style="color:var(--accent-blue);">Poderes:</strong><ul style="margin: 2px 0 0 15px; padding:0;">` + monstro.poderes.map(p => `<li>${p}</li>`).join('') + `</ul></div>`;
                }

                let btnPericiasHTML = '';
                if(monstro.skills) {
                    btnPericiasHTML = `
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; margin-top:10px;">
                        <button class="btn-roll" onclick="rolarPericiaMonstro('${monstro.id}', 'iniciativa')" style="background:var(--bg-card); color:white; border:1px solid #444;">Iniciativa</button>
                        <button class="btn-roll" onclick="rolarPericiaMonstro('${monstro.id}', 'percepcao')" style="background:var(--bg-card); color:white; border:1px solid #444;">Percepção</button>
                        <button class="btn-roll" onclick="rolarPericiaMonstro('${monstro.id}', 'reflexos')" style="background:var(--bg-card); color:white; border:1px solid #444;">Reflexos</button>
                        <button class="btn-roll" onclick="rolarPericiaMonstro('${monstro.id}', 'vontade')" style="background:var(--bg-card); color:white; border:1px solid #444;">Vontade</button>
                        <button class="btn-roll" onclick="rolarPericiaMonstro('${monstro.id}', 'luta')" style="border-color:var(--accent-blue);">🗡️ Luta</button>
                        <button class="btn-roll" onclick="rolarPericiaMonstro('${monstro.id}', 'pontaria')" style="border-color:var(--accent-blue);">🔫 Pontaria</button>
                    </div>`;
                } else {
                    btnPericiasHTML = `<button class="btn-roll" style="width:100%; margin-top:10px;" onclick="alert('Criatura antiga. Por favor recrie para usar as perícias completas.')">🎲 Perícias (Desativado)</button>`;
                }

                const card = document.createElement('div');
                card.className = 'monster-card';
                card.innerHTML = `
                    <button class="btn-remove" onclick="removerMonstro('${monstro.id}')" title="Remover Monstro">X</button>
                    
                    <div class="player-header" style="border-bottom-color: var(--accent-red);">
                        <img src="${monstro.foto}" class="player-img monster-img" alt="Monster Icon">
                        <div>
                            <h3 class="player-name monster-name">${monstro.nome}</h3>
                            <div class="player-info">
                                <strong>Defesa:</strong> ${monstro.defesa} <br>
                                <strong>Presença:</strong> ${monstro.presenca}
                            </div>
                        </div>
                    </div>
                    
                    ${attrsHTML}

                    <div>
                        <div style="font-size: 0.75em; color: var(--accent-red); font-weight: bold; margin-bottom: 2px;">VIDA</div>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <button class="btn-ctrl" onclick="alterarVidaMonstro('${monstro.id}', -1)">-</button>
                            <button class="btn-ctrl" onclick="alterarVidaMonstro('${monstro.id}', -10)" style="font-size: 0.7em;">-10</button>
                            <div class="bar-container">
                                <div class="bar-fill fill-vida" style="width: ${percVida}%"></div>
                                <div class="bar-text">${monstro.vida_atual} / ${monstro.vida_max}</div>
                            </div>
                            <button class="btn-ctrl" onclick="alterarVidaMonstro('${monstro.id}', 10)" style="font-size: 0.7em;">+10</button>
                            <button class="btn-ctrl" onclick="alterarVidaMonstro('${monstro.id}', 1)">+</button>
                        </div>
                    </div>

                    <div class="monster-details">
                        ${listasHTML || '<em>Nenhum ataque ou poder registado.</em>'}
                    </div>

                    ${btnPericiasHTML}
                `;
                grid.appendChild(card);
            });
        }

        if (document.getElementById('tab-monstros').classList.contains('active')) renderizarMonstros();
        if (document.getElementById('tab-iniciativa').classList.contains('active')) renderizarIniciativa();
    </script>
</body>
</html>
