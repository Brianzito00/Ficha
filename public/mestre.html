<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escudo do Mestre - Ordem</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        :root {
            --bg-body: #121214; --bg-card: rgba(32,32,36,0.85); --border-color: rgba(50,50,56,0.8);
            --text-primary: #e1e1e6; --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; --accent-green: #00e676; --accent-red: #e53935; --accent-purple: #b82bf2;
            --shadow-card: 0 8px 32px 0 rgba(0,0,0,0.8);
        }

        body { 
            font-family: 'Roboto', sans-serif; background-color: var(--bg-body); 
            background-size: cover; background-position: center; background-attachment: fixed; 
            color: var(--text-primary); margin: 0; padding: 0; 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(18, 18, 20, 0.9); border-bottom: 2px solid var(--accent-red);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            box-sizing: border-box; z-index: 100; backdrop-filter: blur(10px);
        }

        .top-bar h1 { margin: 0; font-size: 1.5em; color: var(--accent-red); text-transform: uppercase; }
        .btn-leave { background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-leave:hover { background: var(--accent-red); color: white; }

        /* Layout Principal */
        .main-content { display: flex; width: 100%; height: calc(100vh - 60px); margin-top: 60px; }

        /* Area Esquerda (Abas) */
        .left-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .tabs-container { display: flex; gap: 10px; background: rgba(18, 18, 20, 0.95); padding: 10px 20px 0 20px; border-bottom: 1px solid var(--border-color); backdrop-filter: blur(10px); }
        .tab-btn { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); border-bottom: none; padding: 10px 20px; font-weight: bold; font-size: 1em; cursor: pointer; border-radius: 8px 8px 0 0; text-transform: uppercase; transition: 0.2s; }
        .tab-btn:hover { color: white; background: rgba(50,50,56,0.8); }
        .tab-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); }

        .tab-content { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        .tab-content.active { display: block; }

        /* Grelhas */
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

        /* Card do Jogador / Inimigo */
        .player-card { 
            background: var(--bg-card); border: 1px solid var(--border-color); border-top: 3px solid var(--accent-red);
            border-radius: 12px; padding: 15px; box-shadow: var(--shadow-card); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 15px; transition: transform 0.2s;
            will-change: transform, box-shadow; position: relative;
        }
        .player-card:hover { transform: translateY(-3px); border-color: var(--accent-red); }

        .player-header { display: flex; align-items: center; gap: 15px; }
        .player-img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); background: #000; }
        .player-info h3 { margin: 0 0 5px 0; color: white; text-transform: uppercase; font-size: 1.2em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .player-info p { margin: 0; color: var(--text-secondary); font-size: 0.85em; font-weight: bold; }
        .player-info .destaque { color: var(--accent-green); font-size: 1.1em; }

        /* Barras de Status */
        .status-row { margin-bottom: 8px; }
        .status-labels { display: flex; justify-content: space-between; font-size: 0.8em; font-weight: 900; margin-bottom: 3px; align-items: center; }
        .bar-container { width: 100%; height: 18px; background: rgba(0,0,0,0.8); border-radius: 4px; border: 1px solid #222; overflow: hidden; position: relative;}
        .bar-fill { height: 100%; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .fill-pe { background: linear-gradient(90deg, #b38f00, var(--accent-yellow)); }

        .btn-circle { background: transparent; border: 1px solid var(--text-secondary); color: white; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.2s; }
        .btn-circle:hover { border-color: white; background: rgba(255,255,255,0.2); }

        .btn-action-sm { background: rgba(18,18,20,0.8); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8em; text-transform: uppercase; transition: 0.2s; flex: 1; }
        .btn-action-sm:hover { filter: brightness(1.2); }

        /* Painel Lateral (Log de Dados) */
        .log-area { width: 350px; background: rgba(18,18,20,0.95); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .log-area h3 { color: var(--accent-yellow); text-align: center; margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .log-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        
        .log-item { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 10px; border-radius: 8px; }
        .log-item.crit { border-color: var(--accent-yellow); box-shadow: inset 0 0 10px rgba(255,207,51,0.1); }
        .log-item.fail { border-color: var(--accent-red); box-shadow: inset 0 0 10px rgba(229,57,53,0.1); }
        .log-player { font-size: 0.8em; color: var(--text-secondary); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .log-action { font-size: 0.9em; color: white; margin-bottom: 5px; font-style: italic; }
        .log-result { font-family: 'Permanent Marker', cursive; font-size: 2.2em; text-align: right; line-height: 1; }

        /* MODAIS */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(10px); }
        .popup-box { background: var(--bg-card); border: 2px solid var(--accent-red); border-radius: 12px; box-shadow: var(--shadow-card); backdrop-filter: blur(15px); padding: 25px; width: 450px; max-width: 95%; }
        .inv-input { background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }

        /* ANIMAÇÕES */
        @keyframes hitVidaDano { 0% { transform: translateX(0); } 20% { transform: translateX(-6px) scale(0.97); box-shadow: 0 0 25px rgba(229,57,53,0.9); } 40% { transform: translateX(6px) scale(0.97); } 60% { transform: translateX(-6px) scale(0.97); } 80% { transform: translateX(6px) scale(0.97); } 100% { transform: translateX(0) scale(1); } }
        @keyframes hitVidaCura { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,230,118,1); } 100% { transform: scale(1); } }
        @keyframes hitSaniDano { 0% { transform: translate(0) skew(0); } 20% { transform: translate(-4px, 2px) skew(-5deg) scale(0.98); box-shadow: 0 0 25px rgba(0,176,255,0.9); filter: hue-rotate(20deg); } 40% { transform: translate(4px, -2px) skew(5deg) scale(0.98); } 60% { transform: translate(-2px, 2px) skew(-3deg) scale(0.98); } 80% { transform: translate(2px, -2px) skew(3deg) scale(0.98); } 100% { transform: translate(0) skew(0) scale(1); filter: none; } }
        @keyframes hitSaniCura { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,176,255,0.8); } 100% { transform: scale(1); } }
        @keyframes hitPeDano { 0% { transform: translateY(0); } 30% { transform: translateY(6px) scale(0.98); box-shadow: inset 0 0 25px rgba(255,207,51,0.5); } 100% { transform: translateY(0) scale(1); } }
        @keyframes hitPeCura { 0% { transform: translateY(0); } 50% { transform: translateY(-6px); box-shadow: 0 15px 25px rgba(255,207,51,0.8); } 100% { transform: translateY(0); } }

        .anim-vida-dano { animation: hitVidaDano 0.5s ease-out !important; z-index: 10; border-color: var(--accent-red) !important; }
        .anim-vida-cura { animation: hitVidaCura 0.6s ease-out !important; z-index: 10; border-color: var(--accent-green) !important; }
        .anim-sani-dano { animation: hitSaniDano 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) !important; z-index: 10; border-color: var(--accent-blue) !important; }
        .anim-sani-cura { animation: hitSaniCura 0.6s ease-out !important; z-index: 10; border-color: var(--accent-blue) !important; }
        .anim-pe-dano   { animation: hitPeDano 0.4s ease-out !important; z-index: 10; border-color: var(--accent-yellow) !important; }
        .anim-pe-cura   { animation: hitPeCura 0.5s ease-out !important; z-index: 10; border-color: var(--accent-yellow) !important; }

        @media (max-width: 900px) {
            .main-content { flex-direction: column; }
            .log-area { width: 100%; height: 300px; border-left: none; border-top: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Mesa: <span id="display-campanha" style="color: white;">---</span></h1>
        <button class="btn-leave" onclick="voltarLobby()">Sair da Mesa</button>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('mesa', this)">👥 Mesa</button>
                <button class="tab-btn" onclick="switchTab('inimigos', this)">💀 Inimigos</button>
            </div>

            <div id="tab-mesa" class="tab-content active">
                <div id="players-grid" class="players-grid">
                    <div id="empty-state" style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-style: italic; margin-top: 50px;">
                        A aguardar ligação dos jogadores...
                    </div>
                </div>
            </div>

            <div id="tab-inimigos" class="tab-content">
                <button class="btn-leave" style="width: 100%; border-color: var(--accent-red); margin-bottom: 20px; padding: 12px; font-size: 1.1em;" onclick="document.getElementById('modal-inimigo').style.display = 'flex';">➕ CRIAR NOVO INIMIGO</button>
                
                <div id="enemies-grid" class="players-grid">
                    </div>
            </div>
        </div>

        <div class="log-area">
            <h3>Registos de Rolagens</h3>
            <div id="log-list" class="log-list">
                <div style="text-align: center; color: #555; font-size: 0.8em; font-style: italic; margin-top: 20px;">
                    Nenhum dado rolado ainda.
                </div>
            </div>
        </div>
    </div>

    <div id="modal-inimigo" class="popup-overlay" onclick="document.getElementById('modal-inimigo').style.display='none'">
        <div class="popup-box" onclick="event.stopPropagation()">
            <h3 style="color: var(--accent-red); margin-top: 0; text-align: center; text-transform: uppercase;">Criar Inimigo</h3>
            
            <label style="color: var(--text-secondary); font-size: 0.8em; font-weight: bold;">Nome do Monstro / NPC</label>
            <input type="text" id="enemy-name" class="inv-input" style="margin-bottom: 15px;" placeholder="Ex: Zumbi de Sangue">
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="color: var(--text-secondary); font-size: 0.8em; font-weight: bold;">Vida Max</label>
                    <input type="number" id="enemy-hp" class="inv-input" value="50">
                </div>
                <div style="flex: 1;">
                    <label style="color: var(--text-secondary); font-size: 0.8em; font-weight: bold;">Defesa</label>
                    <input type="number" id="enemy-def" class="inv-input" value="15">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="color: var(--text-secondary); font-size: 0.8em; font-weight: bold;">FOR</label>
                    <input type="number" id="enemy-for" class="inv-input" value="1" min="0" max="10" oninput="if(this.value>10)this.value=10; if(this.value<0)this.value=0;">
                </div>
                <div style="flex: 1;">
                    <label style="color: var(--text-secondary); font-size: 0.8em; font-weight: bold;">AGI</label>
                    <input type="number" id="enemy-agi" class="inv-input" value="1" min="0" max="10" oninput="if(this.value>10)this.value=10; if(this.value<0)this.value=0;">
                </div>
                <div style="flex: 1;">
                    <label style="color: var(--text-secondary); font-size: 0.8em; font-weight: bold;">VIG</label>
                    <input type="number" id="enemy-vig" class="inv-input" value="1" min="0" max="10" oninput="if(this.value>10)this.value=10; if(this.value<0)this.value=0;">
                </div>
                <div style="flex: 1;">
                    <label style="color: var(--text-secondary); font-size: 0.7em; font-weight: bold; color: var(--accent-red);" title="Bónus extra que soma ao cálculo da Luta.">BÓNUS ATQ</label>
                    <input type="number" id="enemy-luta" class="inv-input" value="0">
                </div>
            </div>

            <label style="color: var(--text-secondary); font-size: 0.8em; font-weight: bold;">Elemento Principal</label>
            <select id="enemy-element" class="inv-input" style="margin-bottom: 25px;">
                <option value="Sangue">Sangue (Vermelho)</option>
                <option value="Morte">Morte (Cinza Escuro)</option>
                <option value="Conhecimento">Conhecimento (Amarelo)</option>
                <option value="Energia">Energia (Roxo)</option>
                <option value="Medo">Medo (Branco)</option>
            </select>

            <div style="display: flex; gap: 10px;">
                <button class="btn-leave" style="flex: 1; background: var(--accent-red); color: white;" onclick="criarInimigo()">CRIAR</button>
                <button class="btn-leave" style="flex: 1; border-color: #555; color: #aaa;" onclick="document.getElementById('modal-inimigo').style.display='none'">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const campanhaAtiva = localStorage.getItem('campanha_atual');
        if(!campanhaAtiva) { window.location.href = '/index.html'; }
        document.getElementById('display-campanha').innerText = campanhaAtiva;

        const customWP = localStorage.getItem('campanha_wp_' + campanhaAtiva);
        if(customWP && customWP.trim() !== '') { document.body.style.backgroundImage = `url('${customWP}')`; } 
        else { document.body.style.backgroundImage = `url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg')`; }

        const socket = typeof io !== 'undefined' ? io() : null;
        let jogadoresConectados = {};
        let logsIniciaisRemovidos = false;

        // TABELA DE SUCESSOS
        const tbSucesso = { 
            1:{n:20,b:99,e:99},2:{n:19,b:20,e:99},3:{n:18,b:20,e:99},4:{n:17,b:19,e:99},5:{n:16,b:19,e:20},
            6:{n:15,b:18,e:20},7:{n:14,b:18,e:20},8:{n:13,b:17,e:20},9:{n:12,b:17,e:20},10:{n:11,b:16,e:19},
            11:{n:10,b:16,e:19},12:{n:9,b:15,e:19},13:{n:8,b:15,e:19},14:{n:7,b:14,e:19},15:{n:6,b:14,e:18},
            16:{n:5,b:13,e:18},17:{n:4,b:13,e:18},18:{n:3,b:12,e:18},19:{n:2,b:12,e:18},20:{n:1,b:11,e:18} 
        };

        function getAlvosD20(vh) { 
            if (vh < 1) vh = 1; 
            if (vh > 20) return { n: 1, b: Math.max(2, 21 - Math.floor(vh / 2)), e: Math.max(2, 21 - Math.floor(vh / 5)) }; 
            return tbSucesso[vh]; 
        }

        // SISTEMA DE INIMIGOS
        let listaInimigos = [];
        const inimigosCacheKey = 'mestre_inimigos_' + campanhaAtiva;
        if(localStorage.getItem(inimigosCacheKey)) {
            try { listaInimigos = JSON.parse(localStorage.getItem(inimigosCacheKey)); } catch(e) {}
        }

        // CARREGAR JOGADORES DA MEMÓRIA
        const cacheKey = 'mestre_cache_' + campanhaAtiva;
        if (localStorage.getItem(cacheKey)) {
            try { jogadoresConectados = JSON.parse(localStorage.getItem(cacheKey)); setTimeout(() => renderPlayers(), 100); } catch(e) {}
        }

        // TAB SWITCHER
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).style.display = 'block';
            btn.classList.add('active');
            if(tabId === 'inimigos') renderInimigos();
        }

        // ==========================================
        // SOCKET: ATUALIZAÇÕES DA MESA 100% BLINDADAS
        // ==========================================
        if (socket) {
            socket.on('connect', () => {
                socket.emit('join_campaign', campanhaAtiva);
                Object.keys(jogadoresConectados).forEach(codigo => { socket.emit('request_player', codigo); });
            });

            socket.on('update_mestre', (dados) => {
                if (!dados || !dados.codigo) return;
                
                try {
                    // Pega no jogador que já existe na memória para não apagar dados!
                    let p = jogadoresConectados[dados.codigo] || { codigo: dados.codigo };
                    
                    // Guarda valores antigos para detetar as animações
                    let oldVida = parseInt(p.vida_atual) || 0;
                    let oldSani = parseInt(p.sani_atual) || 0;
                    let oldPe   = parseInt(p.pe_atual) || 0;

                    // 1. Atualiza a "fullData" se vier no pacote
                    let incomingFicha = dados.fullData || dados.ficha;
                    if (incomingFicha) {
                        if (typeof incomingFicha === 'string') {
                            try { incomingFicha = JSON.parse(incomingFicha); } catch(e) {}
                        }
                        p.fullData = incomingFicha;
                    }

                    // 2. FUSÃO INTELIGENTE (Prioridade: Novo Dado > Dado do fullData > Dado Velho da Memória)
                    // (Isto impede o congelamento e valores NaN)
                    p.nome = dados.nome ?? p.fullData?.info?.char_nome ?? p.nome ?? 'Desconhecido';
                    p.foto = dados.foto ?? p.fullData?.info?.char_img ?? p.foto ?? '';
                    p.nex = dados.nex ?? p.fullData?.info?.char_nex ?? p.nex ?? 0;
                    p.defesa = dados.defesa ?? p.fullData?.defense ?? p.defesa ?? 10;
                    
                    p.vida_atual = dados.vida_atual ?? p.fullData?.info?.vida_atual ?? p.vida_atual ?? 0;
                    p.vida_max = dados.vida_max ?? p.fullData?.info?.vida_max ?? p.vida_max ?? 1;
                    p.sani_atual = dados.sani_atual ?? p.fullData?.info?.sani_atual ?? p.sani_atual ?? 0;
                    p.sani_max = dados.sani_max ?? p.fullData?.info?.sani_max ?? p.sani_max ?? 1;
                    p.pe_atual = dados.pe_atual ?? p.fullData?.info?.pe_atual ?? p.pe_atual ?? 0;
                    p.pe_max = dados.pe_max ?? p.fullData?.info?.pe_max ?? p.pe_max ?? 1;
                    
                    p.status = dados.status ?? p.fullData?.charStatus ?? p.status ?? {};

                    // Mantém a fullData sincronizada por dentro para segurança extra
                    if (p.fullData && p.fullData.info) {
                        p.fullData.info.char_nex = p.nex;
                        p.fullData.defense = p.defesa;
                        p.fullData.info.vida_atual = p.vida_atual;
                        p.fullData.info.vida_max = p.vida_max;
                        p.fullData.info.sani_atual = p.sani_atual;
                        p.fullData.info.sani_max = p.sani_max;
                        p.fullData.info.pe_atual = p.pe_atual;
                        p.fullData.info.pe_max = p.pe_max;
                        p.fullData.charStatus = p.status;
                    }

                    let newVida = parseInt(p.vida_atual) || 0;
                    let newSani = parseInt(p.sani_atual) || 0;
                    let newPe   = parseInt(p.pe_atual) || 0;

                    // Deteta qual barra mudou para aplicar a classe de animação
                    let animClass = null;
                    if (newVida < oldVida) animClass = 'anim-vida-dano'; else if (newVida > oldVida) animClass = 'anim-vida-cura';
                    else if (newSani < oldSani) animClass = 'anim-sani-dano'; else if (newSani > oldSani) animClass = 'anim-sani-cura';
                    else if (newPe < oldPe) animClass = 'anim-pe-dano'; else if (newPe > oldPe) animClass = 'anim-pe-cura';

                    // Salva e atualiza o DOM
                    jogadoresConectados[dados.codigo] = p;
                    localStorage.setItem(cacheKey, JSON.stringify(jogadoresConectados));
                    renderPlayers();

                    // Dispara a Animação se aplicável
                    if (animClass) {
                        const cardElement = document.getElementById(`card-${dados.codigo}`);
                        if (cardElement) {
                            cardElement.classList.add(animClass);
                            setTimeout(() => { cardElement.classList.remove(animClass); }, 600);
                        }
                    }
                } catch (err) {
                    console.error("Erro na fusão de dados. O sistema protegeu-se do F5:", err);
                }
            });

            socket.on('novo_log', (dados) => { adicionarLog(dados); });
            socket.on('comando_mestre', (dados) => {
                if (dados.tipo === 'jogador_saiu' && dados.codigo) {
                    delete jogadoresConectados[dados.codigo];
                    localStorage.setItem(cacheKey, JSON.stringify(jogadoresConectados)); 
                    renderPlayers();
                }
            });
        }

        // ==========================================
        // RENDER JOGADORES (MESA)
        // ==========================================
        function renderPlayers() {
            const grid = document.getElementById('players-grid');
            if (Object.keys(jogadoresConectados).length === 0) {
                grid.innerHTML = `<div id="empty-state" style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-style: italic; margin-top: 50px;">A aguardar ligação dos jogadores...</div>`;
                return;
            }
            grid.innerHTML = '';
            
            Object.values(jogadoresConectados).forEach(player => {
                // Matemática segura e à prova de NaN
                const vMax = Math.max(1, parseInt(player.vida_max) || 1); 
                const sMax = Math.max(1, parseInt(player.sani_max) || 1); 
                const pMax = Math.max(1, parseInt(player.pe_max) || 1);
                
                const vAtual = parseInt(player.vida_atual) || 0; 
                const sAtual = parseInt(player.sani_atual) || 0; 
                const pAtual = parseInt(player.pe_atual) || 0;
                
                const pctVida = Math.max(0, Math.min(100, (vAtual / vMax) * 100)); 
                const pctSani = Math.max(0, Math.min(100, (sAtual / sMax) * 100)); 
                const pctPe = Math.max(0, Math.min(100, (pAtual / pMax) * 100));

                let extraStyles = "";
                if (player.status) {
                    if (player.status.morrendo) extraStyles = "animation: pulseRed 1.5s infinite; border-color: var(--accent-red); box-shadow: 0 0 15px rgba(229,57,53,0.3);";
                    else if (player.status.enlouquecendo) extraStyles = "animation: pulseBlue 1.5s infinite; border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0,176,255,0.3);";
                }

                const fotoExibicao = (player.foto && player.foto.trim() !== '') ? player.foto : 'https://static.vecteezy.com/ti/vetor-gratis/p1/35129568-silhueta-do-desconhecido-pessoa-com-face-escondido-coberto-e-mascarado-misterioso-estranho-homem-anonimo-personagem-ilustracao-isolado-em-branco-fundo-gratis-vetor.jpg';

                const card = document.createElement('div');
                card.id = `card-${player.codigo}`; card.className = 'player-card'; card.style.cssText = extraStyles;
                
                card.innerHTML = `
                    <div class="player-header">
                        <img src="${fotoExibicao}" class="player-img">
                        <div class="player-info">
                            <h3>${player.nome || 'Desconhecido'}</h3>
                            <p>NEX: <span class="destaque">${player.nex || 0}%</span> | DEF: <span class="destaque" style="color:var(--accent-blue);">${player.defesa || 10}</span></p>
                        </div>
                    </div>
                    <div class="status-bars">
                        <div class="status-row">
                            <div class="status-labels"><span style="color:var(--accent-red)">VIDA</span><span>${vAtual} / ${vMax}</span></div>
                            <div class="bar-container"><div class="bar-fill fill-vida" style="width: ${pctVida}%;"></div></div>
                        </div>
                        <div class="status-row">
                            <div class="status-labels"><span style="color:var(--accent-blue)">SANIDADE</span><span>${sAtual} / ${sMax}</span></div>
                            <div class="bar-container"><div class="bar-fill fill-sani" style="width: ${pctSani}%;"></div></div>
                        </div>
                        <div class="status-row">
                            <div class="status-labels"><span style="color:var(--accent-yellow)">PE</span><span>${pAtual} / ${pMax}</span></div>
                            <div class="bar-container"><div class="bar-fill fill-pe" style="width: ${pctPe}%;"></div></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ==========================================
        // SISTEMA DE INIMIGOS
        // ==========================================
        function criarInimigo() {
            const n = document.getElementById('enemy-name').value || 'Monstro';
            const hp = parseInt(document.getElementById('enemy-hp').value) || 50;
            const def = parseInt(document.getElementById('enemy-def').value) || 15;
            const el = document.getElementById('enemy-element').value;
            
            const forAttr = parseInt(document.getElementById('enemy-for').value) || 0;
            const agiAttr = parseInt(document.getElementById('enemy-agi').value) || 0;
            const vigAttr = parseInt(document.getElementById('enemy-vig').value) || 0;
            const lutaBonus = parseInt(document.getElementById('enemy-luta').value) || 0;
            
            listaInimigos.push({ 
                id: Date.now().toString(), 
                n: n, hpMax: hp, hpAtual: hp, def: def, el: el,
                for: forAttr, agi: agiAttr, vig: vigAttr, luta: lutaBonus
            });
            
            localStorage.setItem(inimigosCacheKey, JSON.stringify(listaInimigos));
            
            document.getElementById('modal-inimigo').style.display = 'none';
            document.getElementById('enemy-name').value = ''; 
            document.getElementById('enemy-for').value = '1';
            document.getElementById('enemy-agi').value = '1';
            document.getElementById('enemy-vig').value = '1';
            document.getElementById('enemy-luta').value = '0';
            renderInimigos();
        }

        function apagarInimigo(id) {
            if(confirm("Remover este inimigo da mesa?")) {
                listaInimigos = listaInimigos.filter(e => e.id !== id);
                localStorage.setItem(inimigosCacheKey, JSON.stringify(listaInimigos));
                renderInimigos();
            }
        }

        function mudarVidaInimigo(id, valor) {
            const ini = listaInimigos.find(e => e.id === id);
            if(ini) {
                let oldVida = ini.hpAtual;
                ini.hpAtual += valor;
                if(ini.hpAtual > ini.hpMax) ini.hpAtual = ini.hpMax; 
                if(ini.hpAtual < 0) ini.hpAtual = 0; 
                
                localStorage.setItem(inimigosCacheKey, JSON.stringify(listaInimigos));
                renderInimigos();

                const card = document.getElementById(`ini-${id}`);
                if(card) {
                    let animClass = ini.hpAtual < oldVida ? 'anim-vida-dano' : (ini.hpAtual > oldVida ? 'anim-vida-cura' : null);
                    if(animClass) {
                        card.classList.add(animClass);
                        setTimeout(() => { card.classList.remove(animClass); }, 600);
                    }
                }
            }
        }

        function renderInimigos() {
            const grid = document.getElementById('enemies-grid');
            if(listaInimigos.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-style: italic; margin-top: 50px;">Nenhum inimigo na mesa. Clique em "CRIAR NOVO INIMIGO".</div>`;
                return;
            }
            grid.innerHTML = '';

            listaInimigos.forEach(ini => {
                let colorHex = "#e53935"; // Sangue
                let imgUrl = "https://via.placeholder.com/75x75/202024/e53935?text=S";
                
                if(ini.el === "Morte") { colorHex = "#71717a"; imgUrl = "https://via.placeholder.com/75x75/202024/71717a?text=M"; }
                if(ini.el === "Conhecimento") { colorHex = "#ffcf33"; imgUrl = "https://via.placeholder.com/75x75/202024/ffcf33?text=C"; }
                if(ini.el === "Energia") { colorHex = "#b82bf2"; imgUrl = "https://via.placeholder.com/75x75/202024/b82bf2?text=E"; }
                if(ini.el === "Medo") { colorHex = "#ffffff"; imgUrl = "https://via.placeholder.com/75x75/202024/ffffff?text=X"; }

                const pctVida = Math.max(0, Math.min(100, (ini.hpAtual / Math.max(1, ini.hpMax)) * 100));
                
                // CÁLCULO EXATO DA LUTA (Atributo * 2) + Bónus Opcional
                let maxAttr = Math.max(ini.for || 0, ini.agi || 0);
                let totalValorLuta = (maxAttr * 2) + (ini.luta || 0);
                
                let tg = getAlvosD20(totalValorLuta);
                let strN = tg.n; 
                let strB = tg.b > 20 ? 'x' : tg.b; 
                let strE = tg.e > 20 ? 'x' : tg.e;
                
                const card = document.createElement('div');
                card.id = `ini-${ini.id}`;
                card.className = 'player-card';
                card.style.borderTopColor = colorHex;
                
                if(ini.hpAtual === 0) card.style.opacity = '0.5';

                card.innerHTML = `
                    <button class="btn-circle" style="position:absolute; top:10px; right:10px; color:var(--text-secondary); border-color:var(--text-secondary);" onclick="apagarInimigo('${ini.id}')">X</button>
                    
                    <div class="player-header" style="margin-bottom: 5px;">
                        <img src="${imgUrl}" class="player-img" style="border-color: ${colorHex};">
                        <div class="player-info">
                            <h3 style="color: ${colorHex};">${ini.n}</h3>
                            <p style="color: white; margin-bottom: 2px;">DEFESA: <span style="color: var(--accent-blue); font-size: 1.2em;">${ini.def}</span></p>
                            
                            <div style="display: flex; gap: 10px; font-size: 0.85em; font-weight: bold; color: var(--text-secondary);">
                                <span>FOR: <span style="color: white;">${ini.for || 0}</span></span>
                                <span>AGI: <span style="color: white;">${ini.agi || 0}</span></span>
                                <span>VIG: <span style="color: white;">${ini.vig || 0}</span></span>
                                <span>LUTA: <span style="color: var(--accent-red);">${totalValorLuta}</span></span>
                            </div>
                            
                            <div style="margin-top: 5px; display: flex; justify-content: center; gap: 10px; font-size: 0.7em; background: rgba(0,0,0,0.5); padding: 3px; border-radius: 4px; font-family: monospace;">
                                <span style="color: var(--accent-green);">N:${strN}</span>
                                <span style="color: var(--accent-blue);">B:${strB}</span>
                                <span style="color: var(--accent-yellow);">E:${strE}</span>
                            </div>

                        </div>
                    </div>
                    
                    <div class="status-bars">
                        <div class="status-row">
                            <div class="status-labels">
                                <span style="color:var(--accent-red)">VIDA</span>
                                <div style="display: flex; gap: 5px; align-items: center;">
                                    <button class="btn-circle" onclick="mudarVidaInimigo('${ini.id}', -5)">-5</button>
                                    <button class="btn-circle" onclick="mudarVidaInimigo('${ini.id}', -1)">-1</button>
                                    <span style="min-width: 50px; text-align: center;">${ini.hpAtual} / ${ini.hpMax}</span>
                                    <button class="btn-circle" onclick="mudarVidaInimigo('${ini.id}', 1)">+1</button>
                                </div>
                            </div>
                            <div class="bar-container" style="margin-top: 5px;"><div class="bar-fill fill-vida" style="width: ${pctVida}%;"></div></div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 8px; margin-top: 10px;">
                        <button class="btn-action-sm" style="border-color: var(--accent-blue); color: var(--accent-blue);" onclick="mestreRolaLuta('${ini.id}')">⚔️ ATQ LUTA</button>
                        <button class="btn-action-sm" style="border-color: var(--accent-red); color: var(--accent-red);" onclick="mestreRolaDano('${ini.n}')">💥 DANO</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ==========================================
        // ROLAGEM 1D20 PURO (SISTEMA CoC ADAPTADO)
        // ==========================================
        function mestreRolaLuta(id) {
            const ini = listaInimigos.find(e => e.id === id);
            if(!ini) return;

            // Define o valor total da perícia
            let maxAttr = Math.max(ini.for || 0, ini.agi || 0); 
            let totalValorLuta = (maxAttr * 2) + (ini.luta || 0);
            
            // Vai buscar as margens
            let tg = getAlvosD20(totalValorLuta);
            let strB = tg.b > 20 ? 'x' : tg.b; 
            let strE = tg.e > 20 ? 'x' : tg.e;
            
            // ROLA APENAS 1D20 PURO
            let roll = Math.floor(Math.random() * 20) + 1;
            
            // Decisão do Sucesso validando o 1D20 contra a Tabela
            let textFormat = "";
            let colorFormat = "color: white;";
            
            if (roll === 1) { 
                textFormat = "DESASTRE"; 
                colorFormat = "color:#ff5252; text-shadow:2px 2px 4px #000;"; 
            } 
            else if (roll === 20) { 
                textFormat = "CRÍTICO!"; 
                colorFormat = "color:#ffcf33; text-shadow:0 0 10px #ff0000, 2px 2px 4px #000;"; 
            } 
            else if (roll >= tg.e) { 
                textFormat = "EXTREMO"; 
                colorFormat = "color:var(--accent-yellow); text-shadow:2px 2px 4px #000;"; 
            } 
            else if (roll >= tg.b) { 
                textFormat = "BOM"; 
                colorFormat = "color:var(--accent-blue); text-shadow:2px 2px 4px #000;"; 
            } 
            else if (roll >= tg.n) { 
                textFormat = "NORMAL"; 
                colorFormat = "color:var(--accent-green); text-shadow:2px 2px 4px #000;"; 
            } 
            else { 
                textFormat = "FALHA"; 
                colorFormat = "color:var(--accent-red); text-shadow:2px 2px 4px #000;"; 
            }

            const logData = {
                jogador: "Mestre (" + ini.n + ")",
                acao: `⚔️ ATQ Luta <br><span style="font-size:0.7em; color:var(--text-secondary);">Alvos: N${tg.n} / B${strB} / E${strE}</span><br><span style="font-size:0.9em; margin-top:4px; display:inline-block; font-weight:bold;">${textFormat}</span>`,
                resultado: roll, 
                cor: colorFormat
            };
            
            if(socket) {
                socket.emit('rolagem_feita', { ...logData, codigo: 'Mestre' });
            } else {
                adicionarLog(logData);
            }
        }

        function mestreRolaDano(nomeInimigo) {
            const formula = prompt(`Qual a fórmula de Dano de ${nomeInimigo}? (Ex: 2d8+5 ou apenas 10)`);
            if(!formula) return;
            
            let total = 0;
            try {
                let f = formula.toLowerCase().replace(/\s/g, ''); 
                const matches = f.match(/([+-]?\d+d\d+|[+-]?\d+)/g); 
                if(matches) { 
                    matches.forEach(m => { 
                        let sign = m.startsWith('-') ? -1 : 1;
                        let cur = m.replace(/[+-]/,''); 
                        if(cur.includes('d')) { 
                            const parts = cur.split('d'); 
                            for(let i=0; i<(parseInt(parts[0])||1); i++) { 
                                total += (Math.floor(Math.random()*parseInt(parts[1]))+1)*sign; 
                            } 
                        } else {
                            total += parseInt(cur)*sign; 
                        }
                    }); 
                }
            } catch(e) { alert("Fórmula inválida."); return; }

            const logData = {
                jogador: "Mestre (" + nomeInimigo + ")",
                acao: "💥 Dano: " + formula,
                resultado: total,
                cor: "color: var(--accent-red); text-shadow:2px 2px 4px #000;"
            };
            
            if(socket) {
                socket.emit('rolagem_feita', { ...logData, codigo: 'Mestre' });
            } else {
                adicionarLog(logData);
            }
        }

        function adicionarLog(dados) {
            const list = document.getElementById('log-list');
            if (!logsIniciaisRemovidos) { list.innerHTML = ''; logsIniciaisRemovidos = true; }
            
            const item = document.createElement('div');
            let classeLog = 'log-item';
            
            if (dados.cor && dados.cor.includes('#ffcf33')) classeLog += ' crit';
            if (dados.cor && dados.cor.includes('#ff5252')) classeLog += ' fail';
            
            item.className = classeLog;
            item.innerHTML = `
                <div class="log-player">${dados.jogador || 'Jogador'}</div>
                <div class="log-action">${dados.acao || 'Rolagem'}</div>
                <div class="log-result" style="${dados.cor || 'color: white;'}">${dados.resultado}</div>
            `;
            
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 25) list.removeChild(list.lastChild);
        }

        function voltarLobby() {
            localStorage.removeItem('campanha_atual');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
