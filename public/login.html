<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Contos do Outro Lado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #121214; color: white; font-family: 'Poppins', sans-serif;
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjKTXXlROZKTCRy58cJfdjVCw3XLueRPdoC5_Sfq6uErKvriHoomeeOGrnHTJ6LjmplkFSXfV1W-pS4pW1tU2CkNFO8PtUKlCzfO9qsPbY48iDU2wA2d0TGcUG-MA0e634RTWoUBdOpTVhz50k3nvxkXTdVYj1dfthCmp2Dpvw0rfSui-h3SDd-VB8jA2rH/w1322-h744/Fundo.jpg');
            background-size: cover; background-position: center;
        }
        
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(18,18,20,0.6) 100%); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: -1;
        }

        .login-box {
            background: rgba(20, 20, 24, 0.6); padding: 40px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(184, 43, 242, 0.15);
            width: 100%; max-width: 400px; text-align: center; position: relative; z-index: 1;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-sizing: border-box;
        }

        h1 { color: #b82bf2; text-transform: uppercase; margin-top: 0; margin-bottom: 5px; font-size: 2em; font-weight: 800; text-shadow: 0 0 15px rgba(184, 43, 242, 0.5); }
        
        .btn-google {
            width: 100%; padding: 15px; margin-top: 30px; font-size: 1.1em; font-weight: 600;
            background: white; color: #444; border: none; border-radius: 12px;
            cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px;
            font-family: 'Poppins', sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn-google:hover { background: #f8f9fa; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,255,255,0.2); }
        .btn-google img { width: 24px; height: 24px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>RPG<br>Contos do Outro Lado</h1>
        <p style="color: #a8a8b3; font-size: 0.9em; margin-bottom: 10px;">Faça login com o Google para aceder às suas fichas, itens e mesas.</p>
        
        <button class="btn-google" id="btn-login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Logotipo Google">
            Entrar com o Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ==============================================================
        // ⚠️ SUBSTITUA O OBJETO ABAIXO PELO SEU DO FIREBASE CONSOLE ⚠️
        // ==============================================================
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    
                    // Converte o email "joao.123@gmail.com" no código limpo "JOAO123" para o sistema ler
                    let username = user.email.split('@')[0]; 
                    username = username.toUpperCase().replace(/[^A-Z0-9]/g, ''); 

                    // Guarda no navegador e manda para o Lobby
                    localStorage.setItem('usuario_logado', username);
                    window.location.href = '/index.html';
                }).catch((error) => {
                    console.error("Erro na autenticação:", error);
                    alert("Ocorreu um erro ao fazer login com o Google. Tente novamente.");
                });
        });
    </script>
</body>
</html>
