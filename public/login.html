<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ordem Paranormal</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background-color: #121214; color: white; font-family: 'Roboto', sans-serif;
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjKTXXlROZKTCRy58cJfdjVCw3XLueRPdoC5_Sfq6uErKvriHoomeeOGrnHTJ6LjmplkFSXfV1W-pS4pW1tU2CkNFO8PtUKlCzfO9qsPbY48iDU2wA2d0TGcUG-MA0e634RTWoUBdOpTVhz50k3nvxkXTdVYj1dfthCmp2Dpvw0rfSui-h3SDd-VB8jA2rH/w1322-h744/Fundo.jpg');
            background-size: cover; background-position: center;
        }

        /* Efeito de desfoque e escurecimento igual ao do Lobby */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: -1;
        }

        .login-box {
            background: rgba(20, 20, 24, 0.95); padding: 40px; border-radius: 12px;
            border: 2px solid #b82bf2; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            width: 100%; max-width: 350px; text-align: center; backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-out;
            position: relative; z-index: 1; /* Para ficar acima do fundo desfocado */
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        h2 { color: #b82bf2; text-transform: uppercase; margin-top: 0; text-shadow: 0 0 10px rgba(184, 43, 242, 0.5);}
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.8em; color: #a8a8b3; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;}
        .input-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; font-size: 1.1em;}
        .input-group input:focus { border-color: #b82bf2; outline: none; }
        
        .btn { width: 100%; padding: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: 0.2s; text-transform: uppercase; }
        .btn-login { background: #b82bf2; color: white; box-shadow: 0 0 15px rgba(184, 43, 242, 0.3); }
        .btn-login:hover { filter: brightness(1.2); box-shadow: 0 0 25px rgba(184, 43, 242, 0.6); }
        
        .btn-register { background: transparent; border: 1px solid #00e676; color: #00e676; margin-top: 15px; }
        .btn-register:hover { background: rgba(0, 230, 118, 0.1); }
        
        #msg-erro { font-size: 0.9em; font-weight: bold; margin-top: 10px; min-height: 20px; transition: 0.3s;}
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Acesso ao Sistema</h2>
        
        <div class="input-group">
            <label>Utilizador (Seu Nickname)</label>
            <input type="text" id="user" placeholder="Ex: JOAO" style="text-transform: uppercase;">
        </div>
        
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <div id="msg-erro"></div>

        <button class="btn btn-login" id="btn-entrar" onclick="fazerLogin()">Entrar no Lobby</button>
        <button class="btn btn-register" onclick="registar()">Criar Nova Conta</button>
    </div>

    <script>
        // Se já estiver logado, não precisa de ver a tela de login de novo
        if (localStorage.getItem('usuario_logado')) {
            window.location.href = '/index.html';
        }

        async function registar() {
            const u = document.getElementById('user').value.toUpperCase().trim();
            const p = document.getElementById('pass').value.trim();
            const msg = document.getElementById('msg-erro');
            
            if(!u || !p) {
                msg.style.color = '#e53935';
                msg.innerText = "Preencha todos os campos!";
                return;
            }

            const res = await fetch('/api/registar', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: u, senha: p })
            });
            const data = await res.json();

            if(data.sucesso) {
                msg.style.color = '#00e676';
                msg.innerText = "Conta criada com sucesso! Pode entrar.";
            } else {
                msg.style.color = '#e53935';
                msg.innerText = data.erro;
            }
        }

        async function fazerLogin() {
            const u = document.getElementById('user').value.toUpperCase().trim();
            const p = document.getElementById('pass').value.trim();
            const msg = document.getElementById('msg-erro');
            const btn = document.getElementById('btn-entrar');

            if(!u || !p) {
                msg.style.color = '#e53935';
                msg.innerText = "Preencha todos os campos!";
                return;
            }

            btn.innerText = "A autenticar...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: u, senha: p })
                });
                const data = await res.json();

                if(data.sucesso) {
                    // Guarda o utilizador no navegador
                    localStorage.setItem('usuario_logado', u);
                    
                    // Vai direto para o Lobby (index.html)
                    window.location.href = '/index.html';
                } else {
                    msg.style.color = '#e53935';
                    msg.innerText = data.erro;
                    btn.innerText = "Entrar no Lobby";
                    btn.disabled = false;
                }
            } catch(e) {
                msg.style.color = '#e53935';
                msg.innerText = "Erro ao contactar o servidor.";
                btn.innerText = "Entrar no Lobby";
                btn.disabled = false;
            }
        }

        // Permitir dar "Enter" no teclado para fazer login
        document.getElementById("pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                fazerLogin();
            }
        });
    </script>
</body>
</html>
