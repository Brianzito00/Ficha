<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ordem Paranormal</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background-color: #121214; color: white; font-family: 'Roboto', sans-serif;
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; background-position: center;
        }
        .login-box {
            background: rgba(20, 20, 24, 0.95); padding: 40px; border-radius: 12px;
            border: 2px solid #00b0ff; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 100%; max-width: 350px; text-align: center; backdrop-filter: blur(10px);
        }
        h2 { color: #00b0ff; text-transform: uppercase; margin-top: 0; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.8em; color: #a8a8b3; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;}
        .input-group input { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; font-size: 1.1em;}
        .btn { width: 100%; padding: 12px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: 0.2s; text-transform: uppercase; }
        .btn-login { background: #00b0ff; color: black; }
        .btn-login:hover { filter: brightness(1.2); }
        .btn-register { background: transparent; border: 1px solid #00e676; color: #00e676; margin-top: 15px; }
        .btn-register:hover { background: rgba(0, 230, 118, 0.1); }
        #msg-erro { color: #e53935; font-size: 0.9em; font-weight: bold; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Acesso ao Sistema</h2>
        
        <div class="input-group">
            <label>Utilizador (Será o seu Código de Jogador)</label>
            <input type="text" id="user" placeholder="Ex: JOAO" style="text-transform: uppercase;">
        </div>
        
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>

        <div id="msg-erro"></div>

        <button class="btn btn-login" onclick="fazerLogin()">Entrar na Ficha</button>
        <button class="btn btn-register" onclick="registar()">Criar Nova Conta</button>
    </div>

    <script>
        // O utilizador será SEMPRE MAIÚSCULO, pois ele serve como o código de sincronização com o Mestre!
        async function registar() {
            const u = document.getElementById('user').value.toUpperCase().trim();
            const p = document.getElementById('pass').value.trim();
            if(!u || !p) return document.getElementById('msg-erro').innerText = "Preencha tudo!";

            const res = await fetch('/api/registar', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: u, senha: p })
            });
            const data = await res.json();

            if(data.sucesso) {
                document.getElementById('msg-erro').style.color = '#00e676';
                document.getElementById('msg-erro').innerText = "Conta criada com sucesso! Pode entrar.";
            } else {
                document.getElementById('msg-erro').style.color = '#e53935';
                document.getElementById('msg-erro').innerText = data.erro;
            }
        }

        async function fazerLogin() {
            const u = document.getElementById('user').value.toUpperCase().trim();
            const p = document.getElementById('pass').value.trim();
            if(!u || !p) return document.getElementById('msg-erro').innerText = "Preencha tudo!";

            const res = await fetch('/api/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: u, senha: p })
            });
            const data = await res.json();

            if(data.sucesso) {
                // Guarda o nome de utilizador para a ficha saber quem é
                localStorage.setItem('usuario_logado', u);
                
                // Se o servidor devolveu a ficha salva na base de dados, guardamos localmente para a ficha carregar
                if(data.ficha) {
                    localStorage.setItem('ordem_save_local', JSON.stringify(data.ficha));
                }
                
                window.location.href = '/ficha.html';
            } else {
                document.getElementById('msg-erro').style.color = '#e53935';
                document.getElementById('msg-erro').innerText = data.erro;
            }
        }
    </script>
</body>
</html>
