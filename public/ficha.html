<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha do Jogador - Ordem Paranormal</title>
    <style>
        :root {
            --bg-body: #121214; --bg-card: rgba(32, 32, 36, 0.85);
            --border-color: rgba(50, 50, 56, 0.8); --text-primary: #e1e1e6; --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; --accent-green: #00e676; --accent-red: #e53935;
        }

        body {
            font-family: 'Roboto', sans-serif; background-color: var(--bg-body);
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; background-attachment: fixed; color: var(--text-primary);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        .ficha-container {
            width: 100%; max-width: 900px; background: var(--bg-card); border: 2px solid var(--border-color);
            border-radius: 12px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px; margin-bottom: 20px;
        }

        .player-code-display { font-size: 1.5em; font-weight: 900; color: var(--accent-blue); text-transform: uppercase; }
        
        .btn-action { background: var(--accent-green); color: black; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-action:hover { filter: brightness(1.2); }
        .btn-logout { background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red); }
        .btn-logout:hover { background: rgba(229, 57, 53, 0.1); }

        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8em; font-weight: bold; color: var(--accent-yellow); text-transform: uppercase; }
        .form-input { padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; border-radius: 6px; font-size: 1em; }

        /* Barras de Status */
        .status-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px;}
        .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .status-row h3 { margin: 0; width: 100px; font-size: 1.1em; }
        .bar-container { flex: 1; background: #000; height: 30px; border-radius: 6px; position: relative; overflow: hidden; border: 1px solid #555; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; line-height: 30px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        .btn-status { width: 35px; height: 35px; background: #333; color: white; border: 1px solid #555; border-radius: 6px; cursor: pointer; font-size: 1.2em; font-weight: bold; }

        /* Atributos */
        .attr-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 25px; }
        .attr-box { flex: 1; background: rgba(0,0,0,0.5); border: 2px solid #444; border-radius: 12px; padding: 10px; text-align: center; }
        .attr-lbl { display: block; font-size: 0.9em; font-weight: bold; color: var(--text-secondary); margin-bottom: 5px; }
        .attr-input { width: 100%; text-align: center; background: transparent; border: none; color: white; font-size: 2em; font-weight: 900; outline: none; }

        /* Perícias e Botões */
        .skills-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-roll { background: rgba(32, 32, 36, 0.9); border: 1px solid var(--accent-blue); color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1em; text-transform: uppercase;}
        .btn-roll:hover { background: var(--accent-blue); color: black; }
        
        .skill-group { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 6px; border: 1px solid #333;}
        .skill-group label { flex: 1; font-size: 0.85em; cursor: pointer; }
        .skill-bonus { width: 40px; text-align: center; padding: 5px; background: #111; border: 1px solid #444; color: white; border-radius: 4px; }

        /* POPUP DE DADOS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); }
        .popup-box-dice { position: relative; width: 90%; max-width: 600px; height: 400px; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #000; border: 4px solid var(--accent-yellow); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .popup-box-dice::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 1; }
        .popup-content { position: relative; z-index: 10; display: none; animation: fadeInResult 0.5s forwards; text-align: center; }
        .popup-number { font-size: 10em; font-weight: 900; color: white; text-shadow: 4px 4px 0 #000; }
        .popup-res { font-size: 2.5em; font-weight: 900; margin-top: 10px; text-transform: uppercase; text-shadow: 2px 2px 4px #000; }
        @keyframes fadeInResult { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        #save-status { font-size: 0.8em; color: var(--text-secondary); font-style: italic; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="ficha-container">
        
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="player-code-display" id="display-player-code">CARREGANDO...</div>
                <span id="save-status">A aguardar alterações...</span>
            </div>
            <div id="main-top-buttons" style="display: flex; gap: 10px;">
                <button class="btn-action" id="btn-salvar" onclick="save()">💾 Salvar</button>
                <button class="btn-action btn-logout" id="btn-logout" onclick="fazerLogout()">Sair (Logout)</button>
            </div>
        </div>

        <div class="grid-info">
            <div class="form-group"><label>Nome do Personagem</label><input type="text" id="char_nome" class="form-input" placeholder="Ex: Arthur Cervero"></div>
            <div class="form-group"><label>Ocupação / Classe</label><input type="text" id="char_ocupacao" class="form-input" placeholder="Ex: Combatente"></div>
            <div class="form-group"><label>Nível de Exposição (NEX %)</label><input type="number" id="char_nex" class="form-input" placeholder="5"></div>
            <div class="form-group"><label>Defesa</label><input type="number" id="defense_val" class="form-input" placeholder="10"></div>
        </div>

        <div class="status-box">
            <div class="status-row">
                <h3 style="color: var(--accent-red);">VIDA</h3>
                <button class="btn-status" onclick="alterarStatus('vida', -1)">-</button>
                <div class="bar-container">
                    <div class="bar-fill fill-vida" id="bar-vida" style="width: 100%;"></div>
                    <div class="bar-text">
                        <input type="number" id="vida_atual" value="10" style="width: 40px; background: transparent; border: none; color: white; font-weight: bold; text-align: right;" onchange="atualizarBarras()"> / 
                        <input type="number" id="vida_max" value="10" style="width: 40px; background: transparent; border: none; color: white; font-weight: bold;" onchange="atualizarBarras()">
                    </div>
                </div>
                <button class="btn-status" onclick="alterarStatus('vida', 1)">+</button>
            </div>
            
            <div class="status-row">
                <h3 style="color: var(--accent-blue);">SANIDADE</h3>
                <button class="btn-status" onclick="alterarStatus('sani', -1)">-</button>
                <div class="bar-container">
                    <div class="bar-fill fill-sani" id="bar-sani" style="width: 100%;"></div>
                    <div class="bar-text">
                        <input type="number" id="sani_atual" value="10" style="width: 40px; background: transparent; border: none; color: white; font-weight: bold; text-align: right;" onchange="atualizarBarras()"> / 
                        <input type="number" id="sani_max" value="10" style="width: 40px; background: transparent; border: none; color: white; font-weight: bold;" onchange="atualizarBarras()">
                    </div>
                </div>
                <button class="btn-status" onclick="alterarStatus('sani', 1)">+</button>
            </div>
        </div>

        <h3 style="color: var(--accent-yellow); margin-top: 0;">ATRIBUTOS</h3>
        <div class="attr-container">
            <div class="attr-box"><span class="attr-lbl">AGI</span><input type="number" id="attr_agi" class="attr-input" value="1"></div>
            <div class="attr-box"><span class="attr-lbl">FOR</span><input type="number" id="attr_for" class="attr-input" value="1"></div>
            <div class="attr-box"><span class="attr-lbl">INT</span><input type="number" id="attr_int" class="attr-input" value="1"></div>
            <div class="attr-box"><span class="attr-lbl">PRE</span><input type="number" id="attr_pre" class="attr-input" value="1"></div>
            <div class="attr-box"><span class="attr-lbl">VIG</span><input type="number" id="attr_vig" class="attr-input" value="1"></div>
        </div>

        <h3 style="color: var(--accent-yellow); margin-top: 0;">PERÍCIAS PRINCIPAIS</h3>
        <div class="skills-grid">
            <button class="btn-roll" onclick="rolarPericia('Iniciativa', 'attr_agi', 'chk_iniciativa', 'skill_iniciativa', 0.50)">⚔️ Iniciativa</button>
            <button class="btn-roll" onclick="rolarPericia('Percepção', 'attr_pre', 'chk_percepcao', 'skill_percepcao', 0.50)">👁️ Percepção</button>
            <button class="btn-roll" onclick="rolarPericia('Reflexos', 'attr_agi', 'chk_reflexos', 'skill_reflexos', 0.35)">🏃 Reflexos</button>
            <button class="btn-roll" onclick="rolarPericia('Vontade', 'attr_pre', 'chk_vontade', 'skill_vontade', 0.50)">🧠 Vontade</button>
            <button class="btn-roll" onclick="rolarPericia('Luta', 'attr_for', 'chk_luta', 'skill_luta', 0.25)" style="border-color: var(--accent-red); color: var(--accent-red);">🗡️ Luta</button>
            <button class="btn-roll" onclick="rolarPericia('Pontaria', 'attr_agi', 'chk_pontaria', 'skill_pontaria', 0.45)" style="border-color: var(--accent-red); color: var(--accent-red);">🔫 Pontaria</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div class="skill-group"><label><input type="checkbox" id="chk_iniciativa"> Iniciativa (Trein.)</label><input type="number" id="skill_iniciativa" class="skill-bonus" value="0"></div>
            <div class="skill-group"><label><input type="checkbox" id="chk_percepcao"> Percepção (Trein.)</label><input type="number" id="skill_percepcao" class="skill-bonus" value="0"></div>
            <div class="skill-group"><label><input type="checkbox" id="chk_reflexos"> Reflexos (Trein.)</label><input type="number" id="skill_reflexos" class="skill-bonus" value="0"></div>
            <div class="skill-group"><label><input type="checkbox" id="chk_vontade"> Vontade (Trein.)</label><input type="number" id="skill_vontade" class="skill-bonus" value="0"></div>
            <div class="skill-group"><label><input type="checkbox" id="chk_luta"> Luta (Trein.)</label><input type="number" id="skill_luta" class="skill-bonus" value="0"></div>
            <div class="skill-group"><label><input type="checkbox" id="chk_pontaria"> Pontaria (Trein.)</label><input type="number" id="skill_pontaria" class="skill-bonus" value="0"></div>
        </div>

    </div>

    <div id="popup-dice" class="modal-overlay" onclick="closeDice()">
        <div class="popup-box-dice" onclick="event.stopPropagation()">
            <div id="popup-content" class="popup-content">
                <div id="popup-num" class="popup-number">00</div>
                <div id="popup-res" class="popup-res">RESULTADO</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO INICIAL E LOGIN
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const viewCode = urlParams.get('view'); // Se tiver "?view=NOME" no link, é o Mestre a espreitar
        let playerCode = localStorage.getItem('usuario_logado');

        // Se não for o Mestre a ver, e o jogador não fez login, expulsa para o Login!
        if (!viewCode && !playerCode) {
            window.location.href = '/login.html';
        }

        // Define o código visualizado no topo
        document.getElementById('display-player-code').innerText = viewCode ? "VISÃO DO MESTRE: " + viewCode : "JOGADOR: " + playerCode;

        // Esconde o botão de Logout se for o Mestre
        if (viewCode) {
            document.getElementById('btn-logout').style.display = 'none';
            document.getElementById('btn-salvar').style.display = 'none'; // Opcional: Mestre não precisa de botão salvar
        }

        let socket = null; 
        if (typeof io !== 'undefined') {
            socket = io();
            
            // Ouvir atualizações forçadas do Mestre (ex: Mestre clica no "-" da vida no Escudo)
            socket.on('comando_mestre', (dados) => {
                const targetCode = viewCode || playerCode;
                if (dados.codigo === targetCode) {
                    if (dados.tipo === 'vida') alterarStatus('vida', dados.delta);
                    if (dados.tipo === 'sani') alterarStatus('sani', dados.delta);
                }
            });

            // Mestre forçou uma sincronização total
            socket.on('mestre_force_sync_player', (dados) => {
                if (!viewCode && dados.codigo === playerCode) {
                    localStorage.setItem('ordem_save_local', JSON.stringify(dados.fullData));
                    carregarFicha();
                }
            });
        }

        // ==========================================
        // 2. MATEMÁTICA E ROLAGENS
        // ==========================================
        const tabelaD20 = {1:{n:20,b:99,e:99},2:{n:19,b:20,e:99},3:{n:18,b:20,e:99},4:{n:17,b:19,e:99},5:{n:16,b:19,e:20},6:{n:15,b:18,e:20},7:{n:14,b:18,e:20},8:{n:13,b:17,e:20},9:{n:12,b:17,e:20},10:{n:11,b:16,e:19},11:{n:10,b:16,e:19},12:{n:9,b:15,e:19},13:{n:8,b:15,e:19},14:{n:7,b:14,e:19},15:{n:6,b:14,e:18},16:{n:5,b:13,e:18},17:{n:4,b:13,e:18},18:{n:3,b:12,e:18},19:{n:2,b:12,e:18},20:{n:1,b:11,e:18}};

        function rolarPericia(nomePericia, attrId, checkboxId, bonusId, multiplicador) {
            const attrVal = parseInt(document.getElementById(attrId).value) || 1;
            const treinado = document.getElementById(checkboxId).checked;
            const bonusExtra = parseInt(document.getElementById(bonusId).value) || 0;

            let f = Math.floor(bonusExtra + (attrVal * multiplicador) + (treinado ? 10 : 0));
            let d = Math.floor(Math.random() * 20) + 1;
            
            let fLimit = f > 20 ? 20 : (f < 1 ? 1 : f);
            let m = tabelaD20[fLimit];

            let resultadoStr = "FALHA";
            let cor = "color:var(--accent-red)";

            if (d === 20) {
                resultadoStr = "CRÍTICO";
                cor = "color:var(--accent-red); text-shadow: 0 0 5px var(--accent-red);";
            } else if (d >= m.e && m.e != 99) {
                resultadoStr = "EXTREMO";
                cor = "color:var(--accent-yellow)";
            } else if (d >= m.b && m.b != 99) {
                resultadoStr = "BOM";
                cor = "color:var(--accent-blue)";
            } else if (d >= m.n) {
                resultadoStr = "NORMAL";
                cor = "color:var(--accent-green)";
            }

            if (d === 1) { resultadoStr = "DESASTRE"; cor = "color:#ff5252; font-weight:bold;"; }

            showPopup(d, `${nomePericia} (${resultadoStr})`, cor);
        }

        // ==========================================
        // 3. ANIMAÇÃO DO DADO E POPUP
        // ==========================================
        function closeDice() { document.getElementById('popup-dice').style.display='none'; }
        
        function showPopup(n, r="TOTAL", st="color:white") {
            const box = document.querySelector('.popup-box-dice'); 
            // O truque da animação: ?t=tempo força o GIF a recomeçar do zero a cada rolagem!
            box.style.backgroundImage = `url('https://blogger.googleusercontent.com/img/a/AVvXsEjMOEuhQsyp9K02VzG4U6kXeEMQYu6efHg98n3yde59MTJ8bNLTvSq5WfWAyGfur8ACjUsjNWQfOp8k0-odkhXt1UpVqf4OqJQ_azqElAh044YPkLWQ0LekZZSwp4u8RNa9Aht1bKFLKkUxFfIz9NyAdJnf2Mo9dHgZ-pRlIf6iMbaPmh5o4hLd3eyYEDc9?t=${new Date().getTime()}')`;
            
            let numEl = document.getElementById('popup-num'); 
            numEl.innerHTML = n; 
            numEl.style.fontSize = 'clamp(4em, 20vw, 10em)';
            
            let resEl = document.getElementById('popup-res'); 
            resEl.innerHTML = r; resEl.style = st;
            
            document.getElementById('popup-content').style.display = 'none'; 
            document.getElementById('popup-dice').style.display = 'flex';
            setTimeout(() => document.getElementById('popup-content').style.display = 'block', 1500);

            // Envia para o Mestre
            if (socket) {
                const pName = document.getElementById('char_nome').value || playerCode;
                socket.emit('rolagem_feita', {
                    codigo: viewCode || playerCode, 
                    jogador: pName,
                    acao: r,
                    resultado: n,
                    cor: st
                });
            }
        }

        // ==========================================
        // 4. BARRAS DE VIDA E SANIDADE
        // ==========================================
        function atualizarBarras() {
            let vA = parseInt(document.getElementById('vida_atual').value) || 0;
            let vM = parseInt(document.getElementById('vida_max').value) || 1;
            let sA = parseInt(document.getElementById('sani_atual').value) || 0;
            let sM = parseInt(document.getElementById('sani_max').value) || 1;
            
            if (vA > vM) { vA = vM; document.getElementById('vida_atual').value = vA; }
            if (vA < 0) { vA = 0; document.getElementById('vida_atual').value = vA; }
            if (sA > sM) { sA = sM; document.getElementById('sani_atual').value = sA; }
            if (sA < 0) { sA = 0; document.getElementById('sani_atual').value = sA; }

            document.getElementById('bar-vida').style.width = `${(vA / vM) * 100}%`;
            document.getElementById('bar-sani').style.width = `${(sA / sM) * 100}%`;
            
            ativarAutoSave(); // Salva sempre que a barra atualiza
        }

        function alterarStatus(tipo, delta) {
            const input = document.getElementById(`${tipo}_atual`);
            let val = parseInt(input.value) || 0;
            input.value = val + delta;
            atualizarBarras();
        }

        // ==========================================
        // 5. CARREGAR E GUARDAR A FICHA (FIREBASE + LOCAL)
        // ==========================================
        let isLoadingData = false;
        let charStatus = { lesionado: false, inconsciente: false, morrendo: false, enlouquecendo: false };

        function carregarFicha() {
            isLoadingData = true;
            const saved = localStorage.getItem('ordem_save_local');
            if (saved) {
                try {
                    const d = JSON.parse(saved);
                    // Informações
                    if(d.info) {
                        for(let key in d.info) {
                            if(document.getElementById(key)) document.getElementById(key).value = d.info[key];
                        }
                    }
                    if(d.defense) document.getElementById('defense_val').value = d.defense;
                    
                    // Atributos e Perícias
                    if(d.attrs) { for(let key in d.attrs) { if(document.getElementById(key)) document.getElementById(key).value = d.attrs[key]; } }
                    if(d.skills) {
                        for(let key in d.skills) {
                            let el = document.getElementById(key);
                            if(el) {
                                if(el.type === 'checkbox') el.checked = d.skills[key];
                                else el.value = d.skills[key];
                            }
                        }
                    }
                    if(d.charStatus) charStatus = d.charStatus;
                    atualizarBarras();
                } catch(e) { console.error("Erro ao ler ficha salva", e); }
            }
            isLoadingData = false;
        }

        function save() {
            if(isLoadingData) return; 

            const d = { attrs:{}, skills:{}, info:{}, defense: document.getElementById('defense_val').value, charStatus: charStatus };
            
            ["char_nome", "char_ocupacao", "char_nex", "vida_atual", "vida_max", "sani_atual", "sani_max"].forEach(id => { 
                if(document.getElementById(id)) d.info[id] = document.getElementById(id).value; 
            });

            document.querySelectorAll('.attr-input').forEach(i => d.attrs[i.id] = i.value);
            document.querySelectorAll('[id^="skill_"]').forEach(i => d.skills[i.id] = i.value);
            document.querySelectorAll('[id^="chk_"]').forEach(i => d.skills[i.id] = i.checked);

            // Mestre a espiar não salva por cima da DB! Apenas atualiza a tela dele.
            if (viewCode) return; 

            // Guarda Localmente e na Nuvem
            localStorage.setItem('ordem_save_local', JSON.stringify(d));
            
            fetch('/api/guardar_ficha', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario: playerCode, fichaData: d })
            });

            // Envia para o Mestre (Atualiza Escudo em Tempo Real)
            if (socket) {
                socket.emit('status_change', {
                    codigo: playerCode,
                    nome: d.info.char_nome || playerCode,
                    nex: d.info.char_nex || 0,
                    defesa: d.defense || 10,
                    vida_atual: d.info.vida_atual || 0, vida_max: d.info.vida_max || 0,
                    sani_atual: d.info.sani_atual || 0, sani_max: d.info.sani_max || 0,
                    status: charStatus,
                    fullData: d
                });
            }
        }

        function fazerLogout() {
            localStorage.removeItem('usuario_logado');
            localStorage.removeItem('ordem_save_local');
            window.location.href = '/login.html';
        }

        // ==========================================
        // 6. AUTO-SAVE MÁGICO (DEBOUNCE 3 SEGUNDOS)
        // ==========================================
        let timerAutoSave;

        function ativarAutoSave() {
            if (viewCode) return; // Mestre não faz auto-save
            
            const statusTxt = document.getElementById('save-status');
            statusTxt.innerText = "A guardar...";
            statusTxt.style.color = "var(--accent-yellow)";

            clearTimeout(timerAutoSave);
            
            timerAutoSave = setTimeout(() => {
                save(); 
                statusTxt.innerText = "Guardado ✔️";
                statusTxt.style.color = "var(--accent-green)";
                setTimeout(() => { statusTxt.innerText = "A aguardar alterações..."; statusTxt.style.color = "var(--text-secondary)"; }, 2000);
            }, 3000);
        }

        document.addEventListener('input', ativarAutoSave);
        document.addEventListener('change', ativarAutoSave);
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.closest('button')) ativarAutoSave();
        });

        // Inicializa ao abrir a página
        carregarFicha();
        atualizarBarras();

    </script>
</body>
</html>
