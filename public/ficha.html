<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ficha de Jogador - Ordem Paranormal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@400;900&display=swap');
        
        :root {
            --bg-body: #121214; --bg-card: rgba(32, 32, 36, 0.9); --bg-input: rgba(18, 18, 20, 0.8);
            --border-color: rgba(50, 50, 56, 0.8); --text-primary: #e1e1e6; --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; --accent-green: #00e676; --accent-red: #e53935;
            --accent-purple: #b82bf2; --shadow-card: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        
        body {
            font-family: 'Roboto', sans-serif; background-color: var(--bg-body);
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-primary); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box;
        }

        /* Layout */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; max-width: 1300px; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;}
        .tabs-nav { display: flex; gap: 10px; }
        .tab-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-secondary); padding: 12px 25px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: bold; transition: 0.3s; backdrop-filter: blur(8px); }
        .tab-btn.active { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }
        
        .main-container { width: 100%; max-width: 1300px; display: none; }
        .main-container.active { display: block; }
        .columns-wrapper { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; box-shadow: var(--shadow-card); margin-bottom: 20px; backdrop-filter: blur(8px); flex: 1; min-width: 300px; }
        .panel-title { font-size: 1.1em; text-transform: uppercase; color: var(--text-secondary); text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-weight: 900; }

        /* Atributos e Perícias */
        .attr-box { background: var(--bg-input); padding: 10px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 10px; text-align: center; }
        .attr-input { width: 60px; background: transparent; border: none; border-bottom: 2px solid var(--accent-yellow); color: white; text-align: center; font-size: 1.8em; font-weight: 900; outline: none; }
        
        .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .skill-card { background: rgba(18, 18, 20, 0.6); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; text-align: center; transition: 0.2s; cursor: pointer; position: relative; }
        .skill-card:hover { border-color: var(--accent-blue); }
        .skill-card.trained { border: 1px solid var(--accent-yellow); background: rgba(255, 207, 51, 0.1); }
        .skill-bonus-tag { font-size: 0.8em; color: var(--accent-green); font-weight: bold; display: block; margin-top: 5px; }

        /* Status Bars */
        .status-box { background: var(--bg-input); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .status-bar-container { height: 25px; background: #000; border-radius: 5px; overflow: hidden; position: relative; border: 1px solid #333; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .fill-vida { background: linear-gradient(90deg, #b71c1c, #f44336); }
        .fill-sani { background: linear-gradient(90deg, #0d47a1, #2196f3); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 2px; font-weight: 900; text-shadow: 1px 1px 2px #000; }

        /* Inventário */
        .inv-input { background: var(--bg-input); border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .weight-bar-bg { width: 100%; height: 10px; background: #000; border-radius: 5px; margin-top: 5px; }
        .weight-bar-fill { height: 100%; background: var(--accent-blue); width: 0%; border-radius: 5px; transition: 0.5s; }
        .weight-bar-fill.overweight { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }

        /* Popups */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .popup-box { background: #1c1c1f; border: 2px solid var(--border-color); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; }
        .popup-box-dice { width: 500px; height: 350px; background: #000; border: 4px solid var(--accent-yellow); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .popup-number { font-family: 'Permanent Marker', cursive; font-size: 8em; color: white; z-index: 2; }

        .btn-roll { background: var(--accent-blue); color: #000; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .btn-roll:hover { filter: brightness(1.2); }

        @keyframes shake { 0% { transform: translate(0,0); } 25% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, 5px); } 100% { transform: translate(0,0); } }
        .crit-anim { animation: shake 0.1s infinite; border-color: var(--accent-red) !important; box-shadow: 0 0 30px var(--accent-red); }

        @media (max-width: 768px) { .columns-wrapper { flex-direction: column; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="openTab('tab-personagem', this)">Personagem</button>
        <button class="tab-btn" onclick="openTab('tab-inventario', this)">Inventário</button>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="tab-btn" style="background: var(--accent-red); color: white;" onclick="exportFicha()">Exportar .JSON</button>
        <label class="tab-btn" style="background: var(--accent-green); color: black; cursor: pointer;">
            Importar <input type="file" style="display:none" onchange="importFicha(event)">
        </label>
    </div>
</div>

<div id="tab-personagem" class="main-container active">
    <div class="columns-wrapper">
        <div class="panel" style="max-width: 200px;">
            <div class="panel-title">Atributos</div>
            <div id="atributos-container">
                </div>
        </div>

        <div class="panel" style="flex: 2;">
            <div class="panel-title">Perícias</div>
            <div class="skill-grid" id="pericias-container">
                </div>
        </div>

        <div class="panel">
            <div class="panel-title">Status</div>
            <div class="status-box">
                <label style="color:var(--accent-red); font-weight:900;">VIDA</label>
                <div style="display:flex; gap:10px; margin: 5px 0;">
                    <input type="number" id="vida_atual" class="inv-input" value="20" oninput="updateStatusBars()">
                    <input type="number" id="vida_max" class="inv-input" value="20" oninput="updateStatusBars()">
                </div>
                <div class="status-bar-container">
                    <div id="bar_vida" class="bar-fill fill-vida" style="width: 100%;"></div>
                    <div class="bar-text"><span id="txt_vida">20/20</span></div>
                </div>
            </div>

            <div class="status-box">
                <label style="color:var(--accent-blue); font-weight:900;">SANIDADE</label>
                <div style="display:flex; gap:10px; margin: 5px 0;">
                    <input type="number" id="sani_atual" class="inv-input" value="20" oninput="updateStatusBars()">
                    <input type="number" id="sani_max" class="inv-input" value="20" oninput="updateStatusBars()">
                </div>
                <div class="status-bar-container">
                    <div id="bar_sani" class="bar-fill fill-sani" style="width: 100%;"></div>
                    <div class="bar-text"><span id="txt_sani">20/20</span></div>
                </div>
            </div>

            <div class="panel-title" style="margin-top:20px;">Ações Rápidas</div>
            <button class="btn-roll" onclick="abrirPopupDados()">🎲 Rolar Dado Customizado</button>
            
            <div style="background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; margin-top: 15px;">
                <label style="font-size: 0.8em; color: var(--accent-yellow);">ARMA ATIVA</label>
                <select id="active-weapon-select" class="inv-input" onchange="updateAcoesArma()">
                    <option value="desarmado">Ataque Desarmado</option>
                </select>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="btn-roll" style="margin:0;" onclick="rolarAtaque()">ATQ</button>
                    <button class="btn-roll" style="margin:0; background: var(--accent-red); color: white;" onclick="rolarDano()">DANO</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="tab-inventario" class="main-container">
    <div class="panel">
        <div class="panel-title">Mochila</div>
        <div style="margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px;">
            <div style="display:flex; justify-content: space-between; font-weight: bold;">
                <span>CARGA</span>
                <span id="weight-text">0 / 5</span>
            </div>
            <div class="weight-bar-bg"><div id="weight-bar-fill" class="weight-bar-fill"></div></div>
        </div>
        <button class="btn-roll" style="background: var(--accent-green); color: black;" onclick="openItemPopup()">+ Adicionar Item</button>
        <div id="inventory-list" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;">
            </div>
    </div>
</div>

<div id="popup-dice" class="popup-overlay" onclick="this.style.display='none'">
    <div class="popup-box-dice" id="dice-box">
        <div id="dice-label" style="position: absolute; top: 20px; color: var(--accent-yellow); font-weight: bold; text-transform: uppercase;">Teste de Luta</div>
        <div class="popup-number" id="dice-result">20</div>
        <div id="dice-formula" style="color: var(--text-secondary); margin-top: 10px;">1d20 + 5</div>
    </div>
</div>

<div id="popup-item" class="popup-overlay">
    <div class="popup-box">
        <h3 style="color:var(--accent-green)">Novo Item / Arma</h3>
        <label>Nome</label>
        <input type="text" id="new-item-name" class="inv-input" placeholder="Ex: Machado">
        <label>Espaços</label>
        <input type="number" id="new-item-weight" class="inv-input" value="1">
        <label>É uma arma?</label>
        <select id="new-item-is-weapon" class="inv-input" onchange="toggleWeaponFields(this.value)">
            <option value="não">Não</option>
            <option value="sim">Sim</option>
        </select>
        <div id="weapon-fields" style="display:none; margin-top:10px; border-top: 1px solid #444; padding-top:10px;">
            <label>Dano (Ex: 1d8+2)</label>
            <input type="text" id="new-item-dmg" class="inv-input">
            <label>Crítico (Ex: 19/x3)</label>
            <input type="text" id="new-item-crit" class="inv-input" value="20/x2">
            <label>Perícia</label>
            <input type="text" id="new-item-skill" class="inv-input" value="Luta">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-roll" style="background:var(--accent-green); color:black;" onclick="confirmAddItem()">Salvar</button>
            <button class="btn-roll" style="background:#444; color:white;" onclick="closeItemPopup()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // --- DADOS BASE ---
    const atributos = ["AGI", "FOR", "INT", "PRE", "VIG"];
    const pericias = [
        {n:"Acrobacia", a:"AGI"}, {n:"Atletismo", a:"FOR"}, {n:"Atualidades", a:"INT"},
        {n:"Ciências", a:"INT"}, {n:"Crime", a:"AGI"}, {n:"Diplomacia", a:"PRE"},
        {n:"Enganação", a:"PRE"}, {n:"Fortitude", a:"VIG"}, {n:"Furtividade", a:"AGI"},
        {n:"Iniciativa", a:"AGI"}, {n:"Intimidação", a:"PRE"}, {n:"Intuição", a:"PRE"},
        {n:"Investigação", a:"INT"}, {n:"Luta", a:"FOR"}, {n:"Medicina", a:"INT"},
        {n:"Ocultismo", a:"INT"}, {n:"Percepção", a:"PRE"}, {n:"Pilotagem", a:"AGI"},
        {n:"Pontaria", a:"AGI"}, {n:"Reflexos", a:"AGI"}, {n:"Religião", a:"PRE"},
        {n:"Sobrevivência", a:"INT"}, {n:"Tática", a:"INT"}, {n:"Tecnologia", a:"INT"},
        {n:"Vontade", a:"PRE"}
    ];

    let inventario = [];
    let lastRollCrit = false;

    // --- INICIALIZAÇÃO ---
    function init() {
        const attrCont = document.getElementById('atributos-container');
        atributos.forEach(a => {
            attrCont.innerHTML += `
                <div class="attr-box">
                    <label>${a}</label><br>
                    <input type="number" id="attr_${a}" class="attr-input" value="1" oninput="updateAllPericias()">
                </div>
            `;
        });

        const skillCont = document.getElementById('pericias-container');
        pericias.forEach(p => {
            const id = p.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            skillCont.innerHTML += `
                <div class="skill-card" id="card_${id}" onclick="toggleTreino('${id}')">
                    <span style="font-size:0.7em; color:var(--text-secondary)">${p.n}</span>
                    <span class="skill-bonus-tag" id="bonus_${id}">+0</span>
                    <button class="btn-roll" style="padding:2px; font-size:0.6em; margin-top:5px;" onclick="event.stopPropagation(); rolarPericia('${p.n}', '${p.a}', '${id}')">ROLAR</button>
                    <input type="checkbox" id="chk_${id}" style="display:none">
                </div>
            `;
        });
        updateAllPericias();
        updateStatusBars();
    }

    // --- SISTEMA DE TABS ---
    function openTab(id, btn) {
        document.querySelectorAll('.main-container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'tab-inventario') updateWeight();
    }

    // --- LÓGICA DE PERÍCIAS ---
    function updateAllPericias() {
        pericias.forEach(p => {
            const id = p.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const attrVal = parseInt(document.getElementById(`attr_${p.a}`).value) || 0;
            const treinado = document.getElementById(`chk_${id}`).checked ? 10 : 0;
            const total = attrVal + treinado;
            document.getElementById(`bonus_${id}`).innerText = `+${total}`;
            
            const card = document.getElementById(`card_${id}`);
            if(treinado > 0) card.classList.add('trained'); else card.classList.remove('trained');
        });
        updateWeight(); // Força atualiza o peso
    }

    function toggleTreino(id) {
        const chk = document.getElementById(`chk_${id}`);
        chk.checked = !chk.checked;
        updateAllPericias();
    }

    // --- SISTEMA DE DADOS ---
    function showDiceResult(val, formula, label, isCrit = false) {
        const popup = document.getElementById('popup-dice');
        const box = document.getElementById('dice-box');
        document.getElementById('dice-result').innerText = val;
        document.getElementById('dice-formula').innerText = formula;
        document.getElementById('dice-label').innerText = label;
        
        if(isCrit) box.classList.add('crit-anim'); else box.classList.remove('crit-anim');
        popup.style.display = 'flex';
    }

    function rolarPericia(nome, attr, id) {
        const d20 = Math.floor(Math.random() * 20) + 1;
        const bns = parseInt(document.getElementById(`bonus_${id}`).innerText.replace('+', ''));
        const total = d20 + bns;
        lastRollCrit = (d20 === 20);
        showDiceResult(total, `Dado(${d20}) + Bônus(${bns})`, nome, lastRollCrit);
    }

    function rolarAtaque() {
        const weaponId = document.getElementById('active-weapon-select').value;
        const d20 = Math.floor(Math.random() * 20) + 1;
        let bns = 0;
        let nome = "Ataque Desarmado";

        if(weaponId !== "desarmado") {
            const item = inventario.find(i => i.id == weaponId);
            nome = item.name;
            const skillID = item.skill.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            bns = parseInt(document.getElementById(`bonus_${skillID}`)?.innerText.replace('+', '') || 0);
        } else {
            const forca = parseInt(document.getElementById('attr_FOR').value) || 0;
            bns = forca;
        }

        const total = d20 + bns;
        lastRollCrit = (d20 === 20);
        showDiceResult(total, `Dado(${d20}) + Bônus(${bns})`, "ATACAR: " + nome, lastRollCrit);
    }

    function rolarDano() {
        const weaponId = document.getElementById('active-weapon-select').value;
        let formula = "1d4"; 
        let multiplicador = 1;

        if(weaponId !== "desarmado") {
            const item = inventario.find(i => i.id == weaponId);
            formula = item.dmg;
            if(lastRollCrit) {
                const critPart = item.crit.split('x')[1] || 2;
                multiplicador = parseInt(critPart);
            }
        } else {
            formula = "1d4"; // Dano desarmado base
        }

        let total = 0;
        for(let i=0; i < multiplicador; i++) {
            total += resolverFormula(formula);
        }

        showDiceResult(total, lastRollCrit ? `CRÍTICO (x${multiplicador})` : "DANO", "RESULTADO DO DANO");
        lastRollCrit = false;
    }

    function resolverFormula(f) {
        // Resolve fórmulas simples como 1d8+2
        try {
            const partes = f.toLowerCase().split('+');
            let soma = 0;
            partes.forEach(p => {
                if(p.includes('d')) {
                    const [qtd, faces] = p.split('d').map(Number);
                    for(let i=0; i<qtd; i++) soma += Math.floor(Math.random() * faces) + 1;
                } else {
                    soma += Number(p);
                }
            });
            return soma;
        } catch { return 0; }
    }

    // --- INVENTÁRIO ---
    function openItemPopup() { document.getElementById('popup-item').style.display = 'flex'; }
    function closeItemPopup() { document.getElementById('popup-item').style.display = 'none'; }
    function toggleWeaponFields(val) { document.getElementById('weapon-fields').style.display = (val === 'sim') ? 'block' : 'none'; }

    function confirmAddItem() {
        const name = document.getElementById('new-item-name').value;
        const weight = parseInt(document.getElementById('new-item-weight').value) || 0;
        const isWeapon = document.getElementById('new-item-is-weapon').value === 'sim';
        
        if(!name) return alert("Dê um nome ao item!");

        const item = {
            id: Date.now(),
            name, weight, isWeapon,
            dmg: document.getElementById('new-item-dmg').value,
            crit: document.getElementById('new-item-crit').value,
            skill: document.getElementById('new-item-skill').value
        };

        inventario.push(item);
        renderInventario();
        closeItemPopup();
        updateWeight();
    }

    function renderInventario() {
        const list = document.getElementById('inventory-list');
        const select = document.getElementById('active-weapon-select');
        list.innerHTML = '';
        select.innerHTML = '<option value="desarmado">Ataque Desarmado</option>';

        inventario.forEach(item => {
            list.innerHTML += `
                <div class="status-box" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <b style="color:${item.isWeapon ? 'var(--accent-yellow)' : 'white'}">${item.name}</b><br>
                        <small>${item.weight} Espaços ${item.isWeapon ? '| ' + item.dmg : ''}</small>
                    </div>
                    <button class="btn-roll" style="width:auto; background:var(--accent-red); color:white;" onclick="removeItem(${item.id})">X</button>
                </div>
            `;
            if(item.isWeapon) {
                select.innerHTML += `<option value="${item.id}">${item.name}</option>`;
            }
        });
    }

    function removeItem(id) {
        inventario = inventario.filter(i => i.id !== id);
        renderInventario();
        updateWeight();
    }

    function updateWeight() {
        const forca = parseInt(document.getElementById('attr_FOR').value) || 0;
        const treinadoAtletismo = document.getElementById('chk_atletismo').checked;
        const limite = 5 + Math.floor(forca/2) + (treinadoAtletismo ? 10 : 0);
        
        let atual = 0;
        inventario.forEach(i => atual += i.weight);

        document.getElementById('weight-text').innerText = `${atual} / ${limite}`;
        const bar = document.getElementById('weight-bar-fill');
        bar.style.width = Math.min((atual/limite)*100, 100) + '%';
        if(atual > limite) bar.classList.add('overweight'); else bar.classList.remove('overweight');
    }

    // --- STATUS BARS ---
    function updateStatusBars() {
        const vA = parseInt(document.getElementById('vida_atual').value);
        const vM = parseInt(document.getElementById('vida_max').value);
        const sA = parseInt(document.getElementById('sani_atual').value);
        const sM = parseInt(document.getElementById('sani_max').value);

        document.getElementById('bar_vida').style.width = (vA/vM * 100) + '%';
        document.getElementById('txt_vida').innerText = `${vA}/${vM}`;
        
        document.getElementById('bar_sani').style.width = (sA/sM * 100) + '%';
        document.getElementById('txt_sani').innerText = `${sA}/${sM}`;
    }

    // --- EXPORT/IMPORT ---
    function exportFicha() {
        const ficha = {
            atributos: {},
            pericias: {},
            inventario,
            status: { 
                va: document.getElementById('vida_atual').value,
                vm: document.getElementById('vida_max').value,
                sa: document.getElementById('sani_atual').value,
                sm: document.getElementById('sani_max').value
            }
        };
        atributos.forEach(a => ficha.atributos[a] = document.getElementById(`attr_${a}`).value);
        pericias.forEach(p => {
            const id = p.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            ficha.pericias[id] = document.getElementById(`chk_${id}`).checked;
        });

        const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ficha));
        const link = document.createElement('a');
        link.setAttribute("href", data);
        link.setAttribute("download", "ficha_ordem.json");
        link.click();
    }

    function importFicha(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = JSON.parse(e.target.result);
            inventario = data.inventario || [];
            Object.keys(data.atributos).forEach(a => document.getElementById(`attr_${a}`).value = data.atributos[a]);
            Object.keys(data.pericias).forEach(id => document.getElementById(`chk_${id}`).checked = data.pericias[id]);
            document.getElementById('vida_atual').value = data.status.va;
            document.getElementById('vida_max').value = data.status.vm;
            document.getElementById('sani_atual').value = data.status.sa;
            document.getElementById('sani_max').value = data.status.sm;
            
            renderInventario();
            updateAllPericias();
            updateStatusBars();
        };
        reader.readAsText(event.target.files[0]);
    }

    function abrirPopupDados() {
        const formula = prompt("Digite a fórmula do dado (Ex: 2d10+5):");
        if(formula) {
            const res = resolverFormula(formula);
            showDiceResult(res, formula, "ROLAGEM CUSTOMIZADA");
        }
    }

    // Iniciar tudo
    init();
</script>

</body>
</html>
