<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Overlay Stream - Ordem Paranormal</title>
    <style>
        :root {
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; 
            --accent-green: #00e676; --accent-red: #e53935;
        }

        body {
            margin: 0; padding: 10px; font-family: 'Roboto', sans-serif;
            background: transparent; color: white;
        }

        /* CONTAINER QUE SEGURA TODOS OS CARDS */
        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espaço entre cada ficha */
            pointer-events: none; /* Deixa clicar através do que for transparente no OBS */
        }

        .overlay-container {
            width: 250px;
            background: rgba(18, 18, 20, 0.85);
            border: 2px solid rgba(50, 50, 56, 0.8);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto; /* Permite interagir com o card se necessário */
            position: relative;
        }

        .header { display: flex; align-items: center; gap: 12px; }
        .foto { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); }
        .nome { font-size: 1em; font-weight: 900; color: var(--accent-yellow); text-transform: uppercase; margin: 0; }
        .detalhes { font-size: 0.7em; color: #a8a8b3; }

        /* BARRAS */
        .bar-bg { background: rgba(0,0,0,0.8); height: 18px; border-radius: 4px; border: 1px solid #333; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.75em; font-weight: 900; line-height: 18px; text-shadow: 1px 1px 2px #000; }

        /* SETUP BOX */
        .setup-box {
            background: rgba(18,18,20,0.95); padding: 15px; border-radius: 10px; 
            border: 1px solid var(--accent-blue); width: 280px; text-align: center;
            position: fixed; top: 10px; left: 10px; z-index: 9999;
        }
        .setup-input { padding: 8px; background: #000; color: white; border: 1px solid #444; border-radius: 6px; width: 70%; margin-bottom: 10px; }
        .setup-btn { background: var(--accent-blue); color: black; font-weight: bold; padding: 8px; border: none; border-radius: 6px; cursor: pointer; margin: 2px; }

        /* STATUS */
        .status-morrendo { border-color: var(--accent-red) !important; animation: pulseRed 1s infinite; }
        @keyframes pulseRed { 0%, 100% { box-shadow: 0 0 5px var(--accent-red); } 50% { box-shadow: 0 0 15px var(--accent-red); } }
    </style>
</head>
<body>

    <div class="setup-box" id="setup-box">
        <h4 style="color: var(--accent-blue); margin: 0 0 10px 0;">Painel Multi-Fichas</h4>
        <input type="text" id="codigo-input" class="setup-input" placeholder="CÓDIGO" maxlength="4">
        <div>
            <button class="setup-btn" onclick="adicionarJogadorPeloInput()">ADICIONAR</button>
            <button class="setup-btn" style="background: #e53935;" onclick="limparTudo()">LIMPAR</button>
            <button class="setup-btn" style="background: #555; color: white;" onclick="this.parentElement.parentElement.style.display='none'">OCULTAR</button>
        </div>
    </div>

    <div id="multi-overlay-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        let jogadoresAtivos = {}; // Armazena os dados de cada socket por código
        const container = document.getElementById('multi-overlay-container');
        const socket = io();

        // Conecta ao servidor e pede dados dos jogadores salvos na lista
        socket.on('connect', () => {
            console.log("Conectado ao Servidor");
        });

        socket.on('update_mestre', (dados) => {
            if (jogadoresAtivos[dados.codigo]) {
                atualizarCard(dados);
            }
        });

        function adicionarJogadorPeloInput() {
            const codigo = document.getElementById('codigo-input').value.toUpperCase().trim();
            if (codigo && !jogadoresAtivos[codigo]) {
                criarCardVazio(codigo);
                socket.emit('request_player', codigo);
                document.getElementById('codigo-input').value = "";
            }
        }

        function criarCardVazio(codigo) {
            jogadoresAtivos[codigo] = true; // Marca como ativo

            const cardHtml = `
                <div class="overlay-container" id="card-${codigo}">
                    <div class="header">
                        <img src="https://via.placeholder.com/60" id="foto-${codigo}" class="foto">
                        <div>
                            <div class="nome" id="nome-${codigo}">Carregando...</div>
                            <div class="detalhes" id="detalhes-${codigo}">Aguardando dados...</div>
                        </div>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill fill-vida" id="bar-vida-${codigo}" style="width: 0%;"></div>
                        <div class="bar-text" id="text-vida-${codigo}">0 / 0</div>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill fill-sani" id="bar-sani-${codigo}" style="width: 0%;"></div>
                        <div class="bar-text" id="text-sani-${codigo}">0 / 0</div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHtml;
        }

        function atualizarCard(dados) {
            const cod = dados.codigo;
            
            // Atualiza Nome e Detalhes
            const nomeEl = document.getElementById(`nome-${cod}`);
            if (nomeEl) nomeEl.innerText = dados.nome || 'Desconhecido';
            
            const detEl = document.getElementById(`detalhes-${cod}`);
            if (detEl) detEl.innerText = `NEX: ${dados.nex || 0}% | DEF: ${dados.defesa || 10}`;

            // Atualiza Foto e Status
            const fotoEl = document.getElementById(`foto-${cod}`);
            if (fotoEl) {
                fotoEl.src = dados.foto || 'https://via.placeholder.com/60';
                fotoEl.parentElement.parentElement.className = 'overlay-container' + (dados.status?.morrendo ? ' status-morrendo' : '');
            }

            // Atualiza Barras
            const percVida = Math.min(Math.max((dados.vida_atual / dados.vida_max) * 100, 0), 100) || 0;
            const percSani = Math.min(Math.max((dados.sani_atual / dados.sani_max) * 100, 0), 100) || 0;

            document.getElementById(`bar-vida-${cod}`).style.width = percVida + '%';
            document.getElementById(`text-vida-${cod}`).innerText = `${dados.vida_atual} / ${dados.vida_max}`;
            
            document.getElementById(`bar-sani-${cod}`).style.width = percSani + '%';
            document.getElementById(`text-sani-${cod}`).innerText = `${dados.sani_atual} / ${dados.sani_max}`;
        }

        function limparTudo() {
            container.innerHTML = "";
            jogadoresAtivos = {};
        }

        // Dica: Para interagir no OBS, clique com o botão direito na fonte -> Interagir.
    </script>
</body>
</html>
