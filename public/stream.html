<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG - Arma Ativa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&display=swap');

        body { margin: 0; padding: 20px; background: transparent; color: white; overflow: hidden; }
        #multi-overlay-container { display: flex; flex-direction: column; gap: 25px; }

        .player-card { display: flex; align-items: center; gap: 15px; }

        .foto-container { width: 130px; height: 130px; position: relative; }
        .foto { 
            width: 100%; height: 100%; object-fit: cover; 
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .perigo { animation: pulse-red 1.2s infinite ease-in-out; filter: drop-shadow(0 0 15px #ff0000) !important; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .status-numbers { 
            display: flex; flex-direction: column; 
            font-family: 'Grenze Gotisch', cursive; font-size: 3.2rem; line-height: 0.85; 
        }

        .val-vida { color: #ffcccc; text-shadow: 0 0 15px #ff4d4d, 0 0 5px #ff0000, 2px 2px 2px black; }
        .val-sani { color: #e0e0ff; text-shadow: 0 0 15px #8080ff, 0 0 5px #0000ff, 2px 2px 2px black; }
        .val-ammo { color: #ffffcc; text-shadow: 0 0 15px #ffcf33, 0 0 5px #ffae00, 2px 2px 2px black; font-size: 2.8rem; }

        .setup-panel {
            position: fixed; bottom: 15px; right: 15px; background: rgba(0, 0, 0, 0.85); 
            padding: 10px; border-radius: 10px; border: 1px solid #ffcf33; z-index: 1000;
        }
        .setup-panel input { background: #000; border: 1px solid #444; color: white; width: 60px; text-align: center; }
        .setup-panel button { background: #222; color: #ffcf33; border: 1px solid #ffcf33; cursor: pointer; }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <div class="setup-panel">
        <input type="text" id="codigo-input" placeholder="CÓD">
        <button onclick="addPlayer()">ADD</button>
        <button onclick="limparSessao()" style="color: #ff4d4d; border-color: #ff4d4d;">LIMPAR</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        let activePlayers = JSON.parse(localStorage.getItem('overlay_players')) || [];

        window.onload = () => {
            activePlayers.forEach(code => renderPlayerCard(code));
            setTimeout(() => activePlayers.forEach(code => socket.emit('request_player', code)), 1000);
        };

        function addPlayer() {
            const code = document.getElementById('codigo-input').value.toUpperCase().trim();
            if (code && !activePlayers.includes(code)) {
                activePlayers.push(code);
                localStorage.setItem('overlay_players', JSON.stringify(activePlayers));
                renderPlayerCard(code);
                socket.emit('request_player', code);
            }
        }

        function renderPlayerCard(code) {
            if (document.getElementById(`card-${code}`)) return;
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.innerHTML = `
                <div class="foto-container"><img src="" id="foto-${code}" class="foto"></div>
                <div class="status-numbers">
                    <div class="val-vida" id="vida-${code}">0/0</div>
                    <div class="val-sani" id="sani-${code}">0/0</div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        function limparSessao() {
            localStorage.removeItem('overlay_players');
            activePlayers = [];
            container.innerHTML = "";
        }

        socket.on('update_mestre', (dados) => {
            if (activePlayers.includes(dados.codigo)) {
                const cod = dados.codigo;
                
                // Atualiza Vida e Sanidade
                document.getElementById(`vida-${cod}`).innerText = `${dados.vida_atual || 0}/${dados.vida_max || 0}`;
                document.getElementById(`sani-${cod}`).innerText = `${dados.sani_atual || 0}/${dados.sani_max || 0}`;
                
                // Atualiza Foto e Efeito de Perigo (25% de vida)
                const fotoEl = document.getElementById(`foto-${cod}`);
                if (fotoEl && dados.foto) {
                    fotoEl.src = dados.foto;
                    const perc = (dados.vida_atual / dados.vida_max) * 100;
                    fotoEl.classList.toggle('perigo', perc <= 25);
                }

                // BUSCA A ARMA ATIVA NO INVENTÁRIO (Filtrando por tipo armadisp e equipped true)
                const ammoEl = document.getElementById(`ammo-${cod}`);
                let muniExibir = "";

                if (dados.inventory && Array.isArray(dados.inventory)) {
                    // Procura especificamente a arma de disparo que está equipada na ficha
                    const armaAtiva = dados.inventory.find(item => 
                        item.equipped === true && item.type === 'armadisp'
                    );

                    if (armaAtiva) {
                        muniExibir = armaAtiva.currentShots || "0";
                    }
                }
                
                ammoEl.innerText = muniExibir;
            }
        });
    </script>
</body>
</html>
