<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG Minimalist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&display=swap');

        body {
            margin: 0; padding: 20px;
            background: transparent; /* Transparente para o OBS */
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* CONTAINER DE TODOS OS JOGADORES */
        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* CARD DO JOGADOR */
        .player-card {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        /* FOTO COM BRILHO EXTERNO */
        .foto-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .foto {
            width: 100%; height: 100%;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            filter: drop-shadow(0 0 10px rgba(255, 140, 0, 0.5)); /* Brilho laranja suave */
        }

        /* STATUS NUMÉRICOS */
        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-family: 'Grenze Gotisch', cursive; /* Fonte mais estilizada */
            font-size: 2.8rem;
            line-height: 1;
        }

        .val-vida { color: #ffcccc; text-shadow: 0 0 15px #ff4d4d, 0 0 5px #ff0000; }
        .val-sani { color: #e0e0ff; text-shadow: 0 0 15px #8080ff, 0 0 5px #0000ff; }
        .val-pe   { color: #f5e0ff; text-shadow: 0 0 15px #d480ff, 0 0 5px #9900ff; font-size: 2.2rem; }

        /* PAINEL DE CONFIGURAÇÃO (CANTO INFERIOR DIREITO) */
        .setup-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .setup-panel input {
            background: #111;
            border: 1px solid #555;
            color: white;
            padding: 5px;
            width: 60px;
            text-align: center;
            border-radius: 4px;
        }

        .setup-panel button {
            background: #333;
            color: #aaa;
            border: 1px solid #555;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .setup-panel button:hover { background: #444; color: white; }

        /* ANIMAÇÃO DE DANO */
        .tomou-dano { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(3px, 2px); }
            60% { transform: translate(-3px, -1px); }
            80% { transform: translate(3px, 1px); }
            100% { transform: translate(0px, 0px); }
        }
    </style>
</head>
<body>

    <div id="multi-overlay-container">
        </div>

    <div class="setup-panel">
        <input type="text" id="codigo-input" placeholder="CÓD" maxlength="4">
        <button onclick="addPlayer()">+ ADICIONAR</button>
        <button onclick="document.getElementById('multi-overlay-container').innerHTML=''">LIMPAR</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        let codes = [];

        function addPlayer() {
            const code = document.getElementById('codigo-input').value.toUpperCase().trim();
            if (code && !codes.includes(code)) {
                codes.push(code);
                const card = document.createElement('div');
                card.className = 'player-card';
                card.id = `card-${code}`;
                card.innerHTML = `
                    <div class="foto-container">
                        <img src="" id="foto-${code}" class="foto">
                    </div>
                    <div class="status-numbers" id="status-${code}">
                        <div class="val-vida" id="vida-${code}">0/0</div>
                        <div class="val-sani" id="sani-${code}">0/0</div>
                        <div class="val-pe" id="pe-${code}">0</div>
                    </div>
                `;
                container.appendChild(card);
                socket.emit('request_player', code);
                document.getElementById('codigo-input').value = "";
            }
        }

        socket.on('update_mestre', (dados) => {
            if (codes.includes(dados.codigo)) {
                const card = document.getElementById(`card-${dados.codigo}`);
                
                // Atualiza Foto
                document.getElementById(`foto-${dados.codigo}`).src = dados.foto || 'https://via.placeholder.com/120';
                
                // Atualiza Números
                document.getElementById(`vida-${dados.codigo}`).innerText = `${dados.vida_atual}/${dados.vida_max}`;
                document.getElementById(`sani-${dados.codigo}`).innerText = `${dados.sani_atual}/${dados.sani_max}`;
                
                // PE ou Munição (ajustado para o 3º número da sua imagem)
                document.getElementById(`pe-${dados.codigo}`).innerText = dados.pe || dados.nex || 0;

                // Efeito de tremer se a vida mudar (opcional)
                card.classList.add('tomou-dano');
                setTimeout(() => card.classList.remove('tomou-dano'), 500);
            }
        });
    </script>
</body>
</html>
