<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --cor-brilho: #ff4a4a; /* Cor do contorno (muda por personagem) */
        }

        body {
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .personagem-card {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 5px;
            min-width: 250px;
        }

        .avatar-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            /* O brilho da imagem que você enviou */
            filter: drop-shadow(0 0 8px var(--cor-brilho));
        }

        .status-info {
            margin-left: 15px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px black;
        }

        .vida { color: #ff8585; }
        .sanidade { color: #c085ff; }
        .municao { color: #ff85ec; font-size: 0.9rem; }

        /* Classe para quando a vida estiver baixa (mudar foto) */
        .ferido { filter: grayscale(50%) sepia(50%) drop-shadow(0 0 8px red); }
    </style>
</head>
<body>

    <div class="personagem-card">
        <div class="avatar-container">
            <img src="https://via.placeholder.com/80" class="avatar" id="foto-p1">
        </div>
        <div class="status-info">
            <div class="vida" id="vida-p1">32/32</div>
            <div class="sanidade" id="san-p1">54/54</div>
            <div class="municao" id="ammo-p1">6 munições</div>
        </div>
    </div>

</body>
</html>
