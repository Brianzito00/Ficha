<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay de Stream - Ordem Paranormal</title>
    <style>
        :root {
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; 
            --accent-green: #00e676; --accent-red: #e53935;
        }

        /* FUNDO INVISÍVEL PARA O OBS */
        body {
            margin: 0; padding: 20px; font-family: 'Roboto', sans-serif;
            background: transparent; color: white; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            height: 100vh; box-sizing: border-box;
        }

        /* PAINEL SECRETO PARA ADICIONAR CÓDIGOS */
        .admin-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(18, 18, 20, 0.95); border: 2px solid var(--accent-blue);
            padding: 10px 15px; border-radius: 8px; display: flex; gap: 10px; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; z-index: 100;
        }
        body:hover .admin-panel { opacity: 1; }

        .admin-input { padding: 8px; background: #000; color: white; border: 1px solid #444; border-radius: 4px; font-weight: bold; text-transform: uppercase; text-align: center; width: 100px; outline: none;}
        .admin-btn { background: var(--accent-blue); color: black; font-weight: bold; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .admin-btn:hover { filter: brightness(1.2); }

        /* RECIPIENTE DOS JOGADORES (ALINHADOS LADO A LADO) */
        #party-container {
            display: flex; flex-direction: row; gap: 40px; flex-wrap: nowrap;
            justify-content: center; align-items: flex-end; width: 100%;
        }

        /* =======================================================
           LAYOUT DO JOGADOR: PERSONAGEM (ESQUERDA) + CAIXA (DIREITA)
           ======================================================= */
        .player-widget {
            position: relative;
            width: 290px;
            display: flex;
            justify-content: flex-end; /* Empurra a caixa preta para a direita */
            margin-top: 180px; /* Dá espaço para a cabeça do personagem sair da caixa */
        }

        /* FOTO DO PERSONAGEM (PNG LIVRE SEM MOLDURA) */
        .char-art {
            position: absolute;
            left: -30px; /* Puxa o personagem para fora da caixa à esquerda */
            bottom: 0;
            width: 170px;
            height: 280px; /* Personagem grande saindo do topo */
            object-fit: contain;
            object-position: bottom center;
            z-index: 2; /* Fica na frente da caixa de status */
            filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)); /* Apenas a sombra da silhueta */
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
        }

        /* CAIXA PRETA DE INFORMAÇÕES */
        .status-card {
            width: 220px;
            background: rgba(18, 18, 22, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--accent-blue);
            border-radius: 12px;
            padding: 15px 15px 15px 70px; /* Espaço vazio na esquerda para não tapar o personagem */
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.8);
            z-index: 1;
            position: relative;
        }

        /* BOTÃO DE REMOVER O JOGADOR DA TELA */
        .btn-remove {
            position: absolute; top: -10px; right: -10px; background: var(--accent-red);
            color: white; border: none; border-radius: 50%; width: 24px; height: 24px;
            font-weight: bold; cursor: pointer; opacity: 0; transition: 0.2s; box-shadow: 0 0 10px black; z-index: 10;
        }
        .player-widget:hover .btn-remove { opacity: 1; }

        /* NOME DO PERSONAGEM */
        .char-nome {
            font-size: 1.1em; font-weight: 900; color: var(--text-primary); text-transform: uppercase;
            margin: 0 0 10px 0; text-shadow: 1px 1px 3px black; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* BARRAS DE VIDA E SANIDADE */
        .bar-wrapper { margin-bottom: 6px; }
        .bar-label { font-size: 0.6em; font-weight: bold; margin-bottom: 2px; text-shadow: 1px 1px 2px black; letter-spacing: 1px; }
        .bar-bg { background: rgba(0,0,0,0.8); height: 14px; border-radius: 4px; border: 1px solid #333; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.7em; font-weight: 900; line-height: 14px; text-shadow: 1px 1px 1px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }

        /* ETIQUETA DE MUNIÇÃO (Fica presa ao topo da caixa preta) */
        .ammo-badge {
            position: absolute;
            top: -15px;
            right: 15px;
            background: rgba(10, 10, 12, 0.95);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            z-index: 5;
        }
        .ammo-icon { font-size: 1.1em; }
        .ammo-text { color: white; font-weight: 900; font-size: 0.9em; text-shadow: 1px 1px 2px black; }
        .ammo-type { color: var(--accent-yellow); font-size: 0.6em; font-weight: bold; text-transform: uppercase; margin-right: 4px; }

        /* AURAS DE STATUS (Aplica uma sombra colorida no recorte do PNG) */
        .status-lesionado { filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 10px var(--accent-red)) !important; }
        .status-morrendo { animation: pulseRedAura 1.5s infinite !important; }
        .status-enlouquecendo { animation: pulseBlueAura 1.5s infinite !important; }

        @keyframes pulseRedAura { 
            0% { filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 5px var(--accent-red)); } 
            50% { filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 20px var(--accent-red)); } 
            100% { filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 5px var(--accent-red)); } 
        }
        @keyframes pulseBlueAura { 
            0% { filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 5px var(--accent-blue)); } 
            50% { filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 20px var(--accent-blue)); } 
            100% { filter: drop-shadow(5px 0px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 5px var(--accent-blue)); } 
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <input type="text" id="new-code" class="admin-input" placeholder="CÓDIGO" maxlength="4">
        <button class="admin-btn" onclick="addPlayer()">+ ADICIONAR</button>
    </div>

    <div id="party-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const partyContainer = document.getElementById('party-container');
        
        let streamCodes = JSON.parse(localStorage.getItem('stream_codes')) || [];

        socket.on('connect', () => {
            streamCodes.forEach(codigo => socket.emit('request_player', codigo));
        });

        function addPlayer() {
            const input = document.getElementById('new-code');
            const codigo = input.value.toUpperCase().trim();
            if (codigo.length > 0 && !streamCodes.includes(codigo)) {
                streamCodes.push(codigo);
                localStorage.setItem('stream_codes', JSON.stringify(streamCodes));
                socket.emit('request_player', codigo);
            }
            input.value = '';
        }

        function removePlayer(codigo) {
            streamCodes = streamCodes.filter(c => c !== codigo);
            localStorage.setItem('stream_codes', JSON.stringify(streamCodes));
            const widget = document.getElementById(`widget-${codigo}`);
            if (widget) widget.remove();
        }

        socket.on('update_mestre', (dados) => {
            if (!dados.codigo || !streamCodes.includes(dados.codigo)) return;

            let widget = document.getElementById(`widget-${dados.codigo}`);
            
            // SE O WIDGET AINDA NÃO EXISTE, CRIA-O
            if (!widget) {
                widget = document.createElement('div');
                widget.className = 'player-widget';
                widget.id = `widget-${dados.codigo}`;

                widget.innerHTML = `
                    <button class="btn-remove" onclick="removePlayer('${dados.codigo}')" title="Remover">X</button>
                    
                    <img id="foto-${dados.codigo}" class="char-art" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" data-current-src="">
                    
                    <div class="status-card">
                        
                        <div id="ammo-badge-${dados.codigo}"></div>

                        <div class="char-nome" id="nome-${dados.codigo}">Desconhecido</div>
                        
                        <div class="bar-wrapper">
                            <div class="bar-label" style="color: var(--accent-red);">VIDA</div>
                            <div class="bar-bg">
                                <div class="bar-fill fill-vida" id="bar-vida-${dados.codigo}" style="width: 100%;"></div>
                                <div class="bar-text" id="text-vida-${dados.codigo}">0 / 0</div>
                            </div>
                        </div>

                        <div class="bar-wrapper">
                            <div class="bar-label" style="color: var(--accent-blue);">SANIDADE</div>
                            <div class="bar-bg">
                                <div class="bar-fill fill-sani" id="bar-sani-${dados.codigo}" style="width: 100%;"></div>
                                <div class="bar-text" id="text-sani-${dados.codigo}">0 / 0</div>
                            </div>
                        </div>

                    </div>
                `;
                partyContainer.appendChild(widget);
            }

            // ATUALIZA A IMAGEM (com animação fade)
            const imgEl = document.getElementById(`foto-${dados.codigo}`);
            const novaFoto = dados.foto || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
            
            if(imgEl.getAttribute('data-current-src') !== novaFoto) {
                imgEl.style.opacity = 0; 
                setTimeout(() => {
                    imgEl.src = novaFoto;
                    imgEl.setAttribute('data-current-src', novaFoto);
                    imgEl.onload = () => imgEl.style.opacity = 1;
                    setTimeout(() => imgEl.style.opacity = 1, 100); 
                }, 300);
            }

            // APLICA A AURA DE STATUS AO REDOR DO PNG
            imgEl.className = 'char-art'; 
            if (dados.status?.morrendo) imgEl.classList.add('status-morrendo');
            else if (dados.status?.enlouquecendo) imgEl.classList.add('status-enlouquecendo');
            else if (dados.status?.lesionado) imgEl.classList.add('status-lesionado');

            // MUDANÇA DA COR DA BORDA CONSOANTE O STATUS
            const statusCard = widget.querySelector('.status-card');
            statusCard.style.borderLeftColor = dados.status?.enlouquecendo ? 'var(--accent-blue)' : (dados.status?.morrendo || dados.status?.lesionado ? 'var(--accent-red)' : 'var(--accent-blue)');

            // ATUALIZA NOME E BARRAS
            document.getElementById(`nome-${dados.codigo}`).innerText = dados.nome || 'Desconhecido';

            const percVida = Math.min(Math.max((dados.vida_atual / dados.vida_max) * 100, 0), 100) || 0;
            const percSani = Math.min(Math.max((dados.sani_atual / dados.sani_max) * 100, 0), 100) || 0;
            
            document.getElementById(`bar-vida-${dados.codigo}`).style.width = percVida + '%';
            document.getElementById(`text-vida-${dados.codigo}`).innerText = `${dados.vida_atual} / ${dados.vida_max}`;
            
            document.getElementById(`bar-sani-${dados.codigo}`).style.width = percSani + '%';
            document.getElementById(`text-sani-${dados.codigo}`).innerText = `${dados.sani_atual} / ${dados.sani_max}`;

            // ATUALIZA A ETIQUETA DA MUNIÇÃO
            const ammoBadge = document.getElementById(`ammo-badge-${dados.codigo}`);
            let ammoHtml = '';
            
            if (dados.fullData && dados.fullData.inv) {
                const armaEquipada = dados.fullData.inv.find(item => 
                    item.eq === true && 
                    item.type === 'arma' && 
                    item.atkType && item.atkType.toLowerCase().includes('disparo')
                );

                if (armaEquipada) {
                    ammoHtml = `
                        <div class="ammo-badge">
                            <span class="ammo-type">${armaEquipada.ammo}</span>
                            <span class="ammo-icon">🔫</span>
                            <span class="ammo-text">${armaEquipada.currentShots || 0}/${armaEquipada.capacity || 0}</span>
                        </div>
                    `;
                }
            }
            ammoBadge.innerHTML = ammoHtml;
        });
    </script>
</body>
</html>
