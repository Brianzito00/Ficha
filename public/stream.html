<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay de Stream - Ordem Paranormal</title>
    <style>
        :root {
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; 
            --accent-green: #00e676; --accent-red: #e53935;
        }

        /* FUNDO TRANSPARENTE E ALINHAMENTO NA BASE DA TELA */
        body {
            margin: 0; padding: 20px; font-family: 'Roboto', sans-serif;
            background: transparent; color: white; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            height: 100vh; box-sizing: border-box;
        }

        /* PAINEL DE CONTROLO SECRETO (Fica no topo esquerdo) */
        .admin-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(18, 18, 20, 0.95); border: 2px solid var(--accent-blue);
            padding: 10px 15px; border-radius: 8px; display: flex; gap: 10px; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; z-index: 100;
        }
        body:hover .admin-panel { opacity: 1; }

        .admin-input { padding: 8px; background: #000; color: white; border: 1px solid #444; border-radius: 4px; font-weight: bold; text-transform: uppercase; text-align: center; width: 100px; }
        .admin-btn { background: var(--accent-blue); color: black; font-weight: bold; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .admin-btn:hover { filter: brightness(1.2); }

        /* LISTA DE JOGADORES (HORIZONTAL) */
        #party-container {
            display: flex; flex-direction: row; gap: 30px; flex-wrap: nowrap;
            justify-content: center; align-items: flex-end; width: 100%;
        }

        /* WRAPPER DO JOGADOR (Controla o conjunto Foto + Caixa) */
        .player-wrapper {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end;
            margin-top: 150px; 
        }

        /* =========================================================
           FOTO DO PERSONAGEM (SEM MOLDURA, BUSTO PNG PURO)
           ========================================================= */
        .char-foto {
            height: 250px; /* Altura do busto - pode aumentar se quiser maior no OBS */
            width: auto;
            max-width: 300px;
            object-fit: contain; /* Garante que o PNG não corta */
            object-position: bottom; /* Fixa os pés em baixo */
            border: none !important; /* Sem bordas */
            background: transparent !important; /* Sem fundo */
            border-radius: 0 !important; /* Sem cantos arredondados */
            box-shadow: none !important; /* Sem sombra de caixa quadrada */
            margin-bottom: -15px; /* Faz o personagem descer um pouco para trás da caixa preta */
            z-index: 5; /* Fica atrás da caixa de vida */
            transition: opacity 0.3s ease-in-out;
            filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.6)); /* Dá um volume à silhueta do personagem */
        }

        /* CARTÃO PRETO DE STATUS (Fica aos pés do personagem) */
        .player-card {
            background: rgba(22, 22, 26, 0.95);
            border: 2px solid rgba(50, 50, 56, 0.8);
            border-radius: 12px;
            padding: 12px 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; gap: 20px;
            position: relative; width: max-content;
            min-width: 250px;
            z-index: 10; /* Fica à frente da foto */
        }

        /* BOTÃO DE REMOVER (Canto do wrapper) */
        .btn-remove {
            position: absolute; top: -20px; right: -20px; background: var(--accent-red);
            color: white; border: none; border-radius: 50%; width: 26px; height: 26px;
            font-weight: bold; cursor: pointer; opacity: 0; transition: 0.2s; box-shadow: 0 0 10px black; z-index: 20;
        }
        .player-wrapper:hover .btn-remove { opacity: 1; }

        /* INFORMAÇÕES E BARRAS */
        .info-side { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 150px; }
        .char-nome { font-size: 1.2em; font-weight: 900; color: var(--accent-yellow); text-transform: uppercase; margin: 0 0 8px 0; text-shadow: 1px 1px 3px black; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; text-align: center; }

        .bar-wrapper { margin-bottom: 6px; }
        .bar-label { font-size: 0.6em; font-weight: bold; margin-bottom: 2px; text-shadow: 1px 1px 2px black; letter-spacing: 1px; }
        .bar-bg { background: rgba(0,0,0,0.8); height: 16px; border-radius: 4px; border: 1px solid #333; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.7em; font-weight: 900; line-height: 16px; text-shadow: 1px 1px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }

        /* CAIXA DE MUNIÇÃO (Fica na direita do cartão) */
        .ammo-side { display: flex; align-items: center; justify-content: center; }
        .ammo-box {
            background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 8px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px;
            height: max-content; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .ammo-icon { font-size: 1.6em; filter: drop-shadow(2px 2px 2px black); }
        .ammo-details { display: flex; flex-direction: column; justify-content: center; }
        .ammo-name { font-size: 0.65em; color: white; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
        .ammo-type { font-size: 0.55em; color: var(--accent-yellow); text-transform: uppercase; font-weight: bold; }
        .ammo-count { font-size: 1.3em; font-weight: 900; color: white; text-shadow: 2px 2px 4px black; margin-left: 5px; }

        /* AURA DE STATUS (Em vez de borda quadrada, o PNG ganha uma aura brilhante que acompanha o corpo) */
        .status-lesionado { filter: drop-shadow(0px 0px 10px var(--accent-red)) !important; }
        .status-morrendo { animation: pulseRedAura 1.5s infinite !important; }
        .status-enlouquecendo { animation: pulseBlueAura 1.5s infinite !important; }

        @keyframes pulseRedAura { 
            0% { filter: drop-shadow(0 0 5px var(--accent-red)); } 
            50% { filter: drop-shadow(0 0 25px var(--accent-red)); } 
            100% { filter: drop-shadow(0 0 5px var(--accent-red)); } 
        }
        @keyframes pulseBlueAura { 
            0% { filter: drop-shadow(0 0 5px var(--accent-blue)); } 
            50% { filter: drop-shadow(0 0 25px var(--accent-blue)); } 
            100% { filter: drop-shadow(0 0 5px var(--accent-blue)); } 
        }
    </style>
</head>
<body>

    <div class="admin-panel" title="Painel invisível. Use no modo 'Interagir' do OBS">
        <input type="text" id="new-code" class="admin-input" placeholder="CÓDIGO" maxlength="4">
        <button class="admin-btn" onclick="addPlayer()">+ ADICIONAR JOGADOR</button>
    </div>

    <div id="party-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const partyContainer = document.getElementById('party-container');
        
        let streamCodes = JSON.parse(localStorage.getItem('stream_codes')) || [];

        socket.on('connect', () => {
            streamCodes.forEach(codigo => socket.emit('request_player', codigo));
        });

        function addPlayer() {
            const input = document.getElementById('new-code');
            const codigo = input.value.toUpperCase().trim();
            if (codigo.length > 0 && !streamCodes.includes(codigo)) {
                streamCodes.push(codigo);
                localStorage.setItem('stream_codes', JSON.stringify(streamCodes));
                socket.emit('request_player', codigo);
            }
            input.value = '';
        }

        function removePlayer(codigo) {
            streamCodes = streamCodes.filter(c => c !== codigo);
            localStorage.setItem('stream_codes', JSON.stringify(streamCodes));
            const wrapper = document.getElementById(`wrapper-${codigo}`);
            if (wrapper) wrapper.remove();
        }

        socket.on('update_mestre', (dados) => {
            if (!dados.codigo || !streamCodes.includes(dados.codigo)) return;

            let wrapper = document.getElementById(`wrapper-${dados.codigo}`);
            
            // Se não existe, cria a estrutura com a Foto Solta em cima da Caixa
            if (!wrapper) {
                wrapper = document.createElement('div');
                wrapper.className = 'player-wrapper';
                wrapper.id = `wrapper-${dados.codigo}`;

                wrapper.innerHTML = `
                    <button class="btn-remove" onclick="removePlayer('${dados.codigo}')" title="Remover">X</button>
                    
                    <img id="foto-${dados.codigo}" class="char-foto" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" data-current-src="">
                    
                    <div class="player-card">
                        <div class="info-side">
                            <h3 class="char-nome" id="nome-${dados.codigo}">Desconhecido</h3>
                            
                            <div class="bar-wrapper">
                                <div class="bar-label" style="color: var(--accent-red);">VIDA</div>
                                <div class="bar-bg">
                                    <div class="bar-fill fill-vida" id="bar-vida-${dados.codigo}" style="width: 100%;"></div>
                                    <div class="bar-text" id="text-vida-${dados.codigo}">0 / 0</div>
                                </div>
                            </div>

                            <div class="bar-wrapper">
                                <div class="bar-label" style="color: var(--accent-blue);">SANIDADE</div>
                                <div class="bar-bg">
                                    <div class="bar-fill fill-sani" id="bar-sani-${dados.codigo}" style="width: 100%;"></div>
                                    <div class="bar-text" id="text-sani-${dados.codigo}">0 / 0</div>
                                </div>
                            </div>
                        </div>

                        <div class="ammo-side" id="ammo-side-${dados.codigo}">
                            </div>
                    </div>
                `;
                partyContainer.appendChild(wrapper);
            }

            // Animação de Troca de Imagem (Mantém a imagem sem fundo)
            const imgEl = document.getElementById(`foto-${dados.codigo}`);
            const novaFoto = dados.foto || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
            
            if(imgEl.getAttribute('data-current-src') !== novaFoto) {
                imgEl.style.opacity = 0; 
                setTimeout(() => {
                    imgEl.src = novaFoto;
                    imgEl.setAttribute('data-current-src', novaFoto);
                    imgEl.onload = () => imgEl.style.opacity = 1;
                    setTimeout(() => imgEl.style.opacity = 1, 100); 
                }, 300);
            }

            // Efeitos de Aura com Drop-Shadow para o PNG ficar incrível
            imgEl.className = 'char-foto'; 
            if (dados.status?.morrendo) imgEl.classList.add('status-morrendo');
            else if (dados.status?.enlouquecendo) imgEl.classList.add('status-enlouquecendo');
            else if (dados.status?.lesionado) imgEl.classList.add('status-lesionado');

            // Atualiza Textos
            document.getElementById(`nome-${dados.codigo}`).innerText = dados.nome || 'Desconhecido';

            // Atualiza Barras
            const percVida = Math.min(Math.max((dados.vida_atual / dados.vida_max) * 100, 0), 100) || 0;
            const percSani = Math.min(Math.max((dados.sani_atual / dados.sani_max) * 100, 0), 100) || 0;
            
            document.getElementById(`bar-vida-${dados.codigo}`).style.width = percVida + '%';
            document.getElementById(`text-vida-${dados.codigo}`).innerText = `${dados.vida_atual} / ${dados.vida_max}`;
            
            document.getElementById(`bar-sani-${dados.codigo}`).style.width = percSani + '%';
            document.getElementById(`text-sani-${dados.codigo}`).innerText = `${dados.sani_atual} / ${dados.sani_max}`;

            // Atualiza a Caixa de Munição
            const ammoSide = document.getElementById(`ammo-side-${dados.codigo}`);
            let ammoHtml = '';
            
            if (dados.fullData && dados.fullData.inv) {
                const armaEquipada = dados.fullData.inv.find(item => 
                    item.eq === true && 
                    item.type === 'arma' && 
                    item.atkType && item.atkType.toLowerCase().includes('disparo')
                );

                if (armaEquipada) {
                    const nomeCurto = armaEquipada.n.split(' ')[0]; 
                    ammoHtml = `
                        <div class="ammo-box">
                            <div class="ammo-icon">🔫</div>
                            <div class="ammo-details">
                                <span class="ammo-name">${nomeCurto}</span>
                                <span class="ammo-type">${armaEquipada.ammo}</span>
                            </div>
                            <div class="ammo-count">${armaEquipada.currentShots || 0}/${armaEquipada.capacity || 0}</div>
                        </div>
                    `;
                }
            }
            ammoSide.innerHTML = ammoHtml;
        });
    </script>
</body>
</html>
