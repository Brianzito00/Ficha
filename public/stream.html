<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG - Munição Dinâmica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&display=swap');

        body {
            margin: 0; padding: 20px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .foto-container {
            width: 130px; height: 130px;
            position: relative;
        }

        .foto {
            width: 100%; height: 100%;
            object-fit: cover;
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            transition: filter 0.3s;
        }

        .perigo {
            animation: pulse-red 1.5s infinite;
            filter: drop-shadow(0 0 15px #ff0000) !important;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 0px;
            font-family: 'Grenze Gotisch', cursive;
            font-size: 3rem;
            line-height: 0.9;
        }

        .val-vida { color: #ffcccc; text-shadow: 0 0 12px #ff4d4d, 0 0 5px #ff0000; }
        .val-sani { color: #e0e0ff; text-shadow: 0 0 12px #8080ff, 0 0 5px #0000ff; }
        .val-ammo { color: #ffffcc; text-shadow: 0 0 12px #ffcf33, 0 0 5px #ffae00; font-size: 2.8rem; }

        .setup-panel {
            position: fixed; bottom: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.85); border: 1px solid #ffcf33;
            padding: 8px; border-radius: 8px; display: flex; gap: 8px; z-index: 1000;
        }

        .setup-panel input { background: #000; border: 1px solid #444; color: white; width: 60px; text-align: center; }
        .setup-panel button { background: #222; color: #ffcf33; border: 1px solid #ffcf33; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <div class="setup-panel">
        <input type="text" id="codigo-input" placeholder="CÓD" maxlength="4">
        <button onclick="addPlayer()">ADD</button>
        <button onclick="limparSessao()" style="color: #ff4d4d; border-color: #ff4d4d;">LIMPAR</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        let activePlayers = JSON.parse(localStorage.getItem('overlay_players')) || [];

        window.onload = () => {
            activePlayers.forEach(code => renderPlayerCard(code));
            setTimeout(() => {
                activePlayers.forEach(code => socket.emit('request_player', code));
            }, 1000);
        };

        function addPlayer() {
            const code = document.getElementById('codigo-input').value.toUpperCase().trim();
            if (code && !activePlayers.includes(code)) {
                activePlayers.push(code);
                localStorage.setItem('overlay_players', JSON.stringify(activePlayers));
                renderPlayerCard(code);
                socket.emit('request_player', code);
                document.getElementById('codigo-input').value = "";
            }
        }

        function renderPlayerCard(code) {
            if (document.getElementById(`card-${code}`)) return;
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.innerHTML = `
                <div class="foto-container">
                    <img src="" id="foto-${code}" class="foto">
                </div>
                <div class="status-numbers">
                    <div class="val-vida" id="vida-${code}">0/0</div>
                    <div class="val-sani" id="sani-${code}">0/0</div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        function limparSessao() {
            localStorage.removeItem('overlay_players');
            activePlayers = [];
            container.innerHTML = "";
        }

        socket.on('update_mestre', (dados) => {
            if (activePlayers.includes(dados.codigo)) {
                const cod = dados.codigo;
                
                // Foto e Status Perigo
                const fotoEl = document.getElementById(`foto-${cod}`);
                if (fotoEl) {
                    fotoEl.src = dados.foto || 'https://via.placeholder.com/130';
                    const percVida = (dados.vida_atual / dados.vida_max) * 100;
                    fotoEl.classList.toggle('perigo', percVida <= 25);
                }
                
                // Vida e Sanidade
                document.getElementById(`vida-${cod}`).innerText = `${dados.vida_atual}/${dados.vida_max}`;
                document.getElementById(`sani-${cod}`).innerText = `${dados.sani_atual}/${dados.sani_max}`;
                
                // MUNIÇÃO DINÂMICA (APENAS ATUAL)
                const ammoEl = document.getElementById(`ammo-${cod}`);
                let muniAtual = "";

                if (dados.fullData && dados.fullData.inv) {
                    // Busca apenas a arma que está marcada como equipada E é de disparo
                    const armaEquipada = dados.fullData.inv.find(item => 
                        item.eq === true && 
                        item.type === 'arma' && 
                        (item.atkType && item.atkType.toLowerCase().includes('disparo'))
                    );

                    if (armaEquipada) {
                        // Exibe apenas o número atual (ex: 12)
                        muniAtual = armaEquipada.currentShots || "0";
                    }
                }
                
                ammoEl.innerText = muniAtual;
            }
        });
    </script>
</body>
</html>
