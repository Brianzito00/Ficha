<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG - Munição Amarela</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&display=swap');

        body {
            margin: 0; padding: 20px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
        }

        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .foto-container {
            width: 130px;
            height: 130px;
            position: relative;
        }

        .foto {
            width: 100%; height: 100%;
            object-fit: cover;
            /* Máscara para suavizar a base da imagem */
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* ESTILO DOS NÚMEROS COM GLOW */
        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 0px;
            font-family: 'Grenze Gotisch', cursive;
            font-size: 3rem;
            line-height: 0.9;
        }

        /* Cores e Brilhos baseados na sua imagem */
        .val-vida { 
            color: #ffcccc; 
            text-shadow: 0 0 12px #ff4d4d, 0 0 5px #ff0000; 
        }
        .val-sani { 
            color: #e0e0ff; 
            text-shadow: 0 0 12px #8080ff, 0 0 5px #0000ff; 
        }
        /* MUNIÇÃO AMARELA */
        .val-ammo { 
            color: #ffffcc; 
            text-shadow: 0 0 12px #ffcf33, 0 0 5px #ffae00; 
            font-size: 2.5rem; /* Um pouco menor para caber o "X/X" */
        }

        /* PAINEL DE CONTROLE (Inferior Direito) */
        .setup-panel {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ffcf33;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .setup-panel input {
            background: #000; border: 1px solid #444; color: white;
            width: 50px; text-align: center; border-radius: 4px;
        }

        .setup-panel button {
            background: #222; color: #ffcf33; border: 1px solid #ffcf33;
            cursor: pointer; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <div class="setup-panel">
        <input type="text" id="codigo-input" placeholder="CÓD" maxlength="4">
        <button onclick="addPlayer()">ADICIONAR</button>
        <button onclick="document.getElementById('multi-overlay-container').innerHTML=''">LIMPAR</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        let activePlayers = [];

        function addPlayer() {
            const code = document.getElementById('codigo-input').value.toUpperCase().trim();
            if (code && !activePlayers.includes(code)) {
                activePlayers.push(code);
                
                const div = document.createElement('div');
                div.className = 'player-card';
                div.id = `card-${code}`;
                div.innerHTML = `
                    <div class="foto-container">
                        <img src="" id="foto-${code}" class="foto">
                    </div>
                    <div class="status-numbers">
                        <div class="val-vida" id="vida-${code}">0/0</div>
                        <div class="val-sani" id="sani-${code}">0/0</div>
                        <div class="val-ammo" id="ammo-${code}">0</div>
                    </div>
                `;
                container.appendChild(div);
                socket.emit('request_player', code);
                document.getElementById('codigo-input').value = "";
            }
        }

        socket.on('update_mestre', (dados) => {
            if (activePlayers.includes(dados.codigo)) {
                // Foto
                document.getElementById(`foto-${dados.codigo}`).src = dados.foto || 'https://via.placeholder.com/130';
                
                // Vida e Sanidade
                document.getElementById(`vida-${dados.codigo}`).innerText = `${dados.vida_atual}/${dados.vida_max}`;
                document.getElementById(`sani-${dados.codigo}`).innerText = `${dados.sani_atual}/${dados.sani_max}`;
                
                // LÓGICA DA MUNIÇÃO
                let displayAmmo = "0";
                
                // Verifica se o objeto completo de inventário existe nos dados enviados
                if (dados.fullData && dados.fullData.inv) {
                    const armaEquipada = dados.fullData.inv.find(item => 
                        item.eq === true && 
                        item.type === 'arma' && 
                        (item.atkType && item.atkType.toLowerCase().includes('disparo'))
                    );

                    if (armaEquipada) {
                        // Se achar a arma, mostra Atual / Capacidade
                        displayAmmo = `${armaEquipada.currentShots || 0}/${armaEquipada.capacity || 0}`;
                    }
                } else if (dados.municao_atual !== undefined) {
                    // Caso o seu servidor envie um campo simples de munição
                    displayAmmo = dados.municao_atual;
                }

                document.getElementById(`ammo-${dados.codigo}`).innerText = displayAmmo;
            }
        });
    </script>
</body>
</html>
