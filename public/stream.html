<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG - Arma no Slot Ativo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&display=swap');

        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* ALINHAMENTO DOS CARDS E CORREÇÃO DE SOBREPOSIÇÃO */
        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
            z-index: 1;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .foto-container {
            width: 140px;
            height: 140px;
            position: relative;
        }

        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            transition: filter 0.3s;
        }

        .perigo {
            animation: pulse-red 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 15px #ff0000) !important;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* NÚMEROS ESTILO NEON ALINHADOS */
        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-family: 'Grenze Gotisch', cursive;
            font-size: 3.5rem;
            line-height: 0.8;
            user-select: none;
        }

        .val-vida { color: #ffcccc; text-shadow: 0 0 15px #ff4d4d, 0 0 5px #ff0000, 2px 2px 2px black; }
        .val-sani { color: #e0e0ff; text-shadow: 0 0 15px #8080ff, 0 0 5px #0000ff, 2px 2px 2px black; }
        .val-ammo { 
            color: #ffffcc; 
            text-shadow: 0 0 15px #ffcf33, 0 0 5px #ffae00, 2px 2px 2px black; 
            font-size: 2.8rem;
            margin-top: 5px;
        }

        /* PAINEL TOTALMENTE NO CANTO OPOSTO PARA NÃO ATRAPALHAR */
        .setup-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 8px;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .setup-panel input {
            background: #111; border: 1px solid #555; color: white;
            padding: 5px; width: 70px; text-align: center; border-radius: 4px; outline: none;
        }

        .setup-panel button {
            background: #333; color: #ffcf33; border: 1px solid #ffcf33;
            cursor: pointer; border-radius: 4px; font-weight: bold; padding: 5px 12px; font-size: 12px;
        }

        .setup-panel button:hover { background: #ffcf33; color: black; }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <div class="setup-panel">
        <input type="text" id="codigo-input" placeholder="CÓD" maxlength="4">
        <button onclick="addPlayer()">ADD</button>
        <button onclick="limparTudo()" style="color: #ff4d4d; border-color: #ff4d4d;">LIMPAR</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        let activePlayers = JSON.parse(localStorage.getItem('rpg_overlay_players')) || [];

        window.onload = () => {
            activePlayers.forEach(code => criarCardHTML(code));
            setTimeout(() => { activePlayers.forEach(code => socket.emit('request_player', code)); }, 1000);
        };

        function addPlayer() {
            const input = document.getElementById('codigo-input');
            const code = input.value.toUpperCase().trim();
            if (code && !activePlayers.includes(code)) {
                activePlayers.push(code);
                localStorage.setItem('rpg_overlay_players', JSON.stringify(activePlayers));
                criarCardHTML(code);
                socket.emit('request_player', code);
                input.value = "";
            }
        }

        function criarCardHTML(code) {
            if (document.getElementById(`card-${code}`)) return;
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.innerHTML = `
                <div class="foto-container"><img src="" id="foto-${code}" class="foto"></div>
                <div class="status-numbers">
                    <div class="val-vida" id="vida-${code}">--/--</div>
                    <div class="val-sani" id="sani-${code}">--/--</div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        function limparTudo() {
            localStorage.removeItem('rpg_overlay_players');
            activePlayers = [];
            container.innerHTML = "";
        }

        socket.on('update_mestre', (dados) => {
            if (activePlayers.includes(dados.codigo)) {
                const cod = dados.codigo;

                // 1. Atualiza Foto
                const fotoEl = document.getElementById(`foto-${cod}`);
                if (fotoEl) {
                    fotoEl.src = dados.foto || 'https://via.placeholder.com/140';
                    const percVida = (dados.vida_atual / dados.vida_max) * 100;
                    fotoEl.classList.toggle('perigo', percVida <= 25);
                }

                // 2. Atualiza Vida e Sanidade
                document.getElementById(`vida-${cod}`).innerText = `${dados.vida_atual || 0}/${dados.vida_max || 0}`;
                document.getElementById(`sani-${cod}`).innerText = `${dados.sani_atual || 0}/${dados.sani_max || 0}`;

                // 3. LÓGICA EXATA DO SLOT "ARMA ATIVA"
                const ammoEl = document.getElementById(`ammo-${cod}`);
                let muniTexto = "";

                // Verifica se a ficha enviou o ID da arma que está selecionada no dropdown
                if (dados.fullData && dados.fullData.arma_ativa_id && dados.fullData.inv) {
                    const idArmaNoSlot = dados.fullData.arma_ativa_id;
                    
                    // Busca aquela arma específica no inventário
                    const armaSelecionada = dados.fullData.inv.find(item => item.id === idArmaNoSlot);

                    // Se a arma existir e não for corpo-a-corpo (ou seja, se a munição for diferente de "Nenhuma")
                    if (armaSelecionada && armaSelecionada.ammo !== "Nenhuma") {
                        muniTexto = armaSelecionada.currentShots || "0";
                    }
                }
                
                // Se muniTexto for vazio, o campo simplesmente não aparece (ideal para armas de corpo a corpo)
                ammoEl.innerText = muniTexto;
            }
        });
    </script>
</body>
</html>
