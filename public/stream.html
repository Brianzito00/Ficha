<body>

    <button class="setup-btn" id="btn-config" onclick="toggleSetup()" style="position: absolute; top: 10px; left: 10px; width: 40px; z-index: 100; opacity: 0.5;">⚙️</button>

    <div class="setup-box" id="setup-box" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000;">
        <h3 style="color: var(--accent-blue); margin-top: 0;">Configurar Overlay</h3>
        <p style="font-size: 0.8em; color: #aaa;">Digite o código do jogador</p>
        <input type="text" id="codigo-input" class="setup-input" placeholder="EX: ABCD" maxlength="4">
        <button class="setup-btn" onclick="gerarLink()">CONECTAR</button>
        <button class="setup-btn" onclick="toggleSetup()" style="background: #333; color: white; margin-top: 5px;">FECHAR</button>
    </div>

    <div class="overlay-container" id="overlay">
        <div class="header">
            <img src="https://via.placeholder.com/70" id="char-foto" class="foto">
            <div>
                <div class="nome" id="char-nome">Desconhecido</div>
                <div class="detalhes" id="char-detalhes">NEX: 0%</div>
            </div>
        </div>

        <div class="bar-wrapper">
            <div class="bar-label" style="color: var(--accent-red);">VIDA</div>
            <div class="bar-bg">
                <div class="bar-fill fill-vida" id="bar-vida" style="width: 100%;"></div>
                <div class="bar-text" id="text-vida">0 / 0</div>
            </div>
        </div>

        <div class="bar-wrapper">
            <div class="bar-label" style="color: var(--accent-blue);">SANIDADE</div>
            <div class="bar-bg">
                <div class="bar-fill fill-sani" id="bar-sani" style="width: 100%;"></div>
                <div class="bar-text" id="text-sani">0 / 0</div>
            </div>
        </div>

        <div class="ammo-box" id="ammo-container" style="display: none;">
            <div style="display: flex; align-items: center;">
                <div class="ammo-icon">🔫</div>
                <div class="ammo-text">
                    <span id="ammo-weapon-name">Arma</span><br>
                    <span id="ammo-type" style="color: var(--accent-yellow);">Munição</span>
                </div>
            </div>
            <div class="ammo-count" id="ammo-count">0/0</div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let playerCode = urlParams.get('codigo');
        let currentSocket = null;

        // Inicialização
        if (!playerCode) {
            document.getElementById('setup-box').style.display = 'block';
        } else {
            document.getElementById('setup-box').style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            iniciarSocket(playerCode.toUpperCase());
        }

        function toggleSetup() {
            const box = document.getElementById('setup-box');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function gerarLink() {
            const val = document.getElementById('codigo-input').value.toUpperCase().trim();
            if(val.length > 0) {
                // Atualiza a URL sem recarregar a página inteira necessariamente
                window.location.href = window.location.pathname + '?codigo=' + val;
            }
        }

        function iniciarSocket(codigo) {
            if(currentSocket) currentSocket.disconnect();
            
            const socket = io();
            currentSocket = socket;

            socket.on('connect', () => {
                socket.emit('request_player', codigo);
                console.log("Conectado ao jogador:", codigo);
            });

            socket.on('update_mestre', (dados) => {
                if (dados.codigo !== codigo) return;
                atualizarInterface(dados);
            });
        }

        function atualizarInterface(dados) {
            document.getElementById('char-nome').innerText = dados.nome || 'Desconhecido';
            document.getElementById('char-detalhes').innerText = `NEX: ${dados.nex || 0}% | DEF: ${dados.defesa || 10}`;
            
            const fotoEl = document.getElementById('char-foto');
            fotoEl.src = dados.foto || 'https://via.placeholder.com/70';
            
            fotoEl.className = 'foto';
            if (dados.status?.morrendo) fotoEl.classList.add('status-morrendo');
            else if (dados.status?.enlouquecendo) fotoEl.classList.add('status-enlouquecendo');

            const percVida = Math.min(Math.max((dados.vida_atual / dados.vida_max) * 100, 0), 100) || 0;
            const percSani = Math.min(Math.max((dados.sani_atual / dados.sani_max) * 100, 0), 100) || 0;
            
            document.getElementById('bar-vida').style.width = percVida + '%';
            document.getElementById('text-vida').innerText = `${dados.vida_atual} / ${dados.vida_max}`;
            
            document.getElementById('bar-sani').style.width = percSani + '%';
            document.getElementById('text-sani').innerText = `${dados.sani_atual} / ${dados.sani_max}`;

            // Lógica de munição
            const ammoContainer = document.getElementById('ammo-container');
            let armaEquipada = null;

            if (dados.fullData && dados.fullData.inv) {
                armaEquipada = dados.fullData.inv.find(item => 
                    item.eq === true && 
                    item.type === 'arma' && 
                    item.atkType && item.atkType.toLowerCase().includes('disparo')
                );
            }

            if (armaEquipada) {
                ammoContainer.style.display = 'flex';
                let nomeCurto = armaEquipada.n.split(' ')[0];
                document.getElementById('ammo-weapon-name').innerText = nomeCurto;
                document.getElementById('ammo-type').innerText = armaEquipada.ammo || 'Padrão';
                document.getElementById('ammo-count').innerText = `${armaEquipada.currentShots || 0}/${armaEquipada.capacity || 0}`;
            } else {
                ammoContainer.style.display = 'none';
            }
        }
    </script>
</body>
