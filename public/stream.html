<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay de Stream - Ordem Paranormal</title>
    <style>
        :root {
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; 
            --accent-green: #00e676; --accent-red: #e53935;
        }

        /* FUNDO TRANSPARENTE PARA O STREAMLABS / OBS */
        body {
            margin: 0; padding: 20px; font-family: 'Roboto', sans-serif;
            background: transparent; color: white; overflow: hidden;
        }

        /* PAINEL DE CONTROLO SECRETO (Aparece ao passar o rato) */
        .admin-panel {
            background: rgba(18, 18, 20, 0.95); border: 2px solid var(--accent-blue);
            padding: 10px 15px; border-radius: 8px; display: flex; gap: 10px; align-items: center;
            margin-bottom: 20px; width: max-content;
            opacity: 0; transition: opacity 0.3s ease; /* Fica invisível na stream normal */
        }
        /* No Streamlabs, quando clicar em "Interagir", basta passar o rato aqui em cima para aparecer */
        body:hover .admin-panel { opacity: 1; }

        .admin-input { padding: 8px; background: #000; color: white; border: 1px solid #444; border-radius: 4px; font-weight: bold; text-transform: uppercase; text-align: center; width: 100px; }
        .admin-btn { background: var(--accent-blue); color: black; font-weight: bold; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .admin-btn:hover { filter: brightness(1.2); }

        /* LISTA DE JOGADORES NO OVERLAY */
        #party-container {
            display: flex; flex-direction: column; gap: 15px;
        }

        /* CARTÃO DO JOGADOR */
        .player-card {
            width: 320px;
            background: rgba(18, 18, 20, 0.85);
            border: 2px solid rgba(50, 50, 56, 0.8);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; gap: 15px;
            position: relative;
        }

        /* BOTÃO DE REMOVER (Só aparece ao passar o rato no cartão) */
        .btn-remove {
            position: absolute; top: -10px; left: -10px; background: var(--accent-red);
            color: white; border: none; border-radius: 50%; width: 24px; height: 24px;
            font-weight: bold; cursor: pointer; opacity: 0; transition: 0.2s; box-shadow: 0 0 10px black;
        }
        .player-card:hover .btn-remove { opacity: 1; }

        /* LADO ESQUERDO (INFORMAÇÕES E BARRAS) */
        .info-side { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .char-nome { font-size: 1.3em; font-weight: 900; color: var(--accent-yellow); text-transform: uppercase; margin: 0 0 2px 0; text-shadow: 1px 1px 3px black; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .char-stats { font-size: 0.7em; color: #a8a8b3; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }

        .bar-wrapper { margin-bottom: 6px; }
        .bar-label { font-size: 0.6em; font-weight: bold; margin-bottom: 2px; text-shadow: 1px 1px 2px black; letter-spacing: 1px; }
        .bar-bg { background: rgba(0,0,0,0.8); height: 18px; border-radius: 4px; border: 1px solid #333; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.75em; font-weight: 900; line-height: 18px; text-shadow: 1px 1px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }

        /* LADO DIREITO (FOTO) */
        .photo-side { flex: 0 0 90px; display: flex; align-items: center; justify-content: center; }
        .char-foto { width: 90px; height: 90px; object-fit: cover; border-radius: 10px; border: 2px solid var(--accent-blue); box-shadow: 0 0 15px rgba(0,0,0,0.8); transition: 0.3s; }

        /* CAIXA DE MUNIÇÃO */
        .ammo-box {
            background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 6px;
            padding: 4px 8px; display: flex; align-items: center; justify-content: space-between;
            margin-top: 5px;
        }
        .ammo-details { display: flex; flex-direction: column; }
        .ammo-name { font-size: 0.65em; color: white; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
        .ammo-type { font-size: 0.55em; color: var(--accent-yellow); text-transform: uppercase; font-weight: bold; }
        .ammo-count { font-size: 1.1em; font-weight: 900; color: white; text-shadow: 1px 1px 3px black; margin-left: 5px; }

        /* EFEITOS DE STATUS NA FOTO */
        .status-lesionado { border-color: var(--accent-red) !important; }
        .status-morrendo { border-color: var(--accent-red) !important; box-shadow: 0 0 20px var(--accent-red) !important; animation: pulseRed 1s infinite; }
        .status-enlouquecendo { border-color: var(--accent-blue) !important; box-shadow: 0 0 20px var(--accent-blue) !important; animation: pulseBlue 1s infinite; }

        @keyframes pulseRed { 0% { box-shadow: 0 0 5px var(--accent-red); } 50% { box-shadow: 0 0 25px var(--accent-red); } 100% { box-shadow: 0 0 5px var(--accent-red); } }
        @keyframes pulseBlue { 0% { box-shadow: 0 0 5px var(--accent-blue); } 50% { box-shadow: 0 0 25px var(--accent-blue); } 100% { box-shadow: 0 0 5px var(--accent-blue); } }
    </style>
</head>
<body>

    <div class="admin-panel" title="Este painel fica invisível no OBS se tirar o rato de cima">
        <input type="text" id="new-code" class="admin-input" placeholder="CÓDIGO" maxlength="4">
        <button class="admin-btn" onclick="addPlayer()">+ ADICIONAR AO OVERLAY</button>
    </div>

    <div id="party-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const partyContainer = document.getElementById('party-container');
        
        // Carrega os códigos salvos no navegador do OBS
        let streamCodes = JSON.parse(localStorage.getItem('stream_codes')) || [];

        // Ao conectar, pede os dados de todos os jogadores salvos
        socket.on('connect', () => {
            streamCodes.forEach(codigo => socket.emit('request_player', codigo));
        });

        // Adiciona um jogador novo ao overlay
        function addPlayer() {
            const input = document.getElementById('new-code');
            const codigo = input.value.toUpperCase().trim();
            if (codigo.length > 0 && !streamCodes.includes(codigo)) {
                streamCodes.push(codigo);
                localStorage.setItem('stream_codes', JSON.stringify(streamCodes));
                socket.emit('request_player', codigo);
            }
            input.value = '';
        }

        // Remove um jogador do overlay
        function removePlayer(codigo) {
            streamCodes = streamCodes.filter(c => c !== codigo);
            localStorage.setItem('stream_codes', JSON.stringify(streamCodes));
            const card = document.getElementById(`card-${codigo}`);
            if (card) card.remove();
        }

        // Recebe os dados em tempo real
        socket.on('update_mestre', (dados) => {
            if (!dados.codigo || !streamCodes.includes(dados.codigo)) return;

            let card = document.getElementById(`card-${dados.codigo}`);
            if (!card) {
                card = document.createElement('div');
                card.className = 'player-card';
                card.id = `card-${dados.codigo}`;
                partyContainer.appendChild(card);
            }

            // Cálculos das barras
            const percVida = Math.min(Math.max((dados.vida_atual / dados.vida_max) * 100, 0), 100) || 0;
            const percSani = Math.min(Math.max((dados.sani_atual / dados.sani_max) * 100, 0), 100) || 0;

            // Define Efeitos da Foto
            let fotoClass = "char-foto";
            if (dados.status?.morrendo) fotoClass += " status-morrendo";
            else if (dados.status?.enlouquecendo) fotoClass += " status-enlouquecendo";
            else if (dados.status?.lesionado) fotoClass += " status-lesionado";

            // Verifica a Arma de Disparo Equipada
            let ammoHtml = `<div class="ammo-box" style="display: none;"></div>`;
            if (dados.fullData && dados.fullData.inv) {
                const armaEquipada = dados.fullData.inv.find(item => 
                    item.eq === true && 
                    item.type === 'arma' && 
                    item.atkType && item.atkType.toLowerCase().includes('disparo')
                );

                if (armaEquipada) {
                    const nomeCurto = armaEquipada.n.split(' ')[0]; // Pega a primeira palavra para não quebrar o layout
                    ammoHtml = `
                        <div class="ammo-box">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <div style="font-size: 1.2em;">🔫</div>
                                <div class="ammo-details">
                                    <span class="ammo-name">${nomeCurto}</span>
                                    <span class="ammo-type">${armaEquipada.ammo}</span>
                                </div>
                            </div>
                            <div class="ammo-count">${armaEquipada.currentShots || 0} / ${armaEquipada.capacity || 0}</div>
                        </div>
                    `;
                }
            }

            // Constrói o HTML do Cartão
            card.innerHTML = `
                <button class="btn-remove" onclick="removePlayer('${dados.codigo}')" title="Remover do Ecrã">X</button>
                
                <div class="info-side">
                    <h3 class="char-nome">${dados.nome || 'Desconhecido'}</h3>
                    <div class="char-stats">NEX: ${dados.nex || 0}% &nbsp;|&nbsp; DEF: ${dados.defesa || 10}</div>
                    
                    <div class="bar-wrapper">
                        <div class="bar-label" style="color: var(--accent-red);">VIDA</div>
                        <div class="bar-bg">
                            <div class="bar-fill fill-vida" style="width: ${percVida}%;"></div>
                            <div class="bar-text">${dados.vida_atual} / ${dados.vida_max}</div>
                        </div>
                    </div>

                    <div class="bar-wrapper">
                        <div class="bar-label" style="color: var(--accent-blue);">SANIDADE</div>
                        <div class="bar-bg">
                            <div class="bar-fill fill-sani" style="width: ${percSani}%;"></div>
                            <div class="bar-text">${dados.sani_atual} / ${dados.sani_max}</div>
                        </div>
                    </div>

                    ${ammoHtml}
                </div>

                <div class="photo-side">
                    <img src="${dados.foto || 'https://via.placeholder.com/90'}" class="${fotoClass}">
                </div>
            `;
        });
    </script>
</body>
</html>
