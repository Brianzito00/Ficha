<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG - Ordem Paranormal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@700&display=swap');

        body {
            margin: 0; padding: 20px;
            background: transparent; /* Essencial para o OBS */
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* CONTAINER DOS CARDS */
        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* FOTO DO PERSONAGEM */
        .foto-container {
            width: 130px; height: 130px;
            position: relative;
        }

        .foto {
            width: 100%; height: 100%;
            object-fit: cover;
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            transition: filter 0.3s;
        }

        /* EFEITO DE PULSAR EM VERMELHO (VIDA BAIXA) */
        .perigo {
            animation: pulse-red 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 15px #ff0000) !important;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px #ff0000); }
            50% { opacity: 0.7; filter: drop-shadow(0 0 20px #ff0000); }
        }

        /* NÚMEROS ESTILO NEON */
        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 0px;
            font-family: 'Grenze Gotisch', cursive;
            font-size: 3.2rem;
            line-height: 0.85;
        }

        .val-vida { 
            color: #ffcccc; 
            text-shadow: 0 0 15px #ff4d4d, 0 0 5px #ff0000, 2px 2px 2px black; 
        }
        .val-sani { 
            color: #e0e0ff; 
            text-shadow: 0 0 15px #8080ff, 0 0 5px #0000ff, 2px 2px 2px black; 
        }
        .val-ammo { 
            color: #ffffcc; 
            text-shadow: 0 0 15px #ffcf33, 0 0 5px #ffae00, 2px 2px 2px black; 
            font-size: 2.8rem;
        }

        /* PAINEL DE CONFIGURAÇÃO (CANTO INFERIOR) */
        .setup-panel {
            position: fixed; bottom: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.85); border: 1px solid #ffcf33;
            padding: 10px; border-radius: 10px; display: flex; gap: 8px; z-index: 1000;
        }

        .setup-panel input { 
            background: #000; border: 1px solid #444; color: white; 
            width: 60px; text-align: center; font-weight: bold; border-radius: 4px;
        }

        .setup-panel button { 
            background: #222; color: #ffcf33; border: 1px solid #ffcf33; 
            cursor: pointer; font-weight: bold; padding: 4px 10px; border-radius: 4px; 
            transition: 0.2s;
        }

        .setup-panel button:hover { background: #ffcf33; color: black; }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <div class="setup-panel">
        <input type="text" id="codigo-input" placeholder="CÓD" maxlength="4">
        <button onclick="addPlayer()">ADD</button>
        <button onclick="limparSessao()" style="color: #ff4d4d; border-color: #ff4d4d;">LIMPAR</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        
        // Recupera jogadores salvos no navegador para não sumirem no F5
        let activePlayers = JSON.parse(localStorage.getItem('overlay_players')) || [];

        // Inicialização ao carregar a página
        window.onload = () => {
            activePlayers.forEach(code => renderPlayerCard(code));
            // Pequeno delay para garantir que o socket está pronto antes de pedir os dados
            setTimeout(() => {
                activePlayers.forEach(code => socket.emit('request_player', code));
            }, 1000);
        };

        // Função para adicionar novo jogador na tela
        function addPlayer() {
            const code = document.getElementById('codigo-input').value.toUpperCase().trim();
            if (code && !activePlayers.includes(code)) {
                activePlayers.push(code);
                localStorage.setItem('overlay_players', JSON.stringify(activePlayers));
                renderPlayerCard(code);
                socket.emit('request_player', code);
                document.getElementById('codigo-input').value = "";
            }
        }

        // Cria o HTML do card do jogador
        function renderPlayerCard(code) {
            if (document.getElementById(`card-${code}`)) return;
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.innerHTML = `
                <div class="foto-container">
                    <img src="" id="foto-${code}" class="foto">
                </div>
                <div class="status-numbers">
                    <div class="val-vida" id="vida-${code}">0/0</div>
                    <div class="val-sani" id="sani-${code}">0/0</div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        // Limpa a tela e a memória do navegador
        function limparSessao() {
            localStorage.removeItem('overlay_players');
            activePlayers = [];
            container.innerHTML = "";
        }

        // ESCUTA AS ATUALIZAÇÕES DO SERVIDOR
        socket.on('update_mestre', (dados) => {
            if (activePlayers.includes(dados.codigo)) {
                const cod = dados.codigo;
                
                // 1. Atualiza Foto e Alerta de Perigo (Vida <= 25%)
                const fotoEl = document.getElementById(`foto-${cod}`);
                if (fotoEl) {
                    fotoEl.src = dados.foto || 'https://via.placeholder.com/130';
                    const percVida = (dados.vida_atual / dados.vida_max) * 100;
                    fotoEl.classList.toggle('perigo', percVida <= 25);
                }
                
                // 2. Atualiza Vida e Sanidade
                document.getElementById(`vida-${cod}`).innerText = `${dados.vida_atual}/${dados.vida_max}`;
                document.getElementById(`sani-${cod}`).innerText = `${dados.sani_atual}/${dados.sani_max}`;
                
                // 3. Lógica da ARMA ATIVA (Sincronização Direta)
                const ammoEl = document.getElementById(`ammo-${cod}`);
                let muniExibicao = "";

                // O código olha DIRETAMENTE para o objeto arma_ativa enviado pelo servidor
                if (dados.arma_ativa) {
                    const arma = dados.Arma_Ativa;
                    // Verifica se a arma que está na mão é de disparo
                    const ehDisparo = arma.atkType && arma.atkType.toLowerCase().includes('disparo');
                    
                    if (ehDisparo) {
                        muniExibicao = arma.currentShots || "0";
                    }
                }
                
                // Atualiza o número amarelo (ou esconde se não for arma de disparo)
                ammoEl.innerText = muniExibicao;
            }
        });
    </script>
</body>
</html>
