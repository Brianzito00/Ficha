<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Stream - Ordem Paranormal</title>
    <style>
        :root {
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; 
            --accent-green: #00e676; --accent-red: #e53935;
        }

        /* FUNDO TRANSPARENTE PARA O OBS */
        body {
            margin: 0; padding: 20px; font-family: 'Roboto', sans-serif;
            background: transparent; color: white; overflow: hidden;
        }

        /* CAIXA PRINCIPAL DO OVERLAY */
        .overlay-container {
            width: 250px;
            background: rgba(18, 18, 20, 0.85);
            border: 2px solid rgba(50, 50, 56, 0.8);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 12px;
            display: none; /* Escondido até conectar */
        }

        .header { display: flex; align-items: center; gap: 15px; }
        .foto { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-blue); box-shadow: 0 0 10px rgba(0,0,0,0.8); transition: 0.3s; }
        .nome { font-size: 1.1em; font-weight: 900; color: var(--accent-yellow); text-transform: uppercase; margin: 0; text-shadow: 1px 1px 3px black; }
        .detalhes { font-size: 0.75em; color: #a8a8b3; font-weight: bold; }

        /* BARRAS */
        .bar-wrapper { margin-bottom: 5px; }
        .bar-label { font-size: 0.7em; font-weight: bold; margin-bottom: 3px; text-shadow: 1px 1px 2px black; }
        .bar-bg { background: rgba(0,0,0,0.8); height: 22px; border-radius: 6px; border: 1px solid #333; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-vida { background: linear-gradient(90deg, #8b0000, var(--accent-red)); }
        .fill-sani { background: linear-gradient(90deg, #01579b, var(--accent-blue)); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.85em; font-weight: 900; line-height: 22px; text-shadow: 1px 1px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }

        /* MUNIÇÃO */
        .ammo-box {
            background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 8px;
            padding: 8px; display: flex; align-items: center; justify-content: space-between;
        }
        .ammo-icon { font-size: 1.5em; margin-right: 10px; }
        .ammo-text { font-size: 0.75em; color: #a8a8b3; text-transform: uppercase; font-weight: bold; }
        .ammo-count { font-size: 1.3em; font-weight: 900; color: white; text-shadow: 1px 1px 3px black; }

        /* SETUP (QUANDO NÃO TEM CÓDIGO NO URL) */
        .setup-box {
            background: rgba(18,18,20,0.9); padding: 20px; border-radius: 10px; border: 1px solid var(--accent-blue); width: 300px; text-align: center;
        }
        .setup-input { padding: 10px; background: #000; color: white; border: 1px solid #444; border-radius: 6px; font-weight: bold; text-transform: uppercase; width: 80%; margin-bottom: 10px; text-align: center; }
        .setup-btn { background: var(--accent-blue); color: black; font-weight: bold; padding: 10px; border: none; border-radius: 6px; cursor: pointer; width: 85%; }

        /* EFEITOS DE STATUS */
        .status-morrendo { border-color: var(--accent-red) !important; box-shadow: 0 0 15px var(--accent-red) !important; animation: pulseRed 1s infinite; }
        .status-enlouquecendo { border-color: var(--accent-blue) !important; box-shadow: 0 0 15px var(--accent-blue) !important; animation: pulseBlue 1s infinite; }

        @keyframes pulseRed { 0% { box-shadow: 0 0 5px var(--accent-red); } 50% { box-shadow: 0 0 20px var(--accent-red); } 100% { box-shadow: 0 0 5px var(--accent-red); } }
        @keyframes pulseBlue { 0% { box-shadow: 0 0 5px var(--accent-blue); } 50% { box-shadow: 0 0 20px var(--accent-blue); } 100% { box-shadow: 0 0 5px var(--accent-blue); } }
    </style>
</head>
<body>

    <div class="setup-box" id="setup-box">
        <h3 style="color: var(--accent-blue); margin-top: 0;">Configurar Overlay</h3>
        <p style="font-size: 0.8em; color: #aaa;">Digite o código do jogador para gerar o link do Streamlabs/OBS.</p>
        <input type="text" id="codigo-input" class="setup-input" placeholder="EX: ABCD" maxlength="4">
        <button class="setup-btn" onclick="gerarLink()">GERAR OVERLAY</button>
    </div>

    <div class="overlay-container" id="overlay">
        
        <div class="header">
            <img src="https://via.placeholder.com/70" id="char-foto" class="foto">
            <div>
                <div class="nome" id="char-nome">Desconhecido</div>
                <div class="detalhes" id="char-detalhes">NEX: 0%</div>
            </div>
        </div>

        <div class="bar-wrapper">
            <div class="bar-label" style="color: var(--accent-red);">VIDA</div>
            <div class="bar-bg">
                <div class="bar-fill fill-vida" id="bar-vida" style="width: 100%;"></div>
                <div class="bar-text" id="text-vida">0 / 0</div>
            </div>
        </div>

        <div class="bar-wrapper">
            <div class="bar-label" style="color: var(--accent-blue);">SANIDADE</div>
            <div class="bar-bg">
                <div class="bar-fill fill-sani" id="bar-sani" style="width: 100%;"></div>
                <div class="bar-text" id="text-sani">0 / 0</div>
            </div>
        </div>

        <div class="ammo-box" id="ammo-container" style="display: none;">
            <div style="display: flex; align-items: center;">
                <div class="ammo-icon">🔫</div>
                <div class="ammo-text">
                    <span id="ammo-weapon-name">Arma</span><br>
                    <span id="ammo-type" style="color: var(--accent-yellow);">Munição</span>
                </div>
            </div>
            <div class="ammo-count" id="ammo-count">0/0</div>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const playerCode = urlParams.get('codigo');

        if (!playerCode) {
            // Se não tem código, mostra a caixa de setup
            document.getElementById('setup-box').style.display = 'block';
        } else {
            // Se tem código, esconde o setup, mostra o overlay e conecta ao socket
            document.getElementById('setup-box').style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            iniciarSocket(playerCode.toUpperCase());
        }

        function gerarLink() {
            const val = document.getElementById('codigo-input').value.toUpperCase().trim();
            if(val.length > 0) {
                // Recarrega a página colocando o código na URL
                window.location.href = window.location.pathname + '?codigo=' + val;
            }
        }

        function iniciarSocket(codigo) {
            const socket = io();

            socket.on('connect', () => {
                socket.emit('request_player', codigo);
            });

            socket.on('update_mestre', (dados) => {
                if (dados.codigo !== codigo) return;
                atualizarInterface(dados);
            });
        }

        function atualizarInterface(dados) {
            // Atualiza Info Base
            document.getElementById('char-nome').innerText = dados.nome || 'Desconhecido';
            document.getElementById('char-detalhes').innerText = `NEX: ${dados.nex || 0}% | DEF: ${dados.defesa || 10}`;
            
            // Atualiza Foto e Animações de Status
            const fotoEl = document.getElementById('char-foto');
            fotoEl.src = dados.foto || 'https://via.placeholder.com/70';
            
            fotoEl.className = 'foto'; // Reseta as classes
            if (dados.status?.morrendo) fotoEl.classList.add('status-morrendo');
            else if (dados.status?.enlouquecendo) fotoEl.classList.add('status-enlouquecendo');

            // Atualiza Barras
            const percVida = Math.min(Math.max((dados.vida_atual / dados.vida_max) * 100, 0), 100) || 0;
            const percSani = Math.min(Math.max((dados.sani_atual / dados.sani_max) * 100, 0), 100) || 0;
            
            document.getElementById('bar-vida').style.width = percVida + '%';
            document.getElementById('text-vida').innerText = `${dados.vida_atual} / ${dados.vida_max}`;
            
            document.getElementById('bar-sani').style.width = percSani + '%';
            document.getElementById('text-sani').innerText = `${dados.sani_atual} / ${dados.sani_max}`;

            // Atualiza Munição (Procura a arma equipada que seja de Disparo)
            const ammoContainer = document.getElementById('ammo-container');
            let armaEquipada = null;

            if (dados.fullData && dados.fullData.inv) {
                armaEquipada = dados.fullData.inv.find(item => 
                    item.eq === true && 
                    item.type === 'arma' && 
                    item.atkType && item.atkType.toLowerCase().includes('disparo')
                );
            }

            if (armaEquipada) {
                ammoContainer.style.display = 'flex';
                // Pega apenas o primeiro nome da arma para não quebrar o layout (ex: "Pistola Semiautomática" -> "Pistola")
                let nomeCurto = armaEquipada.n.split(' ')[0];
                document.getElementById('ammo-weapon-name').innerText = nomeCurto;
                document.getElementById('ammo-type').innerText = armaEquipada.ammo;
                document.getElementById('ammo-count').innerText = `${armaEquipada.currentShots || 0}/${armaEquipada.capacity || 0}`;
            } else {
                ammoContainer.style.display = 'none';
            }
        }
    </script>
</body>
</html>
