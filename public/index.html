<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RPG - Ordem Paranormal</title>
    <style>
        :root {
            --bg-body: #121214; --bg-card: rgba(20, 20, 24, 0.95);
            --border-color: rgba(50, 50, 56, 0.8); --text-primary: #e1e1e6; --text-secondary: #a8a8b3;
            --accent-blue: #00b0ff; --accent-yellow: #ffcf33; --accent-green: #00e676; --accent-red: #e53935;
        }

        body {
            font-family: 'Roboto', sans-serif; background-color: var(--bg-body);
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-primary); margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box;
        }

        .menu-container {
            background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 15px;
            padding: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            text-align: center; width: 100%; max-width: 400px;
        }

        .menu-title {
            font-size: 2em; font-weight: 900; color: white; text-transform: uppercase;
            margin-top: 0; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .menu-subtitle {
            color: var(--text-secondary); font-size: 0.9em; margin-bottom: 30px; font-style: italic;
        }

        .menu-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px;
            font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; border: 2px solid transparent; background: rgba(0,0,0,0.5);
        }

        .btn-player { color: var(--accent-blue); border-color: var(--accent-blue); }
        .btn-player:hover { background: var(--accent-blue); color: black; box-shadow: 0 0 15px var(--accent-blue); }

        .btn-master { color: var(--accent-red); border-color: var(--accent-red); }
        .btn-master:hover { background: var(--accent-red); color: white; box-shadow: 0 0 15px var(--accent-red); }

        .btn-stream { color: var(--accent-yellow); border-color: var(--accent-yellow); }
        .btn-stream:hover { background: var(--accent-yellow); color: black; box-shadow: 0 0 15px var(--accent-yellow); }

        /* MODAL DE LOGIN DO MESTRE */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 9999; justify-content: center; align-items: center;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #111; border: 2px solid var(--accent-red); border-radius: 12px;
            padding: 30px; width: 90%; max-width: 350px; text-align: center;
            box-shadow: 0 0 30px rgba(229, 57, 53, 0.4);
        }

        .modal-content h3 { color: var(--accent-red); margin-top: 0; text-transform: uppercase; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.8em; color: var(--text-secondary); margin-bottom: 5px; font-weight: bold;}
        .form-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 6px; color: white; box-sizing: border-box; font-size: 1em; }
        .form-input:focus { border-color: var(--accent-red); outline: none; }

        .msg-erro { color: var(--accent-red); font-size: 0.85em; font-weight: bold; margin-bottom: 15px; min-height: 15px; }

        .btn-action { background: var(--accent-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; text-transform: uppercase; }
        .btn-action:hover { filter: brightness(1.2); }
        
        .btn-cancel { background: transparent; color: var(--text-secondary); border: 1px solid #444; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-cancel:hover { background: #333; color: white; }

    </style>
</head>
<body>

    <div class="menu-container">
        <h1 class="menu-title">Sistema RPG</h1>
        <div class="menu-subtitle">Selecione o seu portal de acesso</div>

        <button class="menu-btn btn-player" onclick="abrirJogador()">
            🕵️ Ficha de Jogador
        </button>

        <button class="menu-btn btn-master" onclick="abrirModalMestre('/mestre.html')">
            🐉 Escudo do Mestre
        </button>

        <button class="menu-btn btn-stream" onclick="abrirModalMestre('/overlay.html')">
            📺 Overlay / Stream
        </button>
    </div>

    <div id="modal-login" class="modal-overlay" onclick="fecharModalMestre()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Acesso Restrito</h3>
            <p style="font-size: 0.8em; color: var(--text-secondary); margin-bottom: 20px;">Identifique-se para aceder às ferramentas do Mestre.</p>
            
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="mestre-user" class="form-input" placeholder="Digite o usuário">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="mestre-pass" class="form-input" placeholder="••••••••">
            </div>

            <div id="mestre-erro" class="msg-erro"></div>

            <button class="btn-action" onclick="verificarLogin()">Entrar</button>
            <button class="btn-cancel" onclick="fecharModalMestre()">Cancelar</button>
        </div>
    </div>

    <script>
        let destinoRestrito = '';

        // Encaminha os jogadores para a página de login e registo que criámos
        function abrirJogador() {
            window.location.href = '/login.html';
        }

        // Abre o popup de segurança para o Mestre/Stream
        function abrirModalMestre(destino) {
            destinoRestrito = destino;
            document.getElementById('mestre-erro').innerText = '';
            document.getElementById('mestre-user').value = '';
            document.getElementById('mestre-pass').value = '';
            document.getElementById('modal-login').style.display = 'flex';
            document.getElementById('mestre-user').focus();
        }

        // Fecha o popup
        function fecharModalMestre() {
            document.getElementById('modal-login').style.display = 'none';
        }

        // Verifica as credenciais de segurança
        function verificarLogin() {
            const user = document.getElementById('mestre-user').value.trim();
            const pass = document.getElementById('mestre-pass').value;

            // Credenciais fixas solicitadas
            if (user === 'DungeonMaster' && pass === '159159Bryan@') {
                window.location.href = destinoRestrito;
            } else {
                document.getElementById('mestre-erro').innerText = 'Acesso Negado: Usuário ou senha incorretos.';
            }
        }

        // Permite dar 'Enter' no teclado para fazer login
        document.getElementById('mestre-pass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verificarLogin();
            }
        });
    </script>
</body>
</html>
