<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Contos do Outro Lado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #b82bf2; --primary-hover: #d25aff;
            --player: #00b0ff; --player-hover: #33bfff;
            --master: #e53935; --master-hover: #ef5350;
            --success: #00e676; --bg-card: rgba(20, 20, 24, 0.6);
            --bg-input: rgba(255, 255, 255, 0.05); --border-input: rgba(255, 255, 255, 0.1);
            --text-muted: #a8a8b3;
        }

        body {
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #121214; color: white; font-family: 'Poppins', sans-serif;
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjKTXXlROZKTCRy58cJfdjVCw3XLueRPdoC5_Sfq6uErKvriHoomeeOGrnHTJ6LjmplkFSXfV1W-pS4pW1tU2CkNFO8PtUKlCzfO9qsPbY48iDU2wA2d0TGcUG-MA0e634RTWoUBdOpTVhz50k3nvxkXTdVYj1dfthCmp2Dpvw0rfSui-h3SDd-VB8jA2rH/w1322-h744/Fundo.jpg');
            background-size: cover; background-position: center;
        }
        
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(18,18,20,0.6) 100%); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: -1;
        }

        .lobby-box {
            background: var(--bg-card); padding: 40px; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(184, 43, 242, 0.15);
            width: 100%; max-width: 550px; text-align: center; position: relative; z-index: 1;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
        }

        .lobby-box.theme-home { box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(184, 43, 242, 0.15); }
        .lobby-box.theme-player { box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 176, 255, 0.15); }
        .lobby-box.theme-master { box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(229, 57, 53, 0.15); }

        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--primary); text-transform: uppercase; margin-top: 0; margin-bottom: 5px; font-size: 2.2em; font-weight: 800; text-shadow: 0 0 15px rgba(184, 43, 242, 0.5); letter-spacing: 1px; }
        h2 { font-weight: 700; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        p.subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 1.1em; font-weight: 400; }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .section-header h3 { margin: 0; font-size: 1.1em; color: white; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-choice {
            width: 100%; padding: 20px; margin-bottom: 15px; font-size: 1.1em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px;
            font-family: 'Poppins', sans-serif; position: relative; overflow: hidden;
        }
        
        .btn-player { background: rgba(0, 176, 255, 0.1); color: var(--player); border: 1px solid rgba(0, 176, 255, 0.3); }
        .btn-player:hover { background: var(--player); color: black; box-shadow: 0 8px 25px rgba(0, 176, 255, 0.4); transform: translateY(-2px); border-color: var(--player); }
        
        .btn-master { background: rgba(229, 57, 53, 0.1); color: var(--master); border: 1px solid rgba(229, 57, 53, 0.3); }
        .btn-master:hover { background: var(--master); color: white; box-shadow: 0 8px 25px rgba(229, 57, 53, 0.4); transform: translateY(-2px); border-color: var(--master); }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.85em; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .inv-input { width: 100%; padding: 14px 16px; background: var(--bg-input); border: 1px solid var(--border-input); border-radius: 8px; color: white; box-sizing: border-box; font-size: 1em; font-family: 'Poppins', sans-serif; transition: all 0.3s ease; }
        .inv-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(184, 43, 242, 0.15); background: rgba(255,255,255,0.08); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-card); border-radius: 16px; padding: 40px; width: 90%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.2); animation: slideUpFade 0.4s ease; box-sizing: border-box; }
        
        .btn-action { width: 100%; padding: 12px 20px; font-weight: 600; font-family: 'Poppins', sans-serif; letter-spacing: 0.5px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-action:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-action:active { transform: translateY(1px); }
        
        .btn-cancel { width: 100%; padding: 12px 20px; font-weight: 600; font-family: 'Poppins', sans-serif; letter-spacing: 0.5px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: all 0.2s; text-transform: uppercase; background: transparent; color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); color: white; border-color: rgba(255,255,255,0.3); }

        .btn-outline { background: transparent; border: 1px solid currentColor; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.2s; font-family: 'Poppins', sans-serif; text-transform: uppercase; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .list-container { display: flex; flex-direction: column; gap: 12px; max-height: 250px; overflow-y: auto; padding-right: 5px; margin-bottom: 25px; }
        .list-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; transition: all 0.2s; }
        .list-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
        .list-card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .card-title { color: white; font-size: 1.1em; font-weight: 600; text-transform: uppercase; word-break: break-all; }
        .card-subtitle { font-size: 0.8em; color: var(--text-muted); font-weight: 500; }
        .card-actions { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
        
        .theme-border-player { border-left: 4px solid var(--player); }
        .theme-border-master { border-left: 4px solid var(--master); }
        .btn-sm { padding: 8px 12px; font-size: 0.85em; margin: 0; width: auto; flex: 1; }
        .btn-icon { padding: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; margin: 0; flex: none; }
        .text-danger { color: var(--master) !important; border-color: rgba(229,57,53,0.3) !important; }
        .text-danger:hover { background: rgba(229,57,53,0.1) !important; border-color: var(--master) !important; color: white !important; }
        .empty-state { color: var(--text-muted); font-style: italic; text-align: center; padding: 20px 0; font-size: 0.9em; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <div id="view-home" class="lobby-box theme-home">
        <h1>Contos do Outro Lado</h1>
        <p class="subtitle">Bem-vindo(a), <span id="user-display" style="color: white; font-weight: 600;"></span></p>

        <button class="btn-choice btn-player" onclick="showView('jogador')">🕵️ SOU JOGADOR</button>
        <button class="btn-choice btn-master" onclick="showView('mestre')">👹 SOU MESTRE</button>

        <button class="btn-cancel" style="margin-top: 25px;" onclick="fazerLogout()">Sair da Conta</button>
    </div>

    <div id="view-jogador" class="lobby-box theme-player" style="display:none;">
        <h2 style="color: var(--player);">Área do Jogador</h2>
        
        <div class="section-header" style="border-bottom-color: rgba(0, 176, 255, 0.2);">
            <h3>As Minhas Campanhas</h3>
            <button class="btn-outline" style="color: var(--player); padding: 6px 12px; font-size: 0.8em; border-color: rgba(0, 176, 255, 0.5);" onclick="abrirModalJoinCampanha()">+ ENTRAR EM NOVA</button>
        </div>
        <div id="lista-campanhas-jogadas" class="list-container"></div>

        <div class="section-header">
            <h3>Arquivo de Fichas</h3>
            <button class="btn-outline" style="color: white; padding: 6px 12px; font-size: 0.8em; border-color: rgba(255,255,255,0.3);" onclick="criarNovaFicha()">+ CRIAR NOVA</button>
        </div>
        <div id="lista-fichas" class="list-container" style="max-height: 200px; margin-bottom: 20px;"></div>

        <button class="btn-cancel" onclick="showView('home')">Voltar ao Início</button>
    </div>

    <div id="view-mestre" class="lobby-box theme-master" style="display:none;">
        <h2 style="color: var(--master);">Área do Mestre</h2>
        
        <div class="section-header" style="border-bottom-color: rgba(229, 57, 53, 0.2);">
            <h3>As Minhas Mesas</h3>
            <button class="btn-outline" style="color: var(--master); padding: 6px 12px; font-size: 0.8em; border-color: rgba(229, 57, 53, 0.5);" onclick="document.getElementById('modal-criar-mesa').style.display='flex'">+ CRIAR MESA</button>
        </div>

        <div id="lista-mesas" class="list-container" style="max-height: 350px; margin-bottom: 20px;"></div>

        <button class="btn-cancel" onclick="showView('home')">Voltar ao Início</button>
    </div>


    <div id="modal-join-campanha" class="modal-overlay">
        <div class="modal-content" style="box-shadow: 0 20px 50px rgba(0, 176, 255, 0.15);">
            <h2 style="color: var(--player); margin-top: 0; text-align: center;">Acessar Campanha</h2>
            <div class="input-group">
                <label>Código da Campanha do Mestre</label>
                <input type="text" id="novo-join-code" class="inv-input" placeholder="Ex: OS-ESCOLHIDOS-123" style="text-transform: uppercase; border-color: rgba(0, 176, 255, 0.2);">
            </div>
            <button id="btn-modal-add-campanha" class="btn-action" style="background: var(--player); color: black;" onclick="adicionarCampanhaJogada()">ADICIONAR À LISTA</button>
            <button class="btn-cancel" onclick="fecharModais()">Cancelar</button>
        </div>
    </div>

    <div id="modal-escolher-ficha" class="modal-overlay">
        <div class="modal-content" style="box-shadow: 0 20px 50px rgba(0, 176, 255, 0.15);">
            <h2 style="color: var(--player); margin-top: 0; text-align: center;">Juntar-se à Mesa</h2>
            <p style="color: var(--text-muted); text-align: center; margin-bottom: 20px;">Campanha: <strong id="display-mesa-join" style="color: white; font-weight: 600; text-transform: uppercase;">---</strong></p>
            
            <div class="input-group">
                <label>Qual das suas fichas deseja usar?</label>
                <select id="select-ficha-join" class="inv-input" style="padding: 14px; color: white; border-color: rgba(0, 176, 255, 0.2);">
                </select>
            </div>
            
            <button id="btn-confirm-join" class="btn-action" style="background: var(--player); color: black;" onclick="confirmarEntradaMesa()">ENTRAR NA MESA</button>
            <button class="btn-cancel" onclick="fecharModais()">Cancelar</button>
        </div>
    </div>

    <div id="modal-criar-mesa" class="modal-overlay">
        <div class="modal-content" style="box-shadow: 0 20px 50px rgba(229, 57, 53, 0.15);">
            <h2 style="color: var(--master); margin-top: 0; text-align: center;">Nova Mesa de RPG</h2>
            <div class="input-group">
                <label>Nome da Campanha</label>
                <input type="text" id="create-nome" class="inv-input" placeholder="Ex: O Segredo na Floresta" style="border-color: rgba(229, 57, 53, 0.2);">
            </div>
            <div class="input-group">
                <label>Wallpaper da Mesa (Link da Imagem)</label>
                <input type="text" id="create-wp" class="inv-input" placeholder="O fundo muda para todos os jogadores..." style="border-color: rgba(229, 57, 53, 0.2);">
            </div>
            <button class="btn-action" style="background: var(--master);" onclick="criarMesa()">GERAR MESA</button>
            <button class="btn-cancel" onclick="fecharModais()">Cancelar</button>
        </div>
    </div>

    function getAutoImage(n, currentImg) { 
        if (currentImg && currentImg.trim() !== "") return currentImg; 
        const nLower = n.toLowerCase(); 
        for (let key in imgDict) { if (nLower.includes(key)) return imgDict[key]; } 
        return currentImg; 
    }
    
    function hasHeavyArmorEquipped() { 
        let hasIt = false; 
        document.querySelectorAll('.hidden-data-item').forEach(h => { 
            if(h.getAttribute('data-eq') === 'true') { 
                const n = h.getAttribute('data-n').toLowerCase(); 
                if(n.includes('proteção pesada') || n.includes('protecao pesada')) { hasIt = true; } 
            } 
        }); 
        return hasIt; 
    }

    function toggleStatus(type) { charStatus[type] = !charStatus[type]; updateProfilePicture(); save(); }

    function updateProfilePicture() {
        let imgUrl = charImages.normal || "https://static.vecteezy.com/ti/vetor-gratis/p1/35129568-silhueta-do-desconhecido-pessoa-com-face-escondido-coberto-e-mascarado-misterioso-estranho-homem-anonimo-personagem-ilustracao-isolado-em-branco-fundo-gratis-vetor.jpg";
        if (charStatus.morrendo && charImages.morrendo) imgUrl = charImages.morrendo; 
        else if (charStatus.inconsciente && charImages.inconsciente) imgUrl = charImages.inconsciente; 
        else if (charStatus.lesionado && charStatus.enlouquecendo && charImages.les_enlouq) imgUrl = charImages.les_enlouq; 
        else if (charStatus.enlouquecendo && charImages.enlouquecendo) imgUrl = charImages.enlouquecendo; 
        else if (charStatus.lesionado && charImages.lesionado) imgUrl = charImages.lesionado;
        
        let imgEl = document.getElementById('char_img_display');
        if(imgEl && imgEl.src !== imgUrl) { 
            imgEl.style.opacity = 0; 
            setTimeout(() => { imgEl.src = imgUrl; imgEl.onload = () => imgEl.style.opacity = 1; setTimeout(() => imgEl.style.opacity = 1, 100); }, 300); 
        }
        
        ['lesionado', 'inconsciente', 'morrendo', 'enlouquecendo'].forEach(s => { 
            let btn = document.getElementById('btn-status-' + s); 
            if(btn) { if(charStatus[s]) btn.classList.add('active-' + s); else btn.classList.remove('active-' + s); } 
        });
    }

    function applyOccupation(newOcc) { 
        const skillsMap = { "Academico": ["ciencias", "investigacao"], "AgenteSaude": ["intuicao", "medicina"], "Artista": ["artes", "enganacao"], "Atleta": ["acrobacia", "atletismo"], "Chef": ["fortitude", "profissao"], "Criminoso": ["crime", "furtividade"], "EntendedorOculto": ["ocultismo", "religiao"], "Engenheiro": ["profissao", "tecnologia"], "Desgarrado": ["fortitude", "sobrevivencia"], "Investigador": ["investigacao", "percepcao"], "Lutador": ["luta", "reflexos"], "Policial": ["pontaria", "percepcao"], "Religioso": ["religiao", "vontade"], "TI": ["investigacao", "tecnologia"], "Universitario": ["atualidades", "investigacao"], "Jornalista": ["atualidades", "investigacao"], "Revoltado": ["furtividade", "vontade"] }; 
        if(currentOccupation !== "Nenhuma" && skillsMap[currentOccupation]) { skillsMap[currentOccupation].forEach(s => { const chk = document.getElementById('chk_' + s); if(chk) { chk.checked = false; toggleTrained(s); } }); } 
        if(newOcc !== "Nenhuma" && skillsMap[newOcc]) { skillsMap[newOcc].forEach(s => { const chk = document.getElementById('chk_' + s); if(chk) { chk.checked = true; toggleTrained(s); } }); } 
        currentOccupation = newOcc; 
    }

    function updateStatusBars() { 
        const vA = parseInt(document.getElementById('vida_atual').value) || 0, vM = parseInt(document.getElementById('vida_max').value) || 1; 
        const sA = parseInt(document.getElementById('sani_atual').value) || 0, sM = parseInt(document.getElementById('sani_max').value) || 1; 
        document.getElementById('bar_vida').style.width = Math.min(Math.max((vA/vM)*100, 0), 100) + '%'; 
        document.getElementById('bar_sani').style.width = Math.min(Math.max((sA/sM)*100, 0), 100) + '%'; 
    }

    function openSkillPopup(sn, nome, attr, mod) { 
        document.getElementById('popup-skill-name').innerText = nome; 
        document.getElementById('popup-skill-attr-name').innerText = attr + " (x" + mod + ")"; 
        let atEl = document.getElementById("attr_"+attr.toLowerCase()); 
        let at = atEl ? parseInt(atEl.value)||0 : 0; 
        document.getElementById('popup-skill-natural').innerText = Math.floor(at * mod); 
        document.getElementById('popup-skill-trained').checked = document.getElementById('chk_'+sn).checked; 
        document.getElementById('popup-skill-bonus').value = document.getElementById('skill_'+sn).value; 
        document.getElementById('popup-skill-sn').value = sn; 
        document.getElementById('popup-skill-attr').value = attr; 
        document.getElementById('popup-skill-mod').value = mod; 
        updateSkillPopupCalc(); 
        document.getElementById('popup-skill-info').style.display = 'flex'; 
    }
    
    function updateSkillPopupCalc() { 
        let mod = parseFloat(document.getElementById('popup-skill-mod').value), attr = document.getElementById('popup-skill-attr').value; 
        let sn = document.getElementById('popup-skill-sn').value; 
        let atEl = document.getElementById("attr_"+attr.toLowerCase()); 
        let at = atEl ? parseInt(atEl.value)||0 : 0; 
        let natural = Math.floor(at * mod), bonus = parseInt(document.getElementById('popup-skill-bonus').value) || 0; 
        let trained = document.getElementById('popup-skill-trained').checked ? 10 : 0; 
        let penalty = (hasHeavyArmorEquipped() && ["luta", "acrobacia", "atletismo", "iniciativa", "reflexos"].includes(sn)) ? -5 : 0; 
        document.getElementById('popup-skill-total').innerText = natural + bonus + trained + penalty; 
    }
    
    function saveSkillPopup() { 
        let sn = document.getElementById('popup-skill-sn').value; 
        document.getElementById('chk_'+sn).checked = document.getElementById('popup-skill-trained').checked; 
        document.getElementById('skill_'+sn).value = document.getElementById('popup-skill-bonus').value; 
        toggleTrained(sn); 
        save(); 
        closeSkillPopup(); 
    }
    
    function closeSkillPopup() { document.getElementById('popup-skill-info').style.display = 'none'; }

    function confirmAddAbility() { 
        const n = document.getElementById('new-ability-name').value; 
        const d = document.getElementById('new-ability-desc').value; 
        if(!n) return; 
        addAbility(n, d); 
        closeAbilityPopup(); 
    }
    
    function addAbility(n, d) { 
        const id = Date.now().toString() + Math.floor(Math.random() * 100000).toString();
        const safeD = (d||"").replace(/"/g, "'"); 
        const div = document.createElement('div'); 
        div.className = 'ability-item'; 
        div.id = 'ability-'+id; 
        div.setAttribute('data-n', n); 
        div.setAttribute('data-d', safeD); 
        div.style.background = 'rgba(18, 18, 20, 0.8)'; 
        div.style.border = '1px solid rgba(51, 51, 51, 0.5)'; 
        div.style.borderRadius = '8px'; 
        div.style.padding = '10px'; 
        div.style.position = 'relative'; 
        div.innerHTML = `<button class="btn-del" style="position:absolute; top:5px; right:5px; padding:2px 6px; font-size:0.7em;" onclick="removeAbility('${id}')">X</button><div style="font-weight:bold; color:var(--accent-green); margin-bottom:5px; font-size:0.9em; text-transform:uppercase; padding-right:20px;">${n}</div><div style="color:var(--text-secondary); font-size:0.85em; white-space:pre-wrap;">${d}</div>`; 
        document.getElementById('abilities-list').appendChild(div); 
        save(); 
    }
    
    function removeAbility(id) { const el = document.getElementById('ability-'+id); if(el) { el.remove(); save(); } }

    function removeCustomCatalogItem(catType, itemName) { 
        if(confirm(`Tem a certeza que deseja apagar '${itemName}' do catálogo global?\nTodos perderão acesso a ele.`)) { 
            if (customCatalog[catType]) { 
                customCatalog[catType] = customCatalog[catType].filter(it => it.name.toLowerCase() !== itemName.toLowerCase()); 
                localStorage.setItem(keyCatalog, JSON.stringify(customCatalog)); 
                if (catType === 'rituals') { if(document.getElementById('popup-new-ritual').style.display === 'flex') renderRitualsCatalog(); } 
                else { renderPremadeCatalogs(); } 
                if (socket) socket.emit('remover_item_catalogo_global', { catType: catType, name: itemName }); 
            } 
        } 
    }

    function rolarDanoDesarmado() {
        const tipo = document.getElementById('char_tipo_corpo').value;
        let faces = 8;
        if (tipo === 'Pequeno') faces = 6;
        if (tipo === 'Grande') faces = 10;
        
        let roll = Math.floor(Math.random() * faces) + 1;
        let isCrit = lastAttackWasCrit;
        
        let total = roll;
        if(isCrit) {
            let roll2 = Math.floor(Math.random() * faces) + 1;
            total += roll2; 
        }
        
        if(total < 0) total = 0;
        
        let title = isCrit ? `DANO CRÍTICO<br>(DESARMADO)` : `DANO<br>(DESARMADO)`;
        let color = isCrit ? "color: #ffcf33; text-shadow: 0 0 15px #ff0000, 2px 2px 4px #000;" : "color: var(--accent-red); text-shadow: 2px 2px 4px #000;";
        showPopup(total, title, color);
        lastAttackWasCrit = false;
    }

    function updateWeight() {
        const forca = parseInt(document.getElementById('attr_for').value) || 0;
        const treinadoAtletismo = document.getElementById('chk_atletismo') ? document.getElementById('chk_atletismo').checked : false;
        
        let lim = 5 + Math.floor(forca / 2) + (treinadoAtletismo ? 10 : 0);

        let t = 0, bm = 0;
        document.querySelectorAll('.hidden-data-item').forEach(h => { 
            if(h.getAttribute('data-eq') === 'true') { 
                t += parseInt(h.getAttribute('data-w'))||0; 
                const n = h.getAttribute('data-n').toLowerCase(); 
                if(n.includes('mochila militar')||n.includes('mochila tática')||n.includes('mochila tatica')) { bm = Math.max(bm, 5); } 
                else if(n.includes('mochila')) { bm = Math.max(bm, 2); } 
            }
        });
        lim += bm; 
        
        let totalAmmo = 0;
        ["ammo_curta", "ammo_longa", "ammo_pesada", "ammo_especial"].forEach(id => totalAmmo += parseInt(document.getElementById(id).value)||0);
        t += Math.ceil(totalAmmo / 3);
        
        const fill = document.getElementById('weight-bar-fill'); 
        fill.style.width = lim>0 ? Math.min((t/lim)*100, 100)+"%" : "0%";
        document.getElementById('weight-text').innerText = `${t} / ${lim}`; 
        t > lim ? fill.classList.add('overweight') : fill.classList.remove('overweight');
    }

    function abrirModalQtdAtaques(maxAtk, n, id, ak, modPerc) { document.getElementById('max-atk-display').innerText = maxAtk; const input = document.getElementById('input-qtd-ataques'); input.max = maxAtk; input.value = maxAtk; input.oninput = function() { let val = parseInt(this.value); if (val > maxAtk) this.value = maxAtk; if (val < 1) this.value = 1; }; document.getElementById('modal-qtd-ataques').style.display = 'flex'; document.getElementById('btn-confirm-ataques').onclick = function() { let val = parseInt(input.value); if (isNaN(val) || val < 1) val = 1; if (val > maxAtk) val = maxAtk; fecharModalQtdAtaques(); rolarTesteD20(n, id, ak, modPerc, true, val); }; }

    function rolarTesteD20(n, id, ak, modPerc, eArma = false, qtdAtaquesForcado = null) {
        lastAttackWasCrit = false; let sn = id.replace("skill_",""); let skEl = document.getElementById(id); let sk = skEl ? parseInt(skEl.value)||0 : 0; let atEl = document.getElementById("attr_"+ak.toLowerCase()); let at = atEl ? parseInt(atEl.value)||0 : 0; let chkEl = document.getElementById("chk_"+sn); let tr = chkEl ? chkEl.checked : false;
        let penalty = (hasHeavyArmorEquipped() && ["luta", "acrobacia", "atletismo", "iniciativa", "reflexos"].includes(sn)) ? -5 : 0;
        let f = Math.floor(sk+(at*modPerc)+(tr?10:0) + penalty); let m = tabelaD20[f>20?20:f<1?1:f]; let numAttacks = 1; let cMarg = 20;

        if (eArma) { 
            const sel = document.getElementById('active-weapon-select'); 
            if (sel && sel.value && sel.style.display !== 'none' || equippedWeaponsData.length > 0) { 
                const wpId = sel && sel.value ? sel.value : equippedWeaponsData[0].id; 
                const wp = equippedWeaponsData.find(w => w.id === wpId); 
                if (wp) { 
                    if (wp.crit && wp.crit.toLowerCase() !== "nenhum") { 
                        let cStr = wp.crit.toLowerCase().replace(/\s/g, ''); 
                        if(cStr.includes('/')) { cMarg = parseInt(cStr.split('/')[0])||20; } 
                        else if (cStr.includes('x')) { cMarg = 20; } 
                        else { cMarg = parseInt(cStr)||20; } 
                    } 
                    if (wp.atk && parseInt(wp.atk) > 1) { 
                        let maxAtaquesPossiveis = parseInt(wp.atk); 
                        if (qtdAtaquesForcado === null) { abrirModalQtdAtaques(maxAtaquesPossiveis, n, id, ak, modPerc); return; } 
                        else { numAttacks = qtdAtaquesForcado; } 
                    } 
                } 
            } 
        }

        let resultsArray = []; let anyCrit = false; let allDesastre = true;
        for(let i=0; i<numAttacks; i++) {
            let d = Math.floor(Math.random()*20)+1; let isCrit = eArma ? (d >= cMarg) : false; if (isCrit) anyCrit = true; let textFormat = ""; let colorFormat = "";
            if (d === 1) { textFormat = "DESASTRE"; colorFormat = "color:#ff5252; text-shadow: 2px 2px 4px #000;"; } else { allDesastre = false; if (isCrit && eArma) { textFormat = "CRÍTICO"; colorFormat = "color:#ffcf33; text-shadow: 0 0 10px #ff0000, 2px 2px 4px #000;"; } else if (d >= m.e && m.e != 99) { textFormat = "EXTREMO"; colorFormat = "color:var(--accent-yellow); text-shadow: 2px 2px 4px #000;"; } else if (d >= m.b && m.b != 99) { textFormat = "BOM"; colorFormat = "color:var(--accent-blue); text-shadow: 2px 2px 4px #000;"; } else if (d >= m.n) { textFormat = "NORMAL"; colorFormat = "color:var(--accent-green); text-shadow: 2px 2px 4px #000;"; } else { textFormat = "FALHA"; colorFormat = "color:var(--accent-red); text-shadow: 2px 2px 4px #000;"; } }
            if (numAttacks > 1) { colorFormat = colorFormat.replace("text-shadow: 0 0 10px #ff0000, 2px 2px 4px #000;", "text-shadow: 2px 2px 4px #000;"); resultsArray.push(`<div style="${colorFormat} font-family: 'Permanent Marker', cursive; font-size: 0.7em; line-height: 1.2;">ATQ ${i+1}: ${d} (${textFormat})</div>`); } 
            else { showPopup(d, `${n}<br>(${textFormat})`, colorFormat); }
        }
        lastAttackWasCrit = anyCrit;
        if (numAttacks > 1) { let finalHtml = `<div style="margin-top:15px; display:flex; flex-direction:column; gap:5px; width:100%; align-items:center;">` + resultsArray.join('') + `</div>`; let actionText = anyCrit ? "MÚLTIPLO <span style='color:#ffcf33; font-size:0.6em; text-shadow:0 0 10px #f00;'>(CRÍTICO)</span>" : "MÚLTIPLO"; if (allDesastre) actionText = "MÚLTIPLO <span style='color:#ff5252; font-size:0.6em;'>(DESASTRE)</span>"; showPopup(numAttacks + "x", `${actionText}${finalHtml}`, "color:white; text-align:center;"); }
    }

    function rolarAtaqueArma(id) { const wp = equippedWeaponsData.find(w => w.id === id); if(!wp) return; let skillName = wp.skill ? wp.skill.trim() : "Luta"; let sn = skillName.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\W/g,"_"); let skillObj = periciasBase.find(p => p.nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\W/g,"_") === sn); if(!skillObj) { skillObj = periciasBase.find(p => p.nome === "Luta"); } rolarTesteD20(skillObj.nome, "skill_" + skillObj.nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\W/g,"_"), skillObj.attr, skillObj.mod, true); }
    
    function rolarDanoArma(id) { 
        const wp = equippedWeaponsData.find(w => w.id === id); if(!wp) return; let dmgBase = wp.dmg || "0"; let isCrit = lastAttackWasCrit; 
        if(isCrit && wp.crit && wp.crit.toLowerCase() !== "nenhum") { 
            let critMult = 2; 
            let cStr = wp.crit.toLowerCase().replace(/\s/g, ''); 
            if(cStr.includes('/')) { critMult = parseInt(cStr.split('/')[1].replace('x',''))||2; } 
            else if(cStr.includes('x')) { critMult = parseInt(cStr.replace('x',''))||2; } 
            dmgBase = dmgBase.replace(/(\d+)d(\d+)/ig, (match, p1, p2) => { return (parseInt(p1) * critMult) + "d" + p2; }); 
            dmgBase = dmgBase.replace(/(^|[^\d])d(\d+)/ig, (match, p1, p2) => { return p1 + critMult + "d" + p2; }); 
        } 
        let formula = dmgBase + "+" + (wp.extra || "0"); formula = formula.toLowerCase().replace(/\s/g, ''); 
        try { 
            const matches = formula.match(/([+-]?\d+d\d+|[+-]?\d+)/g); let t = 0; 
            if(matches) { matches.forEach(m => { let sign = m.startsWith('-') ? -1 : 1, cur = m.replace(/[+-]/,''); if(cur.includes('d')) { const parts = cur.split('d'); for(let i=0; i<(parseInt(parts[0])||1); i++) t += (Math.floor(Math.random()*parseInt(parts[1]))+1)*sign; } else t += parseInt(cur)*sign; }); } 
            let title = isCrit ? `DANO CRÍTICO<br>(${wp.name})` : `DANO<br>(${wp.name})`; let color = isCrit ? "color: #ffcf33; text-shadow: 0 0 15px #ff0000, 2px 2px 4px #000;" : "color: var(--accent-red); text-shadow: 2px 2px 4px #000;"; showPopup(t, title, color); 
        } catch(e) { alert("A arma não possui uma fórmula de dano válida!"); } 
        lastAttackWasCrit = false; 
    }

        localStorage.setItem('ordem_save_local_' + campanhaAtiva, JSON.stringify(d));
        fetch('/api/guardar_ficha', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: playerCode, fichaData: d }) }).catch(e => console.error(e));

        if (socket) { socket.emit('status_change', { codigo: myUpperCode, origin: socket.id, id: playerCode, nome: d.info.char_nome || 'Desconhecido', foto: currentImgUrl, nex: d.info.char_nex || 0, defesa: d.defense || 10, vida_atual: d.info.vida_atual || 0, vida_max: d.info.vida_max || 0, sani_atual: d.info.sani_atual || 0, sani_max: d.info.sani_max || 0, status: charStatus, fullData: d }); }
    }

    function exportFicha() { save(); const dataStr = localStorage.getItem('ordem_save_local_' + campanhaAtiva); if (!dataStr) { alert("Nenhum dado encontrado para exportar!"); return; } const blob = new Blob([dataStr], { type: "application/json" }); const url = URL.createObjectURL(blob); const charName = document.getElementById('char_nome').value || "Personagem"; const fileName = `${charName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_ficha.json`; const a = document.createElement('a'); a.href = url; a.download = fileName; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); }
    
    function importFicha(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const importedData = JSON.parse(e.target.result); localStorage.setItem('ordem_save_local_' + campanhaAtiva, JSON.stringify(importedData)); isLoadingData = true; populateData(importedData); save(); alert("Ficha carregada com sucesso!"); } catch (error) { alert("Erro ao importar a ficha."); } event.target.value = ''; }; reader.readAsText(file); }

    let timerAutoSave;
    function ativarAutoSave() {
        if (typeof viewCode !== 'undefined' && viewCode) return; 
        const statusTxt = document.getElementById('save-status'); if(statusTxt) { statusTxt.innerText = "A guardar..."; statusTxt.style.color = "var(--accent-yellow)"; }
        clearTimeout(timerAutoSave);
        timerAutoSave = setTimeout(() => { if(typeof save === 'function') save(); if(statusTxt) { statusTxt.innerText = "Guardado ✔️"; statusTxt.style.color = "var(--accent-green)"; setTimeout(() => { statusTxt.innerText = "Sincronizado na Nuvem ✔️"; statusTxt.style.color = "var(--text-secondary)"; }, 2000); } }, 3000);
    }
    
    document.addEventListener('input', ativarAutoSave); 
    document.addEventListener('change', ativarAutoSave); 
    document.addEventListener('click', (e) => { if(e.target.tagName === 'BUTTON' || e.target.closest('button')) ativarAutoSave(); });

    function init() {
        try {
            const nexSel = document.getElementById('char_nex');
            if (nexSel) {
                let nexHtml = '';
                for(let i=0; i<=95; i+=5) nexHtml += `<option value="${i}">${i}</option>`;
                nexHtml += `<option value="99">99</option>`;
                nexSel.innerHTML = nexHtml;
            }

            const attrContainer = document.getElementById('atributos-container');
            if (attrContainer) {
                attrContainer.innerHTML = '';
                ["Agilidade", "Força", "Intelecto", "Presença", "Vigor"].forEach(a => { 
                    let id = "attr_" + a.toLowerCase().substring(0,3); 
                    attrContainer.innerHTML += `<div class="attr-box"><label>${a}</label><input type="number" id="${id}" class="attr-input" value="1" oninput="updateAllPericias(); updateWeight(); updateDanoDesarmado();"><div class="attr-targets" id="${id}_targets"></div></div>`; 
                });
            }

            const periciasContainer = document.getElementById('pericias-container');
            if (periciasContainer) {
                periciasContainer.innerHTML = '';
                periciasBase.forEach(p => { 
                    let sn = p.nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\W/g,"_"); 
                    periciasContainer.innerHTML += `<div class="skill-card" id="card_${sn}" onclick="openSkillPopup('${sn}', '${p.nome}', '${p.attr}', ${p.mod})" style="cursor:pointer; display:flex; flex-direction:column; justify-content:space-between;"><div class="skill-header" style="margin-bottom: 8px;"><span style="font-size: 0.7em; font-weight: bold; text-transform: uppercase; color: var(--text-primary); pointer-events: none;">${p.nome}</span></div><div style="display:flex; justify-content:center; align-items:center; margin-bottom: 8px;"><button onclick="event.stopPropagation(); rolarTesteD20('${p.nome}','skill_${sn}','${p.attr}',${p.mod}, false)" class="btn-roll" style="width:100%; border-color:var(--accent-blue); background:rgba(0,176,255,0.1); display:flex; justify-content:center; align-items:center; padding: 6px 0;"><img src="https://blogger.googleusercontent.com/img/a/AVvXsEiftVk-yKnWxfthjGdnwF6awfHwHWNWsmhyKK4zNCLhhQkGaZrFRK6ccqywzrKpCZfj5XjphjWdPu0SlYHO1P4V3qxS1IOODUZ57HsAF8L5MhsYp-TUmIWnzJW97I18ccNp0DwiT6yoAL7acHi-cWVd0gAOFLAzGbaWFhuF9jwM5P9iJUs2S04wU8Xern4Y" style="width: 20px; height: 20px; filter: invert(1);"></button></div><div class="skill-targets" id="skill_${sn}_targets" style="pointer-events: none;"></div><input type="checkbox" id="chk_${sn}" style="display:none;"><input type="number" id="skill_${sn}" value="0" style="display:none;"></div>`; 
                });
            }

            if (viewCode) {
                const topBtns = document.getElementById('main-top-buttons'); if(topBtns) topBtns.style.display = 'none'; 
                if (socket) {
                    socket.on('connect', () => {
                        socket.emit('join_campaign', campanhaAtiva);
                        socket.emit('request_player', viewCode); 
                    });
                    socket.on('update_mestre', (dados) => { if (dados.codigo === viewCode && dados.fullData && dados.origin !== socket.id) { isLoadingData = true; populateData(dados.fullData); } });
                }
            } else { load(); }

            if (socket && !viewCode) {
                socket.on('connect', () => {
                    socket.emit('join_campaign', campanhaAtiva);
                    setTimeout(() => { if(!campanhaAtiva.includes("SOLO_")) { socket.emit('comando_mestre', { tipo: 'jogador_entrou', codigo: myUpperCode }); } save(); }, 500);
                }); 
                
                socket.on('mestre_pede_ficha', (codigoPedido) => { 
                    if ((codigoPedido || "").trim().toUpperCase() === myUpperCode) { save(); } 
                });

                socket.on('catalogo_inicial', (catalogoDoServidor) => {
                    let mudouLocal = false; let precisaReenviar = false; let itensParaMandarAoServidor = { items: [], melee: [], ranged: [], rituals: [] };
                    const mesclar = (cat) => {
                        if (!customCatalog[cat]) customCatalog[cat] = [];
                        if (!catalogoDoServidor[cat]) catalogoDoServidor[cat] = [];
                        catalogoDoServidor[cat].forEach(serverItem => { if (!customCatalog[cat].some(localItem => localItem.name.toLowerCase() === serverItem.name.toLowerCase())) { customCatalog[cat].push(serverItem); mudouLocal = true; } });
                        customCatalog[cat].forEach(localItem => { if (!catalogoDoServidor[cat].some(serverItem => serverItem.name.toLowerCase() === localItem.name.toLowerCase())) { itensParaMandarAoServidor[cat].push(localItem); precisaReenviar = true; } });
                    };
                    mesclar('items'); mesclar('melee'); mesclar('ranged'); mesclar('rituals');
                    if (mudouLocal || !localStorage.getItem(keyCatalog)) { localStorage.setItem(keyCatalog, JSON.stringify(customCatalog)); renderPremadeCatalogs(); if(document.getElementById('popup-new-ritual').style.display === 'flex') { renderRitualsCatalog(); } }
                    if (precisaReenviar) { socket.emit('sync_catalogo_reverso', itensParaMandarAoServidor); }
                });

                socket.on('item_removido_catalogo_global', (data) => {
                    const cat = data.catType;
                    if (customCatalog[cat]) {
                        customCatalog[cat] = customCatalog[cat].filter(it => it.name.toLowerCase() !== data.name.toLowerCase());
                        localStorage.setItem(keyCatalog, JSON.stringify(customCatalog));
                        if (cat === 'rituals') { if(document.getElementById('popup-new-ritual').style.display === 'flex') { renderRitualsCatalog(); } } else { renderPremadeCatalogs(); }
                    }
                });

                socket.on('comando_mestre', (dados) => {
                    const incCode = (dados.codigo || "").trim().toUpperCase();

                    if (incCode === myUpperCode) { 
                        if (dados.tipo === 'vida') changeStatus('vida', dados.delta); 
                        else if (dados.tipo === 'sani') changeStatus('sani', dados.delta); 
                        else if (dados.tipo === 'status') toggleStatus(dados.status); 
                    }

                    if (dados.tipo === 'expulsar_jogador' && incCode === myUpperCode) {
                        alert("Foi removido da mesa pelo Mestre.\nTerá de escolher uma ficha novamente se for adicionado.");
                        localStorage.removeItem('ficha_vinculada_' + campanhaAtiva);
                        localStorage.removeItem('ordem_save_local_' + campanhaAtiva);
                        fazerLogout(); 
                    }

                    if (dados.tipo === 'dar_item' && incCode === myUpperCode) {
                        addItemObj(dados.item); 
                        save(); 
                        alert(`🎁 O Mestre enviou-lhe um novo item: ${dados.item.n}! Foi adicionado à sua Mochila.`);
                    }

                    if (dados.tipo === 'dar_ritual' && incCode === myUpperCode) {
                        let descHTML = `<b style='color:var(--text-secondary);'>Normal:</b><br>${dados.ritual.descGeral}`; 
                        if(dados.ritual.descDisc !== "-") descHTML += `<br><br><b style='color:var(--text-secondary);'>Discente:</b><br>${dados.ritual.descDisc}`; 
                        if(dados.ritual.descVerd !== "-") descHTML += `<br><br><b style='color:var(--text-secondary);'>Verdadeiro:</b><br>${dados.ritual.descVerd}`;
                        const dHTML = `<div style='display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size: 0.85em;'><div><b style='color:var(--text-secondary);'>Círculo:</b> ${dados.ritual.circ}</div><div><b style='color:var(--text-secondary);'>Execução:</b> ${dados.ritual.ex}</div><div><b style='color:var(--text-secondary);'>Alcance:</b> ${dados.ritual.alc}</div><div><b style='color:var(--text-secondary);'>Alvo/Área:</b> ${dados.ritual.alv}</div><div><b style='color:var(--text-secondary);'>Duração:</b> ${dados.ritual.dur}</div><div><b style='color:var(--text-secondary);'>Resistência:</b> ${dados.ritual.res}</div><div style='grid-column: span 2; margin-top:8px;'>${descHTML}</div></div>`;
                        addRitual(dados.ritual.n, dados.ritual.el, dHTML, dados.ritual.circ, dados.ritual.ex, dados.ritual.alc, dados.ritual.alv, dados.ritual.dur, dados.ritual.res, dados.ritual.descGeral, dados.ritual.descDisc, dados.ritual.descVerd, true, dados.ritual.img);
                        save(); 
                        alert(`🔮 O Mestre ensinou-lhe um novo ritual: ${dados.ritual.n}! Foi adicionado ao seu Grimório.`);
                    }
                });

                socket.on('mestre_force_sync_player', (dados) => {
                    const incCode = (dados.codigo || "").trim().toUpperCase();
                    if (incCode === myUpperCode && dados.fullData) { isLoadingData = true; populateData(dados.fullData); localStorage.setItem('ordem_save_local_' + campanhaAtiva, JSON.stringify(dados.fullData)); }
                });
                
                socket.on('sync_item_catalogo_global', (data) => {
                    const cat = data.catType === 'item' ? 'items' : data.catType;
                    if (!customCatalog[cat]) customCatalog[cat] = [];
                    if (!customCatalog[cat].some(it => it.name.toLowerCase() === data.item.name.toLowerCase())) {
                        customCatalog[cat].push(data.item); localStorage.setItem(keyCatalog, JSON.stringify(customCatalog));
                        if(cat === 'rituals') { if(document.getElementById('popup-new-ritual').style.display === 'flex') renderRitualsCatalog(); } else { renderPremadeCatalogs(); }
                    }
                });
            }
            renderPremadeCatalogs(); 
        } catch(e) { console.error("Erro na inicialização:", e); }
    }

    function load() { 
        isLoadingData = true; 
        let s = localStorage.getItem('ordem_save_local_' + campanhaAtiva); 
        if(!s) { isLoadingData = false; updateDanoDesarmado(); return updateAllPericias(); } 
        try { populateData(JSON.parse(s)); } catch(e) { console.error("Erro ao carregar ficheiro local. Carregando em branco.", e); isLoadingData = false; updateAllPericias(); updateDanoDesarmado(); }
    }

    function populateData(d) {
        if(d.charImages) charImages = { ...charImages, ...d.charImages }; else if (d.info && d.info.char_img) charImages.normal = d.info.char_img;
        if(d.charStatus) charStatus = d.charStatus;
        if(d.info) { ["char_nome", "char_nex", "char_ocupacao", "char_origem", "char_nivel", "char_credito", "char_tipo_corpo", "vida_atual", "vida_max", "sani_atual", "sani_max"].forEach(id => { if(document.getElementById(id) && d.info[id] !== undefined) document.getElementById(id).value = d.info[id]; }); }
        updateProfilePicture(); currentOccupation = document.getElementById('char_ocupacao') ? document.getElementById('char_ocupacao').value : "Nenhuma";
        for(let id in d.attrs) if(document.getElementById(id)) document.getElementById(id).value = d.attrs[id];
        for(let id in d.skills) { const el = document.getElementById(id); if(el) { if(el.type==='checkbox') el.checked = d.skills[id]; else el.value = d.skills[id]; } }
        if(d.ammo) for(let id in d.ammo) if(document.getElementById(id)) document.getElementById(id).value = d.ammo[id];
        if(d.defense) document.getElementById('defense_val').value = d.defense;
        
        document.getElementById('inventory-body').innerHTML = ''; 
        if(d.inv) d.inv.forEach(i => { addItemObj({ id: i.id||Date.now(), n: i.n, w: i.w, d: i.d, eq: i.eq, type: i.type, dmg: i.dmg, extra: i.extra, crit: i.crit, skill: i.skill, img: i.img, atkType: i.atkType, atk: i.atk, range: i.range, ammo: i.ammo, capacity: i.capacity, currentShots: i.currentShots }); });
        
        document.getElementById('abilities-list').innerHTML = ''; if(d.abilities) d.abilities.forEach(a => addAbility(a.n, a.d));
        
        document.getElementById('rituals-body').innerHTML = '';
        if(d.rituals) d.rituals.forEach(r => { const descGeral = r.descGeral || r.desc || "Sem descrição.", descDisc = r.descDisc || "-", descVerd = r.descVerd || "-"; let descHTML = `<b style='color:var(--text-secondary);'>Normal:</b><br>${descGeral}`; if(descDisc !== "-") descHTML += `<br><br><b style='color:var(--text-secondary);'>Discente:</b><br>${descDisc}`; if(descVerd !== "-") descHTML += `<br><br><b style='color:var(--text-secondary);'>Verdadeiro:</b><br>${descVerd}`; const dHTML = `<div style='display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size: 0.85em;'><div><b style='color:var(--text-secondary);'>Círculo:</b> ${r.circ||'1º'}</div><div><b style='color:var(--text-secondary);'>Execução:</b> ${r.ex||'-'}</div><div><b style='color:var(--text-secondary);'>Alcance:</b> ${r.alc||'-'}</div><div><b style='color:var(--text-secondary);'>Alvo/Área:</b> ${r.alv||'-'}</div><div><b style='color:var(--text-secondary);'>Duração:</b> ${r.dur||'-'}</div><div><b style='color:var(--text-secondary);'>Resistência:</b> ${r.res||'-'}</div><div style='grid-column: span 2; margin-top:8px;'>${descHTML}</div></div>`; addRitual(r.n, r.el, dHTML, r.circ||'1º', r.ex||'-', r.alc||'-', r.alv||'-', r.dur||'-', r.res||'-', descGeral, descDisc, descVerd, r.eq !== false, r.img || ""); });
        
        updateStatusBars(); updateAllPericias(); updateWeight(); updateWeaponsDisplay(); updateRitualsCount(); updateLearnedRitualsDisplay(); updateDanoDesarmado();
        
        if (d.arma_ativa_id) { const sel = document.getElementById('active-weapon-select'); if (sel && equippedWeaponsData.some(wp => wp.id === d.arma_ativa_id)) { sel.value = d.arma_ativa_id; renderActiveWeapon(); } }
        document.querySelectorAll('[id^="chk_"]').forEach(c => { if(c.checked) toggleTrained(c.id.replace('chk_','')); }); isLoadingData = false; 
    }
    
    init();
</script>
</body>
</html>
