<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG - Stream Minimalist</title>
    <style>
        /* Importação da sua fonte personalizada Gabriele Bad */
        @font-face {
            font-family: 'Gabriele Bad';
            src: url('gabriele-bad.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
            z-index: 1;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .foto-container {
            width: 120px;
            height: 120px;
            position: relative;
        }

        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        /* CONFIGURAÇÃO DOS NÚMEROS COM A NOVA FONTE */
        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 5px; 
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 2.8rem; 
            line-height: 0.9;
            user-select: none;
            transform: skewX(-15deg); 
            letter-spacing: 2px;
        }

        /* EFEITO GLOW (NEON) */
        .val-vida { 
            color: white; 
            text-shadow: 
                0 0 8px #ff0000, 
                0 0 15px #ff0000, 
                0 0 30px #ff0000; 
        }
        
        .val-sani { 
            color: white; 
            text-shadow: 
                0 0 8px #00aaff, 
                0 0 15px #00aaff, 
                0 0 30px #0088ff; 
        }
        
        .val-ammo { 
            color: white; 
            text-shadow: 
                0 0 8px #ffcf33, 
                0 0 15px #ffcf33, 
                0 0 30px #ffae00; 
            font-size: 2rem;
            margin-top: 5px;
        }

        /* PAINEL DE CONTROLE */
        .setup-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 8px;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .setup-panel input {
            background: #111; border: 1px solid #555; color: white;
            padding: 5px; width: 100px; text-align: center; border-radius: 4px; outline: none;
        }

        .setup-panel button {
            background: #333; color: #ffcf33; border: 1px solid #ffcf33;
            cursor: pointer; border-radius: 4px; font-weight: bold; padding: 5px 12px; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <div class="setup-panel">
        <input type="text" id="codigo-input" placeholder="USUÁRIO">
        <button onclick="addPlayer()">ADD</button>
        <button onclick="limparTudo()" style="color: #ff4d4d; border-color: #ff4d4d;">LIMPAR</button>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        let activePlayers = JSON.parse(localStorage.getItem('rpg_overlay_players')) || [];

        window.onload = () => {
            activePlayers.forEach(code => criarCardHTML(code));
            setTimeout(() => { activePlayers.forEach(code => socket.emit('request_player', code)); }, 1000);
        };

        function addPlayer() {
            const input = document.getElementById('codigo-input');
            const code = input.value.toUpperCase().trim();
            if (code && !activePlayers.includes(code)) {
                activePlayers.push(code);
                localStorage.setItem('rpg_overlay_players', JSON.stringify(activePlayers));
                criarCardHTML(code);
                socket.emit('request_player', code);
                input.value = "";
            }
        }

        function criarCardHTML(code) {
            if (document.getElementById(`card-${code}`)) return;
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.innerHTML = `
                <div class="foto-container"><img src="" id="foto-${code}" class="foto"></div>
                <div class="status-numbers">
                    <div class="val-vida" id="vida-${code}">00/00</div>
                    <div class="val-sani" id="sani-${code}">00/00</div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        function limparTudo() {
            localStorage.removeItem('rpg_overlay_players');
            activePlayers = [];
            container.innerHTML = "";
        }

        socket.on('update_mestre', (dados) => {
            if (activePlayers.includes(dados.codigo)) {
                const cod = dados.codigo;
                const fotoEl = document.getElementById(`foto-${cod}`);
                if (fotoEl) fotoEl.src = dados.foto || 'https://via.placeholder.com/140';

                document.getElementById(`vida-${cod}`).innerText = `${dados.vida_atual || 0}/${dados.vida_max || 0}`;
                document.getElementById(`sani-${cod}`).innerText = `${dados.sani_atual || 0}/${dados.sani_max || 0}`;

                const ammoEl = document.getElementById(`ammo-${cod}`);
                let muniTexto = "";
                if (dados.fullData && dados.fullData.arma_ativa_id && dados.fullData.inv) {
                    const arma = dados.fullData.inv.find(item => item.id === dados.fullData.arma_ativa_id);
                    if (arma && arma.ammo !== "Nenhuma") muniTexto = arma.currentShots || "0";
                }
                ammoEl.innerText = muniTexto;
            }
        });
    </script>
</body>
</html>
