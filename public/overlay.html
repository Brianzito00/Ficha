<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG</title>
    <style>
        /* Importação da sua fonte personalizada Gabriele Bad */
        @font-face {
            font-family: 'Gabriele Bad';
            src: url('gabriele-bad.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* GRADE 4x8 CONFIGURADA AQUI */
        #multi-overlay-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colunas lado a lado */
            grid-template-rows: repeat(8, auto);   /* 8 linhas */
            gap: 20px 40px; /* Espaçamento vertical e horizontal */
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px; 
            animation: fadeIn 0.6s ease-out;
            cursor: pointer; /* Cursor de "mãozinha" para indicar clique */
            transition: transform 0.2s, filter 0.2s;
        }

        /* Efeito ao passar o rato no OBS/Browser para indicar que pode apagar */
        .player-card:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Animação para quando clica em apagar */
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.8); }
        }

        .foto-container {
            width: 105px; 
            height: 105px;
            position: relative;
            flex-shrink: 0;
        }

        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            /* ANIMAÇÃO DE FADE NA TROCA DE FOTO */
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
        }

        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 2px; 
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 2.3rem; 
            font-weight: normal;
            line-height: 0.9;
            user-select: none;
            letter-spacing: 2px;
        }

        /* EFEITOS GLOW (NEON) */
        .val-vida { 
            color: white; 
            text-shadow: 0 0 8px #ff0000, 0 0 15px #ff0000, 0 0 30px #ff0000; 
        }
        
        .val-sani { 
            color: white; 
            text-shadow: 0 0 8px #00aaff, 0 0 15px #00aaff, 0 0 30px #0088ff; 
        }
        
        .val-ammo { 
            color: white; 
            text-shadow: 0 0 8px #ffcf33, 0 0 15px #ffcf33, 0 0 30px #ffae00; 
            font-size: 1.6rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        
        // LÊ O CÓDIGO DA MESA DIRETAMENTE DO LINK DO STREAMLABS (?mesa=MESA-123)
        const urlParams = new URLSearchParams(window.location.search);
        let campanhaAtiva = urlParams.get('mesa') || localStorage.getItem('campanha_atual');
        
        // Puxa os jogadores ISOLADOS desta mesa específica
        let activePlayers = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];

        function atualizarOverlay() {
            const cardsAtuais = Array.from(container.children).map(c => c.id.replace('card-', ''));
            
            // Apaga quem o Mestre tirou
            cardsAtuais.forEach(code => {
                if (!activePlayers.includes(code)) {
                    const el = document.getElementById(`card-${code}`);
                    if (el) el.remove();
                }
            });

            // Adiciona quem o Mestre colocou
            activePlayers.forEach(code => {
                if (!document.getElementById(`card-${code}`)) {
                    criarCardHTML(code);
                    if (campanhaAtiva) {
                        socket.emit('request_player', code);
                    }
                }
            });
        }

        function criarCardHTML(code) {
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.title = "Clique para remover do Overlay"; 
            
            div.onclick = () => removerDoOverlay(code);
            
            div.innerHTML = `
                <div class="foto-container"><img src="" id="foto-${code}" class="foto"></div>
                <div class="status-numbers">
                    <div class="val-vida" id="vida-${code}">00/00</div>
                    <div class="val-sani" id="sani-${code}">00/00</div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        // REMOVER O JOGADOR AO CLICAR NA TELA (OBS)
        function removerDoOverlay(code) {
            const el = document.getElementById(`card-${code}`);
            if (el) {
                el.style.animation = 'fadeOut 0.4s ease-in forwards'; 
                
                setTimeout(() => {
                    el.remove();
                    activePlayers = activePlayers.filter(c => c !== code);
                    
                    // ATUALIZA A CHAVE DA MESA ATUAL
                    localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(activePlayers));
                    
                    // Avisa a sala/campanha que apagou
                    if (campanhaAtiva) {
                        socket.emit('comando_mestre', { tipo: 'remover_jogador_mestre', codigo: code });
                    }
                }, 400); 
            }
        }

        window.onload = () => {
            atualizarOverlay();
            setInterval(() => {
                if(campanhaAtiva) {
                    activePlayers.forEach(code => socket.emit('request_player', code));
                }
            }, 10000);
        };

        // Sincronização via Memória do Navegador
        window.addEventListener('storage', (e) => {
            // VERIFICA APENAS A CHAVE DA MESA ATUAL
            if (e.key === 'mestre_allowed_codes_' + campanhaAtiva) {
                activePlayers = JSON.parse(e.newValue) || [];
                atualizarOverlay();
            }
            // Se o Mestre mudar de mesa no Chrome, o Overlay acompanha se não tiver URL fixo
            if (e.key === 'campanha_atual' && !urlParams.get('mesa')) {
                campanhaAtiva = e.newValue;
                activePlayers = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];
                socket.emit('join_campaign', campanhaAtiva);
                socket.emit('comando_mestre', { tipo: 'request_overlay_sync' });
                atualizarOverlay();
            }
        });

        // Sincronização via Socket (Pede os jogadores ao Chrome do Mestre)
        socket.on('connect', () => {
            if (campanhaAtiva) {
                socket.emit('join_campaign', campanhaAtiva);
                // Quando o OBS conecta, ele "grita" para o Chrome do Mestre pedindo os jogadores da mesa
                socket.emit('comando_mestre', { tipo: 'request_overlay_sync' });
            }
        });

        // O Chrome do Mestre responde e o OBS/Overlay atualiza a tela
        socket.on('comando_mestre', (dados) => {
            if (dados.tipo === 'sync_overlay' && dados.players) {
                activePlayers = dados.players;
                // SALVA EXCLUSIVAMENTE PARA A MESA ATUAL
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(activePlayers));
                atualizarOverlay();
            }
        });

        socket.on('update_mestre', (dados) => {
            const codPuro = dados.codigo; 
            
            if (activePlayers.includes(codPuro)) {
                
                // LÓGICA DE ATUALIZAÇÃO DA FOTO COM ANIMAÇÃO FADE
                const fotoEl = document.getElementById(`foto-${codPuro}`);
                const novaFoto = dados.foto || 'https://via.placeholder.com/140';
                
                if (fotoEl && fotoEl.getAttribute('src') !== novaFoto) {
                    fotoEl.style.opacity = 0; // Inicia o fade out
                    setTimeout(() => {
                        fotoEl.src = novaFoto; // Troca a imagem enquanto invisível
                        fotoEl.setAttribute('src', novaFoto);
                        
                        // Faz fade in quando a imagem carregar
                        fotoEl.onload = () => fotoEl.style.opacity = 1; 
                        
                        // Fallback de segurança se falhar o onload
                        setTimeout(() => fotoEl.style.opacity = 1, 100);
                    }, 300);
                }

                // ATUALIZAÇÃO DA VIDA E SANIDADE
                const vidaEl = document.getElementById(`vida-${codPuro}`);
                const saniEl = document.getElementById(`sani-${codPuro}`);
                
                if(vidaEl) vidaEl.innerText = `${dados.vida_atual || 0}/${dados.vida_max || 0}`;
                if(saniEl) saniEl.innerText = `${dados.sani_atual || 0}/${dados.sani_max || 0}`;

                // ATUALIZAÇÃO DAS BALAS (MUNIÇÃO DA ARMA ATIVA)
                const ammoEl = document.getElementById(`ammo-${codPuro}`);
                let muniTexto = "";
                if (dados.fullData && dados.fullData.arma_ativa_id && dados.fullData.inv) {
                    const arma = dados.fullData.inv.find(item => item.id === dados.fullData.arma_ativa_id);
                    if (arma && arma.ammo !== "Nenhuma") muniTexto = arma.currentShots || "0";
                }
                if(ammoEl) ammoEl.innerText = muniTexto;
            }
        });
    </script>
</body>
</html>
