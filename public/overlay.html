<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG - Stream Minimalist</title>
    <style>
        /* Importação da sua fonte personalizada Gabriele Bad */
        @font-face {
            font-family: 'Gabriele Bad';
            src: url('gabriele-bad.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #multi-overlay-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
            z-index: 1;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .foto-container {
            width: 120px;
            height: 120px;
            position: relative;
        }

        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 5px; 
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 2.8rem; 
            font-weight: normal;
            line-height: 0.9;
            user-select: none;
            letter-spacing: 2px;
        }

        .val-vida { 
            color: white; 
            text-shadow: 0 0 8px #ff0000, 0 0 15px #ff0000, 0 0 30px #ff0000; 
        }
        
        .val-sani { 
            color: white; 
            text-shadow: 0 0 8px #00aaff, 0 0 15px #00aaff, 0 0 30px #0088ff; 
        }
        
        .val-ammo { 
            color: white; 
            text-shadow: 0 0 8px #ffcf33, 0 0 15px #ffcf33, 0 0 30px #ffae00; 
            font-size: 2rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        
        // Puxa da memória local caso estejas a abrir no mesmo browser
        let activePlayers = JSON.parse(localStorage.getItem('mestre_allowed_codes')) || [];

        function atualizarOverlay() {
            const cardsAtuais = Array.from(container.children).map(c => c.id.replace('card-', ''));
            
            // Apaga quem o Mestre tirou
            cardsAtuais.forEach(code => {
                if (!activePlayers.includes(code)) {
                    const el = document.getElementById(`card-${code}`);
                    if (el) el.remove();
                }
            });

            // Adiciona quem o Mestre colocou
            activePlayers.forEach(code => {
                if (!document.getElementById(`card-${code}`)) {
                    criarCardHTML(code);
                    socket.emit('request_player', code);
                }
            });
        }

        function criarCardHTML(code) {
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.innerHTML = `
                <div class="foto-container"><img src="" id="foto-${code}" class="foto"></div>
                <div class="status-numbers">
                    <div class="val-vida" id="vida-${code}">00/00</div>
                    <div class="val-sani" id="sani-${code}">00/00</div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        window.onload = () => {
            atualizarOverlay();
            setInterval(() => {
                activePlayers.forEach(code => socket.emit('request_player', code));
            }, 10000);
        };

        // 1. Sincronização via Memória do Navegador (para quem usa Chrome)
        window.addEventListener('storage', (e) => {
            if (e.key === 'mestre_allowed_codes') {
                activePlayers = JSON.parse(e.newValue) || [];
                atualizarOverlay();
            }
        });

        // 2. Sincronização via Socket (Essencial para funcionar no OBS Studio)
        socket.on('connect', () => {
            // Pede ao mestre a lista de jogadores atual mal o OBS liga
            socket.emit('comando_mestre', { tipo: 'request_overlay_sync' });
        });

        socket.on('comando_mestre', (dados) => {
            // Recebeu a ordem do Mestre com a lista atualizada
            if (dados.tipo === 'sync_overlay' && dados.players) {
                activePlayers = dados.players;
                localStorage.setItem('mestre_allowed_codes', JSON.stringify(activePlayers));
                atualizarOverlay();
            }
        });

        socket.on('update_mestre', (dados) => {
            if (activePlayers.includes(dados.codigo)) {
                const cod = dados.codigo;
                const fotoEl = document.getElementById(`foto-${cod}`);
                if (fotoEl) {
                    fotoEl.src = dados.foto || 'https://via.placeholder.com/140';
                }

                const vidaEl = document.getElementById(`vida-${cod}`);
                const saniEl = document.getElementById(`sani-${cod}`);
                
                if(vidaEl) vidaEl.innerText = `${dados.vida_atual || 0}/${dados.vida_max || 0}`;
                if(saniEl) saniEl.innerText = `${dados.sani_atual || 0}/${dados.sani_max || 0}`;

                const ammoEl = document.getElementById(`ammo-${cod}`);
                let muniTexto = "";
                if (dados.fullData && dados.fullData.arma_ativa_id && dados.fullData.inv) {
                    const arma = dados.fullData.inv.find(item => item.id === dados.fullData.arma_ativa_id);
                    if (arma && arma.ammo !== "Nenhuma") muniTexto = arma.currentShots || "0";
                }
                if(ammoEl) ammoEl.innerText = muniTexto;
            }
        });
    </script>
</body>
</html>
