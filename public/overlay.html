<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG</title>
    <style>
        /* Importação da fonte personalizada Gabriele Bad */
        @font-face {
            font-family: 'Gabriele Bad';
            src: url('gabriele-bad.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* AVISO PARA O OBS (SE O LINK ESTIVER ERRADO) */
        #erro-obs {
            display: none;
            background: rgba(200, 0, 0, 0.9);
            border: 2px solid white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 24px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        /* GRADE CONFIGURADA */
        #multi-overlay-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(8, auto);
            gap: 20px 40px; 
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px; 
            animation: fadeIn 0.6s ease-out;
            cursor: pointer;
            position: relative;
            transition: filter 0.5s ease;
        }

        /* Efeito Hover do Rato (Para o OBS) */
        .player-card:hover {
            filter: brightness(1.15);
        }

        /* =====================================================
           EFEITO VISUAL: TURNO ATIVO (INICIATIVA)
           ===================================================== */
        .player-card.active-turn {
            z-index: 10;
        }

        /* O DESTAQUE E ANIMAÇÃO APLICAM-SE APENAS À FOTO */
        .player-card.active-turn .foto {
            transform: perspective(400px) scale(1.2) translateX(10px) !important; 
            filter: drop-shadow(0 0 15px rgba(255, 207, 51, 1)); 
        }
        /* ===================================================== */

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.8); }
        }

        .foto-container {
            width: 105px; 
            height: 105px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
        }

        /* =====================================================
           ANIMAÇÃO LIVE2D / DEFORMAÇÃO DE MALHA (MESH WARP)
           ===================================================== */
        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            border-radius: 8px; /* Cantos ligeiramente arredondados caso prefiras */
            transform-origin: bottom center; 
            animation: live2d-breathe 4s infinite ease-in-out alternate;
            transition: opacity 0.3s ease-in-out, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.5s ease;
            will-change: transform;
        }

        @keyframes live2d-breathe {
            0% { transform: perspective(400px) rotateY(0deg) scaleX(1) scaleY(1) translateY(0) skewX(0deg); }
            50% { transform: perspective(400px) rotateY(2deg) scaleX(0.97) scaleY(1.04) translateY(-2px) skewX(0.5deg); }
            100% { transform: perspective(400px) rotateY(-1deg) scaleX(1.01) scaleY(0.99) translateY(1px) skewX(-0.5deg); }
        }
        /* ===================================================== */

        .info-wrapper {
            display: flex;
            align-items: center;
            gap: 20px; 
        }

        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 4px; 
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 2rem; 
            font-weight: normal;
            line-height: 1;
            user-select: none;
            letter-spacing: 1px; 
        }

        .val-vida { 
            color: white; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.4); 
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }
        
        .val-sani { 
            color: white; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(0, 170, 255, 0.8), 0 0 15px rgba(0, 170, 255, 0.4); 
        }
        
        .val-ammo { 
            color: white; 
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 2rem; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(255, 207, 51, 0.8), 0 0 15px rgba(255, 207, 51, 0.4); 
            user-select: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="erro-obs">
        ERRO DE LIGAÇÃO!<br><br>
        O Streamlabs não sabe qual é a tua mesa.<br>
        Por favor, clica no botão "OVERLAY" no Escudo do Mestre,<br>
        copia o link completo (que termina em ?mesa=nome-da-mesa)<br>
        e cola nas propriedades do Browser Source no Streamlabs.
    </div>

    <div id="multi-overlay-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        
        const urlParams = new URLSearchParams(window.location.search);
        let campanhaAtiva = urlParams.get('mesa') || localStorage.getItem('campanha_atual');
        
        // Exibe o erro se estiver a ser corrido no OBS sem a identificação da mesa
        if (!campanhaAtiva) {
            document.getElementById('erro-obs').style.display = 'block';
        }

        let activePlayers = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];

        function atualizarOverlay() {
            const cardsAtuais = Array.from(container.children).map(c => c.id.replace('card-', ''));
            
            cardsAtuais.forEach(code => {
                if (!activePlayers.includes(code)) {
                    const el = document.getElementById(`card-${code}`);
                    if (el) el.remove();
                }
            });

            activePlayers.forEach(code => {
                if (!document.getElementById(`card-${code}`)) {
                    criarCardHTML(code);
                    if (campanhaAtiva) {
                        socket.emit('request_player', code);
                    }
                }
            });
        }

        function criarCardHTML(code) {
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.title = "Clique para remover do Overlay"; 
            
            div.onclick = () => removerDoOverlay(code);
            
            // CADA JOGADOR RESPIRA DE FORMA INDEPENDENTE (Delay aleatório)
            const randomDelay = (Math.random() * -4).toFixed(2);
            
            div.innerHTML = `
                <div class="foto-container">
                    <img src="https://via.placeholder.com/140" id="foto-${code}" class="foto" style="animation-delay: ${randomDelay}s;">
                </div>
                <div class="info-wrapper">
                    <div class="status-numbers">
                        <div class="val-vida" id="vida-${code}">00/00</div>
                        <div class="val-sani" id="sani-${code}">00/00</div>
                    </div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        function removerDoOverlay(code) {
            const el = document.getElementById(`card-${code}`);
            if (el) {
                el.style.animation = 'fadeOut 0.4s ease-in forwards'; 
                setTimeout(() => {
                    el.remove();
                    activePlayers = activePlayers.filter(c => c !== code);
                    localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(activePlayers));
                    if (campanhaAtiva) {
                        socket.emit('comando_mestre', { tipo: 'remover_jogador_mestre', codigo: code });
                    }
                }, 400); 
            }
        }

        function destacarTurnoIniciativa(currentId) {
            document.querySelectorAll('.player-card').forEach(card => {
                card.classList.remove('active-turn');
            });
            
            if (currentId) {
                const activeCard = document.getElementById(`card-${currentId}`);
                if (activeCard) {
                    activeCard.classList.add('active-turn');
                }
            }
        }

        window.onload = () => {
            if (campanhaAtiva) atualizarOverlay();
            setInterval(() => {
                if(campanhaAtiva) {
                    activePlayers.forEach(code => socket.emit('request_player', code));
                }
            }, 10000);
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'mestre_allowed_codes_' + campanhaAtiva) {
                activePlayers = JSON.parse(e.newValue) || [];
                atualizarOverlay();
            }
        });

        socket.on('connect', () => {
            if (campanhaAtiva) {
                socket.emit('join_campaign', campanhaAtiva);
                socket.emit('comando_mestre', { tipo: 'request_overlay_sync' });
            }
        });

        socket.on('comando_mestre', (dados) => {
            if (dados.tipo === 'sync_overlay' && dados.players) {
                activePlayers = dados.players;
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(activePlayers));
                atualizarOverlay();
            }
            
            if (dados.tipo === 'turno_iniciativa') {
                destacarTurnoIniciativa(dados.currentId);
            }
        });

        // Função Centralizada para Extrair e Atualizar os Dados
        function processarAtualizacao(dados) {
            const codPuro = (dados.codigo || "").toUpperCase(); 
            if (!codPuro || !activePlayers.includes(codPuro)) return;

            // Extração Segura da Foto
            const fotoEl = document.getElementById(`foto-${codPuro}`);
            const novaFoto = dados.foto || dados.fullData?.info?.char_img || 'https://via.placeholder.com/140';
            
            if (fotoEl && fotoEl.getAttribute('src') !== novaFoto) {
                fotoEl.style.opacity = 0; 
                setTimeout(() => {
                    fotoEl.src = novaFoto; 
                    fotoEl.setAttribute('src', novaFoto);
                    fotoEl.onload = () => fotoEl.style.opacity = 1; 
                    setTimeout(() => fotoEl.style.opacity = 1, 100);
                }, 300);
            }

            // Extração Segura dos Valores de Status (Vida e Sani)
            const vA = dados.vida_atual !== undefined ? dados.vida_atual : (dados.status?.vida_atual !== undefined ? dados.status?.vida_atual : (dados.fullData?.info?.vida_atual || 0));
            const vM = dados.vida_max !== undefined ? dados.vida_max : (dados.fullData?.info?.vida_max || 0);
            const sA = dados.sani_atual !== undefined ? dados.sani_atual : (dados.status?.sani_atual !== undefined ? dados.status?.sani_atual : (dados.fullData?.info?.sani_atual || 0));
            const sM = dados.sani_max !== undefined ? dados.sani_max : (dados.fullData?.info?.sani_max || 0);

            const vidaEl = document.getElementById(`vida-${codPuro}`);
            const saniEl = document.getElementById(`sani-${codPuro}`);
            
            if(vidaEl) vidaEl.innerText = `${vA}/${vM}`;
            if(saniEl) saniEl.innerText = `${sA}/${sM}`;

            // Extração Segura da Munição da Arma Ativa
            const ammoEl = document.getElementById(`ammo-${codPuro}`);
            let muniTexto = "";
            if (dados.fullData && dados.fullData.arma_ativa_id && dados.fullData.inv) {
                const arma = dados.fullData.inv.find(item => item.id === dados.fullData.arma_ativa_id);
                if (arma && arma.ammo !== "Nenhuma") muniTexto = arma.currentShots !== undefined ? arma.currentShots : (arma.capacity || "0");
            }
            if(ammoEl) ammoEl.innerText = muniTexto;
        }

        // O Overlay agora escuta todos os eventos possíveis de atualização para não perder dados!
        socket.on('update_mestre', processarAtualizacao);
        socket.on('status_change', processarAtualizacao);
        socket.on('mestre_force_sync_player', processarAtualizacao);

    </script>
</body>
</html>
