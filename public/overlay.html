<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay RPG</title>
    <style>
        /* Importação da fonte personalizada Gabriele Bad */
        @font-face {
            font-family: 'Gabriele Bad';
            src: url('gabriele-bad.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 30px;
            background: transparent;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* GRADE CONFIGURADA */
        #multi-overlay-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(8, auto);
            gap: 20px 40px; 
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 15px; 
            animation: fadeIn 0.6s ease-out;
            cursor: pointer;
            position: relative;
        }

        /* Efeito Hover do Rato (Para o OBS) */
        .player-card:hover {
            filter: brightness(1.15);
        }

        /* =====================================================
           EFEITO VISUAL: TURNO ATIVO (INICIATIVA)
           ===================================================== */
        .player-card.active-turn {
            z-index: 10;
        }

        /* A ampliação e o brilho vão para o contentor da foto no turno */
        .player-card.active-turn .foto-container {
            transform: scale(1.25) translateX(10px);
            filter: drop-shadow(0 0 15px rgba(255, 207, 51, 1));
        }

        /* Destaca a vida com amarelo no turno */
        .player-card.active-turn .val-vida {
            color: #ffcf33;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9), 0 0 10px rgba(255, 207, 51, 0.9), 0 0 20px rgba(255, 207, 51, 0.6);
        }
        /* ===================================================== */

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.8); }
        }

        .foto-container {
            width: 105px; 
            height: 105px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end; /* Mantém a base presa */
            justify-content: center;
            /* Transição para quando ganha o turno */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.5s ease;
        }

        /* =====================================================
           ANIMAÇÃO LIVE2D / DEFORMAÇÃO DE MALHA (MESH WARP)
           ===================================================== */
        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            /* A origem do movimento é a base do pescoço/ombros para parecer real */
            transform-origin: bottom center; 
            /* A animação infinita de respiração */
            animation: live2d-breathe 4s infinite ease-in-out alternate;
            transition: opacity 0.3s ease-in-out;
            will-change: transform;
        }

        @keyframes live2d-breathe {
            0% {
                /* Estado Normal */
                transform: perspective(400px) rotateY(0deg) scaleX(1) scaleY(1) translateY(0) skewX(0deg);
            }
            50% {
                /* Inspirar: O peito sobe, estica a malha na vertical, contrai na horizontal, e cria um leve balanço 3D */
                transform: perspective(400px) rotateY(2deg) scaleX(0.97) scaleY(1.04) translateY(-2px) skewX(0.5deg);
            }
            100% {
                /* Expirar: Relaxa, alarga um pouco e inverte o balanço 3D */
                transform: perspective(400px) rotateY(-1deg) scaleX(1.01) scaleY(0.99) translateY(1px) skewX(-0.5deg);
            }
        }
        /* ===================================================== */

        .info-wrapper {
            display: flex;
            align-items: center;
            gap: 20px; 
        }

        .status-numbers {
            display: flex;
            flex-direction: column;
            gap: 4px; 
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 2rem; 
            font-weight: normal;
            line-height: 1;
            user-select: none;
            letter-spacing: 1px; 
        }

        .val-vida { 
            color: white; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.4); 
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }
        
        .val-sani { 
            color: white; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(0, 170, 255, 0.8), 0 0 15px rgba(0, 170, 255, 0.4); 
        }
        
        .val-ammo { 
            color: white; 
            font-family: 'Gabriele Bad', sans-serif;
            font-size: 2rem; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), 0 0 8px rgba(255, 207, 51, 0.8), 0 0 15px rgba(255, 207, 51, 0.4); 
            user-select: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="multi-overlay-container"></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('multi-overlay-container');
        
        const urlParams = new URLSearchParams(window.location.search);
        let campanhaAtiva = urlParams.get('mesa') || localStorage.getItem('campanha_atual');
        
        let activePlayers = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];

        function atualizarOverlay() {
            const cardsAtuais = Array.from(container.children).map(c => c.id.replace('card-', ''));
            
            cardsAtuais.forEach(code => {
                if (!activePlayers.includes(code)) {
                    const el = document.getElementById(`card-${code}`);
                    if (el) el.remove();
                }
            });

            activePlayers.forEach(code => {
                if (!document.getElementById(`card-${code}`)) {
                    criarCardHTML(code);
                    if (campanhaAtiva) {
                        socket.emit('request_player', code);
                    }
                }
            });
        }

        function criarCardHTML(code) {
            const div = document.createElement('div');
            div.className = 'player-card';
            div.id = `card-${code}`;
            div.title = "Clique para remover do Overlay"; 
            
            div.onclick = () => removerDoOverlay(code);
            
            // CADA JOGADOR RESPIRA DE FORMA INDEPENDENTE (Delay aleatório)
            const randomDelay = (Math.random() * -4).toFixed(2);
            
            div.innerHTML = `
                <div class="foto-container">
                    <img src="" id="foto-${code}" class="foto" style="animation-delay: ${randomDelay}s;">
                </div>
                <div class="info-wrapper">
                    <div class="status-numbers">
                        <div class="val-vida" id="vida-${code}">00/00</div>
                        <div class="val-sani" id="sani-${code}">00/00</div>
                    </div>
                    <div class="val-ammo" id="ammo-${code}"></div>
                </div>
            `;
            container.appendChild(div);
        }

        function removerDoOverlay(code) {
            const el = document.getElementById(`card-${code}`);
            if (el) {
                el.style.animation = 'fadeOut 0.4s ease-in forwards'; 
                
                setTimeout(() => {
                    el.remove();
                    activePlayers = activePlayers.filter(c => c !== code);
                    localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(activePlayers));
                    if (campanhaAtiva) {
                        socket.emit('comando_mestre', { tipo: 'remover_jogador_mestre', codigo: code });
                    }
                }, 400); 
            }
        }

        function destacarTurnoIniciativa(currentId) {
            document.querySelectorAll('.player-card').forEach(card => {
                card.classList.remove('active-turn');
            });
            
            if (currentId) {
                const activeCard = document.getElementById(`card-${currentId}`);
                if (activeCard) {
                    activeCard.classList.add('active-turn');
                }
            }
        }

        window.onload = () => {
            atualizarOverlay();
            setInterval(() => {
                if(campanhaAtiva) {
                    activePlayers.forEach(code => socket.emit('request_player', code));
                }
            }, 10000);
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'mestre_allowed_codes_' + campanhaAtiva) {
                activePlayers = JSON.parse(e.newValue) || [];
                atualizarOverlay();
            }
            if (e.key === 'campanha_atual' && !urlParams.get('mesa')) {
                campanhaAtiva = e.newValue;
                activePlayers = JSON.parse(localStorage.getItem('mestre_allowed_codes_' + campanhaAtiva)) || [];
                socket.emit('join_campaign', campanhaAtiva);
                socket.emit('comando_mestre', { tipo: 'request_overlay_sync' });
                atualizarOverlay();
            }
        });

        socket.on('connect', () => {
            if (campanhaAtiva) {
                socket.emit('join_campaign', campanhaAtiva);
                socket.emit('comando_mestre', { tipo: 'request_overlay_sync' });
            }
        });

        socket.on('comando_mestre', (dados) => {
            if (dados.tipo === 'sync_overlay' && dados.players) {
                activePlayers = dados.players;
                localStorage.setItem('mestre_allowed_codes_' + campanhaAtiva, JSON.stringify(activePlayers));
                atualizarOverlay();
            }
            
            if (dados.tipo === 'turno_iniciativa') {
                destacarTurnoIniciativa(dados.currentId);
            }
        });

        socket.on('update_mestre', (dados) => {
            const codPuro = dados.codigo; 
            
            if (activePlayers.includes(codPuro)) {
                const fotoEl = document.getElementById(`foto-${codPuro}`);
                const novaFoto = dados.foto || 'https://via.placeholder.com/140';
                
                if (fotoEl && fotoEl.getAttribute('src') !== novaFoto) {
                    fotoEl.style.opacity = 0; 
                    setTimeout(() => {
                        fotoEl.src = novaFoto; 
                        fotoEl.setAttribute('src', novaFoto);
                        fotoEl.onload = () => fotoEl.style.opacity = 1; 
                        setTimeout(() => fotoEl.style.opacity = 1, 100);
                    }, 300);
                }

                const vidaEl = document.getElementById(`vida-${codPuro}`);
                const saniEl = document.getElementById(`sani-${codPuro}`);
                
                if(vidaEl) vidaEl.innerText = `${dados.vida_atual || 0}/${dados.vida_max || 0}`;
                if(saniEl) saniEl.innerText = `${dados.sani_atual || 0}/${dados.sani_max || 0}`;

                const ammoEl = document.getElementById(`ammo-${codPuro}`);
                let muniTexto = "";
                if (dados.fullData && dados.fullData.arma_ativa_id && dados.fullData.inv) {
                    const arma = dados.fullData.inv.find(item => item.id === dados.fullData.arma_ativa_id);
                    if (arma && arma.ammo !== "Nenhuma") muniTexto = arma.currentShots || "0";
                }
                if(ammoEl) ammoEl.innerText = muniTexto;
            }
        });
    </script>
</body>
</html>
