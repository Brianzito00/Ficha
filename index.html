<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Ordem Paranormal</title>
    <style>
        :root {
            --bg-body: #121214; --bg-card: rgba(32, 32, 36, 0.9); --border-color: rgba(50, 50, 56, 0.8); 
            --text-primary: #e1e1e6; --accent-blue: #00b0ff; --accent-red: #e53935; --accent-green: #00e676;
        }
        body {
            font-family: 'Roboto', sans-serif; background-color: var(--bg-body);
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-primary); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .login-container { background: var(--bg-card); border: 1px solid var(--border-color); padding: 40px; border-radius: 12px; backdrop-filter: blur(12px); width: 350px; text-align: center; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .logo-title { font-size: 1.8em; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: #3c4043; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; transition: 0.2s; }
        .google-btn:hover { background: #eee; }
        #choice-section { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.5s forwards; }
        .role-btn { background: rgba(0, 0, 0, 0.5); border: 2px solid var(--border-color); color: white; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 1.2em; text-transform: uppercase; }
        .role-btn.player { border-color: var(--accent-blue); }
        .role-btn.player:hover { background: rgba(0, 176, 255, 0.2); transform: translateY(-2px); }
        .role-btn.master { border-color: var(--accent-red); }
        .role-btn.master:hover { background: rgba(229, 57, 53, 0.2); transform: translateY(-2px); }
        .loader { border: 3px solid rgba(0,0,0,0.1); border-left-color: var(--accent-blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-title">Sistema<br><span style="color: var(--accent-red)">Ordem</span></div>
        
        <div id="login-section">
            <div style="font-size: 0.8em; color: var(--text-secondary); margin-bottom: 15px;">Acesse a plataforma de RPG:</div>
            <button class="google-btn" onclick="simulateLogin()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" alt="Google"> 
                <span id="btn-text">Continuar com o Google</span>
                <div id="loading-spinner" class="loader"></div>
            </button>
        </div>

        <div id="choice-section">
            <div style="color: var(--accent-green); font-weight: bold; margin-bottom: 10px;">Conectado! Escolha a tela:</div>
            
            <button class="role-btn player" onclick="goTo('ficha.html')">FICHA DE JOGADOR</button>
            <button class="role-btn master" onclick="goTo('mestre.html')">TELA DO MESTRE</button>
        </div>
    </div>

    <script>
        function simulateLogin() {
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('loading-spinner').style.display = 'block';
            setTimeout(() => {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('choice-section').style.display = 'flex';
            }, 1000);
        }

        function goTo(page) {
            document.querySelector('.login-container').style.opacity = '0';
            document.querySelector('.login-container').style.transform = 'scale(0.9)';
            setTimeout(() => {
                window.location.href = page; // Redireciona para ficha.html ou mestre.html
            }, 300);
        }
    </script>
</body>
</html>
