<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ficha do Agente - Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-body: #121214; --bg-card: rgba(32, 32, 36, 0.85); --bg-input: rgba(18, 18, 20, 0.8);
            --border-color: rgba(50, 50, 56, 0.8); --text-primary: #e1e1e6; --accent-blue: #00b0ff; --accent-red: #e53935; --accent-green: #00e676;
        }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-body) url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEixvi2mJH9iT2I1itmVsUXChJZ6M1-9LLb2aYaubdjXd7bGBH2sYnpazs_Cr7gNZdLLw_amMEna0FiVTU9fd4qDAm85gtq00RMJSBnktnscwDQ3l_SB2vlB9lpKHhsRgihn-EsnG0PdWX-fLTggvcBd_rXCfYPqZ7Itko_-0wI6ORDKeNrahjWfj1Q9fnuM/s1920/Wallpaper%20Ordem%20Paranormal%20O%20Culto%20do%20Outro%20Lado.jpg') center/cover fixed; color: var(--text-primary); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; max-width: 1000px; margin-bottom: 20px; background: var(--bg-card); padding: 15px; border-radius: 8px; }
        .sync-box input { background: #000; border: none; border-bottom: 2px solid var(--accent-blue); color: white; text-align: center; padding: 5px; width: 120px; }
        .panel { background: var(--bg-card); padding: 20px; border-radius: 12px; width: 100%; max-width: 1000px; box-sizing: border-box; margin-bottom: 20px; border: 1px solid var(--border-color); backdrop-filter: blur(8px); }
        .char-portrait { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent-blue); object-fit: cover; cursor: pointer; }
        .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 1000px; }
        .status-box { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .bar-bg { height: 20px; background: #000; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; width: 100%; transition: 0.5s; }
        .btn-status { background: #222; border: 1px solid #444; color: #888; padding: 5px; cursor: pointer; font-size: 0.7em; margin: 2px; }
        .active-lesionado { background: #8b0000 !important; color: white; }
        .active-enlouquecendo { background: #01579b !important; color: white; }
        input[type="number"] { background: transparent; border: none; color: white; font-weight: bold; width: 45px; text-align: center; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="sync-box">
            <span>ID SYNC:</span>
            <input type="text" id="sync_id" value="Agente01" onchange="changeId()">
        </div>
        <button onclick="save()" style="background:var(--accent-green); border:none; padding:10px; font-weight:bold; border-radius:5px; cursor:pointer;">☁️ SINCRONIZAR ONLINE</button>
    </div>

    <div class="panel">
        <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap; justify-content:center;">
            <img id="display_img" src="https://via.placeholder.com/150" class="char-portrait" onclick="setPhotos()">
            <div style="flex:1;">
                <label>Nome:</label><input type="text" id="c_nome" style="background:rgba(0,0,0,0.3); border:1px solid #555; color:white; padding:8px; width:90%;" oninput="save()">
            </div>
        </div>
    </div>

    <div class="status-grid">
        <div class="status-box">
            <b style="color:var(--accent-red)">VIDA</b>
            <div class="bar-bg"><div id="bar_vida" class="bar-fill" style="background:var(--accent-red)"></div></div>
            <input type="number" id="v_at" value="10" oninput="save()"> / <input type="number" id="v_mx" value="10" oninput="save()">
            <br><br><button id="btn_les" class="btn-status" onclick="toggleStatus('lesionado')">Lesionado</button>
        </div>
        <div class="status-box">
            <b style="color:var(--accent-blue)">SANIDADE</b>
            <div class="bar-bg"><div id="bar_sani" class="bar-fill" style="background:var(--accent-blue)"></div></div>
            <input type="number" id="s_at" value="10" oninput="save()"> / <input type="number" id="s_mx" value="10" oninput="save()">
            <br><br><button id="btn_enl" class="btn-status" onclick="toggleStatus('enlouquecendo')">Enlouquecendo</button>
        </div>
        <div class="status-box" style="grid-column: span 2;">
            <b style="color:var(--accent-yellow)">MUNIÇÃO</b><br>
            <input type="number" id="ammo" value="6" style="font-size:2em; width:80px;" oninput="save()">
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3Ivin8vJWA7qB5WwRo23KfQpT38BP0e4",
            authDomain: "ficha-3f03e.firebaseapp.com",
            databaseURL: "https://ficha-3f03e-default-rtdb.firebaseio.com/",
            projectId: "ficha-3f03e",
            storageBucket: "ficha-3f03e.firebasestorage.app",
            messagingSenderId: "95581213733",
            appId: "1:95581213733:web:38c415b15cabacb3da1bcc"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let syncId = new URLSearchParams(window.location.search).get('id') || "Agente01";
        document.getElementById('sync_id').value = syncId;
        let status = { lesionado: false, enlouquecendo: false };
        let photos = { normal: '', lesionado: '', enlouquecendo: '', combo: '' };

        function changeId() { syncId = document.getElementById('sync_id').value; load(); }
        function toggleStatus(t) { status[t] = !status[t]; save(); }
        function setPhotos() {
            photos.normal = prompt("Link Foto Normal:", photos.normal);
            photos.lesionado = prompt("Link Foto Lesionado:", photos.lesionado);
            photos.enlouquecendo = prompt("Link Foto Enlouquecendo:", photos.enlouquecendo);
            photos.combo = prompt("Link Foto Combo:", photos.combo);
            save();
        }

        function save() {
            const data = {
                nome: document.getElementById('c_nome').value,
                v_at: document.getElementById('v_at').value,
                v_mx: document.getElementById('v_mx').value,
                s_at: document.getElementById('s_at').value,
                s_mx: document.getElementById('s_mx').value,
                ammo: document.getElementById('ammo').value,
                status: status, photos: photos
            };
            db.ref('fichas/' + syncId).set(data);
            updateUI(data);
        }

        function load() {
            db.ref('fichas/' + syncId).on('value', (snap) => {
                const d = snap.val();
                if(d) {
                    document.getElementById('c_nome').value = d.nome || '';
                    document.getElementById('v_at').value = d.v_at || 10;
                    document.getElementById('v_mx').value = d.v_mx || 10;
                    document.getElementById('s_at').value = d.s_at || 10;
                    document.getElementById('s_mx').value = d.s_mx || 10;
                    document.getElementById('ammo').value = d.ammo || 0;
                    status = d.status || { lesionado: false, enlouquecendo: false };
                    photos = d.photos || { normal: '', lesionado: '', enlouquecendo: '', combo: '' };
                    updateUI(d);
                }
            });
        }

        function updateUI(d) {
            document.getElementById('bar_vida').style.width = (d.v_at/d.v_mx*100) + "%";
            document.getElementById('bar_sani').style.width = (d.s_at/d.s_mx*100) + "%";
            document.getElementById('btn_les').className = status.lesionado ? 'btn-status active-lesionado' : 'btn-status';
            document.getElementById('btn_enl').className = status.enlouquecendo ? 'btn-status active-enlouquecendo' : 'btn-status';
            let img = photos.normal;
            if(status.lesionado && status.enlouquecendo) img = photos.combo || photos.lesionado;
            else if(status.lesionado) img = photos.lesionado;
            else if(status.enlouquecendo) img = photos.enlouquecendo;
            document.getElementById('display_img').src = img || 'https://via.placeholder.com/150';
        }
        load();
    </script>
</body>
</html>
